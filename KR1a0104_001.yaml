body:
  text: 像象管見卷一上明錢一本撰乾元亨利貞易有太極是生兩儀兩之而四為四象四之而八為八卦八卦者三畫卦之名重之則六畫卦之名然原初只有兩畫一畫象天一畫象地並不曾再有一畫象人以明兩畫即天地即人天地之外無人人之外無天地也今指三畫卦而曰上畫天下畫地中畫人指六畫卦而曰上兩畫天下兩畫地中兩畫人此但就卦位以明三才之義若曰人參天地為才上不參天下不兩地無以為人云爾其實易者象象也者像參天兩地乃人之才上天下地皆人之像聖人作易立卦生爻凡天地雷風水火山澤卦卦爻爻之象無有不從人分以發揮立人之道故不惟曰象而又特謂之像也羲畫首乾六爻皆陽運而無息是為天下之至健其象天也而像人也人人莫不有是全體之乾道在其身也文王彖乾曰元亨利貞造化陽生隂成陽闢隂闔陽以生物為德生之所始是為乾元元象元陽發舒元氣流行爻爻皆闢亨象陽無不遂爻爻各足陽無不正爻爻可固利貞之象像乾者由文繫乾之辭明羲重乾之象便知此始萬物之元德生萬物之亨德遂萬物之利德成萬物之貞德天得之為天而像在天人得之為人而像在人在天固成乾之象在人不成乾之像是天有乾道而人無乾道人道何以立惟于乾象首先有像方是全體天道而成得人道方始有易可學六十四卦都是人像都是人道卦卦此像象之學爻爻此像象之學能象者能占不象者不占無有有象而無占無有有占而無象或問諸卦亦有元亨利貞之繫何居曰易有太極隂陽未分是三才渾然為一之全體到分隂分陽從純陽六爻之卦言太極謂之乾元故夫子贊乾獨于乾元稱大從純隂六爻之卦言太極謂之坤元故夫子贊坤又于坤元稱至餘卦分體乾坤六爻相雜隂陽之純體不備所謂元亨言其大亨所謂利貞言隨卦畫之性情俱利于貞以貞為利耳己初九潜龍勿用乾爻名九坤爻名六九參天之數六兩地之數爻皆人道參天兩地之用也乾九又名龍行雲施雨以澤天下天用莫如龍故以龍名合六龍而在一卦五天位飛上治初乃龍之德民之分地之下二以上見而用初有潜無見隱而弗用潜龍弗用之象像乾初之象龍在下必潜得潜龍之意凡密以洗心靜以立極隱以求志退以明分無之非全體乾健效變于初善藏其用之天則不然居下而欲為上未出乎潜而遽欲見乎用用違其時德戾其位便不成其為乾便不可以名龍便有所不像便是不能占而無以效天下之動矣九二見龍在田利見大人利見大人卦辭四訟蹇萃㢲爻辭三乾二五蹇上初地之下龍德深藏而不見二地之上龍德離潜而出見五天之正位飛為五上有天道曰在天二地之正位見為二下有地道曰在田見龍在田之象飛天之龍居中正之君位在上位之大人見田之龍備正中之君德在下位之大人飛于五德位兼在人人利見而蒙上治之澤見于二君位不在君德在人人利見而被文明之化利見大人之象九三君子終日乾乾夕惕若厲無咎咎其久切愆也過也從人各各者相違也天違人違天下之事乖矣三不言龍而言君子君子在人位盡人道全體龍德君子即人龍之象居下乾之終應上乾之終有終竟一日自日而夕之象居下而要下之終一日若不失其為一乾應上而要上之終一夕若惟恐失其為一乾乾體合上下而皆成通晝夜而無息君子終日乾乾夕惕若之象如是即過二之中而處危之地以乾惕而善補過矣厲無咎之象九四或躍在淵無咎三曰乾乾上天下田之中既自撰成一乾要終旋上以為乾四曰躍淵上天下田之中又若闢成一淵原始合初以為淵初潜確而不可拔四躍或而不可執四以身上下進退于不天不田上空下洞淵深不測之中或躍在淵之象不言龍但象以躍與三皆君子皆人龍也龍以二五為正中三以乾惕善補過于二上無咎四以或躍善補過于五下無咎九五飛龍在天利見大人六爻同一龍德而時位則以天飛為至五天位飛龍在天之象二曰利見大人大人在下修身見于世五曰利見大人大人在上聖作而物覩飛見之位異大人之德同故上下利見之象亦同上九亢龍有悔亢苦浪切髙極也悔去聲初為地下去五之飛甚遠全無見意潜象上為天外于五之飛又過全無下意亢象悔吝言乎小疵又為憂虞又曰震無咎者存乎悔上居亢極不自以為盡善全美則且以為疵恐不可以訓天下後世則且以為憂且震而動補過之心是皆亢而有悔之象悔言有不必然不必不然與惕若之意亦相應用九見羣龍無首吉六十四卦除乾坤二卦外卦卦剛柔相雜以剛則必下柔以柔則必從剛或主剛而用柔或主柔而用剛無有不相為用惟乾九坤六純剛純柔六爻不相上下有不相用之象故特于乾坤明九六之用九言用猶龍言乘龍無為之乘龍自為首九無為之用九自為首用九分而六潜見惕躍飛亢各成其用合而一潜見惕躍飛亢皆若不自用而各相為用而有為之用羣龍未嘗無首羣龍未嘗不首出只人見羣龍有首乃羣龍之自見則通六龍以為見不執一龍以為見並無據見在所乘之位而見其可獨為首者無首見羣必相下羣必相取安得不吉如五見無飛之首首不在飛去處五龍無不應求無不流就無不如雲龍風虎之相從便成首出庶物萬國咸寧之上治五龍無首之見之用俱放此彖曰大哉乾元萬物資始乃統天雲行雨施品物流行大明終始六位時成時乘六龍以御天乾道變化各正性命保合大和乃利貞首出庶物萬國咸寧彖吐亂切按以彖象文言雜入卦中自漢費直鄭康成始彖曰象曰俱王弼所加易六畫成卦六位成章六者三才之道凡卦俱備三才之道而乾為首文王彖乾繫以元亨利貞之辭劈初就從乾上彖明三才合一之道故夫子贊乾首舉元德以明人分乾道之大元何以大萬物之生有形非始有夫未形而為之始萬物所資以為始乾元也這箇始萬物之元即三才統體之元分則人與天地並列為三統則參天兩地皆屬人道故曰乃統天言統天地不待言天地合而雲行隂陽和而雨施于是隨物賦形定品萬物萬品惟一元所統而有其始惟一元所流而成其形是為乾元之亨大明終始三才原合一以相終始世有大人天施地生人成原始要終而無不明徹終徹始而大為之明掛之乾卦有六位凡潜見惕躍飛亢無位不成其乾道無時不成其乾道而變化見于六位效之乾爻有六龍時以龍為乘時以天為御雲不時行御天以為之行雨不時施御天以為之施時乘時御以行乾道而變化見于六龍于是物物之性命與始而俱始者與形而俱形者以變化而無一之不正一元大和以各正而無一之不保不合物物至此而得其遂乃利物物至此而得其成乃貞是為乾元之利貞萬物就一元中以一散為萬言物品物就萬物中以物各有品言物庶物就生民中以億兆衆庶言物乾元物物之元首人得乾元之秀而最靈已為物之首大人秀之最秀靈之最靈全體乾道德曰天德位曰天位尤為億兆庶衆之首故稱首出萬國咸寧便是終始大明六位之成以時六龍之乘以時時乘六龍以御天雲行雨施以平天下之能事也夫天行健地勢坤乾坤非天地而何然人知天地之為兩儀不知兩儀之即三才且天地之所以為天地只以生物為事人知生物之為天地不知生物原合三才蓋天施地生不爭霎時間天施地生若無人何以終始資始流形終始亦不爭霎時間聖人作易兼三為兩以明人道惟人統天御天故人合天而言乾道惟人行地應地故人合地而言坤道惟天可以兼地而地不可以兼天故天則專言乾道地則止言德合雖則三才並稱其實又只是人道所謂天地設位而易行乎其中乾坤成列而易立乎其中易之行與立皆人道也象曰天行健君子以自强不息乾為君為父獨不名乾或曰所以尊乾强通作彊或作弜象稱君子凡五十三李氏曰學者未敢言無息且自不息入乾者健天得之以為天人得之以為人一般樣健以天行言晝夜周天終古不息健象君子以天行為行一團天理用事無纎毫人欲間斷是健不在天而在君子故謂之自强不息自强象乾道之健不息象乾上有乾六十四卦大象皆言以卦卦人所自有也潜龍勿用陽在下也見龍在田德施普也終日乾乾反復道也或躍在淵進無咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也造徂早切建也作也為也又天地之撰曰洪造復音服初言陽在下陽以生為德合天下而無所不施合天下而無所不造但方隱于地下其德深潜而無可見故止言其質二出地上乃實地上之德為有可見見則遂有所施便象遍在田生物之處而無所不普故曰德施普龍以下在田上在天為正中三過二故宜反復終日乾乾自日及夕反二復初潜見皆不失其道故曰反復道四近五故宜進或躍在淵進以襄五之飛而更善處上之亢故曰進無咎二以德施五兼德與位而造為民物立命為天地立心天地民物俱在大人所造中故曰大人造過五又亢四方進上已極極則盈進無退步存無亡路得無喪所然謂之有悔便知盈不可久聖人非無盈之時持盈固自有道耳用九天德不可為首六龍之德皆天而位乎天德惟五五不可為首餘不待言已文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞胡氏曰四德備而後為乾一德不備則乾道息四時具而後成嵗一時不具則嵗功虧彖𫝊以元德明乾道之大而曰大哉乾元萬物資始以三極之統體言乾元文言以四德明乾道之全而曰元者善之長以人心之太極言乾元以三極之統體言乾元仁不足以盡元以人心之大極言乾元元固可以名仁君子體仁全體是仁做成但有一肢一節不仁便是痿痺死漢何能長人體仁而生人之命皆由我立故足以長人隂陽流暢生物長茂為嘉禮以嘉名嘉即禮也嘉而不㑹合于一身即燦然有禮以相接乃貌合而非衷合安得為禮君子嘉㑹無嘉非㑹凡㑹皆嘉嘉之㑹處不言禮而禮無不合故足以合禮義利不相蒙不知所謂義者正以能使天下之無物不利所以和天下非以拂天下也能使無物不利于物無所乖戾即利為義利外無義故足以和義貞固貞所以全其為元故言固天下之事靡常貞然後固不貞不固事固于君子之貞如樹之固于幹故足以幹事君子行此四德者故曰乾元亨利貞文言直以君子為乾以乾為君子見乾之四德人人之所當行缺一則非所以為人而乾道或幾于息矣初九曰潜龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潜龍也不可拔來氏曰言堅確不可舉用初曰龍德而隱二曰龍德而正中便見六爻龍德俱無淺深所以有潜見之異只是初與二時位不同二見故言善世初隱故不易世二見故言德化初隱故不成名世不能善何德可見德施不普何名可成在純乾之時自二以上有可見之德無可成之名而况初潜并其德而無可見何名之有不易世而遁世得其為龍在已雲雨天下之心原未嘗忘無悶不成名而不見是實見是龍在已雲雨天下之心原未嘗忘無悶樂則行之原能行乎時之所當行憂則違之但惟止乎時之所當止當羣龍應求之㑹出羣龍應求之外確乎堅定之極而非羣龍之可拔如見者自見斷不以見易隱飛者自飛斷不以飛易潜以隱見各隨時位而飛潜原無優劣此所以為龍德而隱此所以為潜龍也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也龍德即聖人君天下之德在五則既中且正在二亦因中而不失正故言正中龍德原無髙逺只在尋常日用之言行間庸言一不信庸行一不謹便無間而有邪邪便不誠九二言庸言言期于信行庸行行期于謹常以信為庸言之間以間不信之邪以存必謹之誠常以謹為庸行之間以間不謹之邪以存必謹之誠有所以善乎世而不伐德極其博而進于化君天下之德其何以加于此二以此見五以此飛無優劣也故特謂之曰君德也善世不伐與遁世無悶亦一脉君子所性隨處充滿無少缺缺遁世原未減得毫釐如何悶善世原未加得毫釐如何伐九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣人道惟在忠信三言忠信二言謹信總是一誠今人德不進只是不忠信業不修只是言辭妄誕而不誠修辭立其誠修省言辭才動口更無一語不忠不信把真實不妄道理盡從口上豎立根基即口即心即辭即事日修日誠德之進在此日積日富業之修在此富有大業盡從修辭立誠上頓藏更無走作之處是以謂之居業何言乎至何言乎終三上應爻下乾為體為德以三為至上乾為用為業以上為終三為下乾之至三知之三至之所知所至皆進修之實詣處而有開必先時隱時見之幾何者不預炳于日夕乾惕之間故曰可與幾上為上乾之終三知之亦終之所知所終皆聖人之究竟處而唯變所適化裁推行之義何者不具存于進退存亡得喪之間故曰可與存義是故居上乾之位知終而終之在我始躍終亢亦與上同其有悔而不驕在下乾之位知至而至之在我反見為潜亦與初同其無悶而不憂故乾乾因其時而惕不論居上在下無時而無乾無時而無惕三之雖危而無咎以此九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎離去聲俞氏曰恆常自為二義三上應爻德業究于至與終四初應爻德業兼于上下與進退或躍在淵之義不執上以為常不執下以為常惟是進修則有常四二同功若不敢踰二之謹信之間故曰非為邪不執進以為恆不執退以為恆惟是進修則有恆三四近爻無日不與三之乾惕為羣故曰非離羣時有上下德業之進修無上下時有進退德業之進修無進退雖無不進不修之時惟恐有不及進不及修之時唯恐進非其所進修非其所修而欲當此變革之時試其所以進試其所以修是以謂之及時不然上下進退異時進修異致失其躍失其所以為淵矣如之何其無咎九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也燥蘇早先早二切六龍同德故以同類之感召而極言利見之義以聲氣言五為聲應氣求之主以水火言五為流濕就燥之處以風雲言五為龍飛虎變之㑹合上天下地而言聖人作而萬物覩本乎天者覩聖人之作而親于上本乎地者覩聖人之作而親于下以聖人上有天道故本天之類無不親聖人如天聖人下有地道故本地之類無不親聖人如地覩聖人者盡萬物親聖人者盡萬物利見聖人者盡萬物此可以徵飛龍大人之分量矣上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也上何以象亢而有悔五位乎天德是為有位五作而物覩是為有民是為聖人在上位而為主自四以下皆賢人在下位而為輔上出五上極其貴矣而無五之位極其髙矣而無五之民且在聖作之上矣而無五之輔無位而貴在無民而髙在無輔而豫聖思其終思其永雖無位無民無輔常若疑于有位有民有輔而不可久是以動而有悔甚言處髙貴之非得已而動必與悔俱也五二應爻飛見一脉四初應爻躍潜一脉上三應爻悔惕亦一脉潜龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也舍書冶切治直吏切鄧汝極曰夏暑極曰亢冬寒極亦曰亢其亢也天則固然時幾實然亶其不得已而然人眚也哉故以為窮之災乾之下三爻皆聖人退修在下時處其窮之象上三爻皆聖人進行在上時處其達之象故二言時舍而五言上治下以二為中有其德無其位方為時所舍初處于二下舍可知故勿用三過二之上雖亦舍非無進修之德業可以實徴之行事故乾乾上以五為中有其德有其位乃上治之時四處于五下治方隆自量可以試于用故或躍上過五之上治己極非亢無以變其窮故有悔潜與惕皆近見潜全然不見惕亦見之事躍與亢皆近飛躍無所亢亢乃躍之窮窮而曰災即悔言災窮亢之災悔乾上之所不能辭此其所以為龍乾行四德四德合行以成乾乾元用九六九合用以成元九之上下異位治舍異時如無元以為之用上之九或以治為首下之九必以舍為首治自在上舍自在下上治固治下舍何治以元用九上有治下無舍時乘六龍以御天雲行雨施天下平天下無不治之時矣故曰乾元用九天下治潜龍勿用陽氣潜藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則氣本作氣象雲起之貌古作氣潜言陽在下以陽在下位言下下之時言藏藏之體天下惟陽氣生物在初無藏在二何見初潜以位宜藏以時宜藏藏之而為氣未顯之而為德惟有陽氣而無陽光惟有蟄潜而無顯見故曰陽氣潜藏見龍在田陽光顯出地上遍地皆陽德發生有胥天下而囿于文明之象故曰天下文明終日乾乾自日至夕若時時顯出一箇乾行之體故曰與時偕行或躍在淵淵即潜之處躍潜一淵初潜惟一氣之蟄藏四躍則四通而變化故曰乾道乃革飛龍在天六龍之德皆天六龍之位皆天然未在天猶不稱天五飛在天德則天德位則天位以天德居天位猶是位乎天位五乃以天位居天德蓋不徒以崇髙之天位為位而惟以乾健之天德為位故曰乃位乎天德至于亢則極然而時為之也故曰與時偕極三曰與時偕行初之時潜而潜二之時見而見固可知矣上曰與時偕極四之時躍而躍五之時飛而飛又可知矣初潜藏三偕行行非與藏反四乃革上偕極極乃革之窮下乾是一時至三盡顯藏之仁故曰偕行上乾是一時至上更無或之處故曰偕極六爻又各自為一時非合德乾元之聖人莫之能用故曰乾元用九乃見天則凡潜見惕躍飛亢之間一一皆有天時之當奉即一一皆有天則之當循用初見潜之則用二見見之則用三見惕之則用四見躍之則用五見飛之則用上見亢之則用九而冠以乾元即聖人即乾元用九而見天之則即聖人即天則時行與行見行之則時極與極見極之則六龍之德無淺深而分量亦異如初言氣之藏四言道之革三曰行上曰極二胥天下而文明德博而化矣以未在天止稱君德不稱天德惟五在天然後稱天德是謂即爻以明主又曰天德不可為首是謂即卦以明元乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉情實也朱子曰萬物到秋冬收斂成實方見得他實體本質故曰性情前明乾之元德之大此又明乾之利德之大元原乾之始貞要乾之終不始必無亨不貞又何利有元之始即有元之亨始者元亨者亦元故曰乾元者始而亨者也有元之亨即有元之利貞利者元貞者亦元蓋元之性理至利貞而後有情實故曰利貞者性情也元始貞終亨利居其中亨美之㑹利義之和豈非天下之美利元始之亨繼之利貞終之何莫非以利天下既終于貞復歸于元何事又言其所利從無始來惟有乾始能以美利利天下利盡天下而不言所利聖人彖乾既贊元德之大又贊利德之大利即元之各足以生非元之外又有利但能始能亨而不到利貞亦不足以為美故言美利而曰乾始能以以之能事歸于乾始舉乾之利德之大正以見乾之元德之大也大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也俞氏曰七字惟乾之九五足以當之五乾之主爻也大哉乾元四德並列首以元德之大言大哉乾乎六爻並列首以乾五之大言剛不屈健無息而尤極其中且正純不雜粹無疵而尤極其精精凝于一情通于六合乾六爻而為之發揮剛健中正之情爻爻無不旁而通純粹精之情爻爻無不旁而通發揮旁通于六爻而無不盡之情情見于六爻乾豈在于天乎時乘為六龍天其為我御乎時行之為雲時施之為雨天下其無不平乎三代以下無善治徒以智力法制把持之而謂之平夫豈聖人乘龍御天行雲施雨之平聖人之平天下龍為乘天為御雲為行雨為施爻爻發揮爻爻有雲雨之行施爻爻旁通爻爻有雲雨之行施天下安得而不平彖言首出庶物而萬國或寧正此君子以成德為行日可見之行也潜之為言也隱而未見行而未成是以君子弗用也君子以成德為行時位合而成德之君子日可見之行有一日不可見之行君子不以為行君子不以為用自是成德君子之行用當如此潜之為言當隱之時而未可以見之時在隱之位而未可以見之位故曰隱而未見德無不可以見于行時位未成其所以行故曰行而未成是以君子弗用言己見已成之君子不以潜為用若在未見未成之時位則有所必潜此初之所以潜潜之所以為龍也君子弗用與其唯聖人初上相唤君子弗用疑未可以拘聖人其唯聖人亢非人所易為有君子亦苦莫能與之意君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也前言言行謹信此言學問寬仁皆龍德君子體乾不息實地踐履真工夫雖以二之龍德正中猶患此理易渙匪學弗聚此理易淆匪問弗辨惟寬有居匪寬無居惟仁有行匪仁無行再言二之為君德見舍學聚問辨寬居仁行之外别無可以君天下之德故有二之德有五之位固為上治有二之德無五之位亦未嘗不君天下而有餘此二五所以並稱利見大人也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣二下乾之中三以中爻論再重一乾重二之剛而無二之中故曰重剛而不中上不在天不飛下不在田不見故乾乾因其時而惕求盡其所以為在人日為乾夕猶惕寧有愧于在天之時寧有怍于在田之時如是雖不中而處危之地實盡人而善補危之過故無咎九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎五上乾之中四以中爻論再重一乾重五之剛而無五之中故曰重剛而不中上不在天不飛下不在田不見中不在人若又出于人之上并三之乾惕而亦若無有故或之或之者疑之也不在天于五何疑不在田于二何疑不在人于三何疑淵即潜之處躍則潜之革革潜為躍故或之躍潜恐二故疑之潜確而不可拔或疑而恐未確潜不易不成信是之在初不必見信之在四或無常無恆疑非之在四且恐見非之在初潜無躍之上與進無疑或兼潜之下與退有疑無疑之淵寂有疑之淵通三要終窮上而乾乾四原始極深以淵淵乾三之乾以重二之剛不中之過善補于二上無咎淵四之淵以重五之剛不中之過善補于五下無咎夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况于人乎况于鬼神乎先後前後之後先平聲後上聲相導前後曰先後先悉薦切後胡遘切皆去聲大人與天地合德與日月合明與四時合序與鬼神合吉凶大人合天天合大人兩邊俱合得來是九五大人先天後天之能事先天而天弗違天合大人後天而奉天時大人合天先天宇宙在手不論時後天時潜時見時惕時躍時飛時亢天運人從時至事起故不止曰奉天而特曰奉天時惟乾元統天天人統體一乾元不分先後故大人能先天而相導于其前能後天而相導于其後能先能後獨言于五五與天一故兩無不合天且弗違而况于人况于鬼神專言大人之先天天且弗違為有以先之况于人惟大人之造命又安得而違之况于鬼神惟大人之慿靈又安得而違之天弗違統御惟我人弗違平寧惟我鬼神弗違雲行雨施惟我言天則人與鬼神尤不待言彖言統御天爻言先後天言統言御即是能先能後而天飛之大人先後兩無不能大尤在于能先聖人彖統天之義于乾元又爻先天之義于乾五見人未透統天一步與先天一著總不可以語大明終始乾道變化之事業示人深矣亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎喪蘇浪切亡也死也又仕失位曰喪古作􅱃俗作喪誤潜之所知退下一邊躍則介于進退上下兩邊亢又但知進存得一邊非德不足時位然耳時位至上當亢而亢亢乎時位之不得不亢惟知有進存得更不知有退亡喪非聖人不能故曰其唯聖人蓋處亢之時位雖以進為正然既謂之無位無民無輔天下之知退者孰正于是存亡得喪皆然故又再言曰知進退存亡而不失其正者其唯聖人初潜惟憂違一邊而曰樂行憂違上亢惟知進存得一邊而曰知進退存亡不失其正潜亢皆時所為進退原無兩道是為潜亢一脉乾六爻龍德無二時位異乘三四上下乾之交論人道之進修恆于斯故言君子二五上下乾之中德極其盛而無不化故言大人言聖人初乾之始上乾之終原始要終具見神明不測之用故初止曰君子弗用上則再曰其唯聖人或疑聖人知進退存亡不失其正單知一邊必是失正失正安可為龍曰不見是無害其初不中無害其三四即失正無害其上而况原不失正蓋六龍時乘上下皆天終始一道可以分一為六可以通六為一原無首見如上遂以失正終亦不足以語龍矣坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物成亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆牝頻忍切楊敬仲曰牝馬最貞既從牡矣他牡欲犯之輒蹄齧不可近乾元以重乾六爻純陽至健其畫竒而一一氣運行萬物皆于乾受氣為象坤元以重坤六爻純隂至順其畫偶而兩兩形分闢萬物皆于坤受形為象始惟氣生有形有氣而後有形形生而氣日滋亨象不順一之施必無二之生寧有二之成利牝馬之貞之象君子有攸往陽全隂半此君子只是坤道半邊君子有牝馬之貞然後有攸往先迷如牝不承牡遂失所主後乃得主無往不利往西南有得朋之利往東北有喪朋之利無往非牝馬之貞無往而不以牝馬之貞為安是以有攸往而無不吉夫子贊坤亦首舉元德以明人分坤道之至乾元稱大對太極言坤元稱至對乾元言萬物于乾元受氣故曰資始萬物于坤元受形故曰資生有始而後有生天施則生不施不生生物亦天坤惟順以承之而生故曰乃順承天坤不能並乾以資物之始亦何能並天而尸生之功惟是有生必載而盡物為載載物之厚德實與覆物無疆之天德可以作配而稱合故曰坤厚載物德合無疆含靜翕之量含萬物生意于其中極其𢎞光動闢之化化生萬物而光輝極其大品物流形合此而亨是為坤之亨言坤元即曰順承天言坤亨又本于德合坤之元合天以為元無二元坤之亨合天以為亨無二亨然則坤寧自有利貞乎利牝馬之貞貞乾之貞而已牝馬地類地一于承天牝馬一于從牡其順相類地以順天行與行合天行而無疆牝馬以順牡行與行合牡行地而無疆凡柔皆有牝馬之順皆利牝馬之貞是惟坤道君子之攸行君子何獨以牝馬之貞為行乾竒為全坤偶為半乾明人道之全有統有御有先有後坤明人道之半對乾言惟有後更無先一行而先是之謂迷無不失道一行而後是之謂順方始得常就坤之四方而言又有隂陽之分西南坤隂之方巽離兑三隂屬焉君子行西南惟有順以坤之順率三隂于順而與之俱以順為行故曰西南得朋乃與類行東北艮陽之方乾坎震三陽皆終始于此焉君子行東北惟有承承之為主毋敢偶之為朋至于成艮之終而無不代之以有終隂陽㑹合而生成有慶皆此故曰東北喪朋乃終有慶西南東北惟其所之無往而非牝馬之貞貞而又安豈惟行地而無疆抑又應地而無疆故曰安貞之吉應地無疆行地無疆以君子之牝之利言應地無疆以君子之貞之安言坤所利牝馬之貞終此故三言無疆乾元始物三才統體一太極方其資始人原參焉非獨天也故曰統天及其流形人又終始之焉有統天之雲雨有大明之雲雨故曰御天坤元生物有天在先兼有統天御天者在先故曰承天以坤之四方言隂陽又各分為半陽方仍屬乾道之君子隂方乃屬坤道之君子不有牝馬之貞則行不能至不安牝馬之貞亦應不能至故曰行地又曰應地大哉乾元物物資始而天為大惟君子以統御天為大而大哉之乾元全體在乾道之君子至哉坤元物物資生而地為至惟君子以行應地為至而至哉之坤元亦全體在坤道之君子易之所謂成位乎中者此象曰地勢坤君子以厚德載物勢舒制切形勢也俗作執從幸非天以氣運曰行地以形載曰勢地勢髙下相因物物為載無有不順坤象君子以地勢為勢順便厚不順便薄如地不順天便是翻覆臣不順君子不順父便是亂賊薄德莫甚更無一物承載得來厚德坤德之厚之象載物坤上有坤之象初六履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅氷也春秋考異四時代謝以霜收殺馴似遵切音巡鄭厚曰坤爻辭皆叶霜字韻造化生物惟一氣流行而為隂陽但乾坤既分在乾初則為陽生之始在坤初則為隂生之始以隂言又以順陽為化為生物之德以不順陽為凝為殺物之霜隂有美以順陽積成隂為惡以不順陽積成履坤初之時位才順則美之造端才不順則惡之造端是為坤初之霜履霜之象一隂既凝積而至于六隂之凝皆初始之堅氷至之象像霜之象得履之意須知隂陽不可相無然必原始順方化而生物原始不順便凝而殺物初如不為早辨原始就是隂凝之霜象故曰隂始凝才凝不覺積漸而成純色之隂道遂到堅不可解去處象故曰馴致其道至堅氷六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也乾五天德之中坤二地道之中二以中順動中心一無邪曲為直四亘無不如一為方方因于直直無不方大不在乾亦在坤矣直方大之象治習為習習即凝隂習氣二之直方原無隂習為蔽故亦不待重復修治而所行自無不利不習無不利之象初不順陽故凝二順陽以動即是乾動直方本於乾動其所固有象故明曰六二之動直以方習而直匪本直之地道習而方匪本方之地道雖有利未能無不利安得光不習無不利地道莫光于二矣象故明曰地道光六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也二下坤之中三以中爻論再重一坤重之于直方大之上為章既不湮塞而淪于晦又不淺露而近于炫以含為正三之所可含章可貞之象臣子分義才入便都是親事才出便都是王事三際內外卦之交或從王事之象三極于虛全體之虛三要下終全體之終無成有終之象章言含非一于不發時在發而貞在含象故曰含章可貞以時發或從王事豈曰坤能實本乾知時發從王一由于知體之光大也象故明曰知光大六四括囊無咎無譽象曰括囊無咎慎不害也譽音餘慎時刃切心真為慎不鹵莽也古作慎三四皆重坤中爻三見二光之上為章四處五裳之內為囊凡坤皆隂斂之爻章曰含相時而發之事囊曰括與時俱閉之事括異于凝霜其所無亦異于含美亦不見無咎無譽之象當閉塞之時而以慎為道即不為三之從王于臣子分義非有害矣象故明慎不害六五黃裳元吉象曰黃裳元吉文在中也坤位莫尊于五而曰黃裳坤六爻皆臣道五如總政之聖相負扆之元臣乃臣之尊位而非君之尊位言黃明常有𤣥以為之主言裳明常有衣以為之主臣道從初無失吉莫先之黃裳元吉之象黃見于裳文非外飾蓋五之中順之德充諸內而見諸外之文耳象故明文在中上六龍戰于野其血𤣥黃象曰龍戰于野其道窮也隂無始以從陽為始隂無終以代陽為終純隂無陽之世劈初來便是凝之始極上來便是堅之至乾稱龍陽龍坤上稱龍隂極疑陽之龍乾龍竒一之體一故神而能御天坤龍耦兩之體兩必敵而惟戰野乾窮于上羣陽在下且不為之輔坤窮于上羣隂在下夫豈為之從乾上無輔動而有悔坤上無從動而必脅龍戰于野之象乾龍興隂陽和澍為雨坤龍興隂陽戾流為血雜𤣥雜黃為雹為氷其血𤣥黃之象初馴致其道至堅氷上極于戰順道無復有存成非其成終非其終象故曰其道窮用六利永貞象曰用六永貞以大終也乾純剛不相為用用九乾六爻之九合以相用坤純柔不相為用用六坤六爻之六合以相用利永貞貞即牝馬之貞不惟要終于貞又必永有所貞方始是用六之利用九冠以乾元乾統天原其始用六不冠以坤元坤承天要其終利永貞坤分體于乾以合乾為終六分用于九以合九為終象故曰以大終文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行柔以坤順為至曰至柔靜以坤順為至曰至靜健順合體故乾為剛而坤動亦剛健順異用故乾德圎而坤德則方後得主而有常以承乾為得主得主者有常失主者無常含萬物而化光陽施隂受故言含陽明隂暗非化不光故言化光坤道其順乎物物承天而生化時時化物而輝光凡資生處無不化無不光無不時時承天而與天時俱行若生而不化有時滯礙化而不光有時暗塞天以時行而坤不克承無以語於坤道之順矣乾道之大剛健中正純粹精坤道之至只在一順乾乃統天坤惟順天此乾坤之别積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也辨辨俱符蹇切辨别也辨治也亂之初生起於一念不善馴而成之甚易逆而消之甚難故學問主腦全在一念發端處從早辨治書曰人心惟危即坤初之隂惟能不使之凝無容著不善處善便由此積積而不已有餘善寧不有餘慶稍凝有容著不善處不善便由此積積而不已有餘惡寧不有餘殃凡臣子的心稍有不順于君父處便謂之坤初之霜便是弒逆之萌而堅氷之漸春秋加趙盾弒君訓人以臣道加許止弒父訓人以子道皆除惡于微早辨于漸之意易曰履霜堅氷至蓋言順坤惟一順而順有從來早辨之順順所當順不早辨之順順非其順至于堅氷亦以順致示人之早辨而防其漸者至矣直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也直其正直言心體之正正存于內如物之直而不斜倚故直為正不直便不正方其義方言制事之義義形于外如物之方而不虧缺故方為義不方便不義君子敬以直內內不失正之謂敬敬立于君子而內自無不直矣何待直之而後直故曰敬以直內君子義以方外外不失方之謂義義立于君子而外自無不方矣何待方之而後方故曰義以方外敬義立而德不孤內直與乾同體外方與乾同用無動而不成乎乾無行而致疑于陽含于三為有美發于五為美之至真是與乾作配得來夫又何孤二所謂不習無不利之道固如此乾二言仁言誠乾陽為仁乾實為誠坤二言敬言義坤隂為義坤虛為敬是為皇羲立象盡意文周繫辭盡言之㫖隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也坤隂之章乾陽之所不可無故謂之隂之美雖有美必含之坤以藏為道隂以斂為道也其或用之以從王事美必歸君弗敢以成功自居一有敢成之心以地則不承天以妻則不順夫以臣則必抗君到弒逆大惡只一敢心所成地道無成而代有終終又稱代見有終亦非坤之功妻道臣道抑不待言隂之美獨于三五言之地道以二為中三近二之光故曰隂有美五合二之中故曰美在中又曰美之至如初言霜便是隂惡之端上言戰便是隂惡之極天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也純坤之卦即純隂之世二五皆中以坤則必承乾以地則必承天其為變化不待言三四皆重柔不中三以重柔在陽位猶變化四以重柔在隂位天地遂閉天地變化草木亦以時蕃盛况于賢人寧不用章而為地道之光天地閉天下終有戰龍之血賢人之不違時寧在草木下故隱乾初隱隱于羣龍應求之外坤四隱隱于隂凝氷堅之至乾四進治則進坤四隱亂則退乾四無常無恆聖之純修坤四無咎無譽賢之深詣非極其慎而慎致其謹而謹不能故前言慎此又言謹君子黃中通理正位居體美在其中而暢于四支發于事業美之至也五黃裳非以黃色為裳裳有黃色黃于外而本黃于中乃其誠中形外之黃故曰黃中惟其徹外徹中而俱黃故凡尊卑上下之條理即委曲細微無不六闢而四通故曰通理坤二直五有其正可下可上不出北面之位故曰正位坤二方五不易其方可下可上一循地卑之體故曰居體凡此皆坤隂之美而在五二合中之中故曰美在其中暢于四支美在一身發于事業美在家國天下二直內方外有其德五積中發外有其業三含未底于暢五暢不止于含所以為美之至所以為元吉隂疑于陽必戰為其嫌于無陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃隂陽大分大抵陽為主隂為從隂並無可以為主之時隂極于上疑似于陽之為主陽主而隂從則和之道隂主而陽從則脅之道是以必戰為其嫌于無陽也故稱龍嫌疑之際公然不别故稱龍以為隂之主雖儼然稱龍猶未離去隂之體類蓋乾陽以生為德乾龍御天隂陽相和則行施無非雲雨坤隂以殺為德坤龍戰野隂陽相戾則行施盡成災沴故稱血惟得乾龍神武不殺方免于戰方離其類出則興雲致雨方不是血夫𤣥黃者天地之雜天地解而雷雨作天地之正也不解為雨而流為血雜𤣥雜黃或為忠義剖肝畢命之血或為庸豎駢首就戮之血或為生靈肝腦塗地之血𤣥疑是天陽之色黃本質地隂之色故曰天地之雜天地雜故血天地正乃雨𤣥自為天黃自為地𤣥黃不易天地各正特正之曰天𤣥而地黃初之所謂早辨辨此初早辨辨于舉足之初不容隂之凝為霜上極辨辨于黃裳之後不容黃之雜于𤣥初無凝原始順上無雜要終順方不失坤道全體之順乾坤正對二五皆中三惕四躍于乾之中三處而四出三含四括于坤之中三顯而四晦乾初潛而四躍革潛為躍陽舒之道坤初凝而四隱以凝故隱隂闔之道乾三惕而上悔陽窮于亢終不失正坤三貞而上血隂窮于戰遂至無終乾全體健爻以六龍名乾畫全統御得來可以通六而成一健坤全體順爻不以六馬名坤畫半行應未至難于㑹六而成一順卦言象爻言變類如此屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧屯張倫切難平去通押關氏曰屯萬物生也物生無不屯者也事成無不由難者也按屯元亨解其屯而後大亨蒙亨亦以行而後亨與乾坤之元亨異屯剛柔始交而難生五險中初動主五初爻主不當相應之位惟四初兩爻在解初為險已解象剛柔之際在屯初為險未解象剛柔始交始交者動乎險下未動乎險中如物初生時動物則有胎卵難出之險植物則有勾屈難伸之險無不艱難故屯進而動乎險中初四始交為雲為雷而方興五二正交為雷為雨而有作雷下動雨上動盈天地之間唯萬物滿萬物之盈唯雷雨之動大得其亨惟此險中是為屯之元亨大有所正亦此險中是為屯之利貞又曰勿用有攸往利建侯因剛柔始交以設教剛柔始交屬天運肇造之初草雷未上動震為𤣥黃之象昧雨未下動坎為隱伏之象初當此時勿用有攸往重始進也四當此時以身當上下之交惟宜建侯而不寧初雖勿往四在必求四勞于求五逸于得轟為雷澍為雨盈惟萬物滿惟雷雨所以旋轉天造而墾闢其草雜清明其昧晦凡皆屯四之任如之何其可寧在比不寧則上下應處屯不寧則雷雨動需出穴坎納約蹇連井甃既濟戒亦皆屯四不寧之義以四為坎之下體五之近爻四下交則險遂得以上解抑以見近爻相須如此其重示萬世近臣以人事君之義至矣象曰雲雷屯君子以經綸坎在他卦為水在雷上天上為雲雷下為雨山下為泉雲雷上雲下雷而雨未成隂陽之氣結塞未通屯象君子以經綸經分理其緒綸比合其類既分理而經之又比合而綸之非無雲空震之雷非但雷不雨之雲是為君子經綸于屯之大端初九盤桓利居貞利建侯象曰雖盤桓志行正也以貴下賤大得民也盤步干切下遐嫁切石之安曰盤柱四植雙立皆曰桓初雖震體以居雜撰艮坤之下既如石盤于地而不可動又如柱立于盤而不可移盤桓之象初四方交之始四未求初有往失在初是以利居貞初無往四勿求失在四是以利建侯初居貞非以不動為正惟以待求後往得行其志為正象故曰雖盤桓志行正初未建則士已建則侯四能輔五建初以震侯之貴下坤民之賤膏不上屯澤盡下究民之大得非初之得而皆五之得象故曰以貴下賤大得民六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也邅張連切乘馬之乘繩證切匪冦婚媾屯二聧上賁四凡三言之吳氏曰過坤十數則逢五五應而許嫁故曰十年乃字小象稱乘剛者六惟困三乘坎餘皆震之第二爻歸妹以三乘二亦曰柔乘剛險中曰動雷雨曰動一卦亨屯之力首藉初剛得以上動二乘初剛動不行柔動何以上行屯如邅如之象一車四馬曰乘兩馬亦為乘二進無以駕五退無以合初乘馬班如之象二五剛柔正應之婚媾二于初雖乘于五原順無害其為應與匪冦婚媾之象既曰婚媾何以不字以下不先上而有求女不先男而有求惟初能以剛動之正為居惟二亦以柔動之中為貞女子貞不字之象十年坤終數撰坤之數終正動之體行雷雨寧有不合婚媾寧有不成十年乃字之象二以乘初上遂不能應五為變十年乃字初四始交二五正交方不失正而得反其常矣象故曰反常六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也虞元俱切惟以追切謀也思也舍式夜切吝力慎切文之以口為吝按唐郭京撰周易舉正三卷略曰即鹿無虞何以從禽也謂以上脫何字京不得從禽義象謬謂有所脫誤舉此他可類推後人多以己意改正易辭皆京病也姤民以魚喻屯民以鹿喻鹿山獸虞山虞林中平土有叢木從禽者所往初五未合雷雨未動坤衆遑遑陷溺于中大則鹿走小則禽奔三上以應追逐以極動之體驚走艮山之麓象即鹿四應初與三近不相得象無虞無虞安所得鹿惟謂思入山無導轉入坤林之中從獸無得再以從禽為思此豈可與幾之君子三動則雷止則艮動止之介甚微故言幾二有女子之貞五應則終字三有君子之幾五止亦與止五為雜艮撰止之主故三亦可舍之而止蓋動五于險才所不足依五以止時則可需故不如舍徒往無功故吝且必同上泣血象故明其窮六四乘馬班如求婚媾往吉無不利象曰求而往明也四非初無以上動班與二同二五君臣中正之婚媾四初臣鄰相求之婚媾四能求初為婚媾合而上往以輔五初志以四求而行吉五膏以四求而下無不利四求初往五豈惟哲于知人闢草昧為清明皆此象故以求而往言其明九五屯其膏小貞吉大貞凶象曰屯其膏施未光也五本為雨足以澤物為膏以與初動未合為屯小貞近則四能求婚媾應則二匪冦婚媾皆小之正也五以四為正惟四所求建侯樹屏轟以大作之雷五以二為正惟二是應執中用中澍以常流之雨是為小貞之吉大貞以已為貞四弗求于初終不得合二弗字于已終不能下轟雷既無初澍雨又無二草昧既不得人寧平又屬自用徒有膏終屯而不下于民是為大貞之凶膏物在雨震動在雷有大無小有君無臣雷雨終不能動雖動弗滿弗盈决不能以一人而光施于萬民象故明施未光上六乘馬班如泣血漣如象曰泣血漣如何可長也五言膏陽之澤上言血隂之傷上在卦外終無以合五初之交乘馬班如之象二四班終得婚媾三在動止之間猶可以舍上乃險極之處何可以長泣血漣如之象下三爻初動險之剛主故可首建為侯二動之中與五正應則終字三動之過反動為止依五為止亦稱幾上三爻四上皆五之佐四應初能求初以佐五則全坎皆膏物之雨上遠初無能求初以佐五則全坎皆傷泣之血象曰何可長微獨憫上泣血之無益抑以戒五大貞之必凶險必能動而後出屯必得人而後亨示人深矣蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖曰山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也蒙莫紅切稚也昧也告音榖山下有險坎中一剛本是源泉以方在陷故象有險謂人心險于山川以此險而無止象橫流奔潰之險險而有止象山下方出之泉以不能無隱伏不能無蔽昧故為蒙蒙亨險而止但止其險不行為泉始于蒙終于陷溺惡乎亨坎為通原有亨道撰為震能以亨行震行之時在二震行之中在二止則體藏行則用顯二以此亨道行通流之泉在我遂可合一卦之蒙而通為流泉故亨二五正應之爻五少男篤實之中體如童稚之未有雕鑿稱童蒙惟亨在二故應自在五二匪有求于五五自不能不求于二匪我求童蒙童蒙求我之象蓍所以筮二以坎撰震初爻如神物之前民用二首出震長人五首以應相求二以剛中為動動為時出之源泉五惟剛中是應應以時出之源泉有應斯求有求斯應初筮告之象再三撰震之再與三皆柔危之動而非剛中之動何能出為源泉僅可流為坎瀆以三上則不相應求以四初則不相應求此為殘流彼為斷澗于志無應于口何滕再三瀆瀆則不告之象初筮從初不瀆以正養人之蒙童求從幼有求以正自養其蒙即蒙成聖其功無以加此利貞之象象曰山下出泉蒙君子以果行育德屯水起于雷天水以動而未下為屯蒙水出于山地水以止而方出出而未有所之為蒙君子以果行育德行貴果决如泉既出乎山就下而無不行德貴涵育如泉方出乎山內涵而有所止初六發蒙利用刑人用說桎梏以往吝象曰利用刑人以正法也說吐活切小畜說輻大畜說輹遁莫之勝說聧後說之弧並同桎梏木械在足曰桎今之械在手曰梏今之杻凡水皆下流惟山泉向上湧出初首近二二以亨行亦遂有上出之機發蒙之象發蒙之利以何為用初以柔險而劈頭遇止奚啻足之桎而手之梏用刑人二有震動刑法初守其刑法以為用險以動動免乎險桎梏用說斯有攸利利用刑人用說桎梏之象以往不用二為刑人如披桎帶梏而往惟有入于坎中合四成困以往吝之象以法正人曰刑以正法人亦曰刑身刑之法在二初首以正法二象故言以正法九二包蒙吉納婦吉子克家象曰子克家剛柔接也二統一卦之蒙而為包蒙是稚之時未論順與不順包則上艮止下震起人得長養發生于其中吉婦有順之德上下之柔有應而求人明婦順我昭茹納吉家自五而言五蒙之尊位五順以巽二若不見父道之在五而惟見師道之在二若不見父之有其家而惟見子之克其家子克家之象五柔有應二剛有克涓滴之流俱與源脉相接匪若剛柔方交而成際象言剛柔接者此六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也取七具切蒙婦可納以其順三乘二二象下女之男三象乘男之女如之何其可取上亦夫悖二見上是為險動上原無金三自悖謬而見其為金但見為金有意從之不知屈身以求二二勿取上必擊安有利見金夫不有躬無攸利之象象言行不順既不順二何能順上總稱蒙冦上之利禦冦禦此六四困蒙吝象曰困蒙之吝獨遠實也遠于萬切四與三皆撰震再三之爻三以二為乘四更與二為遠上之止又及三而不及四亨行不能于險且枕困蒙之象自不免困安能發初吝象人處蒙縱不遇包納之明師亦當近刑擊之益友四下遠剛中之實上逺剛止之實象故明其獨逺實六五童蒙吉象曰童蒙之吉順以巽也順以巽蒙五漸四家人二五以少男篤實之體上依上止下應二中正所謂求我之童蒙養之則聖功入之則聖域吉五以應二為順無俟上擊自然所巽無非泉源象故曰順以巽上九擊蒙不利為冦利禦冦象曰利用禦冦上下順也上以剛上止以止為事三以金見上上以冦視三二中能以身刑克上過遂以艮手施擊蒙之象擊有二義擊而失二之意别無二之包納惟有上之攻治如三方乘二上更止之于險未可徒止而泉且自上塞險不在三而在上冦不在三而在上是謂為冦擊而得二之意包納以為之主明刑以為之弼導之使順疏之使行實能通其泉源匪曰徒止其險是謂禦冦不利為冦利禦冦之象象言上下順謂上能下順乎二以擊蒙之道佐包納之所不及也世有蒙師徒任刑法劈頭朴責别無涵育薰陶以善養人之意為其弟子亦遂有相疾如冦讐然乃知聖人戒上之為冦㫖矣乾坤成列之後三男用事坎為中三女用事離為中坎在動上動為滿盈之雷雨君之所以君惟此膏澤之普施五屯之君震初為輔坎在止下止為時出之山泉師之所以師惟此源脉之通流二蒙之師艮上為輔屯初建侯之利利于動五之險中蒙上禦冦之利利于順二之剛中屯上泣血以乘五蒙初正法以承二屯四求初為婚媾求初以輔五蒙三見上為金夫見上則悖二屯以二五為正字之婚媾蒙以二五為正求之應與屯初動主而教之居貞恐其動不以正且可以建侯于外終不可以師保于內以動偏居于下之故蒙上止主而戒之為冦恐其止之非理且為禦冦之任有餘為童蒙之求不足以止偏居于上之故屯從初動要終即為蒙上之止蒙從上止原始即為屯初之動以二卦反覆相綜只是一卦之義又動于險下則屯動于險上則解止于險上則蒙止于險下則蹇既以屯蒙相綜又以屯解蒙蹇互求其于動險止險之義思過半矣像象管見卷一上欽定四庫全書像象管見卷一下明錢一本撰需有孚光亨貞吉利涉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也往有功漸蹇解彖辭與需同需須非即須為需需則上下相須而險出故曰需須也坎上乾下乾剛健恆易知險險不在前且恆知况險在前乃為險所陷乎故以剛健需于險後其義已不困窮主五論需五雖坎中以居乾上原是乾之天位五二應爻又合乾之正中如無孚以乾固不陷于險何以出五二相需而成孚孚則光無暗不撤孚則亨無塞不通既光且亨而貞無需不吉孚則相須而有功止于下固無險之陷往于上更有涉之功孚坎險而成乾易無險不涉無涉不利利涉大川之象卦言涉大川者入需曰往有功訟曰入于淵渙曰乘木有功正坎象蠱曰往有事大畜曰應乎天撰兑象中孚曰乘木舟虛正兑象同人曰乾行三四有爭撰巽象益曰木道乃行巽震二木象爻言涉大川者四謙初撰坎象頥五上震木在下象未濟三正坎象象曰雲上于天需君子以飲食宴樂上上聲雲上于天方上于天而為雲未下于天而為雨雲與天相為須待需象君子涉世修其在已俟其在天凡一飲一食無非俟命于天之具是以無不安無不樂非憂戚之飲食而皆安樂之飲食是為上天之雲之需而需象備于君子飲食之中初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也郊古肴切邑外為郊又距國百里為郊未失常師四與需初同人所居曰邑邑外曰郊陽性上行初已離邑而郊但于四險猶遠需于郊之象雖需猶患不恆以恆為用不復有陷又寧有咎初雖已行在外原不冒險而行象故曰不犯難行五二孚自合而為有功之往原不失其上行之常象故曰未失常九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也衍以淺于線二切水溢也又下平曰衍二漸近險如近水平洲之沙需于沙之象雜兑撰口與險有交小有言之象雖小有言出穴隨至要終利涉終吉之象二五合中其孚盈溢有餘外自險而內自平象故曰衍在中小雖言而險必涉四有順上有敬終竟需義而無不吉象故曰以吉終九三需于泥致冦至象曰需于泥災在外也自我致冦敬慎不敗也致涉利切使之至也胡氏曰需三逼坎而曰致冦漸三互坎而曰利禦冦禦冦艮剛而能止致冦乾剛而不中也致之一字罪在三矣以三臨坎如濵水塗泥之地需于泥之象四穴未出三進逼之四本不欲為冦以三之逼成冦致冦至之象需泥猶不犯災象故曰災在外致冦則利涉之功敗矣如之何而可以無敬慎能需便是敬慎便不至于敗象故曰敬慎不敗六四需于血出自穴象曰需于血順以聽也穴胡決切需之四上皆為穴猶坎之初三皆為窞血隂之傷穴隂之安五與乾三爻相須四穴其中于初為難于二為言于三為冦逆而相抗惟有血安有需四撰離成麗反血為需聯合上下為相須之人處血之地得需之義需于血之象麗體成而坎體隱若出其所安之穴以為三剛彚征之路出自穴之象四以麗成順下惟乾剛三爻上惟五是順是聽而功無一之敢居象故曰順以聽九五需于酒食貞吉象曰酒食貞吉以中正也以中正訟五同吳氏曰二三四撰兑有向五而食之象酒食需客之具五賴下三剛以濟險相需甚殷四穴未出三剛未來庶幾式飲庶幾式食四穴既出三剛合來有酒飲我有食食我非利涉𢎞濟功臣與天下共釋險難之憂即光亨一德君子與天下共蒙安養之福是為需五貞而得吉之象自卦言二正中五與之合彖故曰以正中自爻言惟五中正以主一卦之需象故曰以中正上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也速桑谷切召徴也當都郎切五有酒食當主正位能召致三剛為客四上二柔需義未成皆合險陷五之人需義既成皆為五敬客之人四穴三剛之前以退避為安故出上穴三剛之外以守已為安故入入于穴之象陽性上進不極不止有不速之客三人來之象客以五來非由上速言不速明非上所能速言有明非上所能有言來明非上所能來然不速而來豈惟共濟于五并欲有拯乎上上安可反失客意敬之四象為五順聽于未來之先上象為五加敬于既來之後如是則無小大無內外無敢慢舉一卦相須之義至上而成故終吉需須也其四剛爻同德相須大小亦相須敬在大雖小有言終吉敬在小于剛大三客皆無所失終吉上無當于主位不致失于客意象言敬之終吉雖不當位未大失如此訟有孚窒惕中吉終凶利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也訟才用切爭也言之于公也古作䛦亦作㕬窒陟栗切訟上剛下險上剛是聽訟者下險是訟者險而健內藏其險而外濟以健好訟固在下下伺以險而上制以健使民有訟亦在上皆訟之道故訟五中正二有孚孚則不以險為通且以險為懼二非險之中而乃剛之中險不在下民無訟矣故吉訟無孚險終在下健終在上訟由是成凶尚五則不終故利見大人不尚五則必終下方在陷上復入之始乎為坎終乎為淵别無出險之日故不利涉大川書人有小罪非眚惟終乃不可不殺有大罪非終惟眚乃不可殺與此終凶之終相發坎中原得乾剛中爻以陷故險訟以坎剛來居乾內與乾五以中相孚來為剛中豈復險而成訟渙以坎剛來居巽內與巽四同功相渙來而有功險豈終窮之地彖于訟曰剛來而得中于渙曰剛來而不窮以此象曰天與水違行訟君子以作事謀始人情相違則訟天上運水下流天與水相違而行爭由此始訟象君子以作事謀始水天一所生之始水始生便與天違行君子凡作事便謀其始事事原始天謀為謀謂之謀始有謀始之訟無訟人之訟矣初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也永于憬切辨符蹇切治也罪人相訟察言以治之曰辨初坎之下險之所夫既以險為所安能無訟之事但初乃環二為邑之人二歸逋險若非初久居訟遂非其長事不永所事之象二向五已無言初向四猶小言所事不永雖小有言終不成訟是以終吉初是訟之淵底不可長以為處何可長以為事象故曰訟不可長中爻撰離四如明庭情僞洞晰象故曰其辨明九二不克訟歸而逋其邑人三百户無眚象曰不克訟歸逋竄也自下訟上患至掇也逋補吳眚所景竄千斷掇端奪切中正在五有孚在二窒惕而中皆二所有不克訟之象二為險主初三附之而居合三爻皆險陷之人奚啻合三百户皆眚病之人坎中一剛原自乾來二五孚還其乾之健既象歸去其為坎之險又象逋歸而逋之象如是合三百户邑人人安居户循理即過誤之訟亦無矧其有故犯終凶之訟其邑人三百户無眚之象坎為穴大既歸逋小如鼠竄象故以歸逋為竄以二訟五恐合初與三而皆能以陷二為患象故以患至為掇六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也初險猶用事曰所事三險不復用事以巽于四下為有得以巽而上承為從來之分義食舊德之象如是而貞雖處危地要終無失貞厲終吉之象初邑之下民之分三邑之上臣之位王事即王命治訟之事三巽而上或以身致五巽五之中正以順麗于二四間便可使上下俱不克訟以訟言則不克以不克之功言亦歸于五或從王事無成之象需四下順舉一卦而成需訟三上順舉一卦不成訟象故明曰從上吉九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也二不克訟不克伺上以險四不克訟不克制下以健四雜撰巽入中爻于五中正之命能布而為之復能入而為之即復即命之象二歸逋邑人已無眚有貞四更為之渝四更為之安若户為變而邑為化風為移而俗為易人以有訟為匪正人以匪正為不安渝安貞之象是為訟四之吉于五中正有尚象故明不失九五訟元吉象曰訟元吉以中正也五二應爻二不克訟五固象訟以二則尚五之中正以五則以健履險常有陷溺之虞雖無不中惟恐有不中而益求其中天下安得不歸于中雖無不正惟恐有不正而益求其正天下安得不歸于正訟元吉之象象曰以中正謂五匪但不以法維民且不以已之中正為至而若不忘有訟然所謂使民無訟正如此此所以為元吉也上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也鞶薄官切鞶帶革帶也或省作䩔與繁纓為馬腹帶不同繁或作繁亦作􅩕亦作樊褫敇紙切又池爾切鞶帶要束下體之服中爻撰巽自三視之為從上之順德自上施之為束下之巽繩上三應爻有如三無舊德可食上以剛極為威使三不敢不服如錫以鞶帶而使斂束帖服于其下或錫之鞶帶之象離日見為終朝坎曵行為三褫終朝三褫之之象或錫從上之强服乎下而言三褫從下之不服乎上而言象言以訟受服亦不足敬言以訟受人之服與五中正之尚殊逺亦不足敬况終朝三褫夫誰為服而猶謂其可敬彖所謂終凶之義固如此需下三爻皆以剛需險之人訟上三爻皆以剛治險之人需五中正而險孚于上訟五中正而險孚于下需初用恆不犯上險之難三剛過上逼之迫則必敗故致冦訟四不失不入下險之淵上健極下束之急則不服故三褫三人來險在乾外乾為主要需之終利涉三褫之險在乾內險為主要訟之終有凶學者到得全體乾健一團天理在我矣且才舉步便知需常恐有險在外才動念便知訟常恐有險在內其于需訟二卦之義思過半矣師貞丈人吉無咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣丈直兩切不從㸃毒徒沃切痛也害也治也剛中而應師臨無妄萃升凡五師言衆居為民即民為師出為師即師為民師貞貞言正非以已正以衆正能以一卦衆心之正為正天下有不正以衆正正之有不為天下之歸往無之彖故明可以王夫是之謂師之貞二有剛中之德撰震而出以帥其師二五正應有剛中而應之象下險上順有行險而順之象以此道而為天下毒如毒藥之攻毒天下之民無有不以為順而從其所長夫是之謂師中之丈人師如是謂之吉可以補役民動衆之過又何咎象曰地中有水師君子以容民畜衆地中有水水藏于地無地匪水有衆聚之象故為師君子以容民畜衆容以為民即衆為民畜以為衆即民為衆民衆如水容畜如地師容民畜衆可以得古人井田之法比建國親侯可以得古人封建之法初六師出以律否臧凶象曰師出以律失律凶也否方有切坎為律律在二之中自五而命于二為有名之師之律自二而令于衆為有制之師之律初師之士衆二撰震出師初從二以出居為尊君親上之民出為救亂禦暴之師一步伐不愆二之中一進退必守二之紀師出以律之象否謂失律臧凶雖驍勇善為戰陳善無足取且恐為二所立誅否臧凶之象師無律才出即肆毒師律首嚴于初此二所以有師中之吉也九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也二以德言本中以帥師言居車之中儼然專制更無敢二故稱在稱中稱吉而無咎王三錫命自五厯三爻而下應之象天心之寵異在五之中順二得五應不惟五能順天二亦承得天來象故曰承天寵三錫之命惟恐有一不辜之殺而為天下毒萬邦皆以是而盡為之招徠象故曰懷萬邦六三師或輿尸凶象曰師或輿尸大無功也或有時而然之辭坎有輪象為輿尸主二長子帥師居車中初如將車士衆三如副車弟子初承二下象士衆無敢犯令三乘二上象弟子或不受制言三或疑二于二而亦得為坎輿之主將一失二中盡成險毒非不恤士衆而流血于車前即所過殘虐而暴骨于車後如之何其無失凶象明大無功甚言師五不可有不當之任使失其所以懷萬邦之意也六四師左次無咎象曰左次無咎未失常也四與三皆若五所使副二之師次師行止舍震東方為左二剛中四柔正與長子一體同功二居中為帥四從左為援二左之四故為左二止之四故有次師左涎之象師以順為常道初有否三有或皆不能無失四順首次所當次必律在主帥而四無敢自為之尸者象故明未失常六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也帥所類切將也領也率也統也亦作率田有禽何孟春曰田狩也李心傳曰以恆四田無禽例之當為動而有獲之象恆四田無禽應以巽柔師五田有禽應以坎剛以先事言之大順之中藏有至險搜狩之中寓有軍政田有禽之象是為有備之師以臨事言之下以險來上以順應震善鳴無言不順無執不利利執言之象是為有名之師二者皆可以無咎問其帥則推轂而為之遣專閫而為之主必在長子而不在弟子以長子為能行其中弟子必不能行其中士卒而失師中之律雖善為戰陳而臧凶弟子而尸長子之任雖有言可執而貞凶五二以中相應必無不當之任使是為委任得人自初而出要中而還功收萬全之師上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也上居師終二五所推轂専閫之帥上五所决䇿佐命之臣師之中惟恐流天下之毒故必有三錫之王命師之終又懼泯長子之功故又特稱大君之有命有命而繫之大君明非上所専長子世以侯繼世之後侯有國大夫有家坤土厚襲于出震之上開國承家之象三或輿尸在師則無不當之使不在師亦不使之為有國有家之佐小人勿用之戒之象坎中男震長男坎以震出即險為順自師中視之稱丈人自五視之稱長子以三乘二仍舊為險自師中視之稱弟子自師終視之稱小人上佐五命出師以執言為正論功以長子為正惟師以正行故功無不正象故曰以正功師中之功必非弟子所可幸而成有國有家之任必非小人所可佐而治不凶于爾國必害于爾家象故曰必亂邦二在師為帥不在師非開國而為侯即承家而為卿大夫二臣位始終不失為臣又始終不用小人皆貞丈人始終之義也比吉原筮元永貞無咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也比古文作兩人以正相親也廣而平曰原吳氏曰比一陽居尊而五隂從之如五家為比而比長統之之象後胡豆切夫如字輔扶雨切車兩旁木曰輔比吉以下之輔上言一剛在上如車合坤衆而順從于下如車之有輔而輔以輔車是以吉原筮主五言蒙初筮震初之筮比原筮艮上之筮髙平之土曰原五君位在坎則為天下之至險惟以坎撰艮不為險陷之坎中而為髙平之剛中一剛首出位在德元坤衆四維既永且貞五筮而得此可與天下順從之民共寡險陷之過原筮元永貞無咎之象不寧以四言四聯坎坤上下之交坎憂體不敢自寧坤順體從之恐後不寧方來之象後夫以上言上乘五上無望其合下之來且身自逆五而去比道于是遂窮後夫凶之象萃與比俱有元永貞之繫萃有分權之四故元永貞繫于爻比唯獨運之五故元永貞繫于卦象曰地上有水比先王以建萬國親諸侯象稱先王者七比豫觀噬嗑無妄復渙其所有事皆王者之事從古而然故稱先王地中有水水暗聚于地中為師地上有水水顯附于地上為比地上之水散則萬合則一既如萬國之民各比于一侯又如萬國之侯共比于一王是為古昔先王封建萬國親撫諸侯與天下交相為比之象初六有孚比之無咎有孚盈缶終來有他吉象曰比之初六有他吉也缶方九切瓦器俗作缶非初舉爻比大有觀渙中孚凡五比初于五為遠四撰坤外比初與合順則孚孚而比之遂可以無逺五之咎初四雖孚三以匪比滲之于坎下于缶又象虛而不盈自初至四無一不順以順成孚乃盈盈則在五下者既無所不順在五上者又寧有不來原始要終而俱來豈惟二有內比之吉四有外比之吉惟三可無匪人之傷惟上可無無首之凶有孚盈缶終來有他吉之象合比六爻之吉義以初順備之象故明曰比之初六有他吉六二比之自內貞吉象曰比之自內不自失也二五正應二前視為止止之坤順之中自四封以內修其職無不順之民自四國以內修其職無不順之鄰以此比五若不待四之外比而自獲乎上是為比之自內貞而得吉之象象故明不自失六三比之匪人象曰比之匪人不亦傷乎師從上視三為小人以險而乘二比從三視上為匪人以險而乘五三上應爻比之匪人之象如此則無首之凶不特在上而亦在三象故以為傷亦之為言對上無所終之辭六四外比之貞吉象曰外比于賢以從上也四近爻以坎撰坤與外諸侯合為一體而成順外比之之象二不失其已貞吉四不失其人貞吉坤爻在下皆順從之賢諸侯四外比之合以從上象故曰外比于賢以從上九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也誡敇也警敇之詞曰誡通作戒位正中比隨巽之五凡三言之五體隱伏以原筮而光明位在德元中德光昭顯比之象師三錫戡亂用武命將比三驅寧平講武天子自田天子之田不合圍驅之原筮之中圍以三爻而止三己順入于驅中順則為取上更逆出于驅外逆不為追王用三驅失前禽之象前禽失于上邑人止于下潛孚默喻以化于五中非驅而無不順非舍而自不失邑人不誡之象五比如是是之謂顯而無不吉比之尊位在五德又正中象故明位正中不强人之必從而人自無不從象故明舍逆取順失前禽不誡在邑人非下之中自為之惟上之中實使之象故明上使中上六比之無首凶象曰比之無首無所終也比以上下合順于五為有終從初言原始順要終寧有不順初固為比之始從上言在上順在下寧有不順上更為比之首上乘五下固惟有順上則惟有逆如人下體皆具而獨上體不完比之無首之象彖之所謂後夫凶正此上于顯比之王無損第去乎順從卒乎悖逆悖逆而生不如無生矣象故特惜之曰無所終小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也畜敇六切李氏曰後人說易遇西字如西郊西鄰西山皆曰文王事初何關于文王此皆言易之弊也小畜柔得位而上下應之四柔得位以主畜下三剛受四之畜而應之上兩剛助四為畜而應之乾健大巽柔小以小而畜大以大而受小之畜卦所以名小畜小畜亨健而巽無恃下之健而受上之巽剛中而志行匪徒巽以四之柔正而必巽以五之剛中以巽之剛中畜乾之剛健以小畜大之志方始無不行故亨若但主四言巽與三近不相得隂有畜陽未和能密而為雲無能和而為雨密雲不雨之象三東四西四居西郊隂和之方反乎陽倡之地我之自西而將以其在東何由得雨自我西郊之象彖言尚往三性健以往為尚故未肯即解而為雨教三巽四以受畜言施未行以主其施者在四進五則行教四合五以大其施而不自為主象曰風行天上小畜君子以懿文德懿乙冀切專也美也又大也或曰懿讀為抑密也遏也風行天上天運大風力小以風畜天小畜之象人有懿德散見為文散則文之懿合則德之懿君子以懿文德以天受風風行天上之象初九復自道何其咎吉象曰復自道其義吉也復剛反四有畜初無反或但以四為道而不自為道便是小加大隂勝陽婦制夫何往而不獲四之咎今四以柔畜初以剛反匪倒身入于柔巽之道以為道乃從自家本健之道以為道復自道之象其若自四指初之詞復何其有說輻之咎自道何其有反目之咎此初義之所以吉九二牽復吉象曰牽復在中亦不自失也牽引牛之縻二雜兑撰毁之始如為巽繩所牽動以中亦能自復是以吉初不待牽二因牽而復其在中亦如初之自道象故曰亦不自失九三輿說輻夫妻反目象曰夫妻反目不能正室也說吐活切輻音福車轑也輪輻三十以象日月下三爻乾健全體猶輿輻無一可說今三與四雜為兑毁無能聯初二以為輻與初二以同復輿說輻之象男女居室夫外妻內為正夫內妻外為反今又與四雜為離目不正相視而反相視夫妻反目之象象言不能正室咎三之自失其道無以正四而反正乎四不如初與二之復也六四有孚血去惕出無咎象曰有孚惕出上合志也四雖得位然必上合五中而後畜健之志始得行如其與五匪孚輻為說目有反皆血皆惕安得無咎四五孚而三四之畜成血之害去惕之事出方無以婦制夫之咎四孚志與五合象故明其上合志九五有孚攣如富以其鄰象曰有孚攣如不獨富也攣閭緣切係也四有孚虛以上合五有孚實以下應五四孚而畜施行上為係而下為牽若固結而不可解有孚攣如之象五實一虛四以五富而畜成全富五之合上下而成畜之富富自四鄰始富以其鄰之象五之應四之志原在公諸君子以為富象故明不獨富上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子貞凶有所疑也婦房九切服也服事于夫也望月滿與日相望如朝君一云日月之望從臣瞻望之望從亡全卦不雨而上爻雨主之以四以畜三隂陽未和合之以上以畜三隂陽既和上三和盡一卦而無不和既雨之象夫內妻外則有反上上三下無不正上三安盡一卦而無不安既處之象初自道自健之道上尚德與三合德以德相巽而相尚若為積滿于乾車而成載尚德載之象然主畜在四上惟應四以畜三故又合三四而警教之婦謂四以相敵言妻以相順言婦四有順之貞又以貞為危孚于五血惕既去合于上柔巽益光婦貞厲月幾望之象君子謂三征復之反亦處之反婦既順而夫又征始說輻終輸載何時能有初與二之復何時又有上之處凶三四近爻終恐其不相得象故明有所疑履虎尾不嘻人亨彖曰履柔履剛也說而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也履力几嘻直結疚居又切卦辭連卦名者履否同人觀艮凡五卦履柔履剛畜從前止履從後行乾在巽下常恐剛躁易進巽柔自上止之為小畜乾在兑上常恐剛過難調兑柔自下和之為履虎以乾象尾以四象乾稱虎以見剛性之最未易和畜履三四皆近不相得主巽四以當下乾之首固不得雨主兑三以履上乾之尾亦必嘻人惡乎亨卦有說而應乎乾之象說而應得乾來下有說上有應原為五之和不為五之疚夫是之謂履虎尾不嘻人而得其亨不嘻言亨若主履剛之柔言然五剛中正尊履帝位于說為和匪于說為疚而剛德極其光健體極其明其亨抑不待言夫子發彖尤贊履五之光明深矣象曰上天下澤履君子以辨上下定民志上火下澤以火動而上澤動而下為睽上天下澤以天定于上澤定于下為履君子以辨上下定民志上者如天之不可以為澤下者如澤之不可以為天天澤昭然是為上下之辨天澤截然是為民志之定志定于中足之所投無弗定矣是為君子之履初九素履往無咎象曰素履之往獨行願也絲帛未加采色曰素履初稱素與賁上稱白同義說三爻皆以和上剛為履而說主在三以柔雜撰易失其素九居履初和說以行其剛正素履之象往不惟于四有應五蓋莫得而夬之上亦且有以旋之往無咎之象象明獨行願謂其本質之說從初無變所以獨得行其志願也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也二剛說之中乾剛中正之五以二之中為履履道取中于二胡不平之又平而極天下之平履道坦坦之象然三主說于前二如雜撰巽離亦以能明能行自見是自陂以求說矣安得貞幽人居說之中以說自斂收三之視勿炫其明却三之履勿急于行既幽又貞方于五剛有應之貞無說之失幽人貞吉之象二中殊不自亂于進退之際象故曰中不自亂六三眇能視跛能履履虎尾嘻人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也為去聲當都郎切眇一目小彌小切跛行不正一曰足偏廢布火切管子四時之行有寒有暑聖人法之有文有武生長之事文也收藏之事武也位不當以六居三者履否豫臨噬嗑睽震兑中孚未濟凡十履必目視然後履故合言視履三說主以說上應履四進五雜離五明為正三僅如眇乃欲有五之明眇能視之象雜巽五行為中三僅如跛乃欲與五之行跛能履之象如此眇跛之說未有不為五所夬履虎尾嘻人凶之象大君乾三爻皆有君道而五為大故三志之欲和五為尤切五誠中正但有剛健而無和說不啻大君之在難矣二中說應之志有以自斂象幽人三過說應之志必于自遂象武人幽人之說說以利貞武人之說說以犯難大君誠得幽人而用之乾虎難馴之性固為默化而潛消誠得武人而用之乾虎易亢之患亦為內捍而外禦以兑戎合離兵折衝禦侮于五下武人為于大君之象象言志剛言其本說之志在于和五之剛以所處之位則凶以所存之志斷無可棄所謂說應乎乾而成履其義固如此九四履虎尾訴訴終吉象曰訴訴終吉志行也訴止㦸切音與色同驚懼謂之訴或作虩志行履否睽未濟之四凡四言之四履五夬三嘻之間亦履虎尾之象退有嘻之懼進有夬之懼跬步戰兢遂可原始勿失初往要終而有上旋訴訴終吉之象四以訴訴履五三之間以說和乾之志于斯行矣象故明志行九五夬履貞厲象曰夬履貞厲位正當也夬古邁切位正當履否兑中孚之四凡四言之夬剛決柔以一柔乘五剛之上也今以一柔履五剛之間乃于五為和匪于五為疚五中正以三為眇不足與明以三為跛不足與行夬履之象以夬為貞于三無取于二何下剛健有餘和說不足坦道弗由乾為病矣安得無危貞厲之象履位以五為正于應乾之說為當于坦坦之道為能由彖謂不疚光明正此象故明位正當上九視履考祥其旋元吉象曰元吉在上大有慶也上舉爻履豫大有坎井鼎歸妹旅兑凡九大有慶頥上同上三正應三所視履從五夬之為眇為跛為凶從上考之即視即履皆祥蓋上剛已失正如不考三之視孰矯其失以歸于正上剛已過中如不考三之履孰裁其過以歸于中上之履道之善即在三之視履中考之視履考祥之象其旋如首之旋三入不至上上旋以下三覆轉易亢之剛性通身以和說鑄造一畨吉莫先矣其旋元吉之象上三剛柔相得盡一卦履義之亨而無嘻人之凶象明有大慶所以為剛大三爻和行之慶深矣履小畜綜為一卦履之三即小畜之四小畜以四之柔巽欲止下三剛之健而曰上下應之見主畜雖在四而五上兩剛原應四以下畜履以三之柔說欲和上三剛之健而曰說而應乎乾見主說雖在三而二初兩剛原合三以上應畜初復因四而復原始受巽之吉義而四自無血惕之咎履上旋視三而旋要終受和之大慶而三不免嘻人之凶則以畜柔得位而履柔不當得位者虛中有孚而不當者或病于功能之自見耳要之復待牽不稱自道之夫履惟夬無當武人之志畜以巽復非人之復而乃自復復即履上之旋履以和旋非人之旋而亦自旋旋即畜初之復胥存乎剛健君子之自取何如耳泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也此易言往來之始否泰反對可以反對言往來然就本卦觀之坤往外乾來內便是小往大來之象非必自此卦之內而之彼卦之外為往自彼卦之外而之此卦之內為來也泰小往大來一往一來合而言有交之象分而言有內外消長之象天地交萬物之生無不通上下交君臣之志無不同此吉亨之象在合而有交以內言為陽為健為君子而君子之道日以長以外言為隂為順為小人而小人之道日以消君子在內便是長之道小人在外便是消之道上下言交謂之同志隂陽言內外健順言內外君子小人言內外內言長外言消直是不同道此吉亨之象在分而有辨聖人彖泰之㫖深矣象曰天地交泰后以財成天地之道輔相天地之宜以左右民財裁通左右即古佐佑字皆去聲象稱后惟泰姤二卦乾上坤下為天地之位之定坤上乾下為天地之氣之交泰象渾然而全者天地之道后為財而成之使民莫不交修其道以為道截然而分者天地之宜后為輔而相之使民莫不交盡其宜以為宜以左右民民屬坤左之右之屬乾后天子諸侯通稱初九拔茅茹以其彚征吉象曰拔茅征吉志在外也茅莫交切菅也可縮酒為藉茹人恕人渚二切茅根彚牛貴切類也古作􅥖音胃志在外泰初咸初渙三泰初草茅士合乾三爻而有貞健之體中爻震兑雜撰五歸二尚二三皆上交然初其茹也初茹拔而起一正進所進皆正然後同類連附而起以為天下用拔茅茹以其彚之象如是而征野無遺賢朝滿君子以大臣則秉政執樞于其中以小臣則分猷共理于其外當天下有邦民物開泰之始試之邦有安之略豫之民有濟之才無征不吉象故明志在外九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也二五同志以有為合交以成用將極地所載而為之治先際天所覆而為之包荒全坤之勢包全乾之量四雜兑為河兑見其流易溺震用無深不涉是謂用馮上終極為遐未隍先虞其復未告先思有命是謂不遺外小人既不雜進內君子更執其中是謂朋亡泰二所行如是允可以配五而尚其中故曰得尚于中行二以乾大之體處化光之坤位成治泰之全用象故明以光大九三無平不陂無往不復艱貞無咎勿恤其孚于食有福象曰無往不復天地際也陂彼義切傾也勿恤凡四泰三晉五夬二家人五乾體恆易為平三過中與四雜撰兑毁下乾之體不全無平不陂之象往復原相尋三既有陂可乘上必因之來復無往不復之象三五同功震恐于平陂之交以動必有毁為艱以動不失健為貞四無能為三陂上何以與四孚帝祉錫于無疆兑口永有所食艱貞無咎勿恤其孚于食有福之象天與地之極際在三四之交象故曰天地際六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也泰二視四為河而用馮四外順首爻四富然後不失順之實而復及上之城今以坤雜兑外有順序之形翩翩之象內無順承之實不富之象匪止于已無富并欲于三有陂以其鄰之象四近三既有以之心上應三豈無復之意不戒以孚之象不富已失四順之實以鄰并陂三健之實象故以為皆失實上四一體外處見五二有尚有歸其中心誠以下為願何待戒而後孚象故以為中心願六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也甲剛乙柔五雜震柔爻故稱帝乙五二以中相合二以兑尚五以震歸帝乙歸妹之象福所止曰祉妹之歸震兑之合歸之後坤乾之正端拱坤順之中以為祉付天下于健行之二尚中之人而已不勞福孰有大吉孰有先以祉元吉之象象明中以行願五以中祉四上合順成止惟二是任惟乾是承順願行矣願必自行非五之福必願有下亦非四與上之福也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也隍城塹有水曰池無水曰隍泰上遐二不敢遺藉其外衛則城虞其隍長子帥之則師虞其命城之與河髙深相固二無憑河有衡决下有動城必上圯城復于隍之象當是時如能用師可為從新城築之謀如告命自邑仍有君子艱貞之義天下之泰保之有終何至貞吝今外之坤衆不改聚無能以震用師內之自邑亦晏如或惟以說為安復隍而為之陳言非告自邑而自邑有告復隍而令之城築非命自邑而自邑有命如是而貞小人為政君子拱手天下之勢惟有日入于亂泰去否成貞吝之象象曰其命亂如此否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也泰上下交而志同否上下不交而天下無邦天下非無邦以三隂在內為之雖有邦直謂之無雖有人直謂之匪否之匪人閉塞之以匪人之象不利君子貞君子閉塞正道不行之象泰小往大來否大往小來一切盡反凡陽必大必剛必明必正而為君子凡隂必小必柔必暗必邪而為小人于泰否見例泰言隂陽健順之德以交否言隂陽剛柔之質以不交象曰天地不交否君子以儉德辟難不可榮以祿天地不交萬物俱閉塞而不通否象君子以儉德辟難不可榮以祿泰以內乾為裁成之道為輔相之宜以外坤為左右之民否以外乾為德而知儉以內坤為難而知辟為祿而更不可榮初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也否與泰初俱象茅茅是潔物不論剛柔凡在初俱未涉世塗而有染故為茅泰初茅茹與三陽為彚震兑雜撰于中爻初拔而連起否初茅茹與三隂為彚巽艮雜撰于中爻初亦拔而連起泰初以君子之彚征則吉否初以小人之彚貞吉則亨初貞而無失即未得君子之交亦不入小人之羣四之命一行初之志遂通貞吉亨之象泰上下志同初征征于外坤之邑國象故曰志在外否天下無邦初貞貞于從乾以為主象故曰志在君六二包承小人吉大人否亨象曰大人否亨不亂羣也泰五歸妹二尚五歸否二包承五包二承五當大人之位以天上覆象包二得小人之中撰止下順象承承則雖無交于君子亦無害于君子豈惟無害于君子抑且能順乎君子寧非小人之吉包承小人吉之象二既上承五宜下交五以君子正道行之非其時主之于君子之羣之中寧否無交陽自全其為陽剛自全其為剛君子自全其為君子夫何不亨大人否亨之象否上下不交君子小人方分羣而處大人以否為亨上下更無撰動隂羣承于內陽羣安于外內外帖然無亂進而休進而傾皆此象故明不亂羣六三包羞象曰包羞位不當也二以坤雜艮于已有止能安小人之分三以坤雜巽于五欲入不安小人之分三以否極為隂巽有許多無狀事在大人天包中包羞之象象明位不當謂承當大人之包不來也泰君子在內則以內包外否君子在外亦以外包內易為君子謀不論否泰俱望之以天自處九四有命無咎疇離祉象曰有命無咎志行也疇界列小畔際三雜巽之始已象命然言羞上固非所入下亦不為行四居剛巽之中五申命四中行以致于三巽命于是方言有上下閉塞之過至四方善補有命無咎之象上下不交四三近爻如界列之畔為疇隂陽兩相麗為離陽剛有命隂柔承之陽剛為主隂柔麗之使羣隂默消彚征之邪氣而成麗陽之福祉胥自四三相麗始疇離祉之象陽剛君子閉塞之志至于有命然後行象故明志行九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也人依木旁以息曰休吳氏曰五中正大人如木有䕃庇可依當都郎切四巽有命君子已自無消五下有止小人遂不復長否至五為止止之自五休否之象承于二柔小能順于其下小人吉之象休于五剛大能主于其上大人吉之象四命及三五休止二全乾未旋全坤未轉一則曰亡未易以休再則曰亡未易以休四有命自五申之之象一不諱亡一保其存再不諱亡再保其存桑木堅而多節以艮堅木叢生坤土已固繫以巽繩益固繫于苞桑之象三剛在外以身當否之責無一可諉而象以五位為正當是為聖人大寶之位上九傾否先否後喜象曰否終則傾何可長也泰上復坤土震圯于澤中否上傾天命巽入于艮手以乾為旋之于內以坤為轉之于外斯之謂傾先否後喜易以隂陽相得為喜先不相交故否亦內三爻下闔之象後得相交故喜亦外三爻上闢之象泰上復君子且有必消之時否終傾小人惡有可長之理極而必反理之常也象故曰何可長泰全乾之體合于內皆君子用事中爻雜撰兑震便漸有變動之義如二遽言馮河三陂四翩上復皆以此以乾體不全于內泰將反而為否之故否全坤之體合于內皆小人用事中爻雜撰艮巽亦漸有交通之義如二即能包承四命五休上傾皆以此以坤體不全于內否將反而為泰之故然泰中爻同一雜撰在陂與復為非而歸妹則是否中爻同一雜撰在休與傾為是而包羞則非所謂雜物撰德辨是與非類如此像象管見卷一下
