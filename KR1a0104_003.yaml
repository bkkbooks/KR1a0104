body:
  text: 像象管見卷三上明錢一本撰咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣感古禫切動也觸也又誠也咸感以兩相交感而各不容心故能感而動于人動人而成感卦體兊柔上而艮剛下此物交則感之象上下敵應不相與艮之止而寂二氣感應以相與咸之感而通是以亨下止上説止主感説主應所感斯無不正而有攸利是以利貞婚姻之道無女先男者男止以下交女説而上應咸如是更有何失是以取女吉天地感而萬物化生天地萬物原一氣也説言乎兊何物不化何物不生然終萬物始萬物莫盛于艮天地何容心于其間是為天地感萬物之道聖人感人心而天下和平聖人之心與天下之人之心原一心也人心説應何用不和何用不平然天下之心有説聖人之心惟止聖人何容心于其間是為聖人感人心之道感者説無不通天下之故所感者止常自寂然不動觀其所感而天地萬物之情可見所感咸也天地萬物相與之情盡于咸可見非咸不成其為感皆妄感與容感而已矣象曰山上有澤咸君子以虛受人左氏曰澤竭則山崩全氏曰萬物之象几中而有容者虛也凡扣而有聲者虛也人心惟虛故靈山谷惟虛故應又曰聲外有聲以虛而傳影外無影麗實而止山上有澤山高澤下而于山上言有澤便是咸之象君子以虛受人山有澤豈不以受其受豈不以虛凡人處已高受人必隘君子以不自有其高為虛體以無所不説涓流皆吾澤潤為受量初六咸其拇象曰咸其拇志在外也拇莫厚切足將指初四感應相與艮之初于趾象止巽在前于拇象動咸其拇之象艮其趾未失止之正咸其拇已撓止之體外有入內亦出止志便象不在初象故明志在外六二咸其腓凶居吉象曰雖凶居吉順不害也腓足肚房非切音肥二雜巽撰入之始不能止惟有入初猶足指之動二乃足肚之動凶夫二止之中巽順之德居謂以止居巽寓順應于廓然之中于正感正應寧有所害故吉象故明順不害九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也股髀公戶切脛本曰股輔下體者或作􅨨亦作骰執之入切本作執古作三以止主而為巽股腓動隨動咸其股之象以止言主在三以巽言主不在三執且在二二執三隨三為二執何以上往往必為上所少執其隨往吝之象二弗居三且全失其止所象故明亦不處無專主自執之志在隨人所執為志三股僅如初拇矣往安得不吝象故明曰下九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也憧尺容切音衝意不定也初止無遷四説以正以正説應正止止惟山凝説惟淵靜非無往來不役于往來非無思不役于思貞吉悔亡之象四如不貞合二三為雜巽之爻巽為進退為不果心念紛飛全不定疊來不為止往不為説憧憧往來之象失止主而得巽朋朋為從惟爾所思爾為思惟朋所從全掉不下朋從爾思之象貞是止説正感巽不能害象故言未感害憧憧往來巽朋來止主亡非剛止剛説篤實光明淵深靜密之思而隂巽輕揚浮散之思非日月寒暑往來屈伸之思而朋類牽引循環不窮之思非一無得總屬私小象故言未光大九五咸其脢無悔象曰咸其脢志末也脢武罪切又音枚夾脊肉一曰心上口下或作脄感無所入之物五剛説之中與二感應相與以其止非以其巽況五已處巽外雖巽亦不為入安得為應咸其脢之象無悔言五自無失而致悔五二正應二言順不害五即為入物來順應非有害也必于不入抑末矣象故曰志末上六咸其輔頰舌象曰成其輔頰舌滕口説也輔上頷又在頰兩旁骨頰兼協切滕水超湧張口騁辭也輔口輔頰舌皆所以言艮輔而言有序咸輔而口為多不惟見上有頰而又見上有舌咸其輔頰舌之象五不為二入志固是末上欲貞三止口亦徒多象故明曰滕口説恆亨無咎利貞利有攸往彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久于其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久于其道而天下化成觀其所恆而天地萬物之情可見矣恆胡登切廣韻玉篇皆下有一畫惟易無下一畫與無字同古作其説象一舟兩頭著岸徹首徹尾恆久恆是久之道不恆非久道也卦體剛上柔下以分正而可久雷風相與以不相悖而可久巽動之德以合而可久剛柔之爻以皆應而可久卦所以名恆恆亨無咎上下相與皆久之道久于道愈久而推之愈通是以亨既亨恆又何咎利貞以道正巽正動之利利有攸往以道內巽外動之利天地之道恆故久而不已人之道恆豈其久而遂已柔巽于內剛動于外柔巽有終剛動有始方將與天地之久道同其不已故恆亨既無咎而又有貞之利有攸往之利也日月以得天為恆故能久照四時以變化為恆故能久成聖人久于所恆之道以天地之道為道與日月合其久照與四時合其久成故天下化成觀其所恆而天地萬物之情可見所恆剛上柔下內巽外動雷風相與剛柔相應皆久道也一失其恆天地立見其翻覆萬物立見其消滅矣如之何而可以久象曰雷風恆君子以立不易方雷風雷動而上風巽而下雷聲常在外風氣常在內長男常震動于外而無所牽于內長女常巽順于內而無所與于外是惟天下常久之定理恆象物理之所不可易者為方如雷風雖相薄常不相悖是為立不易方是為君子之恆初六浚恆貞凶無攸利象曰浚恆之凶始求深也浚私閏切音峻通作濬李氏曰人情物理由淺而深其深必久初四應與之始四震動以為外主初巽順以為內主本可恆之道恆初將以內主外以巽主動四以雜撰失動初以巽性務入有不當必求之有不入必深之浚恆之象以此為貞全非巽順之正故凶所求乎四亦何以善其動故無攸利象明始求深應與之始不以巽為道而以求為主深于求人淺于責已究必以柔凌剛以婦制夫凶其宜矣九二悔亡象曰九二悔亡能久中也二五應爻以二之中巽五之動失或在五得常在二悔亡之象二巽以中為能隨所應與無不可久象故明曰能久中九三不恆其德或承之羞貞吝象曰不恆其德無所容也下以巽上為恆德三雜撰兑毁之始無復能巽不恆其德之象三德不恆上固不為應下亦何所承或以巽而能相承祗見其可羞耳或承之羞之象初貞貞于為浚凶三貞貞于不恆吝上下皆似不為容象故明無所容九四田無禽象曰久非其位安得禽也田男子事四因入有浚而出為田非震之田而兑之田馳之于毁折之場逐之于附決之地雖久何獲田無禽之象象明久非其位安得禽三言德四言位以震撰兑主位便象不在四故特明非其位而不可以久又安望其有得乎六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也五二剛柔正應恆其德之象于德既恆宜若可貞以相從然以二言貞巽婦德也貞于從五是一于從夫以終其事吉以五言貞震夫德也貞于從二如惟婦是從而莫適為主凶咸二居艮男得其止恆五貞震男失其動咸吝于隨人教三定執于內止恆凶于從婦訓五制義于外動相發上六振恆凶象曰振恆在上大無功也中庸振河海孟子玉振凡師出曰治兵入曰振旅之振皆收義俞氏曰恆上師三皆以大無功解凶字四田震之始出之象上振震之終收之象二為巽五惟知有順夫義無制凶三弗恆于巽上遂窮于動夫功盡喪凶四田猶能震而出上振止惟收而入象故明其大無功上經首乾坤乾成男專明夫道坤成女專明婦道下經首咸恆合言男女夫婦之道咸二少相與人道之交女不可以先男故以下女訓男于內所以論一時交感之情恆二長相承人道之綱夫不可以從婦故以制義訓男于外所以論萬世處家之道咸男居女下撰巽而牽女多不得其所止恆夫處婦外撰兑而説婦每不善其所動咸撰巽自二始男全失猶得之于女恆撰兑自五始婦猶得盡失之于夫咸三主男也執不在三上口為滕男斯為下恆初主婦也深之在初四禽無獲夫何以稱是故止志無遷可以求説思之光大震動罔功勿但羞巽德之無恆得止男下説女之義而知所以為感得震夫制巽婦之義而思所以可久其于咸恆思過半矣遁亨小利貞彖曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉遁徒損切浸子鴆切臨曰剛浸而長遁止曰浸而長不言柔臨曰八月有凶遁曰小利貞又似以剛浸為小凶而柔浸為小利聖人之意深矣復一剛始反朋來無咎姤一柔始遇遂不利賔臨二剛浸長其于四柔無不以咸為道遁二柔浸長其于四剛遂無並立之理卦所以名遁遁亨以遁故亨五剛當中正之位二柔在方應之時乃當其方應而先行非待其不應而後行止之時既在二行之時便在五當行而行當遁而遁遁與時行合乾三爻而無不全之健無不正之志皆此遁是以亨小利貞二以爻言則浸而長以卦言則止之中自止于中以止為正止其在小于大無侵正其在小于大無犯亨固在于剛大利亦歸于柔小小利貞之象有遁之時一失則不可復行有遁之義一失則不可復決遁之時在小人下而能止之先不在小人上而無止之後遁之義原與小人相應而去非與小人相失而去其時義所關為甚大彖所以深贊其大也象曰天下有山遁君子以逺小人不惡而嚴逺于願切天在山中天若為山所止天下有山山何能以止天山下止天上運若其相去之遼絶遁象山視天為小故稱小人天與山迥不相及故稱逺天無不覆故稱不惡剛不可屈健不可撓故稱嚴初六遁尾厲勿用有攸往象曰遁尾之厲不往何災也剛非自遁以柔尾之而遁初為四剛之尾傾危之顯禍未加于君子而隂伺之殺根已種于小人是為遁之尾是為尾之厲遁尾厲之象勿用有攸往二執之在前若自二止初之辭象曰不往何災遁初之心即姤初羸豕蹢躅幸災君子之心二居中用事方巽承以止君子之行亦不與初之尾乎君子也六二執之用黃牛之革莫之勝説象曰執用黃牛固志也勝音升説吐活切二五正應之爻五健而上運二止而下固既用順道以應五又用中道以順五以順為牛以中為黃牛以艮手為執以巽繩為要束之固執之用黃牛之革莫之勝説之象二以固留君子為志而無以通君子之志象故曰固志九三係遁有疾厲畜臣妾吉象曰係遁之厲有疾憊也畜臣妾吉不可大事也係潔束也聮絡也通作繫憊步拜切疲極曰憊通作敗豐三亦曰不可大事三剛止之主雜乾欲上行而遁雜巽又不果而係係則合二四為與下有牽于二執疾生于小人上有纍于四好疾生于君子如之何不危係遁有疾厲之象姤二為五剛之首能包初為魚遁三為四剛之首豈無畜二與初之道止初而畜之為臣君道在三止二而畜之為妾夫道在三如是行止惟三所制止則光明之君子行則勇決之君子吉一係大小兩失人已兩失力不能支象故言憊雖曰畜之而吉得其臣僕之恭妾婦之順然柔小既不利逺止體又屬無為與之大事終非其人亦非其時象故曰不可大事姤二包有魚遁三畜臣妾否四疇離祉觀五觀我生剝上君子得輿此可以明君子待小人之道矣九四好遁君子吉小人否象曰君子好遁小人否也好如字否部鄙切塞也閉也四三同德以近相得合而上行初其應爻亦不相惡好遁之象四未遁三有係君子小人未分四遁四剛上行兩柔下止君子小人截然遂分為二以君子言遁不失時君子吉之象以小人言無諸君子為其交與遂將閉塞成否小人否之象故直曰君子好遁小人否也九五嘉遁貞吉象曰嘉遁貞吉以正志也五二剛柔正應二方為應五惟有行二固執牛五原不惡原是覆之如天視之如偶遁如是是之謂嘉是之謂貞而得其吉象言以正志正以已亦正以人志必如是而後為正若為小人所固亦不足以語君子之正矣上九肥遁無不利象曰肥遁無不利無所疑也升三亦曰無所疑遁決于退升決于進遁上肥既象處身山外又象樂天之至為冥冥飛鴻為千仞翔鳯不惟與三綱為一體而有君子之吉亦未嘗不與二柔為一體而無疾厲之憂肥遁無不利之象上于二柔為逺愈逺愈貴初往固逺不及上上亦疑不及初二執亦逺不及上上亦疑不及二象明無所疑才疑便是殺根便是惡機便于天覆之量不無虧蝕即能幽棲高隱僅可以稱山澤之癯而于肥遁之義固殊逺也大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣壯莊亮切威猛強盛之名又氣力浸強之名易傳當雷不雷太陽弱也大壯大者壯也以四剛爻言壯剛以動故壯以兩體言壯大壯遁之反體遁亨主五言亨大壯利貞主二言貞四剛在內壯之君子二柔在外壯之小人君子貞其動無罔于小人小人順其動且輿于君子夫是之謂大者之正而無所不利遁而係二柔則憊大壯而觸二柔則羸天地之情至大至正剛大而以柔小為觸非正大之動而傾危之動何得為大何得為正君子利貞貞其健勿輕于動正其已勿求于人于上二柔如天之無不覆如地之無不載極其大極其正方可見出一箇天地之情來故曰正大而天地之情可見不然非其無情總為人之私小之情非盡無見總為人情私小之見而已矣象曰雷在天上大壯君子以非禮弗履雷在地中其聲未動為復在山上雷聲動而尚小為小過在天上雷聲動而益大為大壯君子以非禮弗履動皆天理無履非禮不愧剛健之天常有轟雷之勇此所以為君子之大壯初九壯于趾征凶有孚象曰壯于趾其孚窮也九居壯初正應四動壯于趾之象四為動主于乾剛之上震動二柔而使之知退知亡者四之能事也初不能貞而以壯趾征無論不能及二柔四初之有孚之爻也四且惡其迫已而不與其征是之謂凶有孚是之謂窮象故曰其孚窮九二貞吉象曰九二貞吉以中也九二貞吉大壯解未濟凡三言之二剛中以中為貞貞其剛于已俟其動于四天地正大之情藹然有可見是為壯二貞吉之象大者之壯大者之正盡于二者之用象故明以中九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也罔網通用羝都奚切音隄羸力追切藩籬也或作樊角俗作角非遁二合內二柔為一體有止于二柔無惡于二柔壯四合外二柔為一體有震于二柔無罔于二柔三上應爻上小人三君子君子小人或不相能以上動為柔危惟力是逞小人用壯之象以三動為毁決其于上柔不為震動于先遽欲毁決于後非罔而何君子用罔之象小人不足責君子如是以貞必危將無動非藩隨動成觸胥為羝羊稔其鬬怒未獲震動之利先罹兌毁之憂羝羊觸藩羸其角之象遁四行合三撰乾而為君子壯三罔合四撰兑以反震動四動雷動而上為春為生三動澤動而下為秋為殺姤四之于初民逺之且未可壯三之于上民罔之奚可為上用壯若因于三之用罔象故曰小人用壯君子罔也九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也説卦傳坤為大輿四剛動之主二以剛中為貞四以剛動為貞貞于合二大者合為壯之君小者分為壯之民內外有辨大小成用何動不正何悔不亡貞吉悔亡之象三罔成藩四貞震行而藩自決三觸有羸四貞不觸而角何羸藩決不羸之象剛以貞動柔以順承五上為輿四為輹未動惟輹解説而止方動惟輹運轉而行一體配合而成大輿之壯用壯于大輿之輹之象初以趾征則凶三以角觸則羸四以輹往二柔惟其所御且喜其進而尊尚之象故曰尚往六五喪羊于易無悔象曰喪羊于易位不當也易以䜴切六居五曰位不當惟壯五五羊不言羝雖亦危動之柔不逞鬭觸之性二四皆貞乾易之體合于四兑羊之體亡于五喪羊于易之象如是四震五行何動而不為君子之輿故無所失而致悔象言位不當五以撰羊之柔首當四剛之前匪欲以外柔摧君子之剛即將以內狠反君子之動如之何其為當是以必喪而後為無悔也上六羝羊觸藩不能退不能遂無攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也埤雅大壯之極疑于羝猶坤之上六疑于龍震大塗加之乾易之上君子履小人視何莫非坦坦之周道自羝羊雜撰于中爻非震行之動而兑毁之動三以上當其進前之路為藩而觸之上亦以三當其退後之路為藩而觸之三上觸剛以鋭自折羸其角之象上下觸柔以荏兩靡不能退不能遂之象如此安得有攸利五知喪上克艱罔或在三艱且在上觸或在三艱且往上一艱處壯之終有善動故三厲而上吉艱則吉之象象言不詳二柔居于遁內為長君子先時而行二柔處于壯外為消小人後時不退是以謂之不詳言咎不長上本為四剛之咎但一知艱以震動受其在剛大以驚懼圖其在柔小咎安從長遁初曰何災災仍在壯上曰咎不長咎仍在彼固不可以為遁之尾此固不可以為壯之首遁之上三爻皆以遁為亨惟三可畜二柔為臣妾以一體合止之故壯之下三爻皆以貞為利惟四可輹二柔為大輿以一體合動之故遁三畜臣妾便吉主君之義在我惟我所行而大者之遁成壯四輹大輿更壯運轉之軸在我惟我所動而大者之壯成人情難退故遁上而後為肥人情好進故壯初便著其凶遁三無係小人已逺于下壯四貞小人亦分于上君子之于小人雖共為一體未嘗無止而逺之之道未嘗無動而分之之道而又未嘗無所以畜之無所以用之是故在大壯則見天地正大之情而在遁則為不惡之量也晉康侯用錫馬蕃庶晝日三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也晉即忍切俗作晉非康侯安康之侯猶考工記所謂寧侯也屯豫言侯以震晉言侯以坤民功曰康坤衆為蕃庶之馬大明中天為晝日艮手從中下接三隂為三接晉進明出地上以明出地言進順而麗乎大明以順麗明言下之進柔進而上行又以柔上行言上之進暌以説麗明旅以止麗明止言明晉以順麗明合萬國之順以順麗一人之明明以順麗而益見其大是以特謂之大明柔進而上行自出地上謂之明自下順而麗之謂之大明自五進而上行乃謂之柔不自有其明更不自有其大上以柔進真大明當天之主何以不逮乎下下以順麗皆康民安國之侯何以不獲乎上自其錫遇之隆有錫馬蕃庶之象自其接見之勤有晝日三接之象其云康侯之用主二言用猶明夷艱貞之利主五言利明出地二為正麗之主明入地五為正晦之主反對一義象曰明出地上晉君子以自昭明德德去其蔽曰昭日以出地而明故明出地上謂之晉明德君子所自有自有此明德而自不失其明曰自昭晉自昭君子出地之明乾自強君子行天之健初六晉如摧如貞吉罔孚裕無咎象曰晉如摧如獨行正也裕無咎未受命也摧罪雷切退也擠也折也下三爻皆以順麗大明為晉順初麗始遽逢四鼫如山摧初而初自貞以貞則吉既摧四固不合衆亦未允于五何孚坤體寬廣可進可退居之以裕是以無咎晉莫重于始正衆進獨退正自在初象故曰獨行正初下未當五任象故曰未受命六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也二以中正順麗于五安復有愁以四鼫為險于中二因而加憂鼫鼠一日未去二憂一日未巳是為晉如愁如貞而得吉之象大明上行之君順麗當天不見有君之尊惟見有母之親二以愁晉能勿貽五之恤豈不介五之福蕃庶之錫晝日之接二藉合三爻以成順亦藉合三爻以受福受兹介福于其王母之象六三衆允悔亡象曰衆允之志上行也允信余準切俗作允非初摧二愁皆以四故三與四如以近相得天下皆疑為鼫鼠之儔矣悔安得亡五上行三在坤衆之先首能以順前導二柔合以上行衆是以允悔是以亡三非中爻雜艮所能止雜坎所能陷象故明衆允之志為上行九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也鼫通作碩位不當以九四言晉夬萃豐小過凡五艮為鼠離之下坤之上艮伏其中下據三柔之上則雜艮而見上近大明之五又雜坎而隱夜行晝伏首鼠兩端晉如鼫鼠之象初裕逸而休四鼫勞而拙貞厲之象四居以順麗明之間于下順有阻于上明有掩象故特明其不當六五悔亡失得勿恤往吉無不利象曰失得勿恤往有慶也三悔亡以衆允五悔亡以虛中而明無不孚坎加憂離明之體顯坎憂之體隱順而麗者為康侯明足以來之不憂失竊而據者為鼫鼠明足以照之不憂得失得勿恤之象如是而往以近則相得吉以逺則無所不順無不利五麗四成明下麗四成順上下皆隂陽會合之慶象故明曰往有慶上九晉其角維用伐邑厲吉無咎貞吝象曰維用伐邑道未光也角剛乎上九居晉極晉其角之象邑鼫鼠所據上與四皆五麗明之爻四為鼫鼠邑于晉中掩蔽大明之光上三應爻衆志允孚于三合而繫屬于上上下相維角之用行明之體全邑之鼫清維用伐邑之象投近明之鼫其事危寬明君之恤其義吉善補剛進之過無咎貞而無伐吝上大明下順麗而容一鼫鼠之四隱伏貪據于其中于晉道安得為光必至伐邑之用行然後無不光之患象故曰維用伐邑道未光也明夷利艱貞彖曰明入地中明夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之箕子囚奴在文王羑里之後方演易時箕子之明未夷爻言箕子明夷象言箕子以之自是周公孔子合言其事以發明易義利艱貞卦惟明夷爻則噬嗑九四大畜九三兩言之晉大明之主在五坤在下以下麗上其事順故言順言麗明夷文明之主在二坤在上以上晦下其事艱故言艱言貞晉雜坎在上從二視之則愁從五視之已出坎上故勿恤明夷雜坎在下從二視之為大難之蒙從五視之正履坎上為內難非極其艱貞則不利故繫之曰利艱貞文王以之孔子之發明言文明柔順以蒙大難此文王處明夷之事文王不自繫于易也箕子以之是正發文王利艱貞之繫利艱貞而曰晦其明言處明夷之時為微子比干之貞猶易為箕子之貞甚艱箕子之佯狂忍辱不為微子之去不為比干之死豈徒曰晦一已之明當極暗之世僅存有一明侯之明以為明乃以明在下暗在上勢不相容故勉留箕子之一身若為從中晦之晦其已所以晦二之明存上之明使二明不至傷于下上暗不速亡于上其事甚艱而志甚正故特明之曰內難而能正其志此艱貞之所以利也不然箕子或與微子同去比干同死文王之蒙大難誠不知所終紂亡亦恐遂無日雖貞未得為艱此豈箕子之所利如無箕子艱貞之利人道無復存于明夷之世矣象曰明入地中明夷君子以涖衆用晦而明遊氏曰明一也自治用昭察惡欲盡之義涖衆用晦太察無徒之義明入地中以明自入地為象故不曰夷明而曰明夷明出地則明君子以明自昭明入地則晦君子以晦涖衆用晦而明用坤之晦藏離之明離明藏于坤晦之中原無不明只不察察為明而生衆心之睽疑耳此所以為涖衆之善道初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也初與三皆二明所麗如飛之有翼自二為雜坎下爻初翼若為坎水所濡無能翼二以飛明夷于飛垂其翼之象君子于行二以雜坎蒙難初以無麗逺避伏坎三爻之下海濵無養終守其困三日不食之象有攸往三如狩二而南初遂麗二而往遂將厯坎而震為出地之明之象主人指二有言言其無可往之處言宜以坎下為安以時正當入地而晦所謂內文明外柔順以蒙大難所謂三分天下有其二以服事殷其義象正如此六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也六二之吉家人與此同李氏曰順以則聖人舉措純乎天理文王之出患難自循天理之外不容一毫私意司馬遷作史記乃謂閔散輩以計出文王如此立言其得罪于聖人甚矣股下體輔震屬左故稱左股文初出震為侯惟紂是輔從上視二支住殷家左股半壁天下今不幸而有坎離之蒙是為左股之夷明夷夷于左股之象離雜坎則陷雜震則起二用何道以拯此難惟有馬壯是二之吉雜震三爻以三則周旋大難之中以四五則維持暗主之側皆馬皆壯無一不有坤順之則在二惟則是順象故明其順以則九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也四時之田在冬曰狩又火田曰狩凡帝王之出亦皆曰狩明夷于南狩蓋文王得出羑里之象二蒙大難惟以離雜坎之故至三復雜震撰動坎則北反為離則南坎則陷起為震則狩羑里之難于是乎解明夷于南狩之象三狩方拯二于上初往遂歸二于下其始不食超然逺引之高鴻其繼就養巍然盍歸之大老得其大首之象雖南狩而得大首時方入地以入地為安明夷之貞也以出地為志于貞害矣主人之所不可不可疾貞之象三之南狩之志志在拯二乃得初而明益大象故曰乃大得日非麗無明晉上伐而四鼫清五明固盛于地上明夷之三狩而初首得二明亦熾于地中二惟以有麗成明上惟以無麗成晦稽明晦之故者考焉六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也坤為腹合震象左腹坎為明夷之心心絡于腹左四五一體有內難而四居外卦之初象其門庭之可出四五一體為腹心而五為晦明之主象有心意之可圖四以坎陷象左腹之入旋以震動象門庭之出入謀五與之同心出自靖以去為道是為入于左腹獲明夷之心于出門庭之象意者心所之四以乘三成坎如不為出二之大難固不解五之內難又益深四與五同繫心暗主各行其意以晦二明去留不同而心意同象故明其獲心意六五箕子之明夷利貞象曰箕子之貞明不可息也胡氏曰爻不言艱言箕子則可知其艱五四俱迫內難四有震塗可出則去五以坎難為安遂奴以與二明為正晦是為箕子之明夷夷其已所以存其上于已有一日之貞即于上有一日之利是為箕子之利貞坤本無明有箕子之貞以坤撰震離若返照明遂不息于上象故曰明不可息明出地上順而麗是為康侯之進明入地中順而晦是為箕子之貞如上便要息滅二明而卒自罹于悔此所以為失則上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也上無明以有二明為明上去二逺終于不明極于自晦不明晦之象明入地中四如初夜時五如未央時上如將旦時初如既濟初吉之為初至三震起而將出于東初登于天之象後如比上後夫之為後至上晦極而將隕于西後入于地之象初登天不止顯于西土而且光于四方合四方之國而皆在所臨照象故曰照四國後入地初在下而登天上在上而入地象故曰失則則是坤順承天之則二順則順為下之則便是順天者存上失則失為上之則便是逆天者亡商周之際文王與紂之事順則與失則之間而已矣家人利女貞彖曰家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣人所居稱家又室內謂之家家人巽離二女長上中下四二兩爻又得正位皆女正之象天下惟女不易正女正家無不正矣故家人之利利在女正夫子發彖推明女不自正女正位乎內以二言女之正男正位乎外以五言女之所由正一家男女之正便是一箇天地之正故曰天地之大義既言男女之各正又言家人有嚴君始于為男女終于為父母一家惟父母為尊父母尊嚴以君主于上若子若婦若兄若弟肅然如臣民之承事于下則一家父子兄弟夫婦正而天下之為父子兄弟夫婦者定故曰正家而天下定夫以天下之定而係于一家之正家正又自女正始此家人所以惟利女貞也象曰風自火出家人君子以言有物而行有恆邵子經世火為風風者火氣之所化風自火出即亨飪之火凡亨飪必以火火以風熾如以槖籥鼓風常鼓得許多風從火裏出此便是父子兄弟夫婦合而相生相養以成一家之象故為家人君子以言有物而行有恆身之所出惟言與行口無擇言無言不物于明德而可以風一家之人身無擇行無行不恆于明德而可以風一家之人此為知風之自初九間有家悔亡象曰間有家志未變也古云教子嬰孩教婦初來中孚之初亦曰志未變初家之始家曰有家有父子有兄弟有夫婦有父子兄弟夫婦相生相養之道間以雜坎在前為象初間坎下如水有防間二以明乎內間四以巽乎外以有而立為間因間而成其有悔是以亡象曰志未變間是間其未變之志二四雜坎二將變其明四將變其巽志已變雖有間無所用之矣詩載驅敝笱之刺春秋祝丘之享齊師之如之書謹禮于微慮患于早皆此意六二無攸遂在中饋貞吉象曰六二之吉順以巽也饋求位切進食于尊者曰饋通作餽或作歸鼎火亨飪于外曰享帝養賢家人之火亨飪于內曰在中饋文周彖爻之義之精如此俞氏曰蒙五順以巽事師之道漸四順以巽事君之道家人之二順以巽事夫之道遂成凡事得專行而擅成皆謂之遂以二婦五後有間前有節一無專行擅成之事無攸遂之象坎之下離之中水火亨飪之交唯酒食是議唯尊者是進是餽在中饋之象壺飱之外非所與門庭之外非所履女貞之利何以加此象曰順以巽順二所自有取其承上之德巽五所為感美其與四同功九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也嗃河各切嘻喜悲切初持剛正于二四之下象有間三持剛正于二四之間象有節嗃嗃聲言之高嚴為呵禁之辭是安能無悔亦安得無危然于家節初無所失悔厲吉之象嘻嘻笑言之狎離陷成坎溺情于兩柔之間火性去而水性成以二或有遂以初若無間婦子嘻嘻之象若然雖有上之身教在恐終有不孚恐終有不威終吝之象六四富家大吉象曰富家大吉順在位也富方副切豐于財也又臣能世祿曰富記曰父子篤兄弟睦夫婦和家之肥也肥與富同義四何以能富其家二正離四又雜撰為一離上下相麗而成明應初事不踰間近三事不陵節合二承五女貞有利婦順有成虛在一已實在一家富貴之象二于家無遂之事正其在已貞吉四于家有富之功相其在大大吉五在家人尊位四為巽順主爻四順五上行下效無一不順富莫尚吉莫大矣象故明曰順在位九五王假有家勿恤吉象曰王假有家交相愛也假庚白切五二正應內順外巽順以成巽巽以成順合一家而胥巽之乎中正王假有家之象坎在下為憂為恤正巽之體顯雜坎之體隱假之來假勿恤吉之象富順之所召假愛之所流象曰交相愛匪止夫夫婦婦之交而盡父父子子兄兄弟弟之交上九有孚威如終吉象曰威如之吉反身之謂也自初至五男女之位無一不得其正上處其上以剛實要終合一家而無不孚有孚之象三嗃嗃則大嚴厲上則剛爻巽體無其威而如有其威威如之象孚曰有以父則信足以為子之法以兄則信足以為弟之法以夫則信足以為婦之法威曰如以子則畏父而愛之則而象之以弟則畏兄而愛之則而象之以婦則畏夫而愛之則而象之家人之要終如此是為上九之終吉初間三節如火是家法上威以假要終樹之風聲是身教象曰反身之謂若不謂徒有初間三節而遂已者睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉睽苦圭切目不相視也家人利女貞利二與四之貞而二明為內主睽小事吉事五與三之小而五明為外主卦之所以睽火動而上澤動而下火澤一氣無睽以動之上下而成異此睽象之一二女同居其志不同行二女同居無睽以志不同行而成異此睽象之二因其睽而事之以下之説麗上之明則自下而上合柔進上行得明之柔中應説之剛中則自上而下合鼎以木巽火巽之自長其亨大睽以説麗明麗之自少其事小革澤中有火剛柔得位其變大睽上火下澤剛柔失位其事小皆小事吉之象非謂睽但可以吉小事也又以三才推廣卦義俱無不睽而合之理初上天地二三四五男女萬物天尊地卑為睽而同以生為事男陽女隂為睽而志通于相應萬物羣分為睽而事各以類聚當睽之時得睽之用時所當睽用所當睽盡乎天地男女萬物之變彖所以深贊其大也象曰上火下澤睽君子以同而異上天下澤上下有定辨為履上火下澤上下不同行為睽君子以同而異同如兩象合體以為同異如火澤上下之各異同中不能無異異處不害其同此所以為君子之睽初九悔亡喪馬勿逐自復見惡人無咎象曰見惡人以辟咎也初四敵應為悔剛爻説體獨得其正為亡馬所以行四初所麗明之爻而以雜坎隱于前為喪五二以應而遇上三以應而遇四無所往豈其不還而遇初勿逐自復之象四初所合德之人而以雜坎反乎明四若反而不目視乎初初亦反而不目視乎四為惡終于惡而不見咎不在四而在初復在四原明之體見在初正麗之道自睽之咎方得免見惡人無咎之象以同德相惡而成睽于何不至見惡人不使之甚也象故曰以辟咎九二遇主于巷無咎象曰遇主于巷未失道也巷胡絳切説文里中道五柔進上行之主合三四而雜撰為坎象隱伏下行不勝側席有事旁求為在巷二雖説應之爻五如亢而無下何可以遇五下行二上應如是而遇正明自在五正説自在二遇主于巷無咎之象象故明未失道世有迂身成君之説皆失道之為詭遇之遇非于巷之遇也六三見輿曳其牛掣其人天且劓無初有終象曰見輿曳位不當也無初有終遇剛也曳餘制切有點誤掣尺制切天剠額刑劓截鼻刑音義三上應爻以説上行麗不以正故見亦不正坎其輿既見其曳而難進離其牛又見其掣而難駕上其婚媾之人自為疑忌而不合不惟髠首而于已為天且若截鼻而于已有劓初目四曰惡人三目上曰其人其之為言亦惡之之意是為無初不知由己所居與正明之五不當故自生曳掣天劓之見無曳見三已有輿可乘何不可駕而進無掣見以離牛駕坎輿前引後推何所不順無天劓之見其人即三之婚媾與上遇雨之吉同是為有終三柔上剛柔往之見難化剛來之見易融象故以有終為遇剛九四睽孤遇元夫交孚厲無咎象曰交孚無咎志行也四者雜坎中爻從初對四言若與初目不相視象惡從四自處言與初不合夫誰為合亦象孤初不與四終惡足體元而長人稱元夫四初遇而有交四初交而成孚雖有孤危善補睽過無咎初見四但辟自睽之咎四孚初遂成合睽之功象故明志行六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也初悔亡守説之正五悔亡進明之中二以分尊五稱遇主五以情親二稱厥宗四以雜坎間于上明下説中一膚之隔幾成秦越如何可往膚在兑口之上正説應而雜坎隱象厥宗之能噬二有噬以正説麗正明五有往以正明應正説二遇未失五往何咎二遇須五在巷五往須二噬膚是謂交相求而交相盡二真得主五真得宗象故明有慶上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪冦婚媾往遇雨則吉象曰遇雨之吉羣疑亡也塗泥作塗路非六爻惟上與四稱睽又稱孤四以離雜坎上履其上有盡反其明而成暗之象故在睽中獨為孤上孤無往而不見三為可疑疑其非所負而負為豕為曳滿眼穢濁若有以汚已疑其非所載而載為輪為隱伏白日魍魎若有以祟已又疑其關弓上下之間從前視之則矯而張若為之射已從後視之則伏而説若為之伺已夫三上剛柔正應原為婚媾而以蓄疑成見無見非疑何時可往何時為遇上三匪冦而婚媾從兹以往雜坎既解為雨正離盡顯其明從下遇之則上合從上遇之則下合才遇雨便舉一卦之睽而無所不合是為上九遇雨則吉之象家人之中有坎其爻位正初得之而為間如水有防盡成上下交流之愛象曰志未變明者不變而之暗睽中有坎其爻位不正上匪化之而為雨如雲蔽日盡成上下間隔之疑象曰羣疑亡暗者盡亡而之明家人父子兄弟夫婦同居于內家天下人中國固即此家此人睽君臣朋友異處于外君臣原睽朋友原睽而以乖異離散言睽非義家人離必起于婦人君臣合必上有明主家上而無反身之令儀無以必之于子婦睽初而棄同德之惡人何能得之于朋友家初間內有則睽上雨外有成此二卦反對互發之義像象管見卷三上欽定四庫全書像象管見卷三下明錢一本撰蹇利西南不利東北利見大人貞吉彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉蹇紀免切行步艱難也難平聲屯言難生震動之始險在動上如草生出地之難故曰難生蹇直言難艮止之終險在止前行不能進故直言其難也卦象險在前止在後見險能止可稱知然一于止而無往蹇何以濟蹇利西南三五合往而雜撰離明于其中則坎體隱坤體見進居五中坎險盡夷為平地是為利西南之象如三五不為合往艮既終止于下險何以濟于上蹇道遂窮是為不利東北之象五以中正當尊位故諸爻皆利見大人五貞舉一邦之蹇難而無不正故吉當蹇之時得蹇之用蹇無有不濟者蹇之時用所以為大象曰山上有水蹇君子以反身修德山上有水山既峻阻其上又有水以為險陷跬步難以行進蹇象君子遇蹇必反求諸身以自修其德反身如山不動之象修德改其所未善勉其所未至如修治山水而母使壅塞山上之象初六往蹇來譽象曰往蹇來譽宜待也待徒亥切來往即進退二字蹇諸爻以利見九五為有功初逺五無可進而往與四敵故宜止而來來與二依三以止見險能止之知首稱在初往蹇來譽之象三未反而入坎初止以待三待所宜待象故明宜待六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終無尤也屯二乘初動之剛初居貞二合以待字稱女貞蹇二承三止之剛三來反二合以上應稱王臣進居重坎之下以五之蹇為蹇而曾不諉其難王臣蹇蹇之象二稱臣見初未為臣未為臣不有躬匪知既為臣又有躬匪忠二蹇蹇艮躬不獲匪躬之故之象臣人盡力不論成敗有二之蹇蹇要終而獲吉者此象故明其終無尤九三往蹇來反象曰往蹇來反內喜之也反平聲孚袁切五立險中惟三有剛實之才可與共濟往亦蹇四未為連來乃反義如平反之反三為止主反身不轉便象終止今以艮雜坎如入身坎中以平反其險五險以三反得平往蹇來反之象三反豈惟外險為濟二獲匪躬之助初亦不為徒待內兩爻皆喜其得所主象故明曰內喜之六四往蹇來連象曰往蹇來連當位實也四往五亦蹇以未合三來則連五三同功四麗其中連成一體之象屯四求初為婚媾蹇四合三為來連連與婚媾同義四柔虛連成剛止之實位于五下為當矣象故明當位實九五大蹇朋來象曰大蹇朋來以中節也五位險中以大人履大難匪視為一丘一壑未拯之險而視若懷山襄陵宇宙陷溺之險真有遺大投艱而一日不容安止之意大蹇之象屯五屯膏以逺初動初居貞不來蹇五朋來以同功三止三反則來朋來之象三為內所喜四所連上所應三來合衆爻俱來取節于五之中以五之中為節往有節不失于過難來有節不失于過止蹇雖大無有不濟象曰以中節若不以能止歸三而尤以當位正邦之功歸五也上六往蹇來碩吉利見大人象曰往蹇來碩志在內也利見大人以從貴也鼎初亦曰以從貴初本無所來以不往為來上亦無所往以不來為往凡往皆以坎言凡來皆以艮言上往安于乘五故蹇來則獨與三應四連巳實上應尤碩故吉利見大人能來三然後能從五然後為有功之象上已出于卦外有不來不見之象以其獨與三應志在應三而從五象故明其所從之可貴屯動險之主在初故屯四以求初為明蹇止險之主在三故蹇上以應三為碩初待而譽初下與五逺而無應此而不止不稱知上從而貴與五近而有應此而終止其道窮凡止所當止而于蹇難無犯止所能止而于蹇難有濟皆處蹇之時用也解利西南無所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲坼解之時大矣哉解佳買切音蟹坼丑格切裂也本作􅠂又作斥拆同解甲坼一陽生坎中為戊土主生萬物出于震震坎相重便是生信之已孚故坼革巳日一隂生離中為己土主成萬物成于兑兑離相重便是成信之已孚故革董子曰北方之中內産陽而物始動于下南方之中內萌隂而物始飬于上動于下者不得東方之和不能生中春是也養于上者不得西方之和不能成中秋是也東方和北方之所起西方和南方之所養起之不至于和之所不能生長之不至于和之所不能成亦似深于解革之旨解坎險能以震動上動而免乎下險故為解蹇解俱以西南為利蹇西南以三五撰離而坎隱于上五一爻乃象無險之中地為西南解西南以四二撰離而坎隱于下合諸爻俱象無險之衆地為西南蹇險重于上如君上之險三五同功以往以下止止上險往五則君上之重險已濟于上彖故言得中解險重于下如民衆之險四二同功以往以上動動下險往四則民衆之重險已免于下彖故言得衆未解之先以西南合往為利既解之後又以東北分往為功蹇止在險下不可偏止解動在險上可以動可以止蹇即五為主解四二皆臣道尊位又在五也無所往其來復二歸坎之體險已盡解無待于往其來復于坎中如雷伏於地中惟有休息慰勞以輯寧衆志不待有動而無不免乎險而無不得其中吉有攸往夙四震動之體險如猶有未解之處非四莫往夙與止反蹇止之難如山之艮而有待解動之夙如雷之迅而有功吉來復恐其數動在外之故是為解後有常之雨露往夙終以有險在內之故是為解後不測之雷霆卦體下坎上震震蕃鮮為百果草木方天地閉塞成冬之時百果草木皆孚甲于歸坎中坎以震出天地解而雷雨作百果草木無不甲坼而發生民物之遇解雨而生皆此彖所以深贊解時之大也象曰雷雨作解君子以赦過宥罪雲雷為屯故雷雨作象解雷天之威雨天之澤威中有澤刑獄中有赦宥之象有過恕其不及而赦之不問有罪矜其無知而宥之從輕赦者不但宥宥則止于寬之而不盡赦初六無咎象曰剛柔之際義無咎也解初不繫一辭初應四動剛柔相際若無險之可解而自有補過之善之象得初義而存之何至于終而猶有悖之未解象故曰義無咎九二田獲三狐得黃矢貞吉象曰九二貞吉得中道也劉彜傳曰狐性疑而情姦晝伏夜動小人之道也三所居連合上下撰為重坎是為狐窟故曰三狐四動而下二合為離三麗于中并上下俱不成坎而窟中之狐搜獲殆盡無一隱伏田獲三狐之象重坎之體隱黃離之用顯匪以已為中而合四為中何動不中何動不直以貞則吉得黃矢貞吉之象獲三狐小人狐媚之險至二而無不解得黃矢君子中直之道至二而無不行即解終猶用二之中以解悖象故明曰得中道六三負且乘致寇至貞吝象曰負且乘亦可醜也自我致戎又誰咎也坎為輪故言乘三居二四之間如上方以四為負而下又以二為乘負且乘之象負為上慢乘為下暴以坎撰坎致冦至之象如三所為何待二田上射政恐不免自為冦盜所奪貞吝之象單負單乘猶是一路小人負且乘負則狐媚乘則隼鷙象故曰亦可醜致冦盜也三不為咎致戎合君子而兵之匪遇二田必逢上射三欲于誰為咎象故曰又誰咎九四解而拇朋至斯孚象曰解而拇未當位也拇茂后切而汝也未當位與位不當有别四為震足初險附之為拇四初應爻一舉足于初險遂有免解而拇之象既解初險合二成麗同功並驅獲狐以斯獲隼以斯解維而孚小人以斯無解而無不孚朋至斯孚之象四解方止初拇于己所居之位尚盡不來象故明未當位明至斯孚合二以動中道既得無險不解其為當位不待言矣六五君子維有解吉有孚于小人象曰君子有解小人退也解二四以君子解小人如離網之張為君子之維以君子之維張設于小人之地久而不解亦是險結小人如之何其為孚五動之中正震之體既顯而撰離之體亦解解如是安往而非蕩平正直之大塗吉君子之維既解正撰坎之險若皆逺去而胥化為雨有孚于小人之象君子之朋不至固無以解小人君子之維不解亦無以孚小人止子解而不孚于天地雷雨生成之分量尚未為盡象明君子有解小人退示人深矣上六公用射隼于高墉之上獲之無不利象曰公用射隼以解悖也射食亦切隼息允切或作隼音笱鷂屬凡鷹搏噬不能無失惟隼為有凖每發必中即今所謂鶻崔仲鳬曰易解狀小人之情四狐言媚惑乘言僭竊拇言依附隼言悍鷙震三爻皆以動免下險上出重坎之外獨持平一卦之上為公從二視三乃原坎隱伏之體象狐從上視三以重險之體發撰明之用外強戾內悍鷙超出狐媚小人一等象高墉之上之隼上三應爻操坎弓離矢之具當終動極解之時有其器遇其時見之于用無高不射無射不獲公用射隼于高墉之上獲之之象凡動皆無所括無不利之象夫雷怒霆擊豈無摧折然皆造化之生機也以隼為道直以殺心為摶噬罪尤浮于險媚之狐以是為解終之悖上亦無他道解之惟黃矢是用而已象故曰公用射隼以解悖蹇解得中皆以坎中為中蹇以往五為得中解之來復坎中不以行往為尚而無不中故曰乃得中蹇諸爻惟三連合上下而有實故蹇終以應三為碩吉解諸爻惟三稔為狐隼而致冦故解終以獲三為無不利蹇三五同功中在五故蹇終猶曰利見大人解二四同功中在二故解終猶曰公用蹇初止體入于重坎之下故冝待解上動體出于重坎之上故能射此二卦反對互發之義損有孚元吉無咎可貞利有攸往曷之用二簋可用享彖曰損損下益上其道上行損而有孚元吉無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行簋居洧切外圓內方曰簋簋盛稻梁簠盛黍稷奉上之謂享獻也又享以訓共儉享有體薦設几而不倚爵盈而不飲肴乾而不食宴則折俎相與共食損上止下説上止多安于無為下説多喜于上應所損在于下體之説所益在于上體之止以下之説道而成上之止道匪損民之有餘以益君之不足故曰損下益上其道上行損有孚以説止成孚損而有孚五受之以中元吉二行之以中無咎柔説在三可貞剛止在上利有攸往又言曷之用二簋可用享正謂損下益上説以道匪説以物以物言如以下享上之禮凡享禮八簋為盛二簋為約二合三四兩柔撰為震筐列于五下為二簋二如用享于五下原不可竭其有上亦自不盡其求以二虛函一實三為簋函上以為實四為簋函初以為實虛者為器實者為意陳以二簋便可成享二簋可用享之象彖言時上下異時時在上以多儀為應時在下以二簋為應故曰二簋應有時下本柔兑而曰損剛主二言剛上本艮剛而曰益柔主五言柔剛言損柔言益惟剛説在下而柔止在上之時為然故曰損剛益柔有時剛在二常饒可以言盈柔在五常乏可以言虛損以其盈益以其虛亦惟剛值其盈而柔值其虛之時為然故曰損益盈虛與時偕行象曰山下有澤損君子以懲忿窒欲山上有澤山體上受而日有所潤為咸山下有澤山體下夷而日有所虧為損忿尤人如澤之有震蕩欲溺己如澤之有沒溺凡人忿恨多其貪欲亦必熾貪欲甚其忿恨亦必深一病二痛皆正秋殺氣之所感君子視忿與欲如澤之幾撼乎上山以懲以窒如山之底定乎下澤初九已事遄往無咎酌損之象曰已事遄往尚合志也遄淳沿切下卦三人同以益上為事初有二三在前有如不認四事為已或止而不往雖往未必遄即不免于咎初四應爻認得為已初前有震動往之速如是又寧有咎已事遄往無咎之象二剛中言弗損三柔不中正言損初不能為二之弗損亦不能為三之損以剛正居初承二若裁其過于三就其中于二以行其損于四酌損之之象二貞中以為志初酌損能以二志為志象故明尚合志九二利貞征凶弗損益之象曰九二利貞中以為志也二以剛中之説為貞以撰震而起為征以中自貞惟貞斯利利貞之象三既自損二再有征以動既為妄動以説必為妄説如之何其無失征凶之象二弗自損惟貞其自有之剛中五承上佑已進于剛克之柔中損不見其在二益已見其在五弗損益之之象二五合中中志先自二貞中道無不上行矣象故明中以為志六三三人行則損一人一人行則得其友象曰一人行三則疑也友交友也三上相交故稱友橫渠張子曰兌三索得女坤道之所成艮三索得男乾道之所成所以有天地絪緼男女構精之象三人行三與二初無一不上行三以説撰坤合五成順坤體見兌體虧兩剛如故一柔有損三人行則損一人之象一人行三已合五為坤不見説之得為在已惟見止之得為在上不見三之説五為足貴惟見上之止五為有功一人行則得其友之象五是篤實光明止體致一以成之則順雜進而説之必拂一人行專致一人説感之精意以順乎五與五合為一體而惟依上成止是致一之説若是三人各致其説剛柔雜進動止兩眩貞不在二止不在上疑且在五十朋之龜將以有之于五不可得已象故曰一人行三則疑六四損其疾使遄有喜無咎象曰損其疾亦可喜也四本止初之體雜撰則為動極之爻故言疾四能自損其疾與三合而成順使遄往之初相説以解而有喜則危動之疾廖而原止之體復是為損四之無咎止體無為多不受人居説之上有益之事固為可嘉益之未能而疾之務損去諱疾忌醫者亦逺象故曰亦可喜六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也漢書食貨志元龜為大貝十朋注兩貝為朋又五貝為朋十朋之龜大寶龜也爾雅龜名十神龜靈龜攝龜寶龜文龜筮龜山龜澤龜水龜火龜五止三説撰坤朋于上二之間止合説順全之説合止順成之有順道之説無違道之説喜起在端拱之朝堂太和在平寧之宇宙是惟元后篤實光明之大寶為十朋之龜三損無其功二上弗損不知益之所自故于益象或止常不遷虛更有受惟見其克合不見其克違或益之十朋之龜弗克違之象善孰如之吉孰如之五之元吉有三説以成之實上止以助之也象故明曰自上祐上九弗損益之無咎貞吉利有攸往得臣無家象曰弗損益之大得志也益九五升六五亦皆曰大得志上二皆曰弗損益之有三為損于中與五合成順體二惟弗損是謂以剛中貞之于下而于五為益之上惟弗損是謂以剛止祐之于上而于五為益之如是不惟上過善補而更無失二貞無咎貞吉之象不惟遄往有初而尤利往有上利有攸往之象三對上曰得友三不以説為得而歸止于上若曰垂紳正笏以成君德惟上上對三曰得臣上不以止為得而歸説于三若曰有安社稷臣以安社稷為説惟三三説而言損不以損為諱既以無已上止而無為不居止之功又寧有家得臣無家之象損下益上原初遂宜有損至上更言弗損乃知損道有上行而損志無下失此剛之終得其為剛大之終得其為大而損一人則三之柔小之為耳象曰弗損益之大得志損一人則二人之所弗為如無二人于下更弗得上友于上一人之志荒矣益利有攸往利涉大川彖曰益損上益下民説無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進無疆天施地生其益無方凡益之道與時偕行利涉大川言木者三益渙中孚丁氏曰君猶舟民猶水水則載舟亦能覆舟既能益下所以利涉益上巽下動動在下有不上順巽在上無不下順以上巽益下動所巽在于五君所益在于二民惠在君原無窮感在民寧有窮故曰損上益下民説無疆損主上止而三為之説益主初動而四為之巽四上佐五下交初匪以已下初乃以五下初五中正申命之主初出震長民之公四以道合之上下之交五大得于上而君道光于上初大作于下而臣道光于下故曰自上下下其道大光進于二五中正之中上下交成利益之慶是以利有益之攸往震巽二木皆涉川之道三無凶事之用震木之道不行上有或擊之凶巽木之道不行是以利涉益之大川損體説而止斂藏之時日損日退退故二簋之用為有時益體動而巽長養之時日益日進進故利往利涉而無疆損以剛柔損益言有時益以天施地生言無方損以損乎下酌盈虛而與時偕行益以益乎下無盈無虛而與時偕行益道在天無有不施之時益道在地無有不生之時益道在人無時而無往之利無時而無涉之利故曰凡益之道與時偕行象曰風雷益君子以見善則遷有過則改雷風恆以內外不易之位言風雷益以內外交助之勢言君子以見善則遷有過則改但見必遷但有必改善遷而過益寡過改而善益增既如風飛而雷厲又如雷迅而風烈恆雷外風內益風外雷內二物易位而相從便是遷與改之象與損對言巽震春夏之令長養之時為遷為改皆以為善艮兑秋冬之令斂藏之時為懲為窒皆以去惡初九利用為大作元吉無咎象曰元吉無咎下不厚事也損上止于君上為成君之友益初動于民下為成民之公四初正應主爻四本五意以風初初合四巽以出震所為所作非小可利益事必盡坤土而耒耨之又盡坤衆而吉凶與同患之雷厲而長養之風既大行風飛而恐懼之雷益大震使人無不遂其生無不復其性所為如是謂之大作有此利用從初無失是為元吉利因于民惠出自上事有大作初無厚也是為無咎象故特明之曰下不厚事六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也二動四巽撰坤朋于五初之間以雷動之民成風靡之順既勤動以力作又巽順以行事是為民生利用出入之大寶為十朋之龜四巽無其形五勿問初不厚不知益之所自故于益亦象或中爻坤艮雜撰動而以順為道既合而不違順而遇艮成止又貞而有永是為在二弗違永貞之吉下有永貞之民心上有永當之帝命五為履艮而升中掃地而用犢以下民之無不順卜上帝之無不享是為在五王用享于帝之吉損五上止與止忘乎説之功象故曰自上祐益二初動與動不知風之自象故曰自外來六三益之用凶事無咎有孚中行告公用圭象曰益用凶事固有之也周禮公執恆圭二與三皆初出震之民二邇初動即叶吉三逺初以止反動動不成順初作無敢不作是為迅雷之震驚上偏莫益以中是為烈風之譴告有此凶事之用方有補過之善益之用凶事無咎之象圭震為玉象初所執命圭三有凶事之用遂于中行之四為有孚五之勿問之心如是為慰初之大作之功至是為成四若告初可以用圭告成于五有孚中行告公用圭之象隕霜不殺物之生機不潛凶事不用民之動機易窒益用凶事三之震動而巽入者完固而無失矣象故曰固有之六四中行告公從利用為依遷國象曰告公從以益志也四以柔下行合二撰順順于五下惟五之中是行五勿問四故有告四有告初即有從所告所從皆五之中而不與以己中行告公從之象為依四告風行初從雷動民生其間上下皆依遷國初徙為四與聞國政能行五中而為民依四徙為初開國為公能行五中而為民依心一道同易地能為無用不利利用為依遷國之象四與初皆能以五志于勿問外象故曰以益志九五有孚惠心勿問元吉有孚惠我德象曰有孚惠心勿問之矣惠我德大得志也損二無可損之剛益五無可益之惠惟為天下得四與初是為五之惠下心四告初從則孚有孚惠心之象五惟穆然順止于中而成民享帝之理已得勿問元吉之象五雖勿問天下不孚四初之惠之德而惟孚五之惠之德我不見德民已成孚有孚惠我德之象象故明其大得志上九莫益之或擊之立心勿恆凶象曰莫益之偏辭也或擊之自外來也上與四皆五近爻然四巽五下能以五中為下上出五上無能以五中為行既不行五之中焉能為下之益不下益惟自為益但自益人孰與益莫益之之象民心不與坤衆震動艮乎反施或擊之之象風以從雷為恆巽以順震為恆以風雷則不相與以剛柔則不相應立心如此恆義何有凶上不以五中為行無辭于公而可告可從象故以為偏辭或益之益在君上二弗知其自來或擊之擊在民下上亦弗知其自來象故皆曰自外來損主三説合五撰坤惟五是順順君而説為損益主四巽合二撰坤惟民是順順民而入為益損三乘二有弗用二中之象故損為自損益四承五有能用五中之象故行曰中行損三得友以上止能勿下遷益四遷國以初動亦能上出損上得臣無家不泯三説之功益初下事不厚若惟四巽是主弗損損下之道無失勿問益下之利無方損初之前為撰震已事遄往初三一志益上之下為撰艮立心勿恆上四兩心為上而安止每荒于嬉兌上説以説上行是為益上為下而好動多行不順巽下順以巽下行是為益下損下以忠事上益上以愛惠下損非損下之有以益上之無如剝民奉君之事益非損上之有以益下之無為分人以財之惠但為上而待下之益斯謂之損為上而惟下之益斯謂之益言損上為不足衰之始言益上為有餘盛之始又損益為咸恆之反猶泰否為乾坤之合乾坤後更十卦而天地交咸恆後更十卦而損益見上經首乾次坤故先泰後否下經首咸次恆故先損後益自乾坤至小畜履剛柔皆三十畫而泰否之三剛三柔繼之自咸恆至蹇解剛柔亦皆三十畫而損益之三剛三柔繼之乾坤泰否之間經厯六坎之險而以巽兌合乾為畜履咸恆損益之間亦經厯四雜坎五正坎之險而以艮震合乾為遁壯君子所居而安者易之序卦非聖人莫能序信矣夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也夬古邁切號平聲決古穴切行流也又斷也破也相分别也從冰誤加鳥旁為鴂或作􅀈又作鵙春分鳴則衆芳生秋分嗚則衆芳歇又芒種之次五日鵙始鳴反舌無聲鵙不鳴佞姦壅逼反舌餘有聲佞人在君側剝曰剝小人于君子常如剝果而使之墜落夬曰決君子于小人第如決擇而使之行流便見君子小人用心不同卦體下健上説有君子健于內而小人説于外之象是以有壅則決而無決不和爻合五剛決一柔主二言決以五為王庭以初與三為自邑以兑口為揚為號為告王庭君子彚征之地上以一柔乘五上此豈王庭之可容上有乘二有揚以聨五剛之交則揚以申五剛之氣則揚俾一柔不得乘陵而肆其説于上五剛不至閼抑而屈其健于下揚于王庭之象五上一體以近而相得為安二視不勝其危二號而五孚五乃一日不容以自安如之何而無夬夬決道于是有光孚號有厲之象初壯趾三壯頄是為即戎有如輕即于始必然取敗于終二既號五而知危亦復告初與三而加警使知治其在我之為先窮其在彼之不利告自邑不利即戎之象揚庭如是孚號如是自邑之告如是于剛為長于柔為消君子全其健小人説于去何夬不和何往不利利有攸往之象彖明剛長乃終以剛決柔之分量如是為盡如是為止故曰乃終非是定到六爻皆剛然後為長為終象曰澤上于天夬君子以施祿及下居德則忌雲上于天須待然後成雨為需澤上于天決注便即成雨為夬君子以施祿及下如澤之必下于天居德則忌如天之不居乎澤初九壯子前趾往不勝為咎象曰不勝而往咎也壯初曰壯于趾視二柔已無難去夬初曰壯于前趾視一柔更為易決初為趾四應爻四次且初直前將操戈王庭以去君側之佞壯于前趾之象如是而往四當其前未可躐四何能即上徒以輕率躁動取咎于四往不勝為咎之象初無躐四勝上之理夬以雨不以戎期于勝定是不勝象故曰不勝而往咎也九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也莫莫故切卦曰孚號以五二既孚言爻曰惕號以二方號五言兌西于日為莫乾西北于時為夜上宵人五近之二不獨以日乾之道為號且以夕惕之道為號惕號莫夜之象能保自邑之不即戎不保上之不為戎首上如自我致戎君子自利攸往不期其勝而無不勝之憂不期其決而無不決之憂有戎勿恤之象二以剛健之中孚剛説之中全卦夬道之中惟二為得象故明其得中道九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎象曰君子夬夬終無咎也頄巨鳩切濡人朱切愠於問切初下壯見于趾為咎為輕率之咎三上壯見于頄有凶有淺露之凶三五同功撰為重乾欲夬上先夬已足以稱君子矣君子夬夬之象三在五剛中以應為決不假用衆獨行之象正與説合遇雨之象睽遇雨上在雨外夬遇雨三在雨中若濡之象以二之中而見雨必曰決而和矣以初之壯而見雨必曰恨不兵之有愠之象濡非真濡愠者自愠而三之壯頄之過已善補要終無即戎之患有攸往之利象故明其終無咎九四臀無膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也臀徒敦切次七私切且七餘切四上一體之人以應壯趾之初近壯頄之三有欲坐不安欲行不決之悔二于五有號號即牽羊之言羊性喜于前行凡牽之之道當其前則却隨其後則行四隨上後是謂能牽無膚次且之悔俱可以亡牽羊悔亡之象五中説于下撰于二有孚四不中説于上見于二無孚聞言不信之象牽羊羊以前為得計雖去亦説四以健為自邑有坐必安此便是夬之雨如無四之信恐竟成夬之戎而恤及夬之邑象故深惜四聰而謂之不明九五莧陸夬夬中行無咎象曰中行無咎中未光也莧澤革侯襇切莖葉皆高大而見故名孟喜以莧為山羊殊失牽羊之義晉上道未光萃五志未光與夬五中未光大同小異莧澤草全感隂氣以生者五高平之陸以君子彚征之王庭而鞠為蔓生之澤草莧陸之象五三同功撰為重乾不上之夬而先自夬夬夬之象三夬夬獨行五夬夬中行以剛説之中合剛健之中于夬方和而過善補中行無咎之象履五説自下和不疚夬五説從上乘雖中恐有牽私愛昵近習之心潛注不斷處未得為光象明中未光與彖其危乃光正相發上六無號終有凶象曰無號之凶終不可長也上為夬終為澤口以決而通流如口之有號以壅而不決如口之無號上以説乘五決口障塞無號之象一柔之説不勝五剛之健五如極而通一必潰而裂終有凶之象夬體以大壯成故初與三猶存壯名壯上剛動之體剛能自決猶有艱之吉夬上柔説之體柔不自決終有決之凶大壯以撰體為羊震之原體顯則喪夬以本體為羊乾之撰體成則決仍為兑便不決故不可以五莧為山羊剝上不食喜君子之僅存然終于剝廬象故曰終不可用夬上無號危小人之不去然終于有凶象故曰終不可長姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉姤古豆切取七喻切聖人內君子外小人剛來謂之復復稱反若故居之還若君子之當然喜之之辭柔來謂之姤姤稱遇若不期之會若小人之天幸戚之之辭合四剛成大之壯姤一柔遽象女壯遽戒人之勿取大壯震男動于外而男為主女壯巽女入于內而女為主內女為主外男為取與之配合而長處主在女賔在男壯在女消在男非如小畜之乾為主于內其于巽女可以妻而可以婦彖故特明曰不可與長然則無姤之時無姤之義乎復一陽生子中反于萬物歸坎之時姤一隂生午中遇于萬物見離之時乾巽交而天地遇五陽生一隂成品物匪陽固不生匪隂亦不成由姤然後有成之章故曰天地相遇品物咸章是為姤之時二五皆剛五位中正二五合而君臣遇二既包初而成其為魚五更包初而成其為瓜中正相遇之剛即成為生合天下而無所不成原合天下而無所不生故曰剛遇中正天下大行是為姤之義天地無遇品物無章天地何可以無姤之時中正無遇天下無行君臣何可以無姤之義知其時明其義于物何所不可遇于人何所不可遇包魚遇包瓜遇而取女難長則失其所以遇姤之時與義彖所以深贊其大也象曰天下有風姤后以施命誥四方誥古到切以文言告曉之告上曰告發下曰誥施命誥四方邵子曰履霜之慎在此李氏曰誥命出于后則無姤之變風行地上自也而行各以其方為觀天下有風自天而下周遍四方處處有風則無一物不與風遇莫不鼓舞而有感動為姤天之風君之命四布而告曉之謂之誥觀省方躬為之省姤誥四方施命而已以四方萬民之逺后無能一一而與之遇惟命自后出而告戒及于四方如風自天行而周遍及于萬物是為后之天下之風是為后之姤初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也繫維也柅女紀切止也定也或以為止車物或以為繫絲物羸力追切羸豕謂牝豕豭強牝弱故謂之羸蹢直戟切躅直録切厯宗通議四月乾之初厯謂之小滿姤初羸豕蹢躅坤初履霜堅冰羸喻其小蹢躅喻其滿霜喻其小堅氷喻其滿易言于一隂既生之後厯言于一隂方萌之初慮之深防之豫也金柅以重乾在前為象初巽二下二如柅之前止初如繩之下繫二不為動初無所往繫于金柅之象以繫為貞以貞則吉有攸往是無繫而有往靦顔與五剛相見挺首與五剛相抗此則昭于人所共見凶在顯肆之處豕本坎止艮之中為牡為豶豕伏巽之下為牝為羸豕孚蹢躅謂隂入而與為孚自此跳躑不可復制此則伏于人所不見禍在隂孚之處剛道決柔道牽一失貞繫之道必稔五剛牽引無窮之禍象故曰柔道牽九二包有魚無咎不利賔象曰包有魚義不及賔也二初同體之人首柅初柔而使之貞全在二二以巽撰乾有天覆之量為包近而能為之包包而未嘗不近惟見初之為美不見初之為惡惟見初之可生不見初之可逺為有魚包有魚無咎之象月建午曰㽔賔一隂用事陽已為賔二如無包初柔在內而為主五剛皆在外而為賔便有不利不利賔之象二有包義方不及賔象曰義不及賔惟恐其及惟恐其賔惟恐其失有魚之包之義也九三臀無膚其行次且厲無大咎象曰其行次且行未牽也三亦與初同體而居二四之中二包有魚三何以為坐臀無膚之象四包無魚三何以遂行其行次且之象無膚危于坐何以弗若二次且危于行何以復為四包義合二四皆有成于二四皆無過厲無大咎之象如三所行無入于初亦無逺于初有剛道之決無柔道之牽象故明未牽九四包無魚起凶象曰無魚之凶逺民也二包撰乾而為包四正乾之體且與初為應爻豈其無包但中正不存既若隔之以二又若睽之以三殊不見初之可近而但見初之可逺包無魚之象三行且次且四如何為起初為見四為起見在初誠自蔑其繫之貞凶起在四亦自斬其生之意凶無魚而起惟有上行别不下睨若疾之已甚而逺之不暇象故不曰逺小人而特謂之逺民然則君子不逺小人乎曰遁相去可稱逺然猶云不惡姤相遇原與之近近而使之無所容必亂之道此則全是人謀不臧更不論命九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也杞栁屬虞翻巽為杞瓜味甘藏美于中過時則敗夬三月卦莧生三月故夬以莧為象姤五月卦瓜生五月故姤以瓜為象中正井五同此皆直言卦德無以字杞高大之良材初在下易蔓為瓜二于初已能包五中正合下三剛而撰為重乾更能以五左右三剛以包一柔高為之覆蔭而大為之容茹以杞包瓜之象一柔在初遂成天地品物之章含章之象如是而又有隕五存之而不足一消之而有餘既如魚之有爛又如瓜之有潰是乃莫之為而為莫之致而致天實命之匪人之故天行一剝即復一夬亦姤自夬上反為姤初初之一柔原從天降有隕自天之象含章者志有隕者命九五之志即無以回天而易命終不付諸天命之自然而舍之象故明曰志不舍命上九姤其角吝無咎象曰姤其角上窮吝也二言魚人固不如魚之多五言瓜蔓愈逺而生愈多生之無窮無所不生是為姤五大行之章而同天地品物之章上與初有初終之義稱姤上剛亢與初角立而不相入稱角無魚推而逺之姤角引而自亢起凶自為之起無與于初吝無咎吝自在上于初何咎無魚絶人姤角自絶姤義于是為窮象故曰上窮吝夬姤反體夬初以趾壯窮姤上以角姤窮夬欲解之為雨姤欲含之為章夬之二五孚亦既有光然在二謂之有戎戎雖不即不得謂之無戎以垂盡一小人在外決之難故危其辭以慮終姤之二五遇可稱大行然在五謂之有隕包雖不廢不得謂之無隕以始生一小人在內遇之難故危其辭以謹始夬上已當成功之序故決姤初原是含生之民故遇姤二但上撰主便不在初不然終是賔夬五但下撰雨便已在上不然終是莧姤非絶初而棄之方為勿用取女夬非截上而去之方是利有攸往此二卦反對互發之義萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣萃秦醉切草貌聚才句切會也又邑落曰聚又大曰鄉小曰聚廟貌也所以倣佛先人之容貌古作庿致孝享項平甫曰古語謂享之豐者為致孝萃聚澤衆水所聚説衆物所聚正秋揫斂地氣所聚以卦言下順能以上説既説矣能無聚乎以爻言五為剛説之中下有坤順之應説既得其應矣能無聚乎卦所以名萃萃亨主五言亨艮門闕雜撰于兑附坤藏之中為王廟五主于中下為順孝由此致上為説享由此致象王者聚萬國之歡心以事其祖考是為萃五之亨而廟由此假王假有廟之象利見大人亨利貞以四言亨言貞下三爻由四以聚四合下三爻以利見九五象人臣聚萬國之歡心以事其上是為萃四之亨而萃無不正利見大人亨利貞之象用大牲合上下以用全坤在下為大牲之用之象撰巽在中為天命之順之象自上用之以假有廟以大人履大順其于天命為能大順于其上萃之亨不待言是以吉自下用之以見大人以大順應大人其于天命為能大順于其下萃之正亦不待言是以利有攸往觀其所聚而天地萬物之情可見聚者説所聚者順天地絪緼萬物化醇以説召順會順成説天地萬物之情盡然蓋未有不順不説而得其所聚未有不得其所聚而可以言天地之位而可以言萬物之育者象曰澤上于地萃君子以除戎器戒不虞除一作儲又作簡治修治又去聲除舊置新曰除澤是聚水上于天散溢而自上下流夬象上于地合瀦而四靣為歸萃象衆之所聚爭之所起君子以除戎器如澤之為水所聚戒不虞如地常為澤之防初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也握烏學切解顔起齒曰笑或作笑亦作關從大非初曰號三曰嗟如夬之言號言告皆以兑口在上為象萃主在五初逺五與四應爻象有孚疑四不當象不終乃緩辭亦難辭孚而不終志不專一象乃亂不萃不可遽萃不可象乃萃二之四雜撰艮手為握兑説為笑若號凡四之所萃皆為五萃之其號原無不順初四以順相號以説相應如是則握手之間一笑契合勿用憂恤孚必有終萃必以正往無不利是為萃初之無咎六二引吉無咎孚乃利用禴象曰引吉無咎中未變也引余忍切禴夏殷春祭名周夏祭名或曰禴只祭祀之占不成去祭活人活人去享人之祭殊不然使民如承大祭亦豈祭其民乎大抵古人事君事親皆如事天地事神明蓋以薦誠于上不假文篩為象耳引謂四孚謂五二之萃五必涉乎四四雜撰巽繩于二前為引二待引後應不失其已吉引于四惟以應于五無咎四引五孚坤質下將説意上流雖禴祭無不成享矣乃利用禴之象二大順之中雖為四所引非為四所變象故曰中未變六三萃如嗟如無攸利往無咎小吝象曰往無咎上巽也三四以近相得應上齎咨之口疑三萃不以正輒發而有嗟其何以利往萃如嗟如無攸利之象往合四上巽是以無咎大順不足是以小吝四本巽五之爻以三巽四往則何咎象故明上巽九四大吉無咎象曰大吉無咎位不當也下三爻皆由四以萃五四非大吉若將分五之民矣安能無咎二引吉原待四引為吉四大吉原是大有引進于二使初三皆得合以上往為吉四有如是大吉又有何咎象明位不當以疑五也九五萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也聖人之大寶曰位位五所自有而言有四二五將無以有之于已也五有位以當天下之萃又有何咎然剛中説體之光終恐為四所掩故匪孚而有悔元剛德首出位在德元永貞盡坤衆皆貞于萃五而永以大順成孚匪孚之悔于是乎亡夬五已得健説之中係纍之者上象故明中未光萃五已成順説之志疑二之者四象故明志未光上六齎咨涕洟無咎象曰齎咨涕洟未安上也齎將池切咨音咨嗟嘆聲涕目液洟音夷鼻液齎咨艮手上持發于兑口之象涕洟兑澤下流出自艮鼻之象上説主何以反説為憂以四位不當于五下威福雖在五常若憂其下移于四天下之政雖不見其多門常若憂其不出于一齎咨未已涕洟繼之欲使五聞而知懼雖有位未以為安欲使四聞而加警雖大吉未以為安是為萃上之無咎象明未安上者此升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也坤巽皆柔柔宜在下惟巽柔而遇坤順在上則巽而上入正惟其時故曰柔以時升升元亨卦象下巽而上順爻象二中而五應升以其時升豈有不亨亨豈有不大是以元亨萃大人在五曰利見利在下升大人在二曰用見見在上二為剛中而巽之大人五用大順之道見之得剛柔相濟之理有明良相遇之慶何用憂恤五正南之位五用見二南征升志至是而無不行故五以用見大人為勿恤二以南征為吉凡巽柔在下卦上合乾剛惟以初柔為主曰柔遇剛姤是合震艮之剛皆曰剛上而柔下恆蠱是合兑柔則曰巽而説行大過是合離柔則曰柔進而上行鼎是在上卦下合乾剛則曰柔得位小畜是合艮剛則曰進得位漸是合坎剛則曰柔得位乎外渙是合兑柔則曰柔在內中孚是純巽則曰柔皆順乎剛于位不復言得以五在剛中之位之故象曰地中生木升君子以順德積小以高大地中生木曰升木始生于地中甚小積而不已其高可以干霄其大可以蔽日惟以順故君子以順德積小以高大人有小不順積成大不順君子從其順之小小者積之為德無不成其為木之高無不成其為木之大如木之生地初六允升大吉象曰允升大吉上合志也上時掌切初雖巽主中在二剛二五孚允及于初大人南征初從以征吉莫大矣允升大吉之象升志在五大得初合二亦得以上象故明上合志損初合二以剛合剛曰尚升初合二以柔合剛曰上小畜四合五與升初同大畜三合上雖皆剛以異體又隔兩柔爻故亦曰上九二孚乃利用禴無咎象曰九二之孚有喜也二五正應以三在前為有疑孚五應二之實心禴二巽五之精意孚乃用禴無巽而無不順是之謂利而為升二之無咎象言有喜自五用見于二為有慶彖以君道言自二用禴于五為有喜爻以臣道言九三升虛邑象曰升虛邑無所疑也二三皆以剛實下巽自三合四五撰為震塗上有通道下無遺賢其邑遂虛虛邑之象三虛二五成孚允及于初象故明無所疑六四王用亨于岐山吉無咎象曰王用亨于岐山順事也山二達為岐四首順之體但以中爻雜撰論四如為兑之上爻則于岐為阻上無由以順下下無由以巽上四如為震之中爻則于岐為亨上由四以下達用見之塗既廣下由四以上達南征之路更闢王用亨于岐山之象五貞吉四上為五用是以吉二禴無咎四下與二孚是以無咎四以順事五為能首通天下賢人升進之岐路象故以為順事六五貞吉升階象曰貞吉升階大得志也三為虛邑四為亨岐五貞于上惟南征大人是順是應貞吉之象然言邑言岐尚未進于階前至五則明良相遇之堂而揖遜以升之階升階之象彖謂有慶志行皆此象故明大得志上六冥升利于不息之貞象曰冥升在上消不富也升志至五大得升極于上以階言則盡級以木言則末杪以地言則極北匪震之出而兑之臨為背明向暗冥升之象不息言消上但有消知退知亡雖冥終不失正而無不利利于不息之貞之象柔以應剛為富上消匪三是應是富二豈不知退亡三虛以避彚征之賢路上消以貞升極之冥塗原始以進升為亨要終以退消為貞合一卦之升義以上之知消知息為有終象故特明之曰冥升在上消不富萃諸爻以合萃九五剛中之大人為亨為貞升諸爻以合升九二剛中之大人為利為貞萃下順萃于上説上弗説下雖順何以萃升下巽升以上順上弗順下雖巽何以升萃主五四二之匪孚初亂三嗟上咨皆以四故升主二三二之為疑上消四亨初允皆以三故萃至上為未安以説主要終升從初為大吉以巽主原始此二卦反對互發之義像象管見卷三下
