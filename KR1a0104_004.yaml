body:
  text: 像象管見卷四上明錢一本撰困亨貞大人吉無咎有言不信彖曰困剛掩也險以説困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也困苦悶切饒氏曰困是窮而不通四面者窒塞行不去之意困下坎剛上兑柔然不稱柔又不曰掩剛而但曰剛掩以二上爻主二剛上柔不當相掩之位四五兩剛與二同德豈其掩二特坎為流水之體兑為止水之體流水在止水之下象其阻抑不通坎為雨潤之體兑為秋斂之體雨澤當收斂之時象其閼鬱不鬯以是謂之剛掩故困困亨處坎之險有兑之説險雖處非其所説則自常不失困所無失即困為通故亨其惟君子明非初與三之可與貞大人二固處困之君子五尤貞二之困之大人二五以剛中相貞豈惟于困無失更又因困有得與五成不言之信吉無尚口之窮無咎不貞乎五有言乎上二有言二先不信上有言上安得信困以不失其所以剛險之中貞剛説之中真實有得於己無病于心為大人之貞為貞大人之吉上乃壅流之澤口掩剛之佞言二上口思援乎上不有大人之貞將無君子之亨上尚口欲拯乎二滕揚之口有餘拯援之實不足彖明尚口乃窮窮便終困而無復有亨之日矣象曰澤無水困君子以致命遂志澤無水水在澤上為盈而有水在澤下為涸而無困象致命行險非命致之于天有時無水之象遂志以説為志遂其在我澤常自如之象初六臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也株木根入土曰根在土上曰株覿見也或作覿亦作􅹩下三爻皆受困之人然有君子小人之分二君子能不失所三與初皆小人處困而不能無失所者初有離巽雜撰之體在其前巽則喬木離則明庭以六居初無能撰巽而起以根株之木為安坐臀困于株木之象又無能撰離而起以隱伏之底為窟穴入于幽谷之象四雖應爻安于坐而甘于入歷三爻而之四終無所見三歲不覿之象初如是惟有日入于幽象故深惜其不明九二困于酒食朱紱方來利用亨祀征凶無咎象曰困于酒食中有慶也紱音弗冕服之韠蔽膝也亦作韍傳以紱言義主于行也二剛中有酒食天下之具以掩成困有酒不可以飲有食不可以食困于酒食之象朱紱諸侯黃朱天子純朱離朱巽繩雜撰于前四五若合以下交朱紱方來之象言方來來二耳未及初與三也有如不用通祀二之酒食何以薦于王公何以羞于鬼神何以為天下飲何以為天下食何所用而有攸利二所謂亨匪以一已為亨兑巫在前合而祀之胥君子小人之困誠欲使之無一失所方無不利利用亨祀之象征貞之反無大人之貞有君子之亨亨在已矣人之失所有弗顧也行而去之安得為吉故凶以亨又不可咎二中與五祭祀受福之心同象故明有慶六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也初在二下止有自入之困三在二上更有乘人之困三以二為乘將進四五不可巽如石之壓其上困于石之象欲退二又不冝乘如叢棘之刺其下據于蒺藜之象以其所處為宫非困而安于困非據而安于據上是説應妻爻離為目坎蔽之妻亦不可得而見入于其宫不見其妻之象進退與處無一而可凶小人在困自入止于不明乘人益其險惡即妻亦不以祥而與之是死道也象故特警其不祥九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也上三爻皆困下三爻之人然惟上為困下之主亦即拯下三爻之人然拯之能事在四五兩剛其拯之所及君子誠急小人失所亦未可獨緩四二位不相當以應來初謂非其與則徐以近來三謂非其與又徐來徐徐之象夫初與三皆如二之將車之人將之無人二車徒以金飾而弗庸四又孰與之共載困不在二亦在四困于金車之象是之謂吝然既謂之來已有下志豈其無終四果于來上無不行初三之困終無不拯以此而况二四合德之與吝有終之象象明志在下雖不當位有與以此九五劓刖困于赤紱乃徐有説利用祭祀象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也刖魚厥切朱紱指四五赤紱指二再命士三命大夫皆赤紱或曰朱正色赤間色井二亦云受福上下三柔若有合困君子之象然在二謂之剛掩何曾以小人為罪惟有以小人之失所為憫耳五如以巽究之躁厲毁折之威上為劓下為刖獨拯二于困則棄絶妄施于小人麗體弗撰于君子朱紱固無以來下赤紱亦何以交上五之困亦滋甚矣劓刖困于赤紱之象乃徐剛中之説在五以蕩平正直無作好惡之心等拯君子小人之困無用不直五中之用行君子貞于説不待言且能使四之徐徐兩爻亦有以自振不終于戚戚乃徐有説之象前巫後史皆五祭祀之用祭則上假祀則下享不見兑坎之相掩惟見險説之成孚何用不利利用祭祀之象君子説有酒飲我有食食我而困亨小人説明生于初谷祥集于三宫而困亦亨二利用亨祀亨匪一已慶在其中五利用祭祀胥君子小人之困而無不亨福及上下象明利用祭祀為受福上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也葛古逹切絺綌草藟力軌切臲五結切卼五忽切葛藟非木無附非附無生坎堅木三上應爻上附三而生上下相為纒繞束縛無以困二而祇取自困困于葛藟之象上木杪杪上窮附將無施于臲卼之象上兑口以危動處困終是不能安故自言自悔曰動之象如是而誠有悔即無拯君子之能事亦非説君子之徒口上壅有決下流為通何征不吉有悔征吉之象象曰未當見二之掩而成困皆以上故曰吉行言其吉在于行如決澤之上壅以通坎之下流不惟陽剛之泉為通流即隂柔之險亦自無壅而合為通流故總于上而特謂之征吉也井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也井子郢切周書黃帝穿井世本化益作井繘餘律切音鷸汲井索關束謂之綆關西謂之繘汔許訖切水涸也養去聲從羊俗作飬非井巽乎水而上水以巽木穴地成坎巽入乎水而上出其水巽水井之體立上水井之用行彖故言井井而曰養而不窮言井又言邑五井之主位邑其所居如四坎性下流井欲上出坎體隱伏井冝嚮明二剛一巽四以兑改改下流之水為止水三剛再巽四以離改改隱伏之體為明體五之所居之邑則有改五之剛中之體原無改改邑不改井之象惟改邑不改井故専以井體言不以邑之有改而象喪不以井之不改而象得兼以井用言來于內巽水而井其井如人鑿井而言井往于外上水而井其井如人汲井而言井井養如何有窮井井以繘繘即巽繩繘井以瓶瓶即坎缶巽水上水直通上收方為繘井有功中爻有兑或值多汲之後如八月之水始涸汔至之象爻惟三上應以初四則敵而不應以二五則敵而不應上之收無以通于初之巽便象井深繘短與未繘井同亦未繘井之象坎巽之交瓶繘相屬之處兑附其中為毁為決又有羸其瓶之象繘不能至汔井方深瓶又有羸井井之用于是遂窮凶彖明乃以剛中井與坎同坎井二五皆剛中上下相以以之難故曰乃以剛中止言以剛中者蒙二初筮之震為以比五原筮之艮為以困二二五合以匪以則坎固險中之體而不可以為剛中之用卦明象爻明變凡剛柔相摩之義例皆如此象曰木上有水井君子以勞民勸相勞郎到切敘其勤以慰勞之曰勞勸奬勉也木上有水凡木液必自下上升從根逹于木杪故古之穴地為井者既以木入井底而為之穴又以木居井底使之巽水而上此木上有水所以為井之象勞民坎為勞卦如使民鑿井而飲之類勸相巽為申命如使民同井相養之類初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也泥乃計切滯也時舍與乾九二文言傳同俱上聲淮南子八方風至浚井取新泉四時皆服之管子鑽燧改火杼井易水古人蓋以未浚未易水之井皆稱舊矣初巽水之主但以中爻雜撰言初居兑毁之下若窒其泉之所自來井泥之象無以上于兌口之上不食之象初泥而三為泄四為甃則新不則泥無以去水無以改新泉無以取為舊舊井之象禽即井收通作鹿盧故為禽初既泥而不食上必棄而無收無禽之象象言下謂巽不能上言時舍謂非可以用汲之時九二井谷射鮒甕敝漏象曰井谷射鮒無與也射神夜切鮒符遇切小魚旅行以相即謂之鯽以相附謂之鮒井魚不識巨海鮒其井魚之類乎或曰宜作蚹為螺蹄蝓郭璞曰蝸牛古今注曰陵螺似俱億甕屋送切罌也本作甕可以甃井亦可以為汲瓶俞氏曰困之水欲下曰有與退而有與也井之水欲上曰無與進而無與也泉出注溪曰谷巽為魚初濳井底為鮒井上出谷下注二剛與五合中本井泉雜撰為兑便無能巽而上出惟有反而下注井谷之象所養惟隂濳細微之初射鮒之象卦言瓶汲器從中下而有毁為羸爻言甕甃具從中折而未修為敝敝則泥之端不在初滲之隙且在四甕敝漏之象二四同功四井未甃王明之體未成兑毁之體尚在象明無與以此九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也泄私列切治井也通作泄二三以剛巽水皆井泉二以下注為谷三以上澄為泄然猶未能為五之食井泄不食之象不食便是五之責三以同功加憂為我心惻之象有上為應可用汲之象合五撰離暗撤于北方明生于南面王明之象王明下巽上收人井其井以不窮之養為天下養並受其福之象巽水上水之中在二二未上五三若塞之憂其為兑之塞仍欲尚其為坎之行象故謂之行惻五明非三不成象故謂之求非枉已之求而王明之求並二並五而井養俱無所失象故謂之受福六四井甃無咎象曰井甃無咎修井也甃側救切音皺結砌也四為巽水上水之交以正麗于五三之間敝則修而補之漏則修而塞之使上者既不下滲而下者又終上出是為井甃無咎之象井以四之修甃方始常完而無敝漏常泄而無汚常新而無舊象故明修井九五井洌寒泉食象曰寒泉之食中正也洌水清也又冷洌與冽異三二近相求有成之功已泄五二正相巽一清上溢更洌井洌之象五居坎北正體離不能炎兑不能涼寒泉之象初不食三不食五獨上水于兑口之上食之象五雖象食巽而入水當在下收而上水仍在上五何為哉惟有不失其中不失其正受成于上下而不窮之養在天下矣象故曰中正上六井收勿幕有孚元吉象曰元吉在上大成也收去聲鹿盧收繘者幕慕各切惟在上曰幕覆物亦曰幕井泉至五而食上位五上旋坎輪以收巽繩汲水而上井收之象拆而不闔勿幕之象與三以應為孚不窮于汲水五以近為孚不窮于食有孚之象是為井上之無吉象言大成見井井之功止于泄猶為小成必極于收然後為大成未繘羸瓶之凶不言可知矣坎之剛中一爻在困二為君子養人之酒食在井五為君子養人之寒泉困戒上口不欲説之匪人井舍初泥不欲巽之匪人困五祭祀以三上為未合之通流方以壅二井二敝漏以四初為未合之巽水無以上五困四來下疏上決二何以不亨井三泄上收下繘五何以不食困初幽困三死為合掩君子之小人而君子之慶自在井四甃井上孚為合承君子之小人而小人之施亦宏困有悔于終且為征吉之上井無改其舊卒為時舍之初人顧自處何如于困井觀之尤信革已日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉已音紀天有十日甲至戊為前五日已至癸為後五日已後庚庚因已故曰已日乃孚卦未有言悔亡者惟革言之水火相息胡氏曰坎離有相濟之義兑離曰革圖書七九易位之象革上澤下火坎水在火上坎水陽離火隂一隂一陽不相射則相濟澤水在火上澤水隂離火隂兩隂不相濟非水滅火即火涸水則相息此革象之一二女同居中上少下序則不紊但志不同行而為睽少上中下序則已紊遂志不相得而為革此革象之二卦象五行震東方木蠱中爻雜震為甲日兑西方金巽中爻雜兑為庚日坎離天地之中戊巳十干之中中土之位土中之數戊陽土陽主生陽生子中坎中一陽為戊日上合震是為陽生之信之已至故解曰草木甲坼已隂土隂主成隂生午中離中一隂為已日上合兑是為隂成之信之已至故革曰已日乃孚文明以説文明主革以説從革以之用行何革而不得其亨何革而不得其貞革所當革何悔不亡以天地言之春夏為陽盡于離秋冬為隂起于兑此天地革而四時成之象下離明德受命上兑天人俱説此湯武革命順乎天而應乎人之象天地之革以時湯武之革以時革之時所以為大象曰澤中有火革君子以治厯明時古者考天象驗人時皆以火為證三月火出于辰五月火中于午七月火流于申十月火伏于亥厯宗通議自古迄今六十六厯上古莫詳于周髀兩漢莫善于太初六朝莫善于皇極唐以大衍為善五代以欽天為善宋元以來則惟授時為善也其立法之異者太初本于律大衍本于易授時本于晷元郭守敬造授時厯考知七政運行于天進退自有常度專以考測為主晉杜預云治厯者當順天以求合非為合以驗天楊敬仲曰天道不可窮盡可窮盡者非天道也故厯當數變以求合其中何承天曰圜極常動七曜運行離合去來雖有定勢以新故相涉自然有毫末之差連日纍歲積微成著是以虞書著欽若之典周易明治厯之訓天時之推遷變革無不以火為候火出于震藏于兊澤中有火火藏澤中寒當革暑隂當革陽時序變遷革象厯日月躔次君子以治厯明時厯日月而迎送推日月而定四時一歲四時一日十二時就一日而治之明之有賔有餞有作有息無一時之不明統一歲而治之明之春析夏因秋夷冬隩合四時而為明治在已明以已治在人明以人時時治時時明此所以為君子之革初九鞏用黃牛之革象曰鞏困黃牛不可以有為也鞏居竦切韋束也固也從鞏馮氏曰變革與皮革異革以二中為主二極其中又極其順在離謂之黃離在革謂之黃牛初與三即黃牛之革初非革時下無革位初三合為牛革初四合為巽繩以固束黃牛為用無使強陽得以用事而中順得以成孚鞏用黃牛之革之象初四皆君子牛革無鞏于初豹文安蔚于終欲進而襄大人虎變之治不可欲進而成小人革面之化不可惟不為然後可有為不為初之革義也象故曰不可以有為六二已日乃革之征吉無咎象曰已日革之行有嘉也二以離柔居中五以兑剛正應成信著于二之中是為已日而後庚庚因于已革其時矣乃革之之象征如伊之相湯如呂之亮武無征不吉吉又何咎二五正應而革行如隂陽正配而偶成象故明曰行有嘉九三征凶貞厲革言三就有孚象曰革言三就又何之矣離三爻皆主革三以二已為有牛初用鞏三用征離已以言革以何為孚凶兑三爻皆從革五君上民四君子上小人三以上應為有民雖不征但有貞已日而不革何時為革厲三必如何而有孚三與上口相應為革言三有革上未從故言厯三爻而後説意流通人無間言革言三就之象莫難孚者民之多議之口至于三就文明直通為上説已日乃孚孚此是為革三之有孚有三就之革言而又無上之革面無之象故曰又何之九四悔亡有孚改命吉象曰改命之吉信志也三四時位皆處已之後爻皆雜撰為巽巽為進退為不果故三必革言三就而後有孚四亦悔亡而後有孚已日既孚説以承五出之納之惟求至當説以先上因之革之惟求至當巽命改而兑説行惟其所改而無不孚吉象故言信志九五大人虎變未占有孚象曰大人虎變其文炳也乾五兼象龍虎以乾重乾革五單象虎以兑撰乾五兑秋肅殺之體撰乾于已日之上冶鑄一過神武不殺合飛龍之德造飛龍之位首出以為天下主大人虎變之象虎變于上風從于下信在言前不待以言占孚信在命前不待以改占孚未占有孚之象五二以已相孚誠中形外炳為南面中天大明之光華象故曰其文炳彖于蒙比言筮爻于革言占是為易筮易占上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也豹以勺狼貪豹亷有所程量而食古詩餓狼食不足飢豹食有餘面向也前也背為違而去面為向而來象故明順以從君革至上而成故合言君子小人無不從革之象豹似虎圜文虎有文而能神豹有文而不能神此虎豹之别以四言從五之變以為變下孚二之已上著五之文君子豹變之象以上言畏五之威而逺罪已雖與二異面亦與二同小人革面之象君子之變既如豹君子何所征已革而又征小人也上柔質異于剛德之徹底變化方為面而來又復背而去凶能以貞為居革面之化亦與豹變之文同吉從革之君主五四上又皆從五之革以為革四爻剛位柔雖未如五之炳隱然有五之文象故曰其文蔚小人無其心有其面亦如風之必從乎虎無敢不巽順無敢不説從象故曰順以從君能使小人有順從之象便是革道之成君子小人異質小人僅可以革面固未可以變豹望之也鼎元吉亨彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨鼎都挺切三足兩耳和五味之寶器飪如甚切本作飪亨飪聖人亨大亨俱披庚切與烹通用以木巽火亨飪也燧人氏觀星辰察五行知空有火麗木則明于是鑽木取火教民亨飪鼎言象以六爻為象初趾二三四腹五耳上鉉皆鼎象以木巽火亨飪也以下木上火以木巽火為亨飪之象亨飪所重祭祀賔客二事祭祀莫尊于亨上帝賔客莫大于養聖賢亨上帝惟一故止曰亨養聖賢匪一故曰大亨聖人亨以享上帝又推享帝之心大有所亨以養天下之為聖為賢此古之聖人制鼎亨飪之大用五本離目于鼎為耳巽火而得聖人享帝養賢之用不以一人之耳為耳而以天下之耳為耳以耳必極天下之聰不以一人之目為目而以天下之目為目以目必極天下之明蓋以巽初之柔既合天下之耳目以廣一人之聰明上得中下應剛又悉一人之聰明以盡天下之耳目亨飪之功既備聰明之用無窮是以吉為元吉而亨為元亨象曰木上有火鼎君子以正位凝命鼎亨飪之器木上有火以木入火火發于木而成亨飪之用鼎象君子以正位凝命定亨飪之鼎而正生養之位人所以凝夀命定國家之鼎而正嚮明之位君所以凝天命初六鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也初言趾四言足無事曰趾陳設曰足初鼎趾鼎以剛為實初柔與剛實反非所可食為否鼎有趾不能自行惟以耳行中爻雜撰兑毁耳若倒于上則趾便顛于下因之傾出舊否即鼎初之利用鼎顛趾利出否之象五二之正配故初于二為妾古者妾于嫡君夫人俱稱子亨飪中饋之事當主之自子初以顛趾言有否可出以正峙而巽言有得有以初首巽二而得為妾便亦通五而從其子能以巽火之功左右鼎五而亨飪成得妾以其子之象如是安得有咎鼎趾原冝正峙然當新實未納而舊否未出之初顛豈為悖象故言未悖革上從五而應二之火則變革成鼎初巽二而通五之火則亨飪成象故曰從貴九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也仇逑同詩赳赳武夫公侯好仇二剛居鼎腹中是為有實既有實則行鼎以耳全在正應之五今五合三四撰為兑毁四覆若有疾即四三革若有疾即三二則撰兑不及與五正應疾不相即而實相應故吉二有實非可復如初趾之顛象故曰慎所之疾不即二實行于五矣五終不為二所尤象故曰終無尤九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也虧去為切從雐從虛非凡物之行以足惟鼎之行以耳鼎之三木巽過中鼎沸火烈耳雖在五不可以舉鼎耳革之象趾雖在初不可以行其行塞之象離雉之膏合四與二已液為一方合而液于離火未上而通于兑口雉膏不食之象兑乾雜撰澤上于天決之為雨鉉之以玉方有水火均調之意然後炎勢息鼎沸平故若虧革者正塞者通故若悔方雨虧悔之象其始不食終無不食終吉之象三有雉膏以食人為義而以耳革失之象故曰失其義九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也覆方六切反也倒也餗桑谷切八珍之具渥烏谷切厚漬也程迥曰膏潤于己者獨厚也雉膏公餗皆鼎實三實而液于內象士人文德之腴故云雉膏四珍而列于外象公家大亨之養故云公餗四與上皆鉉五耳之爻四以撰兑自為毁折初趾止于顛四足至于折行非其行塞不足言鼎折足之象顛趾方以初為否而出之折足且以初為應而與之以公養聖賢之珍為私昵一人之食覆公餗之象上何以對聰明之主下何以對巽伏之賢不勝恧赧其形渥之象是為鼎四莫大之失故凶象曰信如何聖賢巽伏于下無一非五所當養五應二不及三便象不能以一人之耳目周天下全以麗四為明目逹聰之任四如是如五信任之意何蓋深為四愧之辭六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也鉉户畎切舉鼎具五行鼎之主以不失其中為黃耳以上四兩剛為金鉉以慎于信四貞于受上而後二之鼎實得為人食匪一己之利而天下之利為利貞五虛中受二以行二之實為其實象故明中以為實上九鼎玊鉉大吉無不利象曰玊鉉在上剛柔節也玊魚欲切玊中畫近上王三畫勻玉和氣所凝溫潤而栗剛柔適均五金莫得而並君子所以比德于玉崔仲鳬曰金鉉君之道也玊鉉臣之道也五耳柔匪剛不堅五火烈匪玉不和五言鉉兩耳之鉉以一柔麗于兩剛之間柔以剛克為金上言鉉全鼎之鉉以上剛加于五柔之上剛柔有節為玉上以玉鉉五雉膏食而天下文明公餗施而聖賢為養靡任不勝大吉靡行有塞無不利有上之鉉而水火于是乎均齊隂陽于是乎適調鼎五耳目聰明之用于是不偏象故明曰剛柔節革二上爻主火透至上曰革面鼎初之妾質鼎五初爻主火通于初曰得妾革上之貞面革五變虎革命之事功鼎二有實凝命之學術革三四俱有化民之任故三曰革言四曰改命鼎三四俱有食人之實故三曰雉膏四曰公餗革初君子有不為之日鼎上君子既成功之時革之剛爻而以上自處君子而墜為小人鼎之剛爻而以初自處丈夫而甘為妾婦觀革鼎之卦象玩鼎革之爻變或上之質而豹之皮或初之裏而雉之表吁愧矣震亨震來虩虩笑言啞啞震驚百里不喪七鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也虩許逆切蠅虎啞於革切七卑履切所以載鼎實鬯香酒鄭氏曰人君于祭禮七牲體薦鬯而已其餘不親為也震以一剛動于二柔之下在天為陽氣迅發之雷聲在人為天理迅萌之動機洊震卦初四兩爻皆震主震亨剛居震初劈頭震動初震二柔于內四震二柔于外合四柔俱以恐震如虩之虩周環顧慮不遑自寧是為致福震來虩虩之象震無過動動後有止剛柔適調隂陽用和載笑載言盡成善鳴是為有則笑言啞啞之象震之出以乾長子主坤國邑舉坤成數有國百里來為自震出為震人厯百里而同震逺者驚邇者懼震驚百里之象七坎之棘鬯坎之酒宗廟社稷艮闕坎隱坤土震稼皆有其象初出而為之守以祭則為之主以坎棘為七以坎酒為鬯以艮手載之灌之于中長守其宗廟以為宗廟祭主長守其社稷以為社稷祭主不喪七鬯之象震亨亨此象曰洊雷震君子以恐懼修省省息井切視也察也審也人心非動無震兩雷洊至益有所動震象恐懼作于心修省見于事修克治之功省審察之力惟恐懼而後有修省之端惟修省而後見恐懼之實恐懼初雷象修省洊雷象初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也項平甫曰爻辭加一後字明吉在成震之後初洊震主爻全體震動無前後之間但從未震言為來來以震人竦動之以恐懼之心俾不自寧震來虩虩之象從已震言為後後無所泥暢逹之以歡欣之意俾各有得笑言啞啞之象是為震初之吉人心無恐即怠一怠百殃俱至一恐百祥俱至震而恐之無非致以福也象故曰恐致福四遂泥便無則初笑言有止則無泥失象故曰後有則六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也貝博蓋切海介蟲古者貨貝月令震氣不出嵗中少雷萬物不實人民災初震來震人二震來震于人二以柔乘剛以止乘動剛逼而震柔邇而懼震來厲之象人所貴惟此心此理然多埋沒匪震不出震是人之無盡寶藏為貝不啻巨萬為億震之出首初震之中在二五之合五艮山之巔為九陵二五合為七日二受震于初若大失其已億喪貝之象柔不利逺二五未易合二懼初一登而躋五躋于九陵之象躋而能止于陵為有得于貝原無失不過七日恐懼修省合而洊震之體成即喪即得即躋即得勿逐七日得之象六三震蘇蘇震行無眚象曰震蘇蘇位不當也二邇初震來為迅三逺初震不能來雖來亦緩震蘇蘇之象才蘇蘇便有坎之多眚三承四初震方終四震洊至間不容止夫是以有震之行而無坎之眚震行無眚之象三非二之位上無五之中象故于三曰位不當于上曰中未得九四震遂泥象曰震遂泥未光也泥乃計切初首震四洊震中爻艮有止四震為行坎有陷四震為起遂之象止在行終不果陷在起終不力泥之象剛明震動之光遂極其勢泥非其威前有震恐後無笑言象故明未光六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也五洊震之中初震未往四震洊來震初既恐懼而不自安震四益修省而不敢安震往來厲之象三行止于無眚上索益為未得五危厲得中巨萬寶貝即心在心實能恐懼而有于心即事在事實能修省而有于事億無喪有事之象三以止于坎下為眚五以行于坎上為危匪啻危震之心實有危震之行象故曰危行其事在洊震之中惟有初震之吉更無四震之泥億具以震首出如五可言大得象故曰大無喪上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也索蘇各切矍居縛切上履震極極其震恐去艮已無止則履坎又為加憂以氣則窮震索索之象以目則眩視矍矍之象如是之動無征不凶夫往來皆厲有事之戒儼然在于五鄰奚啻如初之有則震于其躬窮而無得震于其鄰來厲實有恐懼之事往厲實有修省之事畜五之鄰虛富而實之則畜成震上之鄰中抑過就中則過補凶無咎之象震初虩虩啞啞震終索索矍矍初終不合剛柔相戾是為震無婚媾索索氣窮息喘不能言矍矍目眩心戰不能言是謂婚媾無言索索矍矍之過補虩虩啞啞之意通初笑言上合逺邇震驚之爻而俱言其言婚媾有言之象笑言啞啞震人之則婚媾有言驚逺懼邇逺邇和同震于人之則不喪七鬯宗社之福事神之則婚媾有言生靈之福長人之則艮其背不獲其身行其庭不見其人無咎彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也艮震反體震中爻艮坎雜撰艮動中之止坎動中之泥艮中爻震坎雜撰震止中之動坎止中之限艮之義止匪以單止言止乃以時止時行言止止乎時之所當止止固謂之止行乎時之所當行行亦謂之止動而不失時行之止靜而不失時止之止行止動靜一以其時而無失止道豈不為光明艮之三上皆爻主然三象艮限非時止時行時動時靜之止便是止失其所安得無咎艮背則得其止二剛主止四柔從其所止無一不止其所矣何以為艮其背上以剛上止主止于上上下不復相應曰敵行止各以其時曰不相與故以時止而止言止三止二柔于下上止二柔于上上下合止不相應與以止既如背之有止更無身之可獲是為艮其背不獲其身之象以時行而行言止三反為震而行于下上止自如而止于上下行上止不相應與以行三于艮庭有行上于行人無見是為行其庭不見其人之象必獲其身身背何以異是為身限不獲其身限相不在身背之有艮皆時止而止之止必見其人人己何以異是為人限不見其人限相不在人庭之有行皆時行而行之止止如是以時則不失陽明著見于外隂莫得而掩蔽之以道則光明六爻各止其所萬物各止其所皆此又有何咎震以四泥劈初而來有轟雷以闢坎通之象故曰亨艮以三限要上而止有移山以補坎陷之象故曰無咎不可以止于無咎謂艮非盡善之道象曰兼山艮君子以思不出其位兼古甜切并也秉持一禾兼持二禾曰兼止為山兼則兩山對峙合而成止艮象君子以思不出其位天下之理即位而存能使心之所思各止其位位是思之理思是位之理思之又思無非止之又止是為艮思是為不出局淺陋言思滯方寸言位而謂之不出去君子之艮思千里初六艮其趾無咎利永貞象曰艮其趾未失正也六居艮初趾象從初立定腳跟止乎時之所當止無咎然有限象在前雖止患不貞雖貞患不永艮止而貞貞而永有初之始有上之終利永貞之象初以時止非以限止有止無行正未之失象故曰未失正六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也拯之庱切音整上舉也趾之上為腓艮其腓之象三限二前能拯時行則行在我不隨時止則止在我方是快心之艮如無以拯三之限但以三之限為隨行止若為三所限為加憂為心病皆此其心不快之象不曰我而曰其主不在二而在三二進而聽三有之三退而聽二未也象故曰未退聽九三艮其限列其夤厲熏心象曰艮其限危熏心也限胡簡切身上下之際腰膂也列良薛切分解也夤引貞切八夤曰維夤維也三下止為艮反上成震正時止時行之爻如有止無行上下體便若腰膂僵直不可屈伸艮其限之象四五兩爻又若脊背分列不相連屬列其夤之象震行不能坎心為病以限加危以列益焚厲熏心之象心一身止主不快不可而况有熏象故直明其為危六四艮其身無咎象曰艮其身止諸躬也傴背為躬全象不獲其身四何以象艮其身身以全體言能止能行能屈能伸三下惟止三上兼行三象行止兩截限身四象行止兼獲艮身艮其身無咎之象身屈為躬身猶伸躬猶恭四以震行方伸而行于三上旋屈而止于上下伸屈兩得其止象故明曰止諸躬六五艮其輔言有序悔亡象曰艮其輔以中正也咸相向輔頰舌俱見艮反立惟輔從後可見五中當輔之位靜為喙止艮其輔之象動為善鳴言有序之象言者心聲有序如是寧有不快危厲之失悔是以亡初未失止之正五中行止俱不失正正莫過于五中象故曰以中正上九敦艮吉象曰敦艮之吉以厚終也爾雅丘再成為敦上為兼艮主爻加于三上三下惟止時止而止止固加之以止三上兼行時行而行行亦加之以止是為敦艮之吉初止始上止終始以貞永終以敦厚萬物之所成終而成始此矣象故曰以厚終震從初動艮至上止震原始匪初無始如宗廟社稷之有主艮要終匪上無終如身之有背如家之有庭動中之止躋陵之事止中之動行庭之事動失其動喪貝之事止失其止不快之事動得其動如初之虩虩啞啞原非有動無止原是動止兩得偏動則泥止得其止如上之敦亦非有止無動亦原是止動兩得偏止則限此二卦反對互發之義漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也漸慈染切次也進也漸之進內止外巽以巽主往進于止主之上之得其道進乃不驟不然則欲速不逹直無所之何可以進故云之進與晉進之義别卦體內男外女主四言女以三為歸三以止下之于內四以巽歸之于外女歸如是漸莫尚矣夫復何失女歸吉之象四柔三剛以柔乘剛疑不得位疑若非正不知四本柔正之位位不得不可以進四以位言進為得位非其無功而徒往故曰進得位往有功雖得位不正不可以進四又不進失正原可以正一邦之不正故曰進以正可以正邦此即爻主之進之貞以明其利然四言得位所得者柔正之位非剛中之位其位固在四柔之得正尤在五剛之得中故曰其位剛得中此即卦主之進之貞以明其利以內之止合外之巽止而後巽巽于止後三五為剛動之正二四為柔動之正初柔為原始之動之正上剛為要終之動之正動無不正動寧有窮此又合六爻之進之貞以明其利漸所利之貞凡若此利貞之象象曰山上有木漸君子以居賢德善俗山上有木木之髙因乎山之髙原非一蹴而驟長漸象君子以居賢德善俗以居以善如漸生之山木惟以賢德為居然後俗可望善亦如漸生之山木初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也埤雅雁愛陽而惡隂夜泊洲渚令雁奴圍而警察鴻陽鳥雲飛水宿至以時飛以序從陽不忒一偶不再中爻雜撰坎離故六爻皆以鴻為象干水涯初本艮山之足以居坎水之下故為干鴻漸于干之象少男幼鴻為小子鴻羣夫婦之序一定而不可亂三四雜坎象冦四初應爻初預以四之失道為危向四而喙且以為冦至而警之使禦小子厲有言之象圖小子之危禦夫婦之寇漸之初遂可盡一卦得位進正之義而善補失道之過象故曰小子之厲義無咎也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也李氏曰鴻食則呼衆衎衎和鳴也磐石之安平者居水中人患不及尤為安平二五中正相應進于極安極平之地鴻漸于磐之象水火雜撰之交為飲為食各隨分而止無非分之求飲食衎衎之象二漸如是夫復何失故吉五正邦之主二之一飲一食皆正邦之助雖若止于在下飲之食之于在下非空飽飲食之人象故明不素飽九三鴻漸于陸夫征不復婦孕不育凶利禦冦象曰夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也醜昌九切可惡也離上獲匪其醜類也地之髙平者為陸磐進于干既安且平陸進于磐雖髙亦不失其平鴻漸于陸之象以止體言則陸以中爻言則坎夫婦易位相率而陷于坎中為寇夫屈婦下不宜征三如向坎以征何能復有二五之正夫征不復之象婦加夫上不冝孕四如妊坎而孕恐不勝其眚病之多婦孕不育之象以夫婦而為寇如是凶三以艮止四以順巽而坎不能為之冦夫婦方始順序而相保夫不離止之羣何征不復婦不失巽之道何孕不育利禦寇之象卦言女歸吉以四歸三爻言夫婦以四乘三乘即是寇亂初言危終明不可亂皆此六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也桷音角椽方曰桷淮南子曲木不可以為桷柔不乘剛如鴻不木棲桷榱之方而直者即木之橫平柯四乘風之鴻以漸不遽進回翔風中擇木而止或得橫平之處亦無木棲之咎四漸五下以四視五五為木大而中正如幹如棟四為木小而平直如柯如桷或得其桷以小之正附大之中若柯依幹若榱依棟既知上順以巽五豈復下乘以寇三與三順序而相保正此又有何咎三四原不失正三禦冦止于二上則順四得桷巽于五下則順惟其順有可待象于三曰順相保于四曰順以巽九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也爾雅大陸曰阜大阜曰陵又髙曰丘平曰陵五進居尊位極其髙極其平鴻漸于陵之象卦惟一婦乘夫而孕為不順五二正應以五夫夫之正率二婦婦之正以五二夫婦之正率人夫婦之正四為婦能以巽正之體成順麗之爻既厯三嵗但見如離之中虛而不見如坎之有孕終不敢以柔乘剛以婦加夫婦三歲不孕終莫之勝之象如是便舉一邦之夫婦而無不正吉天下之為夫婦莫不有相保之願五所願正于天下惟此象故明得所願上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也羽玊矩切舊注羽音之羽上聲毛羽之羽去聲或以逵儀為韻欲改陸為逵木桷陵孕亦豈韻乎皆郭京舉正之弊也上三應爻三言陸猶在水中蓋地之髙平者上言陸已進山上蓋山之髙平者上進雖極其髙以漸終無過亢故有依前遵陸之象其羽可用為儀初之言危厲孕婦之凶可用以為四之省上之羽肅肅征夫之表可用以為三之儀漸位雖若無五之正中鴻儀殊足襄五之所願吉三四以坎冦亂夫婦之進之正上不言而有儀用上為儀三禦冦而無亂夫誰為亂象故始義初言終嘉上羽特明之曰不可亂也歸妹征凶無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也無攸利柔乘剛也漸巽為女艮為歸女自外歸內歸于下止之家如民下取女之事歸妹兑為女震為歸女自下歸上歸于上動之主如君上取女之事人人以天地為一家而大義尤主于君上君上而歸妹以天氣則下交以地氣則上交萬物如之何不興歸妹卦體震長男有天交于地之始義兑少女有地交于天之終義其在六爻坤乾交于上下坎離交于南北震兑交于東西象天地之交出震見離説兑勞坎象萬物之興天地不交而萬物不興故歸妹為天地之大義但以人道言少女歸而配匹之事由此終長男動而生育之事由此始故歸妹又為人之終始説以動所歸妹又以主爻之説言妹柔説既失其正用動尤易于征征謂不待男而自行居三之位而征以三之説為動近不相得上又非應其何所歸征凶之象二剛而三為之乘即無征之凶必有乘之害無攸利之象漸四正三下之四自外歸之曰吉曰利貞歸妹之三不正四不為下三向外以征曰凶曰無攸利皆即主爻以致教戒之辭象曰澤上有雷歸妹君子以永終知敝楊馮俞氏等以歸妹為兄嫁妹之象説易至此謬之甚矣澤上有雷澤從雷動澤為女雷為男便是下歸上女歸男之象故為歸妹君子以永終知敝長女從長男為恆之久何不終之有少男下少女為咸之吉何敝之有惟以下女歸上男以説女歸動男上有易動之失下有易説之失其終易隙君子是以圖永其終其敝易乘君子是以當知其敝終且敝兑澤毁折之象且知震雷恐懼之象初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也娣女弟徒禮切五歸二曰其君君行恆以娣媵則初與三皆當媵二而為娣二歸五初惟二所左右從以歸五歸妹以娣之象初本毁體附于震足跛象承二而行能履之象以跛自處以正承二征則必為良娣之袂征吉之象恆夫婦之久道娣之媵君止于其分亦恆理也象故曰以恆承二在初能使初承在二象故言吉而曰相承九二眇能視利幽人之貞象曰利幽人之貞未變常也二妹君為三所乘任三有説而不輕于動與五正應惟五所歸而不自為主初跛履中行在二以承嫡行二眇視離目不全以待男明二如有明坎即有滅匪貞非利二深隱澤中一毫説意不形于動是之謂幽是之謂貞而無不利利幽人之貞之象初以承二為恆二以承五為常但以説動媵妾之正非君后之正二體隂而性陽質柔而德剛初非三説所變象故明曰未變常六三歸妹以須反歸以娣象曰歸妹以須未當也天文有須女四星須賤妾之稱三四近而不相交三上敵而不相歸亦如初之娣二為當今為雜撰坎離之爻説一失動成陷娣一失夷為須歸妹以須之象雜坎陷而無反雜離麗而有反反以麗二便亦能為初承反歸以娣之象三須無反且恐不可娣二以進御于五象故明未當九四歸妹愆期遲歸有時象曰愆期之志有待而行也遲直利切待也又欲速而以彼為緩曰遲使彼徐行以待此亦曰遲五言帝四上近爻上士四諸侯諸侯下取歸亦必君從亦以娣二君既以歸五初娣原非其偶無與為期故愆歸妹愆期之象以時又方歸坎而未出震為遲有期之人自有歸之時遲歸有時之象帝有天下侯有國國君夫人亦不啻后之重如二五之中有以貴其行則行無以貴其行則不行象故表四之志特明其有待而行六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也袂彌弊切袖也五以柔中尊履帝位與二正應期無可愆當春之仲時無可遲上動下説自下歸上帝乙歸妹之象方歸曰妹已歸曰君君行則娣從可知五之歸二惟以婦德為貴不以婦容為貴二之歸五非以承上為良更以逮下為良五以中相取二以正遜初以反優三如損其在已而飾其在娣其君之袂不如其娣之袂良之象震兑之中坎離之交東西相望五虛已歸二男之教理于外陽之輝出于震日之光昱于晝二偕娣進五女之教理于內隂之美見于兑月之華昱于夜月幾望之象帝乙歸妹如是何得如之故吉五二之位皆在中匪以説動有貴其歸象故曰其位在中以貴行上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也筐去羊切方曰筐刲苦圭切士女相歸女有承筐之禮士有刲羊之禮震筐在上三承之以柔虛無實之象兑羊在三上刲之以反歸無血之象無實之筐不可承無血之羊不可刲無攸利之象四以初為應爻不動于説上以三為應爻動于説矣女反有歸士動二行四志無失上實不存象故明其為虛筐漸曰女歸如民家娶婦事四婦三夫五父二母上老初少惟民一夫一婦得一巽正之婦夫婦和父母順老安少懷賢德著于家風俗善于國如是而止于巽下豈無于磐之安故女歸之吉歸于四歸妹曰其君如帝室納后事二后五帝初與三近君皆媵二之娣四與上近帝四如國中未妻之侯上如國中未婦之士惟帝有君有娣如君有貞娣無良以説為動帝心惑后寵移賤妨貴妾奪嫡終何由永敝何由知如是而動于説上是為杌􅑾之國故征凶之戒嚴于三漸以三四兩爻盡邦國男女夫婦之變五莫勝邇正婦軌二衎衎默喻征夫上為儀逺樹夫刑初有言憂危孕婦以剛中在五上下亦皆正進之故歸妹以五二兩爻明帝后匹配之交初以敵四而不相歸三以敵上而不相歸非其合為女娣媵二以歸五初三皆無所終之故漸三四交已成之夫婦以雜坎為征為冦歸妹三四不交非敵之配偶以雜坎為須為愆漸三復四順方不亂其為男女歸妹三反四遲亦各自正其婚姻漸初小子有義以居止巽之始歸妹上士乃無實以居説動之終此二卦反對互發之義像象管見卷四上欽定四庫全書像象管見卷四下明錢一本撰豐亨王假之勿憂冝日中彖曰豐大也明以動故豐王假之尚大也勿憂冝日中冝照天下也日中則昃月盈則食天地盈虛與時消息而况于人乎况于鬼神乎豐芳忠切豆之豐滿者一曰器名假庚白切豐大明在內動在外主明用動日以震東生明明以出震成大故豐豐亨王假之明動二主不當相應之位中爻雜撰巽兑明不照于天下明斯小矣豐何以亨五中天之位與二以中相尚以動之中來明之中而成大明于中天王假之之象勿憂五以震體處豐何得無憂然徒憂無益只在假通二明常有中天之大合天下而無不照是乃五之所宜他何用憂王有假日中有宜豐是以亨彖又發明盈虛消息之理以示宜日中之道日之為言照也曰中之為言常照也故日方進于中斯謂之宜若已進于中便不謂之宜日才中撰為兑西昃又至矣此一日之盈虛而有消息之象月才盈撰為兑毁食又至矣此一月之盈虛而有消息之象天地盈虛無不與時消息而况于人豈可獨昧此與時消息之理况于鬼神又豈不日著此與時消息之理處豐而知日中之宜又遽知昃食之消息無時而無震之恐懼修省如是其有憂乃可以言勿憂于王假之之道為庶幾而豐常不失其亨亨此象曰雷電皆至豐君子以折獄致刑雷電皆至電光發于內雷聲震于外電迅大雷亦迅大豐象折獄是非曲直欲得其情非電無折致刑輕重大小欲當罪非雷無致雷至而電不至刑可致無以折獄電至而雷不至獄可折無以致刑初九遇其配主雖旬無咎往有尚象曰雖旬無咎過旬災也豐之明主雖在二然初者二之首麗之爻惟四動可以配初明而成大初四應爻遇其配主之象十日為旬二麗初日出之陽初遇四動主之合初于動主得合日旦之體在初出震之用在初雖與二相須遍及十日惟有動而生二之明别不豐而為二之蔀雖旬無咎之象往是翼二進五成五中天之章五豈不加尊尚往有尚之象一月三旬積旬成月初二相麗象上句十日然旬亦十之盈數故言雖以示不可過之意過乎初二巽兑雜撰昃食隨至象故明曰過旬災六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也蔀蒲户切又薄口切草名斗當口切斗為帝車運乎中天豐之斗以五為象初日出之陽無蔀二日中之光與四雜撰成巽巽為隂木為髙長所大者不過如蔀草之蓊蘙然豐其蔀之象二明既蔽五章不成雖在日中大明之照不顯斗燦之光僅存日中見斗之象二以巽蔽五以兑毁以已昏昏安能使五昭昭往得疑疾之象然二五皆虛中之體二四本明動之合所志原無不相信者匪孚故蔀有孚明動之正體既顯巽兑之撰體自隱何蔀不發發則明相合志相信何疑何疾吉象故曰信以發志九三豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也沫音昧如涎沫濡沫流沫乃細雨不成水之意肱古𢎞切二四雜巽巽隂髙長大為蔽日之深莽曰豐蔀三五雜兑兑澤瀰漫大為浴日之巨浸曰豐沛豐蔀五存小燦之明于日中為見斗豐沛上飛微濛之雨于日中為見沫震左兑右三以兑橫于二前象右肱兑有毁象折三肱折于右四動善于左二麗三以為明三合四而上往將至動終而無不明無咎豐尚大大事如日之烜如雷雨之作豐沛見沫既不能如日之烜又不能如雷雨之作大事從兹已去象故明不可大事三四如五二之左右肱右肱用左肱廢日且西沈無能東出象故明終不可用九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也豐蔀見斗四與二同二失其明四失其動五斗之見四致之矣初與四正動之主稱配四遇初非正明之主下二一等稱夷四得合初初麗二尚往于下四襄五來章于上吉四與二不當明動正應之位象故特言其位不當二明既蔀五章何來四若幽之象故特言其幽不明遇初劈初便為東方之明進于中天自明無不照而動無不善五章以四遇而行象故言吉而明之曰行六五來章有慶譽吉象曰六五之吉有慶也五日中之位二四雜撰成蔀五為假之于正尚四之動以為動尚二之明以為明明動合而章皆五中天之章來章之象旅二即三止以為次懷五明以為資豐五履四動而有慶孚二明而有譽如是真可以言勿憂矣有慶譽吉之象譽因于慶象故明有慶上六豐其屋蔀其家窺其户闃其無人三嵗不覿凶象曰豐其屋天際翔也窺其户闃其無人自藏也闃虛入聲寂靜意從門狊狊犬視扄鵙切豐至上為豐大之極以處昃日之終務窮極之動動不足以生明動愈髙廣明愈暗塞豐其屋蔀其家之象二明主象上之有家既以巽蔀三應爻象上之有戶又以兑闔户闔則內不可出外不可入從外窺之明蔽于內上非夷主之遇之人從內窺之動窮于外上非配主之遇之人當炎炎隆隆之候俄而羣動頓息聲響俱寂窺其戶闃其無人之象至于三嵗巽隂之蔀不撤兑闔之户不闢終于無人可覿凶上天爻為昃日邊際以動體合飛體驕心盈氣猶騖于髙翔象故曰天際翔四初兩剛有遇五二兩柔能來上柔三剛稱應爻而曰無人曰不覿非三故為絶之乃上以柔暗自髙獨于三為不遇獨于三不能來真所謂自暴而自棄矣象故曰自藏旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅力舉切衆也衆出則旅寓故凡客于外者皆為旅又葆旅葆菜也野生故曰旅離明在下震以動尚之于上為豐離明在上艮以止麗之于下為旅卦體上明下止明旅主止旅人豐五來二則亨以五動于明上故言尚大旅二麗五則亨以二止于明下故雖亨言小五柔得中乎外卦原于內卦艮止之剛無所不順能以下之艮止麗上之離明則雖一寄寓間而于正道俱無所失是為旅貞而無不吉難處者旅之時難盡者旅之義或以旅興或以旅喪所關甚大彖所以深贊其時義之大也象曰山上有火旅君子以明慎用刑而不留獄凡入而舉火于內者居家之人止而舉火于外者旅寓之人山上有火火寓于山旅象君子以明慎用刑而不留獄明如火慎如山君子所以用刑山有火留則延燒獄有罪人留則淹繫君子所以不留獄初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也瑣悉果切旅之初即豐之上豐上不克來二之章動而上翔極其窮大旅初不克麗五之明止而下墜不勝猥細旅瑣瑣之象所止所斯斧析止之所初之自有以瑣瑣不勝四斧之裁若逢四斧之析斯其所之象焚巢焚次之殃從上而降必及于初無取非災取災之象旅初就無麗明之志身未必窮而志先窮初之災志窮取之象故明曰志窮災六二旅即次懷其資得童僕貞象曰得童僕貞終無尤也次七四切從二俗作次非凡師再宿為信過信為次三止主二依三成止旅即次之象以止撰巽巽而上入于五明遂有所麗懷其資之象二有即有懷初于二亦且守如閽寺得童僕之象旅言貞貞此瑣瑣之旅不貞為尤二貞要譽命之終而終于無喪象故明其終無尤九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也三五明止不相當雜撰兑毁正明不麗燥火為焚旅焚其次之象止主如是二且無即初又何依喪其童僕之象以貞則危窮與初同三焚延及二初象故曰亦以傷上麗不能下為與矣主義不立初弗為僕象故曰以旅與下其義喪九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也處上聲居定居處暫止而已司馬君實曰利劍在手不敢飲酒五中能順下剛之麗四未得五中順之位能為旅人暫止之所無能為旅人即安之次旅于處之象四亦離牛有順體雜撰而為究躁之爻則剛鋭犀利如巽工所持之斧得其資斧之象于初有斯未能拯人之窮且恐益人之災我心不快之象四位未得心已一體旅人為我但以剛為斧即善操恐銛不可犯而鋒不可嬰一失所傷必多殊不似五雉之中順象故直明四心之未快六五射雉一矢亡終以譽命象曰終以譽命上逮也豐五來章章在二惟五能來旅五射雉雉在五惟二所射三以止麗明主爻剛直如矢雜巽撰入則止體亡而麗體成一矢亡之象五以明為旅舍惟人所止如懸雉以立射的惟人所射一矢命中于二手中爻之有巽兑巽如上之順下而伸命兑如下之説上而有譽譽未易得命未易行五合譽命而兼得合譽命以永終終以譽命之象明在上麗在下合止三爻而俱上逮于五明象故言上逮四不快五終譽明在我不明在人以斧斯之則窮豫之雉而惟其所射則麗如諺所謂順不明人是為得中順剛之旨上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也鳥在穴曰窠在木上曰巢柔中順剛惟五四上皆剛而上尤亢四言處猶能為人所寓上言巢止可為鳥所憑上加離火兑毁之上鳥焚其巢之象止三爻皆旅人先乎射雉兑口向上以有所麗而笑後乎焚巢兑口向上以無所麗而號咷旅人先笑後號咷之象離三爻皆牛順于剛止之上皆平地止之易地原無不在離之順德以焚蕩然四斧猶言得上牛乃盡喪凶上以剛亢出柔中之上于順義為反象故曰以旅在上其義焚旅終喪牛任人之有笑號休戚不關其心漠然付之罔聞象故曰終莫之聞豐明以動動而明配主夷主遇豐有常照之日旅明順止止麗明一矢亡旅有命中之雉豐四動體動于明上兩主有遇方為行明動不相遇便蔀旅三止體止于明下一矢無亡是終止止明不相麗便焚豐上逺二明窮于外動旅初逺五明窮于內止動之明主在內是為豐家蔀則內無所歸縱以為居闃其無人奚啻鬼幽止之明主在外是為旅次焚則外無所往縱有所往無一為僕有同孤鳥反覆豐旅之義隨動隨止明與不明可以審所自處矣巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人巽以一柔入于二剛之下而剛能令之在天象風常以長養之令鼓舞萬物在君象命常以長養之令鼓舞萬民重巽卦上下以順相入一命方入于前再命又入于後重復申戒則柔順而入人也易故曰重巽以申命巽五極其中正以二之剛中巽五之中正胥天下而入于中胥天下而入于正剛巽之志如是亨可知故曰剛巽乎中正而志行初順二而入四順五而入主小言巽其亨在小是以小亨小得其亨無往不順故利有攸往見五則利故利見大人象曰隨風巽君子以申命行事隨風前後相從而至于物無所不順于物無所不入巽象君子以申命行事命即所行之事事即所申之命申命申之于未行之先行事行之于既申之後即命即事即申即行相隨順入是為君子之隨風是為君子之巽初六進退利武人之貞象曰進退志疑也利武人貞志治也五申命之主初去五逺以隂巽不果小民居申命之初承二為進敵四為退疑而未定進退之象兑以秋肅為武四者以巽撰兌之爻象武人四田有獲能齊一民志以胥巽于五中象武人之貞初有四之武有四之貞遂能果決上進以從五惟大人中正之命是順是巽則利利武人之貞之象進退志在二五之令象故言疑武貞志方受五之庚象故言治九二巽在牀下用史巫紛若吉無咎象曰紛若之吉得中也古人皆席地坐惟尊者坐于牀五主申命二為行以致于民爻剛位柔避去尊位弗居使初民儼然知有五位之居尊五命之當順巽在牀下之象四雜撰兑離之爻兑為巫如祭禮之有祝祝以孝上告離為史如祭禮之有嘏嘏以慈下告二四同功用史紛若多方傳上意以告于初民用巫紛若多方傳下情以告于五上巽牀如是剛無不行之志吉命自五申天下之政又無不出于一無咎巽五正中惟二合而得其中而可使天下之民皆無不中象故言得中九三頻巽吝象曰頻巽之吝志窮也巽以柔順剛三剛四柔近不相得以剛巽柔不可非四無以巽五不巽不可既巽又違既違又巽是以吝巽上窮三與之合象故明志窮六四悔亡田獲三品象曰田獲三品有功也以一柔居四剛之中不能無悔得正故亡初言武四言田田即治兵講武之事四以主巽先初以兑合二以離合三皆田象主初而有武貞之利合二而成史巫之用合三而無頻吝之窮齊之一之區之别之悉獲以歸五獲三品之象五先後有庚四三品悉獲非四之田五庚亦不獨成象故明有功九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也五居巽之正中以中為貞貞是執此所申之命堅如金石行此所申之命信如四時故吉而悔亡且于上下無所不利無初未能不令而從初有進退之象有終終無令而不從剛中志行之象五以巽臨兑自東南之長養要兑説之西成民志無不説無不庚以五為之先從五下視內有三日之庚以五為之後從初上視內有三日之庚先之以三日之庚後之以三日之庚民心罔中若為徹底從新鑄造一過而無不合歸于五中故貞既吉而庚又吉凡言先後三日即六日日之干十支十二相錯為六十其間甲之曰六庚之日六巽五變即蠱蠱事之壞事物始必飭終必蠱先甲後甲以中爻震木為象震之出日之甲春之始反終而原其始所以飭蠱蠱五變即巽巽事之權事物過中必有庚先庚後庚以中爻兑金為象兑之説日之庚秋之中裁其過以歸于中所以制巽此蠱巽相通甲庚取象之别蠱之甲言于卦合上下而共有事巽之庚言于爻申命行事之主獨在五也上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也巽上亦曰牀下二巽于五前上巽于五後以剛居柔皆有避五弗居之象然二在牀下得巽之中上在牀下窮于無入窮則遂宜有所斷制四撰離兑于中爻從初視之則武從五視之則庚自二用之則為史巫自上得之則為資斧巽究躁越五之中反四之順故四獲而上喪喪則過中失正何所斷制既無以巽乎君而入乎民且無以審其退而善其處其巽愈卑其身愈危止存得一個傴僂之軀視三之窮尤甚貞凶之象以上為正凶之道象故曰正乎凶兑亨利貞彖曰兑説也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉兑杜外切先西薦切難乃旦切兑説也是不言之説人心義理之説不在言語口舌故説去言為兑而兑所以為説兑巽反體巽體柔之卦兑用柔之卦四柔居于巽中有功巽小亨主柔小言亨而以能順九五之剛為利往為利見三柔居于兑中不當兑亨主剛大言亨而以能正六三之柔為利貞夫子發彖推明兑之所以為説在于剛中而柔外剛中自二以合五柔外為上不為三説以利貞非但不為三來且更光于上引説如是以上則順乎天以下則應乎人有事而為民先之則勞而忘勞有難而與民犯之則死而忘死使民自勸于説而不自知與勸民而説不同説言乎兑豈不甚大上天爻上有説順天之象三人爻下有説應人之象兑為毁折為附決説以行之以三言民毁折于中忘勞之象以上言民附決于外忘死之象象曰麗澤兑君子以朋友講習麗澤兩澤相麗互相滋益兑象君子以朋友講習以同方之朋合志之友相為講其所未明習其所未熟其互相滋益為何如是為君子麗澤之兑震兼恐懼修省修省又為恐懼之實兑兼講習習又為講之實初九和兑吉象曰和兑之吉行未疑也初四應爻同德相求調之成聲以和為説吉三內説之主雜巽撰入剝在上不在下初行進亦無疑于入小人之説象故言行未疑九二孚兑吉悔亡象曰孚兑之吉信志也二五剛中合志以孚成説已無不吉與三相近自守不失亦不為入悔是以亡象故明信志六三來兑凶象曰來兑之凶位不當也兑以剛中柔外為正三以柔居中以巽上入合上為來無能為以柔順剛之説而但為援剛入柔之説左右逢迎説不以道君子寧為其所説凶剛中説主在五三獨不如二之孚象故特明其位曰不當九四商兑未寧介疾有喜象曰九四之喜有慶也商度也猶商賈之商又金行之聲曰商傷也其氣遒徑凋落萬物與商不同商介畫也又側畔也四三以近相説而有入初未疑四已疑二信志四有惑志商兑未寧之象四剛正以三為介柔疾不纍斯剛正無傷以已既瘳未寧之疾以五亦免于剝之厲其交慶而説為何如介疾有喜之象喜在四慶在五象故明有慶九五孚于剝有厲象曰孚于剝位正當也四切近乎三曰疾五視三以一柔巽伏于中將決裂四剛説體而從中以變曰剝四正有介之象五二以中成孚如中孚之孚三固將剝而入之五若欲化而孚之孚于剝之象但兌五説體與履五健體不同履五健恐其和之難危在夬兑五説不覺其入之易危在孚有厲之象兑中有剝于四五皆易入而正位如五足以當之決不為所入也象故明位正當上六引兑象曰上六引兑未光也三來兑來上而下以剝剛中之説有胥相陷溺之非上引兑引三而上以為柔外之説有拯援拔起之意但以柔口為引與四剛正之介不同四介足為五喜上引未為五光象故明未光巽東南生物之氣雖生尚宜有庚中爻雜撰為兑兑見巽中于上下皆有所庚撰之是兑正秋成物之氣既成不宜有剝中爻雜撰為巽巽伏兑中于上下又有所剝撰之非巽以一柔入二剛之下順而承皆助剛之柔四獲初不特二柔相巽以順剛二三兩剛在四初之間無不上巽乎中正象故獨明四之功兑以一柔見二剛之上逆而乘皆剝剛之柔三來上不特二柔相説而不知有剛五四兩剛在上三之間且將剝變而為柔象故獨凶三之來兑反巽為長至五而庚即兑之成巽反兑為消至五而剝即巽之入巽以四初二柔為民四剛皆君以君巽于民上而惟民情是順是以一申再申而無不入此巽之所以為入兑以三上二柔為民四剛皆君以君下于民下而惟民意是説是以忘勞忘死而無不説此兑之所以為説是為二卦反對互發之義渙亨王假有廟利涉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也渙亨在二四同功二來險中不出則窮以同功風散主爻遂有震起而無坎陷曰不窮四柔得位乎外惟剛中之五是同而非險陷兩柔之與同五有二四同功之用何險不為流散渙所以亨艮門闕雜撰于巽隱坎幽之中為王廟二來于內四同于外二四合內外以為之相五剛實有孚乃穆穆以主于中王假有廟之象坎固大川巽則順木以順涉險即險成順豈無利涉之功利涉大川之象假廟巽德上入風運于無形涉川巽木下行險散于有象皆亨之道而匪貞不固利貞之象象曰風行水上渙先王以享于帝立廟雷水為解解為雨風行水上為渙渙次兑後水遇兑秋以後曰始涸曰始冰曰水澤腹堅皆凝結之義至東南巽風行于其上則無不融液泮釋而成流散之波文渙象先王以享于帝立廟上帝之于萬物如水之原原本本惟一長養之風一行遂流散為萬而至于不可窮先王深于渙配得上帝來故帝以渙享祖考之于子孫如水之原原本本惟一長養之風一行亦流散為萬而至于不可窮先王深于渙對得祖考來故廟以渙立初六用拯馬壯吉象曰初六之吉順也渙初不言渙坎之底川之淵風流波靡險難結塞正在初也前有震為壯馬初用壯馬以拯有上入無下陷何險不出吉四巽順主爻初與正應象故明其順九二渙奔其機悔亡象曰渙奔其機得願也機居履切几人所憑坐通作機機尊者所憑以四得位于五前為象二來坎中孰使之來若是五遣之使來以解散天下之險難也二報命稍緩寧無即緩成陷之悔二四同功坎以震出四如疾風之吹二如急流之奔五憑四為機二因機為奔速返上同之列還貽一人之安悔是以亡四願上同二正得之象故明得願六三渙其躬無悔象曰渙其躬志在外也二四皆三之近爻二機方有所奔四更不以為羣三何所措其躬羣四不可乘二不可以下則俯身以屈于二二奔與奔以上則委身以順于四四同為同渙如三以風則不能靡以波則不能流何悔之有渙其躬無悔之象三不以內險為安象故明其志在外六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也二奔機合初與三而俱上于四四有上同無下眤天下無一非其羣天下無一為其羣渙其羣元吉之象渙為水之散丘為山之聚舉天下之人無一而為四之羣惟欲合天下之人無一不以五為同不見四之有羣惟成五之有丘渙有丘之象坎三爻在下為心巽深入故又言所思四第不係之為羣未嘗不慮以下人以誠心必開以衆思必集如有隱伏一謀憂病一籌亦必有揚而無閼有詢而無鄙匪夷所思之象象故特明其光大九五渙汗其大號渙王居無咎象曰王居無咎正位也號戶報切四渙曰羣上渙曰血所渙者險體五渙曰汗坎為心五二通為一心即心為號即號為心凡大命令之下大政事之布大財用之發以散則為和風以潤則為甘雨如人之汗從心而液遍一身之皮毛爪甲無不霑透渙汗其大號之象又曰渙王居四羣渙而尊事一人之業顯五號渙而恭已南面之理得五王之正位位在德元五以為居夫何為哉惟見王之尊居端拱而與天下共補險陷之過渙王居無咎之象象曰王居無咎正位與彖王乃在中正相發上九渙其血去逖出無咎象曰渙其血逺害也全坎皆為血卦獨言于上三是柔險乘剛之爻上是成功不居之時有如以應係三三固欲出而外上固欲入而內安得無血去逖出去不復來逖不復近出不復入于其坎血逺而又逺何咎之有上四皆渙五之佐四有髙世之功上當風散之成惟有去與逖出不涉險害為善補過象故明逺害節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民節亨主五言亨坎剛兑柔分以為節而五剛尤為得中坎水流兑水止坎欲流以兑而有所止兑為止坎嘗不失其流五得中非其一于流而無止又非一于止而無流所為節而止者柔險所為通而流者剛中是以亨才過中即失正出乎五入乎上兩柔相敵而止苦節之象有止無流但能以澤止窒人險陷之意無能以坎通導人泉流之機節道遂窮不可貞之象夫子發彖推明節是行險之道人心險于山川易縱難節非説無以行險非當位無以節非中正無以通五當節之尊位既中又正無乎不節無乎不通故有亨之道卦體出震説兑勞坎成艮天地節而四時成之象五中正節以制度節在上説在下不傷財不害民之象象曰澤上有水節君子以制數度議德行數色句切度徒故切風行水上風乘水水受風氣有所散而無壅滯川谷通焉為渙澤上有水水滙澤澤納水氣有所節而不散越藪澤鍾焉為節君子以制數度多寡有數而不敢淆隆殺有度而不敢紊議德行內檢其心而有可存之德外檢其身而有可徴之行數度德行皆流水之象以制以議皆澤有限止之象初九不出户庭無咎象曰不出户庭知通塞也戶侯古切護也半門曰户又外曰門內曰戶又民居曰户庭謂門户外間曠之地無室閭之處兑三爻皆以説節止上險而三為説主九居節初非特不恃口舌以為功更先慎其言語以自防二列初前為戶庭初居二內如戶重扄而慎之又慎如口三緘而密之又密不出戶庭之象習坎重險渙變上一畫為巽象散坎上出之險節變下一畫為兑象止坎下流之險渙上逖出于坎之險害自逺無咎節初不出于坎之通塞自知無咎初非有塞無通第知行險之危而尚口之易一或不慎不密豈惟無以節險抑恐險禍立至故以極其慎密為不出非一一于閉塞為不出象故明曰知通塞九二不出門庭凶象曰不出門庭失時極也説文雙扉曰門初以二為戶庭庭在户內初方下四又柔險之爻閉户適當其可二以三為門庭庭在門外二已上五又得中之剛出門正惟其時今五固中正以通二固敵應不出以説應之爻而不出不勝其畏險以撰震之爻而不出何時為善動于已一例閉塞于五亦若不許其通流如之何其無失凶當通之時極塞之道將止其泛溢之險并窒其通流之源象故曰失時極六三不節若則嗟若無咎象曰不節之嗟又誰咎也四安五甘原無不節初二不出亦無所言三上應爻上言苦便是不節若之象三有口便是則嗟若之象不節而嗟本真懇之説以形痛惜之悼聲四安五甘自不以三之嗟為咎上苦而悔又誰以三之嗟為咎象故曰又誰咎六四安節亨象曰安節之亨承上道也四居剛柔分節之間固無俟初之出戶亦不待三之有嗟自能安意下受而為澤之止以説上行而承坎之通安節亨之象中正之通在五四以近上承不以徒止為功更以通行為道象故明曰承上道也九五甘節吉往有尚象曰甘節之吉居位中也四安已無勉強五甘益進于中二門無所容其出三口無所容其嗟甘由于衷節以其中甘節吉之象往謂通之以節天下節在已甘在已節在天下甘在天下能使坎流合為澤止而無泛溢之險又使澤止通為坎流而無壅閼之虞剛柔分節上下合德人人説而尚之往有尚之象居節尊位而又有節中德象故曰居位中上六苦節貞凶悔亡象曰苦節貞凶其道窮也上以流水之體居澤口之上乃易流之處非能節之處以與嗟若之爻主正應雖欲不節而不可得無四之承故無四之安無五之中故無五之甘苦節之象以貞則凶能止而不能通以悔則亡與不節者為逺貞凶悔亡之象苦節不可貞彖以處人言不可使之有苦才苦于人將必有不堪苦節貞凶爻以自處言不可自以為苦才苦于已亦必有難久貞凶小人斯濫塹中悔亡君子固窮路上渙風散主爻在四初拯二奔三躬皆以從四節澤止主爻在三四安五甘上苦皆以受三渙之三在二四同功之間上交下交皆以禮曰躬節之四在剛柔分節之間上順下受皆以道曰安渙五汗險體洽為暢四肢之液節五通險體疏為放四海之原渙上逖出居功難寵利無非害血恐即渙即險之故節初不出放言易口舌無非亂階恐即節即險之故此二卦反對互發之義中孚豚魚吉利涉大川利貞彖曰中孚柔在內而剛得中説而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也孚從爪從子如鳥抱子之象蓋中所抱者實有物也中孚二柔在內説主巽主近不相得何以孚惟二得剛説之中惟五得剛巽之中二説而五巽兩柔在內遂無不孚兩柔成孚有一邦成化之象彖故曰乃化邦豚魚吉孚主在五如風四以巽魚之體雜震撰動與三俱動于五下惟五意所向先風為應孚如是更有何失豚魚吉之象利涉大川四幾望巽順之木三得敵震蕩之川三以大川之體雜更撰止與四俱止于五下風波既夷木川兩虛惟五所舟何涉不利利涉大川之象五二皆有剛中之貞二貞已順乎人五貞更應乎天人有其貞無不利矣是為中孚之利貞姤初象魚又象豕二物中孚豚魚一物豚魚生大澤中每作隨風為向舟人稱為風信風之南北未形魚之向悖先應人之有信豈其反出豚魚下彖故明曰豚魚吉信及豚魚風澤相遭起風作浪皆心之敵風恬浪靜木為順木川為澄川此人心寂感一致之虛體又人心莫孚于同舟彖故明曰利涉大川乘木舟虛下説人心孚于下之象上巽天意孚于上之象孚如是成矣貞矣彖故明曰中孚以利貞乃應乎天象曰澤上有風中孚君子以議獄緩死坎流水風行其上散而流渙之象澤止水其上有風寂而感虛而通中孚之象君子以議獄緩死獄與死兑秋之肅殺議與緩巽風之長養獄曰議求入中之出而况其未入死曰緩求死中之生而况其未死心術隱微中絶無一毫殺根即對獄死之人盎然生意之流形此所以為澤上之風而為君子之中孚初九虞吉有他不燕象曰初九虞吉志未變也燕玄鳥也杜秋燕已如客虞屯山虞中孚澤虞一名固澤鳥時常在澤象主守之官中孚兩柔在內成敵下和二上攣五然後孚初四應爻有應無敵四以巽來初以説應只守其在初便無不孚便無不吉虞吉之象月令仲春玄鳥至仲秋玄鳥歸五化邦之主初歸燕之時初承二應四二鳴亦鳴四上亦上豈曰無他但惟攣五實不揚去有他不燕之象説志在初非如三四之有變動必待化而後孚象故特明其未變九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也鶴陽鳥而遊于隂稟金氣依火精以生十二時鳴禽經鶴為露禽八月白露降鶴即鳴而相警和胡卧切好如字爵依人鳥亦屬陽一名家賔知更馮云燕爵皆飛鳥象靡文彼切披靡也順也鶴陽鳥性愛隂感秋而鳴其鳴中律二澤之中隂之位當正秋時動説意于成物之候撰善鳴于隂澤之中鳴鶴在隂之象二鳴三四兩爻一體震動上下賡鳴其子和之之象好爵謂五二五合中無分吾我故好爵在五而謂之我靡如從風而靡之靡五入人如風故稱靡鶴子鳴和爾我隨風一體上巽相隨順入于五中説之至更入之深何得如之我有好爵吾與爾靡之之象三中心原願上應四中心原願下入二為鳴隨叩隨動隨觸隨發不期其和而自無不和象故明曰中心願六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也四柔巽主爻三柔説主爻以柔遇柔近不相得得敵之象中爻雜撰震艮震行則進而上艮止又退而却或鼓或罷之象中心無主兑口無常震行則懼而泣艮止又喜而歌或泣或歌之象三四相敵如是何以攣五而成孚皆以位不中正説與巽不相當致此象故明位不當六四月幾望馬匹亡無咎象曰馬匹亡絶類上也絶古作􅓟從系從刀從卩從色非月無光受日為光隂匪孚從陽為孚四隂魄之體見于兑明已生于西撰為震遂將出于東幾與剛中之五對望得來月幾望之象四三以類相持如馬相匹四已幾于望五寧又復與類行四巽順而下入三説應而上行馬匹亡之象如是安有不孚于五之咎兩柔以類為匹類先從四而絶敵必自三而解有不上五而成孚無之象故明絶類上也九五有孚攣如無咎象曰有孚攣如位正當也三四在內成敵五二以中為孚柔説未孚剛説而和鳴以動則孚柔巽未孚剛巽而篤實以止則孚剛中交孚上維下繫若固結之而不可解是為有孚攣如而化成一邦人得寡過之象剛巽中正之位在五五巽二説正為相當二柔在內安得不孚象故明位正當上九翰音登于天貞凶象曰翰音登于天何可長也凡鳥羽髙飛皆曰翰巽為雞雞鳴必振動其羽故記以雞為翰音上以巽雞之體居天爻之上翰音登于天之象二鳴暗于內剛得中之嗚與三四聫為一體而成動有倡必和之鳴上音的于外剛不得中之鳴與三四不克聫為一體而成動雖倡無和之音二即在隂無禦于逺上即登天無應于邇以此為貞上無以入三三無以應上必失之道貞凶之象子和之鳴夜半之雷聲有通于無聲者在登天之音外揚之風聲縱髙逺有聞徒聲耳且恐如風散之不崇朝象故明曰何可長小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也小過亨彖明小者過而亨以柔小言如二之遇妣遇臣如五之弋穴是以亨以剛大言處三而為之防處四而為之遇與時偕行不失其正是以利貞可小事以二五得中不可大事以三四失位不中二剛鳥身四柔鳥翼飛兼震鳴飛鳥遺之音之象遺音謂何上兩柔乘于剛上為逆下兩柔承于剛下為順以剛大兩爻言不宜為四之上動但宜為三之下止以柔小四爻言不宜為五上之上逆但宜為二初之下順皆不宜上宜下之象如是小不逆大而順于大而大不失其為大柔不逆剛而順于剛而剛不失其為剛是以大吉象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉雷在天上雷聲震動于天上為大壯山上有雷雷聲震動于山上為小過行喪用皆艮躬之所不能無恭哀儉出于迅發之動機而非有所矯為雷過恭過哀過儉出于篤實之真心而自不能已為山上之雷是為君子之小過初六飛鳥以凶象曰飛鳥以凶不可如何也小過有飛鳥之象宜下而順首在初止而無飛亦首在初初四應爻四動初飛起為飛鳥有不勝其越分陵上侵陽犯剛之狀飛鳥以凶之象凡師能左右之曰以初飛三四將為所以不以者也剛大失位不中小以大大不可如何柔以剛剛不可如何象故明不可如何六二過其祖遇其妣不及其君遇其臣無咎象曰不及其君臣不可過也三四以剛大尊居二上三如父故四稱祖二以止撰巽順乎三四之下對祖稱妣對君稱臣就二之不宜上而言四不中二中二中勝過四之不中謂之過祖以二之中撰四之不中謂之遇妣是為過而弗過之象就二之宜下而言三剛二柔謂之不及其君以二順三謂之遇其臣又為過而弗過之象二柔得中有此二義是以無咎全卦是過二止三下獨象不及為人臣子而有過君之心便是亂賊之萌初以上戕皆所必至象特明臣不可過嚴矣九三弗過防之從或戕之凶象曰從或戕之凶如何也防符方切隄也三下體止主弗過言二不及君雖稱弗過亦當定主二上如山之峙而有防防則下三爻一體俱止二臣無失初鳥何飛初不為飛上亦將不獨飛如失其止主合五撰兑唯喏于中為從外殺為戕止失于內動毁于外離之之凶恐不獨在上且及于三或戕之凶之象象言凶而謂之如何初不可如何大無如小何三如何小如大何也九四無咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也四有失位不中之咎何以無二巽三四之下于三四皆稱弗過三于二特止君臣之分為防之四于二僅聫祖妣之交為遇之四之無咎亦以此矣四如下無遇而上有往上三爻一體俱動五穴無弋上鳥迅飛上既為飛初亦安能不飛以之凶遂不可如何往厲必戒之象雖勿為往而惟有遇然過祖之妣終非婦順之正永以為貞貞非所貞如之何其可用勿用永貞之象必戒勿用震體迅決亦兑口在前若為教示之辭三四皆失位而四更在五下象故特明其位不當三防四遇亦皆宜下三從或戕四往必戒亦皆不宜上大過二得初老夫女妻無不利五得上老婦士夫可醜小過四二之遇祖則老夫妣則老婦矧又為過祖之妣豈夫婦可恆之正象故明終不可長六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也五繫小畜之彖辭五上三四之上亦欲畜三四而成雨然五雖有倡三四終不為和隂氣凝而上結可以為雲陽氣不散而下流不可以為雨密雲不雨之象震本東方撰兑則西五既自我于西郊焉能震出于東方惟如二巽艮山之下安止無飛為在穴二下稱臣五上稱公五二合明臣分君祖三四剡木為矢巽繩為繫以中相取去其如五之上動就其如二之下止公弋取彼在穴之象二遇妣遇臣不宜上而不上五弋取在穴宜下而下已上之過猶庶乎可救已亢則無及矣上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也五已上上更亢並無遇妣遇臣之遇但有過祖及君之過弗遇過之之象初上合而飛飛之初以凶四動或可乘以人飛之極離之三止實難撼自離艮東北如窮寒極冬飛鳥于其時或為厲風飄舉上飛而不得下則肌骨霎時凍裂毛羽頃刻紛墜是為羽化上成亢動于巽風兑毁之上飛鳥離之之象凶是謂災眚是指上所為謂若兑口以言相謂言如上所為能逃乎天災不能不離乎人眚能免乎人眚不能不離乎天災一切凶家害國更不待言像象聖人所以警小人過亢之凶至矣惟大亦有亢時然但言悔不言凶言災不言眚大亢總不失正小亢則固無所不至也中孚兩柔不相得而剛得中匪得中之剛弗孚小過兩剛皆失位而柔得中舍得中之柔無遇中孚兩柔四為正三不當以三乘二上小過兩剛三為正四不當以四處五下中孚二五能孚三四之柔初自孚有餘上孚人不足小過二五亦順三四之剛初始于以人上終于自離中孚孚中不孚外小過宜下不宜上中孚有五之攣一邦成化小過無三之防如水去隄大小剛柔內外賔主之辨審矣既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也濟取渡險險在明內險未出明未全如渡水未竟曰未濟險在明外險已出明已全如渡水已竟曰既濟既濟亨小卦有小大離柔主二稱小坎剛主五稱大五以剛大居外受成二以柔小居內主事亨在柔小是以言亨言小五剛正位當于上二柔正位當于下五二正一卦皆正是以利貞又原初論既進則柔中日明日進嚮明為治初吉之象要終論既以柔乘五曰暗日止背明即暗反治即亂終亂之象夫子發彖究所終亂之故獨以其止坎離之交水火之際離固曰麗而無止坎亦水流而無止何獨既終為止為以隂柔居濟終陽剛以動為常無止隂柔以靜為常有止履既運有既心安既終忘既初上坎不為流水為止水矣一為止水于火不相濟而相息明不上行險且下陷濟道遂窮惡得無亂既未濟皆取象于濟水水故初終皆稱濡既初為上坎所濡未初自濡既終自濡未終仍為下坎所濡象曰水在火上既濟君子以思患而豫防之火之上非水之所可在水在火上水不滅火火不涸水以氣交相為濟既濟之象君子以思患而豫防之方得其相濟之用即思其相射之患思患思水上火下火有熾而涸水之患水有決而滅火之患豫防之如豫以水防火又豫防水之滅火初九曵其輪濡其尾無咎象曰曳其輪義無咎也曳餘制切離三爻皆拯坎三爻之險而濟之坎為輪為狐坎重而下初以車言亦輪以狐言上首初尾坎輪不飾于中而亘于初曳象尾在重坎之底濡象劈初曳輪濡尾濟險之功何在然既初已是到岸曳則義能圖始離性炎濡又義能首克不言既而義無不濟是為濟初之義之無咎六二婦喪其茀勿逐七日得象曰七日得以中道也七日義見震卦二五以既而定以二承五如家人六二一無攸遂深明順道稱婦茀婦車前蔽設則行二方麗三為茀五復合三為離象喪喪則二無所麗以行若宜逐然自三一有鬼方之伐二五遂成重明之治五如歸坎受成二原麗三有茀何喪非得勿逐七日得之象二之即喪即得其喪也若推三轂以進之于五其得也惟受五成而無喪之功婦如是中道之用無以加象故明曰以中道九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也三言髙宗二喪茀而無逐柔中之明不顯于二髙世之功遂成于三三五同功歸五入而受福嚮三出而戡亂上濡首濟終獨出重明之外人道不存象逺夷之國為鬼方三惡其終亂合甲胃戈兵以出征髙宗伐鬼方之象厯三爻而戡定其亂三年克之之象離明常為君子坎險常為小人鬼方既克上下合為重明小人若為逺去小人勿用之象象言憊伐鬼方而以三年計兵力豈不困乏而以明去暗主于必克此所以為困勉之成功此所以為髙宗乾坤之後經厯六險而後人道全既未之終震伐二險而後鬼方克不伐不可望其克不克不可名為人明陷之間人鬼之關匪直君子小人之判而已學易者欲安于一日不濟得乎六四繻有衣袽終日戒象曰終日戒有所疑也繻錫俞切袽女居切既濟三四與五合而撰離皆南面嚮明之位三四又水火之交故合三四以明君道三剛正位當如戡亂用武之時利用大作四柔正位當如守成右文之世莫先謹守繻繒袽緼離之文繻之衣坎之質衣之袽方以繻為衣衣中必有袽處文明之日預隱伏之憂自朝至昃惟恐開坎水罅隙之滲漏致離明有滔天之沒溺繻有衣袽終日戒之象象曰有所疑剛柔位當正也以柔乘剛疑矣緣水火之性不相射四如不戒便要決水滅火以陷滅明夫安可以不戒既濟五二定而無為三四交以成濟三所應者上險非有三年之伐不成平險之功四所應者初明非有終日之戒不顯嚮明之治故從五視之時在三為東鄰殺牛時在四為西鄰禴祭三四既其濟之功二勿逐五受福皆此九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也三伐四戒濟道已備五何為哉惟在酌三四之時以用二之中五二位南北之中三屬陽屬左象東鄰其體牛撰以坎血三年之伐殺牛之祭也四屬隂屬右象西鄰其體水撰以文明終日之戒用禴之祭也出三入五出離入坎已收髙宗之功再殺東鄰之牛非其時矣故不如謹衣袽戒終日利用西鄰之禴祭五禴祭實而有二之虛二喪茀虛以成五之實實在五淵微宥密矢享親享帝之誠二以文明虛而助之虛在二明光上下皆至治馨香之慶五以精意實而收之實受其福之象象言時天時發用在離在東斂藏在坎在西五歸坎正當西鄰之時言吉大來五大二小合二小之吉為五大之吉是以謂之大來小亨在二大來在五終亂永無患矣上六濡其首厲象曰濡其首厲何可久也上為濟首何以又濡以其出于五外無復撰為離明到底終于坎險初為尾而濡首在上身猶不沒上為首而濡則尾未有不濡全身沒溺濟功盡喪皆此故厲象言何可久示人思其可久慮其所終深矣未濟亨小狐汔濟濡其尾無攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也既未濟皆以濟坎中一剛為主濟險皆以離柔為主既二得中重之而上則皆明五險遂無不濟故主二言亨未五得中重之而下亦皆明二險亦可望濟故主五言亨二當未濟之時居下坎之中有五得中之柔在上時雖未濟而剛柔之正應自在但俟其在五勿失其在上是為未濟之亨亨不在二汔濟在初與三是為小狐凡濟渡處水邊常淺水中常深初三雖坎邊以居重坎下與坎中無異今初以與四有應視為淺涸水濵而急于濟三以與上有應視為淺涸水濵而急于濟不知二且曳輪初三何自遂能越二而出坎之中此小狐不量淺深而妄涉水之濟耳小狐汔濟之象凡狐涉水必揭其尾既狐之為尾也剛濡猶無病未狐之為尾也柔從初無濡終之濟否且未可量從初有濡不待要終而已知其終之不續矣是為濡其尾無攸利之象彖明雖不當位剛柔應正言二之所以亨不同小狐汔濟之見略與困二不失其所亨曰其惟君子而非小人之可與同義象曰火在水上未濟君子以慎辨物居方全氏曰水火之體不易水火之氣相交水行而火不濟則水氣淫而為潦火行而水不濟則火氣亢而為旱是以道並行而不相悖者言各一其行而濟之以氣也火在水上火炎上水潤下上下不相為用未濟之象火水本一氣升而上炎曰火降而下潤曰水遂判為二物凡物之辨咸若是君子以未濟慎為之辨火行居南水行居北南北異方方有定居凡方之居咸若是君子以未濟慎為之居初六濡其尾吝象曰濡其尾亦不知極也既初濡尾原是離體如將近岸而濡且以剛決不為陷故無咎未初濡尾原是坎體如方涉淵而濡且以柔難于不陷故吝象言亦不知極初所極者承二應四至上為止二方曳輪四且震伐又何能以至之于上故無所極亦之為言始如是終可知甚言不能續終之辭九二曳其輪貞吉象曰九二貞吉中以行正也初濡尾三征凶皆小狐汔濟之見二量時度力倒曳其輪以俟五有孚則進匪孚不進以曳為貞以貞則吉既之下三爻皆所以濟上三爻未之下三爻皆待濟于上三爻剛中在二柔中在五以正相應應然後行象故明曰中以行正六三未濟征凶利涉大川象曰未濟征凶位不當也全卦未濟獨言于三二既曳輪三復乘之二且不駕三何可征處三而征甚于初吝陷之又陷直墮深淵之底未濟征凶之象能起而涉承四應上明之又明誕登大國之岸利涉大川之象三有大川之涉二輪可以無曳四有大國之賞五光亦無不孚略與既濟三四之義同未濟以濟二為主惟三乘二象故特明其不當既三有伐以伐上險四終曰自戒其為險無待初伐此初輪所以可曳未四有伐以伐初險三利涉以自出險無待上伐此上酒所以可飲人不幸而有陷可以審所自處矣九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也賞書兩切賞之言尚尚其功也未之四即既之三首處坎上而貞二與之為同車三承之以利涉險在人自無所溺于已明在已且可以拯乎人貞吉悔亡之象初濡尾坎底獨出重明之外人道不存象鬼方四剛不如既三之位當匪震恐不免自居重險中其何以伐初貞而能震厯重險而為之震出以震為用用震以伐震伐三年威伏在初受成在五合上下而胥耀之于光明正明之功歸于五四匪以為功重明之國開于四五若有懋賞三年有賞于大國之象以明撤暗之志至四方行象故曰志行六五貞吉無悔君子之光有孚吉象曰君子之光其暉吉也吳氏曰日中為光朝日為暉散暉及物為光斂光在體為暉日中之日夜間之燎其暉散則為光朝日之日向晨之燎其光斂則為暉四貞貞其剛于兩柔之間而坎不能濡五貞貞其明于兩剛之間而以二為應四吉而悔亡悔有待于亡五吉而無悔悔不待亡而自無君子之光有孚二非五無行五非二無孚虛五之中以孚二之中在二為倒曳之輪在五為後車之載由是而張飲酒之筵由是而賞震伐之功合孚于五而成君子之光是謂君子之光之有孚故貞既吉而孚又吉日中為光朝日為暉暉光相為體用五孚二實以為光二斂五光以成暉吉不獨在五亦在二而未之望既皆此象故曰其暉吉上九有孚于飲酒無咎濡其首有孚失是象曰飲酒濡首亦不知節也節卦之外小象言節者四家人之三失家節蹇五以中節鼎上剛柔節未濟上亦不知節既之功莫髙于三初曳輪濡尾若俟三之必克而進未之功莫震于四上有孚飲酒若喜四之有賞而飲四震如有餘懼上飲如為合歡四震必濟之兵上飲終濟之觴有孚于飲酒無咎之象但三剛皆失位而上為之首有如以飲為是遂忘四震則未濟之大川不在三之征且在上之飲三征于坎固未出上飲于坎又有入初濡尚為尾之濡上飲且為首之濡何以辨初濡之為非而上濡之為是何以辨三征之為非而上飲之為是即于君子之光無不孚得之四失之上非五之所是濡其首有孚失是之象象言亦不知節亦之為言因初不知極之辭初知極極上乃既其濟上知節節五斯歸于中既未三四皆取象于伐鬼方無論氣質偏駁通身蔽塞為鬼方以身言但有一隙明所不通處以家國天下言但有一隅明所不通處如既之上未之初通卦重得離明而此獨仍為坎暗故特謂之鬼方三年克之三年有賞或從上伐或從下伐戰必勝攻必取方是出坎而既其濟鬼方無伐神州陸沈相率而墮于鬼幽鬼躁之歸使髙宗赫濯聲靈遂湮于後世哀哉像象管見卷四下
