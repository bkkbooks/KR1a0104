body:
  text: 像象管見卷五明錢一本撰繫辭上傳凡十二章天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣此自畫前聖人因天地自然之易畫而為卦説起天地者人心全體之易也見于畫則曰乾坤天尊于上而易畫之乾定矣地卑于下而易畫之坤定矣天地之髙卑以陳易畫之貴賤位矣天地之動靜有常易畫之剛柔斷矣天地間方必以類聚物必以羣分凡卦爻類聚者皆方羣分者皆物聚而得則吉失則凶分而得則吉失則凶易中之吉凶生矣天地間本一氣升而上在天則成日月星辰之象降而下在地則成水火土石之形凡卦爻剛者天之象或變而化柔柔者地之形或變而化剛易中之變化見矣聖人作易夫非教人默識心體以定乾坤位貴賤斷剛柔生吉凶上成天象下成地形變天地之變以為變化天地之化以為化一身中有一乾坤人奈何其自小之凡人乾坤不定便是翻覆貴賤不位便是混淆剛柔不斷便是疑惑吉凶不生便是滯物變化不見便是死塊夫子曰乾坤毁則無以見易言人道于此滅亡也然則易其可以一日不學哉是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣摩交錯蕩推蕩始以氣言成以形言作則個切朱子曰摩是那兩箇物事相摩戛蕩則是團旋圜轉推蕩將出來楊氏曰剛柔即兩儀自太極上推出來曰摩自八卦上推去為六十四卦曰蕩知主之意朱子謂此知字訓管字不當解作知見之知又曰鼓之以雷霆等皆説易中所有此合上為一章成象成形變化見矣變何變化何化剛柔以相摩為變化八卦以相蕩為變化剛柔八卦之摩蕩如震為雷之鼓離為霆之鼓巽為風之潤坎為雨之潤離為日運行于晝又為一暑坎為月運行于夜又為一寒兩相摩而成四四相摩而成八八相蕩而成六十四成天之象者乾道也成其為男者也成男震坎艮皆男而皆成矣成地之形者坤道也成其為女者也成女巽離兌皆女而皆成矣乾道成男曰知大始不徒曰始而曰大始物未有始乾道始之最無有可先于其知者坤道成女曰作成物不徒曰物而曰成物物物自成坤道惟因其成而成之絶無有做造于其物者大始之知先天為主宰物而不勞心都無許多艱深險阻天下無一人不可以與知道在易而已矣成物之作後天為用從陽而不造事都無許多繁擾作為天下無一人不可以與能道在簡而已矣乾知惟易故人人易知人人有乾之易人人之知同也坤能惟簡故人人易從人人有坤之簡人人之能同也易知有親以其易者與天下共知之同心者多安得無親易從有功以其簡者與天下共能之協力者衆安得無功有親自然日新不己德可久而賢于人有功自然富有無外業可大而賢于人知到德可久只是一易能到業可大只是一簡故曰天下之理得得則天下俱得成非一人獨成成男配天成女配地故曰成位乎其中學者不知所以變化至于象不成其為象而乾毁形不成其為形而坤毁只是缺却相摩相蕩一段工夫間有從事于摩蕩者又無得乎易簡之理往往傾險使人不可近勞擾使人不可行以德則可暫而不可久以業則可小而不可大此乾坤所以無成位之日也成象之謂天成人之象有天道焉謂之乾道成男成形之謂地成人之形有地道焉謂之坤道成女成男變化而盡乾道者成女變化而盡坤道者乾道不成自是無主何知之有間有所知必是細屑之知而非大始之知坤道不成自是無能何作之有間有所作必是造撰之作而非成物之作乾道不成必是不易而人難知德何可久坤道不成必是不簡而人難從業何可大可久言德便是天尊而乾定可大言業便是地卑而坤定乾定者乾成乾位得乎易之理而已矣坤定者坤成坤位得乎簡之理而已矣剛柔八卦皆人心之定理非人力所可安排布置非私智所可擬議增損然而聖人學易之功則實有用力之地如不以剛摩柔大柔則廢如不以柔摩剛大剛則折如不蕩之以乾惡乎健如不蕩之以坤惡乎順如不蕩之以震惡乎動如不蕩之以巽惡乎入如不蕩之以坎惡乎陷如不蕩之以離惡乎麗如不蕩之以艮惡乎止如不蕩之以兌惡乎説故謂相摩相蕩為易簡自然之定理可謂相摩相蕩為易簡當然之實功可不然聖人學易之功又孰從而稽之哉天原尊人多卑之而不尊有君失其為君者有父失其為父者有夫失其為夫者皆卑之而不尊焉者也地原卑人多髙之而不卑有以臣而加君者有以子而加父者有以婦而加夫者皆髙之而不卑焉者也然則乾坤之位何能有定乎哉聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化是故吉凶者得失之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利朱子曰陽化為柔只恁地消縮去無痕迹故曰化隂變為剛是其勢浸長有頭面故曰變楊氏曰設更置之謂羲易六十四卦順隂陽生成自然之序而畫之為圖未有辭也今以正反相對各以兩為次序卦畫雖伏羲之舊其次序則自今更置之故曰設卦易者象也八卦成列象在其中原初皇羲畫卦以象為教不言而見吉凶文序周爻若更置而次第之謂之設卦設而象可見一卦有一卦之象一爻有一爻之象象見而辭可繫一卦有一卦之辭一爻有一爻之辭文周繫辭明吉凶為觀象未明者設也剛柔相推而生變化剛柔兩盛則為相摩剛柔迭勝則為相推一剛一柔正反相推或自內而推之出外或自外而推之入內推則變變則化或剛化為柔而柔又變剛或柔變為剛而剛又化柔是故卦象何吉變化而得便成吉象卦象何凶變化而失便成凶象故曰吉凶者得失之象卦象又何以有悔吝失而凶必憂憂成悔又自凶趨吉之象得而吉必虞與娛同虞成吝又自吉趨凶之象故曰悔吝者憂虞之象吉凶悔吝變化生生而無已又只是一剛一柔相推而為進退之象剛柔相推又只是晝夜相禪之象觀得失之象而動吉凶必明觀憂虞之象而動悔吝必審觀進退之象而動變化乃見觀晝夜之象而動剛柔以斷以效天道之用卦象之隂陽爻也動則天道之極立焉以效地道之用卦象之剛柔爻也動則地道之極立焉以效人道之用卦象之陽剛之仁隂柔之義之爻也動則人道之極立焉六爻之動三極之道無動非象無象非道非徒觀之以象而皆觀之以道是故易有次第都是三極之道君子所以存諸心皆易序也居之夫豈不安易有爻辭都是三極之道君子所以説諸心皆易爻也玩之夫豈不樂是故居則觀卦之象玩所繫之辭而知吉凶動則觀爻之變玩所繫之占而知吉凶居成象動成爻居既盡乎天之理動必合乎天之道自天祐之吉無不利不亦宜乎彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震無咎者存乎悔是故卦有小大辭有險易辭也者各指其所之項氏曰存乎位以六爻言存乎辭以主爻言隂爻為小陽爻為大或小或大之象雖有不齊而為一卦之主則無大小之間故謂之齊齊猶定也朱子曰介如界至界限之界自下體出上體自上體入下體常在三四之間此悔吝所從生張子曰辭各指其所之指之以趨時盡利順性命之理臻三極之道也彖言乎象彖即彖辭統言一卦事理已具之定體不得而變者也爻言乎變爻即爻辭錯言六位剛柔進退之無常惟變所適者也聖人繫卦爻之辭吉凶言人之失得悔吝言人之小疵無咎善人之補過合彖象爻變而皆具也是故列貴賤者存乎位又自爻變中凡在上者必為貴凡在下者必為賤貴賤之有定列言齊小大者存乎卦又自彖象中乾坤主全體震主一坎主二艮主三巽主一離主二兌主三小大之有異齊言貴賤之列變之象也小大之齊象之變也辨吉凶者存乎辭吉凶者言乎其失得象有象辭之失得爻有爻辭之失得貴賤之位大小之卦或吉或凶一一為分而辨之憂悔吝者存乎介悔吝者言乎其小疵悔未純乎吉吝未純乎凶然其路口略爭差些子不得全要介得分明謹之于微不可以小疵而自恕震無咎者存乎悔悔是天理萌動之機無咎者善補過善其悔過真心劈頭震動覿體呈露當下憑此一念恐懼修省必期復于無過而後已若無如是之悔不過念轉隨罷口説便休悔殊未之震也又安得有補過之善乎是故卦有小大辭有險易辭也者各指其所之使人去危就安趨吉避凶險辭指象變所之之失而以言其凶否則亦必有小疵易辭指象變所之之得而以言其吉否則亦可以補過學易者而求補過之善其惟以悔為震乎求小疵之不存其惟以介為憂乎悔以震無咎介以憂悔吝則必常得而無失有吉而無凶矣易與天地準故能彌綸天地之道仰以觀于天文俯以察于地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀與天地相似故不違朱子門人竇文卿曰天地人謂之三極人才有些物欲害處便不與天地流通如何得相似誠為難事知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體凖古文準字均平凖度也乾凖天坤凖地九凖陽六凖隂彌補其不足而周之綸約其有餘而修理之問反字如何朱子曰方推原其始初却摺轉一摺來如回頭之義是反回來觀其終也邵子曰滯于一方不能變化非神也有定體不能變通非易也易與天地凖故能彌綸天地之道天地之道于何為凖以易為凖也天地之道有幽明有死生有鬼神有幽明必有幽明之故孰從而知之以易凖而知之易有隂陽之畫非易之文而天之文仰觀而求其故天文吾文易有剛柔之畫非易之理而地之理俯察而求其故地理吾理此幽明之故之可知也有死生必有死生之説孰從而知之以易凖而知之易原始要終以為質乾陽為始為生原乾之始而吾其始始生之所從來坤隂為終為死反坤之終而吾其終終死之所從去此死生之説之可知也有鬼神必有鬼神之情狀孰從而知之以易凖而知之易有隂物陽物有隂變陽變陽精之氣為神物為神之情隂精之氣為鬼物為鬼之情陽魂之遊為神變為神之狀隂魂之遊為鬼變為鬼之狀此鬼神情狀之可知也知幽明之故幽明何故故吾易知死生之説死生何説説吾易知鬼神之情狀鬼神何情狀情狀吾易是故易者天地之準惟與天地凖故與天地相似雖天地不得而違似以易之知天地有不周易無所不周似以易之道天地有不濟易無所不濟夫何過偏旁幽曲之處推而行之無不通旁行與正行一般夫何流樂天知命在在處處皆天之所命知有天命自然無所不樂夫何憂安土敦乎仁在在處處皆吾之安土安處皆是仁如土重疊堆垜來則益厚益安安人安百姓皆此夫何所不愛以範圍乎天地之化上天下地之化極其大皆入易之模範匡圍中夫何過以曲成乎萬物物物偏旁幽曲之處極其小皆易之成能夫何遺幽明死生鬼神晝夜一道通乎幽明之故而知通乎死生之説而知通乎鬼神之情狀而知通乎晝夜之道而知一知到通乎晝夜之道而知非天下之至神其孰能與于此神則隂陽不測而無可求之以其方大哉易也斯其至矣易則惟變所適而無可執之以為體此易所以能彌綸天地之道而與天地準也人若晝夜不通便是不知便是神有方易有體了又惡足與語神語易哉或問彌綸天地之道朱子曰彌如封彌之彌合萬為一糊合無罅縫綸如綸絲之綸一實萬分各有條理彌如大德敦化綸如小德川流天地匪易無平是以謂之與天地準或問幽明之故曰故者幽明之所以然天文為明地理為幽天文又自有幽明地理又自有幽明如闔户謂之坤闢户謂之乾闔處便是幽闢處便是明分闔闢而觀察之仰以觀于天文闢户之觀俯以察于地理闔户之察又合闔闢而觀察之時時有闔闢時時有幽明時時而觀察之則知其故矣念念有闔闢念念有幽明念念而觀察之則知其故矣或問死生之説曰始即生之説終即死之説原探乾始而無失其始乾道在我方謂之知生反要坤終而無失其終坤道在我方謂之知死生言坤之乾死言乾之坤生言終之始死言始之終人而有得于易生固生死亦生人而無得于易死固死生亦死或問鬼神之情狀曰鬼神有何情狀亦指易而情狀之耳易行乎其中易立乎其中皆人也人者鬼神之會人身之精氣便是鬼神為物之情狀人身之遊魂便是鬼神為變之情狀今人説鬼神舍却自身别去懸空求一箇鬼神如何情狀得須是反諸人身而求之其不免為鬼躁歟鬼幽歟其得號為神明歟神靈歟如其不免為鬼當下此身已即是鬼豈待死而後謂之鬼如其得號為神當下此身已即是神豈待死而後謂之神情狀之以人身為鬼為神當下了然斷不必求之身外與夫死生之際也一隂一陽之謂道繼之者善也成之者性也程子曰天只是以生為道繼此生理者即是善也善便有一箇無底意思元者善之長萬物皆有春意便是繼之者善也成之者性也成却待他萬物自成其性須得仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神管登之鼓萬物而不與句聖人同憂句鼓萬物而不與止是因物付物聖人同憂謂天地之心寄之于聖人聖人以天地之心為心也張子曰聖人不以所可憂而同其無憂者有相之道存乎我也朱子曰象如日月星辰在天亦無箇實形只是箇懸象如此乾便略坤便詳效如效順效忠效力一似説效犬效羊效牛效馬呈出許多物蓋乾只是成得箇大象坤便呈出那法來黃勉齋曰隂陽流形道便在其中不成别有箇道蔡氏曰不云藏諸體而云藏諸用蓋其所藏乃有用者即所謂體也極數知來楊氏曰理之至無以加之謂極有所主管之謂知隂陽是兩儀一是太極到隂陽不測便是聖神全體太極會太極動靜之全一隂一陽之謂道一而二二而四四而八八而十六十六而三十二三十二而六十四不過隂陽兩畫交易變易生生無已易之道如斯而已繼之者善也這一隂一陽端緒原是接續流行而有其繼之是之謂善成之者性也這一隂一陽全體無不凝成具足而有其成之是之謂性仁者見之謂之仁知者見之謂之知曰仁曰知皆繼之成之而見道分明者仁者有仁邊之見日用無非仁知者有知邊之見日用無非知日用而知善斯成性道所以有于君子百姓日用乎隂陽而一無所見不見那隂陽繼續底道理是以于善一無所知不見那隂陽凝成底道理是以于性一無所知君子之道豈不遂鮮于天下顯諸仁藏諸用一隂一陽于仁中顯露顯即顯其所以藏于用處密藏藏即藏其所以顯天地以此生萬物聖人以此成萬物天地鼓之以無心止于因物付物謂之不與聖人同之以有憂能以天地之心為心謂之同憂以聖人之同憂成天地之無心合仁知為一道通萬物為一身德至聖人而為盛之至業至聖人而為大之至盛德大業如聖人至矣哉業言大藏而愈有德言盛顯而日新德日新一乾之大生業日富一坤之廣生不過一隂一陽之生生是以謂之易成此生生之象之謂易之乾效此生生之法之謂易之坤極生生之數而知來謂之易之占通生生之變而不至于窮謂之易之事聖人德業之至見于生生之易如此欲執一隂一陽之道以求聖人則非不有所繼且成而莫測其所以繼所以成非不有所顯與藏而莫測其所以顯所以藏仁知各有所見聖人若無庸其見百姓日用不知聖人亦有所不知非天下之至神其孰能與于斯夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣夫乾其靜也専其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉廣大配天地變通配四時隂陽之義配日月易簡之善配至德朱子曰乾一而實坤二而虗大生是渾淪無所不包廣生是廣濶能容受得那天之氣夫易廣矣大矣廣地道無所不受大天道無所不包廣廣生大大生以言乎逺無外故不禦以言乎邇無內故靜而正以言乎天地之間逺不禦而邇靜正故無不備雖然易之廣大乾坤兩畫而已乾畫奇而一坤畫耦而兩靜而専一之體立動而直一之用行易之大生以是而已靜則翕而兩為合動則闢而兩為開易之廣生以是而已専翕邇之靜正直闢逺之不禦一専一直一翕一闢天地之間之無不備是故大生莫大于天廣生莫廣于地易之廣大配之天地有四時易之變通配之天地有日月易之隂陽之義配之天地有至德易之易簡之善配之易所以為廣大而以言乎天地之間無不備備此子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門朱子日地卑便會廣髙則狹了若只揀取髙底做便狹又曰世上更無卑似地底地卑是兩腳踏地從貼底謹細處做將去又曰禮才有些不到處這便有所欠闕業便不廣矣惟是極卑無所欠闕所以廣成性是不曽做壞底成對虧而言易其至矣乎孰能至易之至聖人之德業其至也聖人之德之崇以其知之崇聖人之業之廣以其禮之卑崇莫崇于天聖人之知如天上運而極其髙明故曰崇效天卑莫卑于地聖人之禮如地下凝而極其卑順故曰卑法地知日崇德日以崇禮日卑業日以廣天地若陳設得一箇上下之位聖人便有崇效卑法位天位地之德業行乎其中故曰天地設位而易行乎其中易行其中便能成其性成性存存成性未嘗不存只有聖人之德業便不曽作壞了而能常存其所存如開了一箇道義之門而利用出入之無窮故曰道義之門此聖人所以至易之至也聖人有以見天下之賾説文賾雜亂也而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通本義會謂理之所聚而不可遺處通謂理之可通而無所礙處以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化俞氏曰前言剛柔相推而生變化卦爻之隂陽變化出于伏羲之畫故曰生此言擬議以成變化文周以辭述而成之故曰成也一曰改其舊質謂之變馴致于善謂之化因形而易謂之變離形而易謂之化鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機户之動發于樞矢之動發于機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭初六藉用白茅無咎子曰茍錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言功謙也者致恭以存其位者也亢龍有悔子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也不出户庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也子曰作易者其知盜乎易曰負且乘致冦至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致冦至盜之招也吳興唐氏曰慢藏非謂藏之不固理財正法只有量入為出聖賢與天下為公不令人自裒多裒來須益寡若慢然圖藏盜便思奪易何以謂之象天下萬物雖至賾而不可勝窮然無一之有可厭而惡凡有一物必有一箇形容可擬必有一箇物宜可象都是道理中合有底事自合理會如隂物有隂之形容陽物有陽之形容隂有隂物之所宜陽有陽物之所宜雖至賾所在皆于形容有所擬而于物宜無不象是故謂之象得其象無象不可居而安樂而玩言天下之至賾而不可惡以此易何以謂之爻天下萬務雖至動而不可勝窮然無一之有可紛而亂凡動皆有會如會府之會自彼而來面面可至凡動皆有通如通都之通自此而往方方可達雖至動所在合湊來都有一箇無遺缺處貫通去都有一箇不窒礙處無不可以行其大經大法之常禮行之而得動而合乎典禮繫之辭以斷其吉行之而失動而悖乎典禮繫之辭以斷其凶是故謂之爻得其爻無爻不可居而安樂而玩言天下之至動而不可亂以此至賾有象至動有爻擬之象爻而後言言成象言成爻議之象爻而後動動成象動成爻一言一動寧有不得其宜乎寧有不合于禮乎擬言而變化成于言議動而變化成于動寧有一之可惡乎寧有一之可亂乎學易者而思擬議變化如之何得中孚之九二不必逺有所騖近在居室之間求之可以動天地者在此也得同人之九五不必泛有所交得二人與之同心精鍊如斷金契合如臭蘭可以明出處宜語默者在此也得大過之初六薄物且可重用况其重者乎是無微而不當慎也得謙之九三有功且以下人矧無功而欲上人乎是無適而不當謙也得乾之上九處髙貴則思亢極之悔得節之初九念亂階則峻户庭之防得解之六三懼致冦則切負乘之羞以此擬言言必有物而變化成于言以此議動動必有恆而變化成于動不然言非其言動非其動不觸而若怒雖一物亦見其可惡而况天下之至賾不擾而若紛雖一動亦見其可亂而况天下之至動于聖人擬象繫爻之義盡荒矣天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變而行鬼神也大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸奇于扐以象閏五歲再閏故再扐而後挂乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神德行是故可與酬酢可與佑神矣子曰知變化之道者其知神之所為乎此夫子明河圖之數朱子曰凡變則生生則化之漸凡化則成成則變之成九家易曰陽往為酬隂來為酢隂往為酬陽來為酢隂陽倡和之象又隂陽相配即謂之助神靈川全氏曰揲蓍之法虛一太極之存主挂一太極之流行虛一太極之分乎兩儀挂一兩儀之含乎太極紹興中新譜有不揲右手所分之説蓋兩儀者動靜之體天動而地靜故揲左不揲右猶取夫挂一之策皆以靜取之皆右分之策也且初揲即得其數則獲一必知其三獲二必知其二獲四必知其四知之又何必于復揲之又曰用九所以含一用六所以含四以四為奇者用五之一以八為偶者用十之二用四用八十二月之數月數也用九通八用六通七三十之數日數也以十二三十相乘三百六十當期之數也又曰筮不虛一則不能動不挂一則不能變挂一者挂五中之一揲四者揲五中之四一餘九故陽用九四餘九故隂用六又曰八卦者四象之所生故策則四揲奇偶則四計九則四九六則四六七則四七八則四八故曰四營兵言營什伍居焉師之動靜因之卦言營九六七八寓焉爻之動靜因之筮之謂營猶卜之謂兆兆坼之方圓也天地之數始于一中于五一一而二一二而三一三而四一四而五一之生也五一而六五二而七五三而八五四而九五五而十五之成也天數五地數五五位相得而各有合合之五十有五五而十十而五歸于中也成變化而行鬼神鬼神不在變化之外變化即在五而十十而五之中如一生六成三生八成一既進而用三八必退而用六二生七成四生九成四既退而用二七必進而用九二三合而為五一生一成一進一退七八九六各合為十五一生一成一進一退凡天數之生成主進以進為變化地數之生成主退以退為變化鬼神之屈伸往來即行乎其中故曰成變化而行鬼神今人不知變化之道而妄測鬼神之情狀止可謂之言鬼神不可謂之行鬼神大衍之數謂蓍策之數大衍之數五十五十有五之數既衍其五其用四十有九大衍之中又衍其一衍五參天兩地之中數五十有五之所宗者五衍一易有太極四十有九之所宗者一衍一以象太極分二以象兩儀挂一以象三才揲四以象四時揲左一扐以象一閏揲右再扐以象五歲再閏是為一變再扐後挂獨言挂分二必挂一天地非人弗參之義合乾坤之策當期之日合二篇之策當萬物之數是故四營之而一變兩儀以運三才以備四時以行歲功以成天地設位易行其中乾坤合策易成其中三變成爻九變成卦每九變小成之而為八卦每十有八變大成之而為六十四卦引而伸之引謂加長之伸謂舒展之亦即伸于萬物之上之伸伸之則二篇之策都是道之顯示者矣觸類而長之以此抵彼曰觸物之相同者曰類長謂增益之又長餘也多也長之則二篇之策都是德行之通乎神明者矣天下之能事畢天下人之所以為能天下人之所當有事盡于此也若不為引伸則恐局曲滯泥束其見于數之中而道何以顯不為觸類而長則恐支離汗漫曽無得于數之妙而德行何以神惟顯道是故可與酬酢而應對萬變惟神德行是故可與佑神而贊助造化子曰知變化之道者其知神之所為聖人立象以盡意因數而以神道設天下之教能知神之所為一且無體四十有九又奚以用盡衍者也不知神之所為則數而已矣是故謂之大衍之數易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占是以君子將有為也將有行也問焉而以言其受命也如嚮無有逺近幽深遂知來物非天下之至精其孰能與于此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與于此易無思也無為也寂然不動感而遂通天下之故程子曰易中故與密字學者須要默識此易之妙旨非天下之至神其孰能與于此夫易聖人所以極深而研幾也古注極未形之理曰深研動微之會曰幾惟深也故能通天下之志惟幾也故能成天下之務惟神也故不疾而速不行而至張子曰一故神譬之人身四體皆一物故觸之而無不覺不疾而速不行而至也子曰易有聖人之道四焉者此之謂也動是幾處有善惡兩端之分器日用之謂或曰器即動之有成者制器十三卦其中之一事不可専指制物器一節為言朱子曰錯雜而互之綜條而理之綜宗之也又云如織綜之綜又云錯是往來底綜是上下底王巽卿曰易者無形之聖人聖人者有形之易指易以言聖人可指聖人以言易亦可又曰辭變象占卦卦爻爻備此四者伊川易傳止尚其辭康節數學止尚其象漢上易説止尚其變晦菴木義止尚其占謂之非易不可謂得聖人之道之四則恐猶有所遺也易有聖人之道四易辭聖人之言也易變聖人之動也易象聖人之器之制也易占聖人之卜之筮也辭變象占卦卦爻爻無不備具故不惟精而為天下之至精不惟變而為天下之至變不惟神而為天下之至神凡人之言動制器卜筮不尚聖人之辭皆妄言而已矣不尚聖人之變皆妄動而已矣不尚聖人之象奇技淫巧無益有害皆失制之器而已矣不尚聖人之占以利害為禍福不以義理為禍福皆淫巫瞽史之卜筮而已矣將以求至精至變至神其可得哉至精聖人所以極深至變聖人所以研幾至神聖人所以幾深而入神深不極則天下之志不通而精者粗幾不研則天下之務不成而變者滯志不通務不成則疾之未必速行之未必至而神者卒于昏昏以死寧復有所謂聖人之道乎哉君子將有為有行問焉以言言辭占之事而變象在其中受命如嚮如嚮應聲自人問之為言自易受之若命以言君子有為有行皆以聖人之言為問也惟問皆若聖人之前言故言皆若定命之當受此所以為易辭此所以為易占無有逺近幽深遂知來物來物非窈𡨕之朕兆乃前定之物理以今日之理與前日已定之理只是一箇理不容有二三是以心聲嚮應近不遺逺不禦幽深不能隔精之又精而為天下之至精參伍以變錯綜其數言變象之事而辭占在其中天地之數函于三中于五參以三相參伍以五相伍錯綜以順逆相錯以上下相綜或曰卦以兩相對曰參伍爻以兩相互曰錯綜通參伍之變一剛一柔相間成文陽剛天文隂柔地文故曰遂成天地之文極錯綜之數自內自外剛柔有體內體內象外體外象故曰遂定天下之象變一理萬殊趣時應變變之又變故為天下之至變易無思無為凡人易字不到手多是有心有心則思有思則為易體自然無心故無思無思故無為後人脫去易字而説無思無為全不成義理無思為便是寂寂然不動參伍錯綜之數函於太極原來不動感而遂通天下之故即物物各具之太極寂然不動于其思感而遂通天下之思之故寂然不動于其為感而遂通天下之為之故寂而未始不感感而未始不寂寂感之故有神存非思之所可通非為之所可能思以無思而思為至神為以無為而為為至神至精亦從此具至變亦從此出人以有思有為撓其寂然之體而窒其感通之用則多物于物而不神况天下之至神也哉龜山先生言正心到寂然不動處方是極致以此感而遂通天下之故深矣子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之德圓而神蓍數奇奇故圓渾融周足曰圓無方不測曰神卦之德方以知卦象耦耦故方一定不移曰方明白有别曰知六爻之義易以貢易謂變化貢謂顯出于外非告語聖人以此洗心退藏于密程子曰密是用之源聖人之妙處又曰形而上者則是密也朱子曰心中渾然此理别無他物又曰寂然之中衆理畢具而無眹可名又曰只是不粗疏恁地結密一曰窺之無間渾全周密吉凶與民同患吳幼清曰吉凶民之所患聖人為民患之神以知來知以藏往蓍探未來之吉凶示人卦藏己往之吉凶示人張子曰開物于幾先故曰知來明患而弭其故故曰藏往其孰能與于此哉古之聰明睿知神武而不殺者夫是以明于天之道而察于民之故是興神物以前民用聖人以此齊戒以神明其德夫禮之言齊曰心不茍慮必依于道手足不茍動必依于禮齊者専致其精明之德以交于神明也本義湛然純一之謂齊肅然警惕之謂戒又洗心曰齊防患曰戒月令廣義聖賢所謂齊者齊其心之不齊戒者戒其非心妄念無一日不齊戒也今人以茹素謂之齊戒不知平日用心何如也是故闔户謂之坤闢户謂之乾闔闢以一歲言之寒暑也以一日言之晝夜也以一時言之出入之息也一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神易中之變通象器法神皆就卦爻上見是故易有太極朱子曰極是道理之極至總天地萬物之理便是太極又曰太極不是一物無方所頓放但以物論之便如木之有根又曰自見在事物觀之則隂陽函太極推其本則太極生隂陽又曰天地之間只有動靜兩端循環不已更無餘事此之謂易而其動其靜則必有所以動靜之理是則所謂太極者也是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業張子曰有吉凶利害然後人謀作大業生若無施不宜則何業之有是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱朱子曰賾不是奧是紛亂時隱是隱奧也鈎深致逺以定天下之吉凶成天下之亹亹者朱子曰亹亹猶催迫天下人勉之為善相似莫大乎蓍龜是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也朱子曰繫辭所以告理從辭上發出定猶言必然斷剖決也夫易開物成務冒天下之道天地間有形者皆物也物不開則塞何以通天下隱而未發之志有為者皆務也務不成則毁何以定天下為而未成之業志不通而疑愈疑而愈不通業不定而疑愈疑而愈不定何以斷天下然而未然之疑是故易之所為作也聖人開物以通天下之志成務以定天下之業通志定業又皆以斷天下之疑易所以冒天下之道也然聖人所以斷天下之疑者豈徒以蓍而神卦而知爻而貢哉天生神物則有蓍蓍是卦象未立未有定體故其德圓而神圓以圓融周足言神以神妙不測言聖人之心先得蓍之德夫何疑蓍以筮之而有卦卦是蓍變既成已有定體故其德方以知方以一定不易言知以分辨可見言聖人之心先得卦之德夫何疑卦有六爻六爻之義變易于圓與方之間而貢示夫神與知之德聖人之心先得爻之義夫何疑聖人所以斷天下之疑斷以聖心之無疑者也夫人心之疑多不克斷以物欲易汚之故物欲之汚稍有絲髮未滌而洗則一絲一髮皆得以牽而引之間而奪之罅隙既形疏漏遂滋勞拙既見顧慮尤多夫何退藏于密之有聖人之心無絲髮物欲之汚則無絲髮之疑之不斷以圓神者洗心而欲窺其圓神之眹兆則杳然何以有方知者洗心而欲測其方知之端倪則寂然何得以易貢者洗心而欲問其易貢機緘則即之而無其所愈洗愈退愈退愈藏愈藏愈密退謂若一無前進藏謂若一無發露密謂若充塞天地一無踈漏非特絲毫物欲無可間而入雖鬼神亦若不能窺斯謂之密而已矣吉凶與民同患以此通天下之志以此定天下之業以此斷天下之疑神知來蓍開無卦之先所以神圓神之德在聖人神其神者亦在于同患之百姓則自今以來未定之吉凶夫誰不開先于蓍德中而不迷于吉凶悔吝之塗知藏往卦定有象之後所以知方知之德在聖人知其知者亦在于同患之百姓則從前而往已定之吉凶夫誰不悉具于卦德中而可考夫得失憂虞之故無蓍德者不神來無以知無卦德者不知往無以藏來曰知來今都主管得往曰藏往古盡在那裏面知來以神以蓍為神而蓍外無神非世之神通之神藏往以知以卦為知而卦外無知非世之伎術之知若此者斯謂之通志定業而能斷天下之疑其惟古之聰明睿知神武不殺之聖人為能開物成務如此乎陽生隂殺天理流行私欲淨盡神明英武不間以私不二以疑斯謂之神武不殺生生之謂易亦只是不殺殺即不生自古人心不死而多自殺以死亦獨何哉聖人惟無疑是以出入造化則于天道無不明進退古今則于民故無不察以聖心神知之德易貢之義見之蓍而神物以興設之卦立之爻而民用以前聖人至明而無疑亦以此歟天下之民共明而無疑聖人至察而無疑亦以此與天下之民共察而無疑至明至察在聖人共明共察在天下聖人之所為洗心而齊吉凶與民同患而戒以神明其聰明睿知神武不殺之德者于是為獨至矣又何天下之疑之有不斷哉天下之疑有不斷則凡闔闢往來利用出入之間無不滯于物天下之疑無不斷則凡闔闢往來利用出入之間無不妙于神神也者非獨聰明睿知神明其德之聖人用之而實天下之民之咸用之是故易首乾坤乾坤兩畫便是人之户誰能出不由户闔之斯謂之坤闢之斯謂之乾闔闢相乘或闔而復闢或闢而復闔斯謂之變闔為往則闢為來而不窮于往闔為來則闢為往而不窮于來斯謂之通凡闔闢變通往來之間可見乃謂之象不見者夫豈囿于象有形乃謂之器無形者夫豈滯于器制于象器而用之者謂之法超于象器而用之者夫豈泥于法以此利用以此出入自聖人以至塗人莫不用之其神同也特聖人為能齊戒以神明之衆人則日用不知耳有能從闔闢而悟變通之利從象器而得制用之精以入于神則民之神明其德亦與聖賢同歸矣是故易有太極太極者天地鬼神之奧神明之原即所謂洗心以退藏于密之密齊戒以神明其德之德舉天地萬物生生化化盡無以出于此亦無以加于此者也聖人會太極之全而兩儀四象八卦生焉八卦列而吉凶定焉吉凶定而大業生焉是故法象之大不在天地而在易變通之大不在四時而在易懸象著明之大不在日月而在易崇髙之大不在富貴而在易易也者備天地之法象以致天地之用備四時之變通以致四時之用備日月之著明以致日月之用備富貴之崇髙以致富貴之用凡成器之所以立而天下之所為利皆易也皆聖人之大業也聖人之大業莫大乎定天下之吉凶成天下之亹亹亹亹猶勉勉成天下之亹亹則天下之吉于此乎定不成天下之亹亹則天下之凶于此乎定未有不亹亹而疑于可以吉未有亹亹而疑于或以凶聖人所以斷天下之疑者斷諸易斷諸易者斷諸蓍龜言天下之至賾至隱至深至逺而蓍龜有以探之索之鈎之致之吉凶以定亹亹以成者蓍龜之神之所以為大皆聖人之易之所以為大也是故聖人之易則蓍龜之神物以為神則者則其無心而知吉凶效天地之變化以為變化效者效其體一而周萬變象天垂象之吉凶以為吉凶象者象其不言而以象告則馬圖之出于河者以為圖則龜書之出于洛者以為書聖人之所則而效象而則者蓍龜之神物天地之變化天象之吉凶河洛之圖書聖人之所全而體者太極也太極生兩儀兩儀生四象太極全體分明畫出所以示也四象生八卦而繫之以辭所以告定之以吉凶所以斷所謂以通天下之志以定天下之業以斷天下之疑也示象之意伏羲之事繫辭以告定吉凶以斷文王周公之事易之開物成務冒天下之道者如斯而已者也易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神鼓舞動民之具周禮地官司徒之屬有鼓舞二官乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁毁即不成列也則無以見易易不可見則乾坤或幾乎息矣梁氏曰兩不立則一不可見一不可見則兩之用息是故形而上者謂之道形而下者謂之器凡見于卦畫者皆形也形而上者隂陽之流行形而下者制用之肖似形而上無可見形而下可見道以理言器以象言謂理有成象如成器然一曰器物之有成法者化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭胡氏曰窮天地萬物之象而歸諸卦曰極發天地萬物之理而見乎辭曰鼓正義以鼓為發揚是也化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行朱子曰情偽只是箇好不好如剝五隂只是要害一箇陽這是不好底情便是偽如復如臨便是好底卦便是真情又曰緼是箇胎骨子問乾坤成列曰兩畫也是列八卦也是列六十四卦也是列自天祐之吉無不利天人之祐助尤在神明之人默成之德行書不盡言言不盡意聖人立象以盡意設卦以盡情偽繫辭焉以盡其言辭能盡言矣不得其辭亦何以異于書象能盡意矣卦能盡情偽矣不得其象不得其卦亦何以異于言其惟變而通之于卦象與辭之間方盡利乎鼓之舞之于卦象與辭之間方盡神乎乾坤其易之緼謂之緼所以盡利盡神有出于乾坤成列之外也乾坤成列而易立乎其中非易與乾坤並立為三即乾坤兩畫以卦言易而成乎六十四以爻言易而成乎三百八十四不過乾坤兩畫變化而成故曰易立乎其中乾坤毁則無以見易乾坤先不成列也易不可見則乾坤或幾乎息但一有不易乾自乾獨陽不生坤自坤獨隂不成也是故乾坤之畫亦形也形而上者謂之道形而下者謂之器易之緼道之器也意之象也言之辭也所以必變通而後盡利者變也者化乎器而裁之以道斯不局于器而謂之變也通也者推乎器而行之以道斯不滯于器而謂之通也所以必鼓舞而後盡神者神也者利用出入民咸用之之事業舉乎器而措此道于天下之民使皆得以變其所變通其所通斯無器非道鼓舞盡神而謂之事業也是故極天下之賾者存乎卦象鼓天下之動者存乎爻辭茍非其人道不虛行也茍不至德至道不凝也惟化裁而變推行而通神而明此形上之道斯盡利盡神由象而得意矣化裁而變推行而通默而成此形上之道不言而信有此形上之道斯盡利盡神由象而得言矣得意何言言不盡意得言何書書不盡言匪存乎人匪存乎德行其何以與于此自天祐之吉無不利固其宜矣像象管見卷五
