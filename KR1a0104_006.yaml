body:
  text: 像象管見卷六明錢一本撰繫辭下𫝊凡十二章八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也韓康伯曰有變動而後有吉凶動以用言即變之所之或曰動因乗承近應而見柴氏中行曰如情偽相感逺近相取好惡相攻皆是動剛柔者立本者也變通者趨時者也蔡氏曰剛柔者變通之本體變通者剛柔之時用吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也程子曰天地之道常垂象以示人故曰貞觀日月常明而不息故曰貞明天下之動貞夫一者也朱子曰天下之動雖有不齊常有一箇定的葢只把此理做箇定則在那裡惟随其順逆以為吉凶耳夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也效此易簡像此易簡爻象動乎内吉凶見乎外内外互言功業見乎變變者動之已定聖人之情見乎辭天地之大徳曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義李氏曰財言理是不相侵亂之意如以稅斂言之什一便是天下之正理正辭朱子曰大槩是分别是非是底說是不是底說不是教化便在正辭裏面項平甫曰理財備物致用也正辭辨物正言也禁民為非㫁吉凶明失得外内使知懼也易有太極人之一也一生二二生四四生八八卦成列一之象也故曰象在其中因而重之一之交也故曰爻在其中有交則有變剛柔相推一之變也故曰變在其中有變則有動繫辭焉而以吉凶命人一之動也故曰動在其中動而貞于一吉動而不貞于一凶動而介于一與不一之間悔與吝随之吉凶悔吝生乎動之一與不一者也八卦有象重卦有爻原來只有剛柔兩畫剛柔者變通之立本者也剛柔相推而有變通變通者剛柔之趨時者也一動罔不吉不一動罔不凶吉凶者要終一以正勝不可僣也一之道天地以之貞觀日月以之貞明而况天下之動有不貞于一乎天下之動貞夫一以全體言之則太極以剛柔立本言之則乾之易而坤之簡也夫乾確然示人惟一易夫坤隤然示人惟一簡爻效此象像此爻象動乎内動此吉凶見乎外見此功業見乎變聖人之情見乎辭莫非見此天地之大徳曰生乾易坤簡一无所為只以生物為事聖人之大寳曰位兼君師言如不得君位則政人不來不得師位則教人不來何以守位曰仁仁即天地生生之大徳聖人成位乎兩間合徳于天地之生生而已若非仁位是虛位何以守何以聚人曰財財即天地所生之物以養其所生之人若无財人无生養何以聚理財正辭禁民為非曰義財以義理辭以義正民之為非以義禁財理而人聚人聚而仁存仁存而位守聖人大寳之位又无非所以成天地大徳之生而貞夫一耳此見教天下守一以善動便是聖人繫辭以命人之情惟其一故象言至賾不可惡爻言至動不可亂古者包犧氏之王天下也仰則觀象于天俯則觀法于地纂言曰氣之有文者曰象形之有理者曰法觀鳥獸之文與地之宜宜如髙黍下稻之類近取諸身逺取諸物于是始作八卦以通神明之徳以類萬物之情作結繩而為網罟以佃佃平去二音亦作畋通作田治土也以漁葢取諸離結繩網罟二事結繩以防欺詐因以為網罟而佃漁包犧氏沒神農氏作斵木為耜揉木為耒耜柄耒耨耨耘除草之利以教天下葢取諸益二體皆木上入下動日中為市致天下之民聚天下之貨交易而退各得其所葢取諸噬嗑上明下動亦交合之義神農氏沒黄帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉无不利黄帝堯舜垂衣而天下治葢取諸乾坤君臣之義明上下之分定故天下治刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下葢取諸渙木在水上而風行之服牛乗馬引重致逺以利天下葢取諸随下動上說動則随人重門擊柝以待暴客葢取諸豫二隂在前重門之象震木動于外擊柝之象三隂安于内逸豫之象亦備豫之象㫁木為杵掘地為臼臼杵之利萬民以濟葢取諸小過上動下止弦木為弧剡木為矢弧矢之利以威天下葢取諸睽弧却于後矢發于前弧曲而張矢直而利皆睽象上古穴居而野處後世聖人易之以宮室上棟下宇以待風雨葢取諸大壮二隂覆于上四陽柱于下宫室之象古之𦵏者厚衣之以薪𦵏之中野不封不樹喪期无數後世聖人易之以棺槨葢取諸大過四陽聚于中二隂包于外棺槨之象上古結繩而治後世聖人易之以書契書文字契合約百官以治萬民以察葢取諸夬朱子曰葢取諸等字乃模様是恁地此舉十三卦聖人制器尚象功業見乎變之事而首在包犧包犧氏通天地萬物為一身而八卦始作非强作也俯仰皆觀逺近皆取齊戒神明包犧氏有以通之而為徳也徳通于神明情類于萬物以類一物之情而神明通于一物矣以類萬物之情而神明通于萬物矣今人但以塊然之形軀為一身而俯仰不知所以觀逺近不知所以取尚何八卦之可作神明之徳之可通萬物之情之可類乎作結繩而為網罟作結繩即所以治故曰結繩而治因之以為網罟非于結繩之外加宻加繁如後世繁宻之網罟以佃以漁佃治土又田獵漁取魚人得以養生在此物得以遂生在此葢取諸離其象物相麗也其義即嚮明之治也明者以養其大體可以通神明之徳可以類萬物之情不明者以養其小體則孟子所謂飲食之人而已矣甚者繁網宻罟漁獵其民以為己養結繩之治遂不可復見于後世作易者之有憂患何時已哉聖人制器尚象取諸離以為網罟取諸益以為耒耜取諸噬嗑以為市所先者食貨食貨生民之本也取諸乾坤以為衣裳取諸渙以為舟楫取諸随以服乗牛馬取諸豫以為門柝取諸小過以為臼杵取諸睽以為弧矢取諸大壮以為宫室取諸大過以為棺槨取諸夬以為書契而養生送死防奸制偽之事葢无一之不具皆所以推廣天地生生之大徳而見于變之實功實業也葢取諸云古人制作无一不與易合无一不以易為用耳非謂必按某卦然後制某器尚某象也且易象无乎不具又豈止十三卦為足以制器而十三卦之外顧一无可取之象哉羲農黄帝堯舜對上古亦曰後世聖人耿希道曰十三卦之辭或言利或不言利有耒耜杵臼則網罟之利不足言此耒耜杵臼所以言利有舟楫馬牛則交易之利不足言此舟楫車馬所以言利有弧矢則門柝之利不足言此弧矢所以言利李氏曰天下之事不至于夬則不通故雜卦之次序與十三卦之制器尚象皆終于夬也是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也俞氏曰原其始吉凶生于悔吝之小疵要其終悔吝著而為吉凶畫前易原无象畫後易斯有象易者象盡在畫中象者像都是人道人成象謂之像也彖者材統言三才曰才專言人道曰材爻也者效天下之動缺一爻如缺一肢節一手足其何以效天下之動凡像與不像材與不材動之效與不效俱吉凶之所由生而悔吝之所由著生謂自此而生著謂自微而著吉悔之著凶吝之著陽卦多隂隂卦多陽其故何也陽卦奇隂卦耦其徳行何也陽一君而二民君子之道也隂二君而一民小人之道也張子曰衆隂共事一陽理也二君共一民一民事二君上與下皆小人之道也一君體二民二民宗一君上與下皆君子之道也乾純陽陽為君坤純隂隂為民乾之子一陽以為序而皆麗于二隂故陽卦反為多隂坤之女一隂以為序而皆麗于二陽故隂卦反為多陽少者多之所宗一者衆之所歸一君二民主在一君以隂從陽以大為主道大而公故為君子之道二君一民主在一民以陽從隂以小為主道小而私故為小人之道易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歳成焉往者屈也來者信也屈信相感而利生焉張子曰屈信相感而利生感以誠也情偽相感而利害生雜之偽也尺蠖之屈以求信也尺蠖屈伸蟲龍蛇之蟄以存身也聖人于易稱名小而取義大不以龍蠖巨細而有所遺精義入神以致用也利用安身以崇徳也過此以往未之或知也窮神知化徳之盛也易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期将至妻其可得見耶易曰公用射隼于髙墉之上獲之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾无咎此之謂也馮氏曰小人不以不仁為恥故見利而後勸于為仁不以不義為畏故畏而後懲于不義威善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑子曰徳薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也子曰知幾其神乎君子上交不諂下交不凟其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望程子曰知幾者君子之獨見非衆人所能及也穆生為酒醴而去免于胥靡之辱姜肱為土室之隠免于黨錮之禍薛方守箕山之節免于新室之汙子曰顔氏之子其殆庻幾乎有不善未嘗不知知之未嘗復行也蒙山陳氏曰有不善與為不善不同有不善謂之過為不善謂之惡易曰不逺復无祗悔元吉天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶上言易卦具君子小人之道此下備舉十一爻教君子為善勉小人逺刑何思何慮不是不思不思則不得不是不慮不慮則无獲但天下之人失却思慮主宰而憧憧以為思都是妄思憧憧以為慮都是妄慮或往或來都是朋類此等思慮熟爛于胷中便與土塊填塞一般夫子教天下之人以何為思以何為慮看來天下道理所行之塗各殊而其歸則无不同所發之慮有百而其致則无不一然則何苦為此憧憧往來之思慮夫亦思慮其同歸一致者而已矣同曰歸如人人所還之家一曰致如人人所至之地是天下公共之天理而非有我一人之私以此思慮純是一團天理思慮又何病于往來之憧憧是故日月相推而明生寒暑相推而歳成以往故尺蠖龍蛇之信與存以屈故以蟄故日月寒暑不往而何以有來而何以生明而何以成歳尺蠖不屈而何以求信龍蛇不蟄而何以存身惟往而後來惟屈而後信惟蟄而後存惟同而能殊惟一而斯百殊者同之所化百者一之所分不役思慮于殊與百而凝思慮于同與一精研此義至于入神千思萬思皆不思之思何思之有千慮萬慮皆不慮之慮何慮之有與日月合明與寒暑合序與尺蠖龍蛇合其屈信蟄存舉而措之天下用不求利而自利以致用也致之用无施不利居之身随處而安徳不期崇而自崇以崇徳也過此以往未之或知窮神而神天徳知化而化天道皆徳盛自致聖而不可知之之事要之其始只由精義以進耳若出乎義必入乎利出乎君子必入乎小人君子精義利用安身日入乎神小人見利名辱身危日迫于死君子利用安身動而不括出而有獲為安為存為治小人用不利而身不安始于小惡不懲終于大罪不解為危為亡為亂君子雖安常不忘危是以身安而國家可保小人以危為安以小謀大必且凶于國害于家而何以保其身身之保與不保係于用之利與不利用之利與不利係于義之精與不精盖義者至精至㣲之理涵于動而未形有无之間又謂之幾故精義斯入神矣知幾不其神乎邵子曰何者謂之幾天根理極微這幾字最認得分明君子上交不諂下交不凟謂之知幾凡人上交必有些小趨奉底心下交必有些小簡傲底心所争只是些子聖門顔子恰恰知此畧不爭差些子故孔子稱之曰殆庶幾有不善未嘗不知知之未嘗復行未嘗不知只這些子蔽隔不得知之未嘗復行只這些子爭差不得幾是這些子義是這些子充拓去幾之知義之精同之歸一之致也天地絪緼萬物化醇男女構精萬物化生天地之外无男女男女之外无天地醇之化者理之賦生之化者形之成只是一箇原无兩箇損三說主匪其以柔說説人其曰三人行則損一人惟下二人剛說之道為主非己說是主其曰一人行則得其友又惟上一人剛止之道為用非己說是用女惟從男男女又妙合乎天地故謂之致一之道人人有此致一之道用无不利而身安動寧括乎心无險陂而常易語寧懼乎相求以義而交定上交下交其寧諂與凟乎如此者以立心言所謂恒以思慮言所謂同所謂一所謂貞天下何思思此天下何慮慮此舍此无有不入憧憧私意路頭去朱子答門人徐居父人所以思慮紛擾只縁未見道理耳天下何思何慮是无閒思慮也又答劉履之若見得道理分曉自无閒雜思慮天下何思何慮不知有甚事可思慮也㫖矣子曰乾坤其易之門耶乾陽物也坤隂物也隂陽合徳而剛柔有體以體天地之撰以通神明之徳其稱名也雜而不越于稽其類其衰世之意耶夫易彰往而察來而㣲顯闡幽開而當名辨物正言㫁辭則備矣其稱名也小其取類也大其㫖逺其辭文其言曲而中其事肆而隐因貳以濟民行以明失得之報乾坤易之門緼與門皆指奇偶二畫言奇偶有體隂陽爻象之所立故曰緼闔闢互用隂陽往來之所由故曰門得其門者為誰羲文周孔四聖人之外或寡也乾陽物坤隂物兩儀生于太極而有對待故以門名亦以物名至于隂陽合徳剛柔有體以體天地之撰以通神明之徳庻幾得其門而入矣其稱名也雜而不越名即六十四卦之名雜即物相雜之雜不越非天地之撰即神明之徳初不越乎其門衰世之意作易聖人之意葢皆憂後世之衰而思以挽之治古之隆也夫易之變由乾坤之門而出往以之彰來以之察顯既微之幽又闡之皆闢其門而開之之義開而當名名實稱也辨物隂物陽物之有辨也正言擬之後言也斷辭繫辭明吉凶也如此則既備矣而又名不徒當其稱之也小其取類于隂陽也大辭不徒斷其㫖逺其辭文言不徒正又曲而中物不徒辨又肆而隠凡皆因貳以濟民行以明失得之報報曉也曉然開示使天下後世之人俱得遊于易之門也曰因貳以濟者民行之衰衰于不貞夫一而二以貳故因其疑貳不决而作易以濟之吉凶者言乎其失得天下之民行有失易為報之以凶天下之民行有得易為報之以吉故曰以明失得之報易之興也其于中古乎作易者其有憂患乎是故履徳之基也謙徳之柄也復徳之本也恒徳之固也損徳之修也益徳之裕也困徳之辨也井徳之地也巽徳之制也唐一菴氏曰履謙復上經三卦恒下經貞巽之首益巽在外反益為損井損在内反井為困皆可以表巽道之用故並取五卦以見意而直以巽終之履和而至謙尊而光復小而辨于物恒雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷居其所定體不動遷水却流行出去不窮巽稱而隠朱子曰稱如稱量稱物之稱隠不見也如風之動物无物不入但見其動而不見其形履以和行謙以制禮復以自知恒以一徳損以逺害益以興利困以寡怨困而能說得處困之道井以辨義巽以行權朱子曰天下道理只在聖人口頭偶説此九卦意思自足若更添一卦也不妨非謂九卦之外皆非所以處憂患也程子曰古今多錯用權字纔說權便是變詐或權術不知權只是經所不及者權量輕重使之合義纔合義便是經也作易者之有憂患為天下後世慮也即吉凶與民同患之憂患三陳九卦明君子反身修徳終身憂患之大端履徳之基基所以立第一在躬行實踐无履便是无基業之人謙徳之柄柄所以持人最不可盈无謙便是无欛柄之人次復一㸃真陽奮于重隂之下人之本木之根草之芽次恒知及仁守纔完固不傾移損言修只有減益言裕非有増困曰辨君子生于憂患小人死于安樂井曰地基與地俱畧不可摇撼移動底巽曰制制如刀之裁制布帛非巽順于理弗能履和而至和兌之說至乾之健行到極處謙尊而光坤上行為尊艮下處原光復小而辨于物一陽方生為小羣隂不能亂為辨恒雜而不厭震動不一為雜巽入有常為不厭先難方損之初後易既損之後長裕充長其固有不設无撰造撰造則為偽窮則水之涸身之困通則水之流道之亨居其所水在井中遷水之汲而及物稱酌量處置隠形迹不露和行行欲和不欲硬舉步常從容和緩方无顛蹶之患制禮退讓所以明禮是為禮之法則自知訓知猶主最當一㸃微陽兠根為主天下孰得而蔽昩之一徳始終如一逺害非一身之害與天下共逺之興利非一身之利與天下共興之歐陽文忠氏曰君子者天下繫焉一身之損益天下之利害也君子之自損忿慾耳自益遷善而改過耳然而肆其忿慾者豈止一身之損哉天下有被其害矣遷善而改過者豈止一己之益哉天下有蒙其利矣寡怨知命安分辨義自守得定是是非非必有以審其當權稱錘前却无定以等物之輕重而取于衡平非義精仁熟入細底人不能故論語以可與權為學之至易之為書也不可逺為道也屢遷變動不居周流六虛魏氏曰爻専指九六畫兼七八九六畫之見者又為位爻之變者又為虚虛從畫而為位位從爻而為虚上下无常剛柔相易不可為典要惟變所適其出入以度外内使知懼又明于憂患與故无有師保如臨父母初率其辭而揆其方既有典常茍非其人道不虛行前言典禮此言典要又言典常典當也經也法也謂天地人之常道極則也不可逺與不可須臾離同義屢遷變也變動謂更互移動不居謂不止定一處位本无體因爻始見故稱六虛不可為典要不可以上下剛柔為典要唯變所適上下无常剛柔相易變之所適无適而非典要非其无典要也其出入以度内外使知懼出以度人之外即所謂義以方外入以度人之内即所謂敬以直内出入内外无不以度无敢不懼不徒知懼而又明于憂患與所以憂患之故不有師保之臨即有父母之臨无時无處而不知懼也初率其辭而揆其方方即是度是典既有典常以典要為常原始謹初率其辭之所指揆其方之所向出以度外入以度内卦卦所適之變盡以典要為常而有其常爻爻所適之變盡以典要為常而有其常如是則得其人而道行故曰茍非其人道不虚行易之為書也原始要終以為質也要謂究其歸宿六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰徳辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要无咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪柔之為道不利逺者朱子曰近君則當和柔逺去則當强毅果敢始得易之為書原始要終以為質言卦六爻相雜唯其時物言爻質言體之純雜言用之變時物相雜之時之物爻各一時爻各一物其初難知初是卦之本始處其上易知上是卦之末終處初辭擬之随時物而擬諸形容卒成之終究竟不失原始要終之質若夫雜物撰徳辨是與非則非其中爻不備中爻謂中四爻又可雜撰為兩卦以卦必三爻下三爻上三爻固是兩卦從二至四三爻也成一卦從三至五三爻也成一卦无往不可雜之為八物撰之成八徳辨是與非言同一雜撰又有雜撰之是又有雜撰之非如屯中爻雜撰艮坤二雜坤以柔乗剛撰之非四雜坤以順應初撰之是五雜艮則屯膏而不得下撰之非三雜艮則舎止而不輕往撰之是擬初成上本末具舉慎辨其中是非不混言天下之至賾而不可惡言天下之至動而不可亂以此噫亦要存亡吉凶則居可知居即所居而安之居言不待變動而吉凶存亡亦无不可知以有原始要終之為質者在也故知者觀其彖辭所思已是過半而况並觀六爻之辭由初之難圖上之易悉得中爻同功異位多譽多懼多凶多功逺近剛柔之義天下之能事不既備乎易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉三畫之卦不曰爻以未有變動物相雜故曰文朱子曰隂陽相間錯為文若有隂无陽有陽无隂如何得有文胡氏曰卦舉始終而成體故曰質爻雜剛柔而為用故曰文六者非他三才之道才之為言裁也上裁而有成乎天中裁而有成乎人下裁而有成乎地合三為一故謂之三才中人以下自成其才者絶鮮不成其才先己不成其人又何以成其為天成其為地故曰罔之生幸而免也道有變動卦之二體有一定之象六爻相雜中爻雜撰便盡數變動是以謂之爻爻有等爻有上下貴賤之差等是以謂之物物相雜隂物陽物相為間錯是以謂之文文不當故吉凶生吉言得只是文得當凶言失只是文得不當當下當而吉便能盡其才當下不當而凶便不能盡其才人見其禽獸也而以為未嘗有才則豈易之情也哉易之興也其當殷之末世周之盛徳邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此之謂易之道也朱子曰要去聲要約之義平聲要其歸之意從平聲為長誠齋楊氏曰紂殷王仲尼殷後也貶殷為末世褒周為盛徳指紂之名而不諱稱文王之王而不抑不以一家之私沒天下之公也三分天下有其二以服事殷此便是周之盛徳曰殷之末世周之盛徳者否終則傾文王當此時而彖易直溯堯舜黄農而上以逺紹乎皇羲不𫝊之緒不使湮墜于末世故以言乎易之興也其辭危无一爻可易其道大无一物可廢總之懼以終始其要歸于无咎而已无咎者善補過也聖人要在无咎聖人懼以終始雖欲不為補過之圖不可得也五十學易可无大過聖人之危懼與文王同後世易學湮晦玩易忘危兢業本體不勝滅裂至于惡積不可掩罪大不可解百孔千瘡曽无處下手可補此无他只是慢易而不知懼或是始懼而終不懼夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻能說諸心能研諸侯之慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能八卦以象告爻彖以情言剛柔雜居吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生攻意向専到之意非攻擊之謂逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝吴氏曰相得則吉利悔亡无悔无咎從可知将叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈項氏曰六辭以類推之艮吉震躁兌叛巽疑坎喜陷為誣善離喜麗為失守或曰爻之隂陽外與始相與内與終實背去為叛疑謂隂陽均敵而无大小之差枝如木枝兩開游謂自知非實汎漫不常失其守謂陽失其専固則屈于隂隂失其承從則屈于陽王巽卿曰下繫推明乾坤至易至簡知險知阻示人且以知人之情偽結之與上繫言乾坤易簡之道而及于可大可久之氣象不侔上繫從畫前說起是夫子示人用易處常之道當為治世之意下繫從重卦說起是夫子示人用易處變之道故為衰世之意乾至健確然示人以易人能行其至健而有得于心而措之于行則不特易在我且恒易在我故乾之徳行為恒易乾本上下交于坤而成坎下則危圖之天一居下卦之以坎代坤皆乾之險也險易相反恒易是以恒知天下之險恒危于險而不陷于險坤至順隤然示人以簡人能行其至順而有得于心而措之于行則不特簡在我且恒簡在我故坤之徳行為恒簡坤本下上交于乾而成離上則難圖之地二居上卦之以離代乾皆坤之阻也阻簡相反恒簡是以恒知天下之阻恒危于阻而不困于阻恒易簡故能悅諸心恒知險阻故能研諸侯之慮侯即建侯之侯諸語辭研諸侯之慮坤順承乾人之有主之慮也乾坤合徳險阻盡平是以能定天下之吉凶而成天下之亹亹以此變化于或云或為之間擬言議動悦心研慮何事而不為吉何事而不為祥凡有吉事先兆以祥故曰吉事有祥凡事而有吉祥之象逺可以觀道近可以瞻器由象可以知吉凶之已成故曰象事知器凡事而有吉祥之占知可以蔵往神可以知來由占可以知吉凶之從來故曰占事知來吉凶之定定此矣亹亹之成成此矣天地設位聖人成能定吉凶成亹亹皆成能之事也人謀鬼謀百姓與能所謂聖人之成能亦幽明通知人鬼合謀成其百姓之所與能者已耳夫豈能人之所不能亦豈百姓不可以與聖人之成能者哉凡易之情近而不相得則凶或害之悔且吝或害其相得之道必有悔吝矧其全不相得而寧不謂之凶吉人辭寡以易簡五辭反是便都是險阻其辭雖六其别則二情偽而已矣像象管見卷六
