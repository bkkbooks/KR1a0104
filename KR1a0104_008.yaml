body:
  text: 像象管見卷八明錢一本撰序卦傳有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以茍合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以無妄有無妄然後可畜故受之以大畜物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恆恆者久也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷于外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後説之故受之以兌兌者説也説而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉像象管見卷八
