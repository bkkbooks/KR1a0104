body:
  text: 像象管見卷九明錢一本撰雜卦𫝊乾剛坤柔比樂師憂余氏曰在上而得衆故樂居下而任重故憂臨觀之義或與或求本義以我臨物曰與物來觀我曰求二卦互有與求之義屯見而不失其居蒙雜而著吳氏曰見者陽在上卦之天而位顯雜者陽在下卦之地而位幽初動于險內而固守曰不失其居上止于險外而光明曰著震起也艮止也損益盛衰之始也大畜時也無妄災也當剛止之時故能畜禍非自取曰災萃聚而升不來也謙輕而豫怠也朱子曰謙輕是卑小之義豫怠豫是悅之極便放倒了怠或音苔噬嗑食也賁無色也兌見而巽伏也兌隂外是巽隂內伏隨無故也不主于故時隨而隨蠱則飭也剝爛也復反也晉晝也明夷誅也井通而困相遇也以通與遇為反對遇塞而不通之象咸速也恆久也渙離也節止也解緩也蹇難也解則勢已寬故緩蹇則勢方急故難睽外也君臣朋友之道在外家人內也父子兄弟夫婦之道在內否泰反其類也君子以君子為類小人以小人為類君子泰則小人否小人泰則君子否大壯則止遁則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故也親寡旅也物盛則多事身寓則少親離上而坎下也小畜寡也履不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頥養正也既濟定也歸妹女之終也未濟男之窮也夬决也剛决柔也君子道長小人道憂也項平甫曰大過而下原其亂之始生于姤極其勢之上窮于夬自夬而乾有終而復始之義胡氏曰上三十卦終之以困柔掩剛也下三十四卦終之以夬剛决柔也柔掩剛君子不失其所亨剛决柔君子道長小人道憂矣然則天地間剛柔每每相雜至若君子之為剛小人之為柔决不可使相雜故于雜卦之末特分别君子小人之道言之聖人贊化育扶世變之意微矣鄧汝極曰文王序卦聖人更其序而為雜由乾坤而窮之于井困由咸恆而反之于姤夬明易之不可窮也序始屯終未濟望道未見之意雜始比終夬思見君子之意序不易者八反易者二十八雜正對者二十八不對者八六十四總以八為主不可得而易者也雜于乾坤後比師始井困終咸恆後渙節始需訟終餘八卦合為末局而以夬終作易聖人之有憂患其心同其道同比樂師憂晉晝明夷誅雜卦合為上局凡比皆晝而為君子之道故樂凡師皆誅而為小人之道故憂堯舜前皆樂之世晝也湯武後皆憂之世誅也比師井困之聫合將求比樂在疏井通欲釋師憂先安困遇升萃之居上雜中仲尼濳心文王之深思乎天下萃矣而大牲用焉岐亨矣而貞吉升階焉不以師憂易比樂不因困遇忘井通無取明夷之誅而思三接晉日之晝也其前大畜無妄曰時曰災後謙豫曰輕曰怠紂世春秋皆時為之羑囚匡圍非災如何聲色不大知能俱無且以為輕觀逸游田之不敢疏食水飲之晏如惟恐其怠也前損益曰盛衰之始才損便為盛始才益便為衰始後噬賁曰食曰無色食家常飯也無色布帛之為也震起艮止兌見巽伏先後聫合萃聚常聚是為乾坤合德萬古不磨之精神升不來不復來是為君子日進髙明並不究于汚下之事業困相遇坎剛自掩可與兌柔分過故曰相姤遇巽柔獨為主乾剛便似都無暫立處雜卦聖人繫姤于大過後另為一局顛而遇女即能待能終男不勝窮故終于夬决是為頥養正之人道既濟定之天道大有曰衆小畜曰寡同人曰親旅曰親寡同人旅之間猶為小過不親之末遂為大過聖人以無大過自期而謂有假于數年學易之功亦以此或目易為不緊要謂非學者急務不幾舉一世而盡顛之無復有正之日乎離上坎下一局終于訟之不親始于小過之過離上坎下即未濟之男之窮過為小過而顛為大過皆此睽家人革鼎相反為一局徹外徹內去故取新皆巽兌合離之時用大壯遁合于中大壯泰剛外長一畫謂之止外去二隂如為羝羊之觸立置之窮遁否剛內長一畫謂之退內來二隂不有臣妾之畜必速成姤是故君子以一剛要壯終遂成大有之衆皆壯止之力以一剛原遁始無失同人之親皆遁退之功剝爛也言熟也復反也則可以種之而復生也大過中爻重乾也姤即大過下體夬即大過上體雜以是終足之所投首之所舉俱以小人為憂也非憂人之為小人而憂己之為小人卒墮于未濟之男之窮也小過過也二體皆剛大過顛也二體皆柔雖四剛合處于中而本末不勝其弱凡似剛而實柔似公而實私似義而實利似大而實小皆是聖人以無大過自期亦深懼不免乎顛耳雜于乾坤成列後比師坤坎合晉明夷坤離合為第一局至大有同人乾離合為第二局至需訟乾坎合為第三局大過至夬為第四局又自乾至睽二十卦為外反為家人至夬二十卦為內外坤與坎離為合局內乾與坎離為合局乾坤以坎離為中坎離以乾坤為正外坤內乾欲天下之常泰始乾終夬欲天下盡人為君子無一不上達天德全體乾道而免未濟之窮也像象管見卷九
