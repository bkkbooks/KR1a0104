body:
  text: 像象管見易類提要臣等謹案像象管見九卷明錢一本撰一本字國瑞武進人萬厯癸未進士官至福建道監察御史以建言罷歸天啟初追贈太僕寺卿事迹具明史本傳一本研究六經尤邃於易是書不取京焦管郭之說亦不取陳摶李之才之義惟即卦爻以求象即象以明人事故曰像象象者天道像其象者盡人合天之道也大旨謂由辭得象而後無虚懸說理之病知象為像而後有神明黙成之學而深闢言象遺理言理遺象彷彿其象而仍不知所以為象之弊雖間有支蔓而篤實近理者為多自稱用力幾二十年亦可謂篤志矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀題辭易者象也易盡在畫也象也者像也則以為彷彿近似矣惟以像為理之近似但有其彷彿之謂而翼後之易遂亡以人不成像則立乎其中與行乎其中之意悉虛也夫易有太極是生兩儀聖人盖劈頭以乾坤兩畫為人儀合天地雷風水火山澤八卦為人象而敎人之實有像故曰八卦定吉凶吉凶生大業也然則像象義指亦畧可睹而性命精㣲舍是亦别無可容言之處矣本不肖萬厯癸未筮仕廬陵不敢謂能事賢友仁然竊聞仁賢緒論而知所嚮往于時塘南王先生輯有衛道編以辨異闢邪蒙山陳先生著有就正初稿以發明易道二先生間語不肖曰子有意于求明蓋進而讀易遂手易而讀之出入必于是寝食必于是積之凡二十餘年始于屯仍為屯終于未濟仍為未濟象則茫然而矧于像何能有一隙之窺然而半生之精力在此矣龜山先生云自漢魏以來以易名家者殆數千百人觀其用力之勤蓋自謂能窺天人之奥著為成書足以師世然其書具在不為士大夫譏評訕笑用覆醤瓿者无幾矣不肖曷不量而又踵是復竊自念譏評訕笑之來評所當評笑所當笑即可以求其所未至亦即可公己公人而與天下共求其所未至固不妨盡披其短拙疵謬之見于有道君子之前而醤瓿亦効一覆之用也第恐其為成都醤翁之瓿如井上之勿幕有孚并其覆亦无所用之萬厯甲辰秋九月丙辰毘陵錢一本題序測易本羲畫文王錯綜序之以成天地之至文是謂易興于中古子曰文王既没文不在兹乎盖伏羲以是授之文王而孔子以是得與于斯文者也其序𫝊宋王申子謂非聖人作不敢謂然因竊測之易首乾坤天地定位此人人之心量也乾坤中天地以交為坎離坤交乾隂麗陽中而成明南面而聴嚮明而治聖人之所取也乾交坤陽陷隂中而成險從初便有險陷乾道何以首出聖人有不勝其憂矣是故乾坤成列之後首有事于坎屯蒙坎與震艮遇屯雷從下以動上險動為滿盈之雷雨蒙艮從上以止下險止為時出之山泉需訟坎與乾遇以乾健孚坎險雷有光亨之吉訟有窒惕之吉師比坎與坤遇以坤順行坎險師為貞師之帥比為顯比之王小畜履乾與巽兌遇震艮二剛先坎有合以拯險巽兑二柔後乾有合以行健由是乾下坤中不為險陷之交乾居坤下遂成天地之泰泰豈一日之致哉屯蒙需訟師比之有六坎蓋所謂人心惟危天下萬世之所同險屯原初震動蒙要上艮止需訟皆乾為君師比皆坤為藏然後有畜有履而成泰向使六坎之險有一不渉求有天下之泰不可得己乾坤十變方泰泰之難泰一變即否否之易乾不交坤而否離以文明麗之于乾内外于是受之以同人大有坤不交乾而否艮以止入而貞之于坤内震以動出而奮之于坤外于是受之以謙豫隨蠱震兑巽艮之合由否泰變隨震剛來下兑柔亦以喜開泰蠱艮剛上巽柔下亦以幹傾否臨觀坤與兑巽遇兑後乾為履于坤則説順相涖而成臨巽前乾為畜于坤則巽順相孚而成觀噬嗑賁離與震艮遇動乎險為屯于離則雷電合章而成噬嗑止乎險為蒙于離則剛柔相文而成賁剝復坤與艮震遇剝謙之變否之極坤以止上闔復豫之變泰之初坤以動下闢无妄大畜乾與震艮遇无妄震以首動險次噬嗑明出入以動乎坤者而動之于乾下乾以動而加健見原始震動之功大畜艮以首止險次賁明出入以止乎坤者而止之于乾上乾以止而大正見要終艮止之力頥震艮之合坤在中爻大過巽兑之合乾在中爻坎離重坎重離之自合震艮巽兑在其中爻乾坤始坎離終天地萬物父母水火天地大用乾坤始頥大過坎離終六子父母之用之終是為上經之始終下經首咸山澤通氣少男少女之合一乾坤也次恒雷風相薄長男長女之合一乾坤也遯咸男為主而内止乾為外避矣大壯恒男為主而外動乾為内貞矣晉離出地坤下順以麗之明夷離入地坤上順以晦之剛止剛動之男用乾父遂若無其功柔明之女用坤母猶必致其役此剛柔男女父母内外之辨也家人離在内巽外入以假之睽離在外兑内説以合之離柔得中即坤柔亦必用其中巽柔兑柔又可知也蹇咸男内止以止險于其外解恒男外動以動險于其内蓋咸恒二體分于離坎之交離明固巽兌二柔之易合而麗坎險非震艮二剛未易止而免也咸恒十變有損益猶乾坤十變有否泰咸下女吉損固以説道上行乎恒從婦凶益固以巽道下下乎咸變損兑柔為内主恒變益巽柔為外主長少之柔交于内外以為主又聖人之所謹是故乾遇之説于上為夬之決剛之健巽于下為姤之包覆之量也坤遇之説于上為萃之聚柔之順巽于下爲升之時容之度也坎遇之説于上為困之亨不尚其口巽于下為井之寒泉受其入也離遇之説于上為革之孚匪革其面巽於下為鼎之黃耳行其實也自夬姤至革鼎而乾坤不經見于是震艮列而長少二男後乾以終事焉震自為合以雷則相洊而至匪徒震人而合以自震矣艮自為合以山則相兼而止匪徒止人而合以自止矣艮得其止巽為順之于外不言下女而有女歸之吉漸又咸之正感乎震得其動兑為説之于内不言制義而有以娣之良歸妹又恒之大義乎歸妹震動合于兑説也震動配以離明則明動相須而君上之家為益大故受之以豐漸艮止合于巽入也艮止麗以離明則止明相麗而之進于外為益貞故受之以旅于是巽兌列而長少二女後坤以終事焉震合以自動巽合以自入盖風雷相薄而分之則雷自為薄風自為薄各以動入為道也艮合以自止兌合以自説盖山澤通氣而分之則山自為通澤自為通各以止説為道也巽風之入柔不如震雷之動剛巽于隨風之後而風力厚其于坎險亦何所不渙乎且震在險下動之難巽在險上渙之易矣兌澤之説柔不如艮山之止剛説于麗澤之後而説體專其于坎險亦何所不節乎且艮在險上猶患其過擊説在險下惟患其不出矣屯蒙震艮于坎以原始渙節巽兌于坎以要終如是而坎猶為險人道无望其存乾坤无望其成列矣中孚小過與頥大過對中孚巽兌之合然三四得敵于其中渙節之餘險不在坎而即在于巽兊也小過震艮之合然三四失位于其中屯蒙之餘險不在坎而即在于震艮也坎與乾坤震艮巽兌交皆不名濟惟終與離交而後名之為旣濟坎離天地交之中離中一柔即坤隂全體之柔坎中一剛即乾陽全體之剛乾下交坤而成坎坎又為之上交于離坤上交乾而成離離又為之下交于坎離下交隂麗陽中而成明者要終无亢坤道原下以順承坎上交陽陷隂中而成險者要終有拯乾道原上而首出夫是之謂不相射而相逮為中天地而有交之濟以水火之濟成天地之交乾坤之能事備矣夭地之交曰泰一轉即否水火之交曰濟一轉即未濟否之日多濟之日少聖人之憂患无時而已故既濟之後受之以未濟終咸恒始中孚小過終震巽艮兊之交之始終合既未濟又為六子之用之終是為下經之始終例畧易者象也象也者像也象謂皇犧卦畫之象象又謂之像人兼天地為才全象皆備于人一畫有缺即不成其為人即不像其為象象在人人成像也皇犧立象盡意不待有辭文周繫辭明象即辭即象後世得辭遺象非其辭得象失像非其象夫惟由辭得象而後无虚懸説理之病知象為像而後有神明黙成之學或曰像者乃事理之彷彿近似可以想像而非真有實事或又曰易无此事无此理惟有此象此與言象遺理言理遺象彷彿其象而仍不知所以為像之弊並同四營成易十有八變成卦易成于四營故每卦中既具兩之儀又寓四之象爻成于三變故每爻必兼三畫以明變雜物撰徳辨是與非變在中爻亦變在六爻故爻言乎變言六爻相雜之變言中爻雜物撰徳之變耳若通九為八以變隂通六為七以變陽一卦皆可變為六十四卦極于四千九十六卦而備雖與易變原无不通然聖人初不以之言易也卦者掛每卦掛出一太極掛出一箇天地儀象于人身使戴天履地之人皆知有參天兩地之事業不渺焉以一身為身而以天地為身其義至為廣大是以聖人沒身未已如筮而得此卦觀此象玩此占此特人謀鬼謀百姓與能之一若士人而待占筮後學恐不勝其疎漏而何以能洗心何以能退藏于宻設无所事乎占一部易便與己都不相干矣且聖人明言易有聖人之道四尚易之辭以言尚易之變以動尚易之象以制器尚易之占以卜筮原不單以卜筮言易以卜筮言易謂莫尚于易占能占易者然後可言卜可言筮是之謂聖人之道之卜筮初非如後世京焦管郭之卜筮卜其所卜筮其所筮而流于䜟緯術數之小技也天地有闔闢有俯仰故卦有正反四時日月錯行代明于其中萬物生長收藏于其中故中爻有雜撰雜而不越故言天下之至􅄨而不可惡言天下之至動而不可亂卦論體要反兩卦看要分内外看要六爻總合看要中爻相雜看爻論主雖多以尊位論然兩體自各有爻主有六爻以一為主有六爻兼兩為主不單主五為尊爻亦不專主五言君道看易不得主爻全无頭腦都是鶻突説造化隂陽剛柔無截然為兩之理陽中必有隂隂中必有陽剛卦必多柔柔卦必多剛卦必三畫三才之義中爻雜撰亦必三畫无往非三才之義兩之而六六无不兩兩地之義六无不三參天之義上下體合而兩原是三中爻雜而兩亦是三無往非三六之中論兩體論中爻兩原通四四原通八以八物論中爻雖有是非之辨然爻必三畫以成物爻爻于八物相雜得成是為雜物以八徳論中爻雖有是非之辨然爻必三畫以成徳爻爻于八徳相撰得成是為撰徳但玩一卦但占一爻參兩之義天地萬物之理盡具于其中真是一卦逺不得一爻逺不得或目易為不甚𦂳要之書又謂易非學者急務等之于珓句籖詩孔翼後而聖學亡其久矣夫易道屢遷變動不居周流六虛上下无常剛柔相易不可為典要惟變所適乾上曰貴而无位今輒泥上爻為无位三五同功異位二四同功異位今輒泥初上俱无位需上曰雖不當位未大失今輒泥剛居剛位柔居柔位當柔居剛位剛居柔位不當是遷之不能况于屢是居之有定何以變何以動六虚板為六實上下既宜有常剛柔更不可易其為典要无變可適甚矣惡乎易惡乎易易言乘不是柔居剛上便為乘言承不是柔居剛下便為承言應亦不是初必與四應二必與五應三必與上應凡乘承應須看爻主又看中爻雜何物撰何徳與夫雜撰及不及凡易之情近而不相得則凶或害之悔且吝易有相近之情亦以主爻論目近爻為比爻此易之所无子夏易解贋本也疑出漢杜子夏漢費直本畫一全卦繫以彖辭再畫本卦繫以爻辭又畫覆卦繫以用九用六之辭後以一傳字加彖𫝊之首鄭𤣥本省去費本六爻之畫又省用九用六覆卦之畫移上下體于卦畫之下又移初九至用九爻位之文加之爻辭之上又合彖𫝊象𫝊于經于彖𫝊加彖曰字于象𫝊加象曰字王弼本同鄭但移文言附乾坤二卦之後加文言曰字以孔子賛爻之辭本以釋經乃各附當爻每爻加象曰字歴代因之是為今易漢藝文志云易經十二篇吕大防定為經二卷𫝊十卷晁説之釐為八卷吕祖謙復定為十二卷一以古為㫁是為古易嗚呼易本羲畫雖无文辭八卦相錯剛柔雜居之中郁郁乎為天下之至文乃宇宙開闢第一文字是之謂古耳若文周孔子之辭凡皆以明羲畫之象合于一處匪今釐于二處匪古今古詎在辭之離合間匪象之像而辭之求辭則古文而像則茫然翼後无易與刪後无詩等慨矣易畫有定象易辭有定指爻變而卦不變在爻象若有變在卦象原无變以爻為隨時取義如屯二匪冦婚媾原指五乃指初而曰初為賢明剛正之人而為冦以侵逼于人此是據二以柔近剛為義更不計初徳何如又如比三比之匪人原指上以承乘應皆隂為匪人而曰二之中正而謂之匪人隨時取義各不同也又如歸妹下兑體是妹上震體是歸妹者今于二曰女賢而配不良既以五為夫于五曰帝女下嫁又以二為夫四震男主爻也却亦目之為賢女此等去處盖六爻而嘗失之三四又卦必相盪爻必相摩如乾為天下之至健矣或有取于艮以畜其健或有取于巽以畜其健或有取于兑以和其健或有取於震以動其健餘卦可推盖以相盪相摩之得失見吉凶亦原无但以爻位之陽居隂隂居陽而遂有吉凶悔吝異占之説聖人賛易天地定位章明對待之體帝出乎震章明運行之序大衍之數章又明信手拈來之妙用皆以羲畫言易也易興于中古文王錯綜以序發皇羲之藴以敎萬世无窮之至文耳後人以圖説易如乾南坤北圖則曰此伏羲先天易如離南坎北圖則曰此文王後天易夫先後无二天羲文相授守一道文王固无改為伏羲卦圖之理又或将先後卦圖規之為圓以象天矩之為方以象地无論或圓或方即横亘豎列亦无不通顧易之所以為易未嘗不具于圖終非按圖以求之可得耳
