body:
  text: 像象管見卷二上明錢一本撰同人于野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利渉大川乾行也文眀以健中正而應君子正也唯君子為能通天下之志同人以離之一柔為主上為全乾之體此人人之天人人可應而同之理然柔不得位不應柔不得中不應惟離柔在于乾下得位得中應得全乾之體同得天下之人是以謂之同人同人于野亨以明體不為中爻雜物所蔽如天宇四垂之野人盡相見乎離人无不見人无不同矣夫是之謂同人之亨利渉大川以乾體不為中爻雜物所虧三四无爭乾行之體全離明之應合大川渉矣夫是之謂同人之利渉利君子貞合二五之中正言貞文明以健主二而以五中正而應主五而有二之應二明不自以為君子而以五之健為正五健不自以為君子而以二之明為正斯可以通天下本明之志而合之以為明可以通天下本健之志而合之以為健豈惟同乎人而不見其異乎人抑且同為君子而不見其獨為君子夫是之謂君子之正夫是之謂同人之利貞象曰天與火同人君子以類族辨物類力遂切等也天上運火炎上一氣相與同人之象君子以類族辨物非其族者非其與族不可與惡乎同類者類其族之所與而勿失其同非其物者非其與物不可與惡乎同辨者辨其物之所與而勿失其同族物覆如天類辨照如火初九同人于門无咎象曰出門同人又誰咎也又誰咎也節三與此同解三義畧有異文明應乾之主在二初在二下象入而闢于門内之人如不為出又象分立門户之人明體審初陽性上進闔而能闢入而能出雖在門内其于門外諸君子惟見人可與同别无門可為異是為同人于門无咎之象初門有出三四无争咎者寡矣象故明曰又誰咎六二同人于宗吝象曰同人于宗吝道也二以一柔處五剛之中惟五之正應是同如親己則同之不親己者不同也同人于宗之象其于應與諸君子之意似為可少吝象然二守其己之中正于已原虚于五剛原應但親己與否在人而已原无可以泛同于人之道象故以為道九三伏戎于莽升其髙陵三歳不興象曰伏戎于莽敵剛也三歳不興安行也莽莫黨切草生廣野莽莽然故曰草莽安行與危行反項氏曰安行安分而行不可危危行危懼而行不得安三四雜巽于二五之間四失健忮而攻二三失明忮而敵五離戈兵為戎巽隂木為莽巽入又為伏伏戎于莽之象巽為髙巽而上逾四進五升其髙陵之象自三之五為三歳五中正如之何其可敵伏莽之戎到底不可以興三歳不興之象三剛本與五同乃反忮五成敵象故曰敵剛至于三歳不興終无可興之日髙陵之升皆乾行之易地无大川之不渉矣象故曰安行九四乗其墉弗克攻吉象曰乗其墉義弗克也其吉則困而反則也三升陵欲逾四敵五四乗墉欲乗三攻二四忮二之同五而不同已以四之髙乗三之上乗其墉之象巽不果弗克攻之象但弗攻明健遂合吉同人中正之則原自在五四五同體反而則五卽不失其所同四困于攻二以為同象故明其弗克之義反則之吉九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也號呼咷哭聲以中直困五同五二中正而應從先視之中在五二自无不直争在三四猶若未直以二若先以明號五以五若先以健號二從後視之三戎不興四墉无攻三四既夷五二有喜同人先號咷而後笑之象大有以二應五曰大車之載同人以五應二曰大師之克克之義匪以克人而惟自克屈其在已中正之乾健受其在人中正之文明匪天下之大勇如五之至健不能有五之克豈惟于二為合一切伏莽之戎乗墉之攻盡行銷衂合陽大諸君子之衆更无有不合大師克相遇之象爻言克相遇而象并以相遇言相克匪五一人之克匪五二二人同心之克能使人盡相遇非人盡相克不能克則俱渉同人之川遇則通為君子之正唯君子為能通天下之志而无不同葢以此上九同人于郊无悔象曰同人于郊志未得也志未得謙上困五同同人至五通天下而相克相遇有君子之正无不得之志上出五外健亦在我于人何所不同文明之中正未應雖同實距百里同人于郊之象以自无失故无悔雖无三四相爭之失尚鮮五二相克之遇象故又言志未得大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨彖于屯随臨无妄升革元亨皆釋為大亨大有蠱鼎仍為元亨呉氏曰以陽為元釋為大以隂為元皆不釋為大或謂元亨重于大亨者非俞氏曰大有若以九居五則為乾之御天矣不止應天也鄧氏曰卦以大名者四以小名者二全半之等也同人柔得位得中而應乎乾主應者言大有柔得尊位大中而上下應之主應之者言一柔得位之尊得大之中五剛合而應之五剛之大之有皆為五所有有安得不大是以謂之大有大有之有匪以其有言有而以其德言有乾剛健離文明合而成五之德故曰其德剛健而文明五所居剛健中正之天位五以文明應天之剛健而時時與天合行无時而非文明之應无時而非剛健之行上下之應五如是五之應天時行又如是故能亨其大有而從初无失是以元亨象曰火在天上大有君子以遏惡揚善順天休命火在天上燥萬物之功與天同運竝天之大大有之象天有休美之命淫必禍之善必福之火為南方之行无物不毁无物不化君子以遏止人之惡如火之有毁顯揚人之善如火之有化一遏一揚皆以順天休命休命之順與天合遏揚之權與火合初九无交害匪咎艱則无咎象曰大有初九无交害也大有之世上下皆以應五為有初小民其于天子成賦中邦惟正是供之外原不以有相交有交害如三五雜撰為兑毁便是交之害初遠五无交害之象即私其有匪初之咎又曰艱則无咎艱是善保其有食以時用以禮正供于二合載于五永為天子樂樂利利好義終事之民則无咎不艱不期驕奢而驕奢至不期敗亡而敗亡至二有載初將不繼亦安得為无咎大有初九剛明善始君不求其有于民民不交其有于君君民兩无不有而兩无所害象故明曰大有初九无交害也九二大車以載有攸徃无咎象曰大車以載積中不敗也載作代切舟車運物曰載乗也承也勝也同人之五以乾大自上而克稱大師大有之二以乾大自下而載稱大車二五正應如為國藩屏為民牧養列侯以正中取之初有制積之二无過不及常中以載以中為載之象有攸往以其正中應五大中成五之有而又成五之大是以无咎初无交害二以所積之中往五善成其有亦有何敗象故言積中不敗九三公用亨于天子小人弗克象曰公用亨于天子小人害也亨許庚切易中亨享字俱有辨不可以亨作享三上公之位視二之中為過公用用二一切納貢之禮不徒以有輸君恒用二之中以為中用二之往以為往不惟以有相成而更以大相成何用不亨公用亨于天子之象若以居下小人而有公之用撰毁折于乾離之中言有无于豐盈之世以民必竭健之力以君必蔽離之明小人弗克之象弗克便是有交害象故明小人害九四匪其彭无咎象曰匪其彭无咎明辯晳也彭歩光切晳从析从折誤或曰晳與晰同音制彭或以車言或以馬言皆衆盛之義四剛爻明體合同功之二承大中之五絶不以車馬衆多人民繁阜財貨充盈稱天子之盛事以下則惟明德是宣以上則惟民艱條奏匪其彭无咎之象天下惟有易以叢害召敗四剛明用事兑不能雜既辯害之端又晳敗之故辯而又晳无愧其為明矣象故曰明辯晳六五厥孚交如威如吉象曰厥孚交如信以𤼵志也威如之吉易而无備也備平被切邵子曰左旋右行天日之交也豐六二亦云信以𤼵志五以中虚文明應全乾之剛健為孚不言有孚言厥孚匪一人之孚而上下之孚匪一人之交而上下之交合上下之有以相交合上下之交以成孚厥孚交如之象既成有之象又成交之孚上匪恃位以為尊下則惟載之恐後威如之象孚如是威如是交以天下而无害載以天下而无敗吉惟五有虚中之信而衆陽遂无不應之志應在上下𤼵其應志在五象故言信以𤼵志易乃乾德合乾易之德而有之于五安用有備以保其有象故言易而无備上九自天祐之吉无不利象曰大有上吉自天祐也祐音又神助也通作右祐者助下之應五象人之所助上之應五象天之所助上天爻德與天合五有虚中之信上履其信以為信五有麗剛之順上思其順以為順又居五之上不敢自尚而尚下四剛之賢與之合成剛健全體之天道如是以祐五于上安得有不吉安得有不利是為自天祐之吉无不利之象合五剛之大之有以應一柔之有而无不成其所有之大有至上而无以上是為大有之上吉謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也呉氏曰謙屈已下物也既貶抑其尊甘處物下又推遜卑者使居已上内止退已而不進外順讓人而不争所以為謙謙亨謙有天道下于坤下者艮艮光明天道下濟而光明之象謙有地道上于艮上者坤艮山髙坤地卑坤行艮上地道卑而上行之象下濟光明謙有天道之亨卑而上行謙有地道之亨謙與盈反以天道言虧必在盈益必在謙以地道言變必在盈流必在謙以鬼神言害必在盈福必在謙以人道言惡必在盈好必在謙盈如彼謙如此亨可知君子有終謙主在三自其位于下之上象謙尊尊而不光何言有終今則實有艮之光自其位于上之下象謙卑卑而可踰何言有終今則止有定則而不可以踰是為君子之有終象曰地中有山謙君子以裒多益寡稱物平施裒古易文作掊或作捊取也稱平聲施去聲地中有山莫髙匪山而有于地中髙不自多以卑自處謙象髙卑之度即多寡之數多在已不敢自有寡在人以已下之君子以裒多益寡之象山髙地卑未得為平以平地藴髙山物物稱量其宜而均平其施无使有一物之不平君子以稱物平施之象初六謙謙君子用渉大川吉象曰謙謙君子卑以自牧也謙主三止初前有坎三象隱伏地中之謙初象隱伏坎下之謙處謙之初謙三之謙以君子之謙為謙有止之則无陷之失謙謙君子用渉大川之象是為謙初之吉三且以髙山之則自處于卑初更卑處安得不守三之卑則以自治象故曰卑以自牧六二鳴謙貞吉象曰鳴謙貞吉中心得也二三以近相得三如震動二即賡鳴三以謙倡二以謙和以鳴則貞以貞則吉二中鳴出中心與三應和得來非由勉強象故明中心得九三勞謙君子有終吉象曰勞謙君子萬民服也俞氏曰萬盈數一陽五陰之卦多言之如懷萬邦建萬國之類事功曰勞三以一剛為止主于上下五柔之中舉世莫尚其功其功如山之為髙却又卑處地下隱伏不見施伐盡忘勞謙之象下濟則下二爻止而服于下依三以有終上行則上三爻順而服于上依三以有終上下皆可據三為定則君子有終吉之象以一剛而止衆柔合衆柔以服一剛象故曰萬民服六四无不利撝謙象曰无不利撝謙不違則也三下止為艮反上成震四以卑體動而上行行无不順无不利之象撝如撝軍以退之撝四雖進行三上惟有反以則三是順是遜而極其退譲以為謙撝謙之象象故明不違則六五不富以其隣利用侵伐无不利象曰利用侵伐征不服也泰四不富以其隣四虚失順之實又以其三將以隳君子用世之志謙五不富以其隣五虚无踰之心又以其四欲以顯勞臣髙世之功非但不富四四如為坎上爻唯三是乗四首不服何言萬民是故隂為不服則濳師以掠其境利用侵顯為不服則聲罪以致其討利用伐五三同功以震上行利用侵伐之象侵伐用而則在三順在五能以謙順中道利天下无不利之象上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也二近三而鳴鳴于止下謙以止貞故曰中心得上應三而鳴鳴于動上謙以動震非三隱伏地中不伐不德之意故曰志未得征者上伐下征以正其不正以坤之衆踰艮之止相率而為違則之謙邑國之不正孰甚上之謙原以應三鳴邑國盡聞故亦利用三則以行師邑據四而言國合五而言四如踰三邑非其邑五如富四國亦非國坤衆為師震動而起為行為征四五兩爻皆以震行後正利用行師征邑國之象謙初用渉大川以三之止為用謙五利用侵伐謙上利征邑國取正于三而止處三之下无三之止非君子之謙之終處三之上踰三之止非君子之謙之終上應三要終能正象故特明之曰可用行師征邑國也豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉彖言大矣哉豫遯姤旅言時義隨言隨時之義坎暌蹇言時用頤大過解革言時楊敬仲曰六十四卦皆時也皆有義也皆有用也皆大也聖人偶于十二卦言之耳愚者執其言智者通其意豫剛應而志行剛无不應不行之志則豫順以動順積于先動成于後順以為動動无不順則豫豫順以動故天地如之天地如我之順為順天地如我之動為動也而况建侯行師豈无攸利建侯坤為民衆四固出震之長子建四為侯大得民矣利建侯之象行師坤為師衆四又帥師之丈人以四行師天下順之矣利行師之象夫子𤼵彖極言天地聖人順動之道以盡豫之時義日月不過而四時不忒順動之象在天地刑罰清而民服順動之象在聖人順動以時故豫之時為大順動以義故豫之義為大象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考奮翬也鼔翅輕疾也揚也鳥張羽奮奞也奞音迅雷在地伏藏而无聲雷出地奮𤼵而有聲故云奮殷於巾切作樂之盛稱殷地有順德雷從地出其聲奮迅有翬揚其順之象故為豫樂震雷𤼵動之聲樂由陽來故先王以之作樂德坤厚積累之功德以樂彰故先王以之崇德作樂崇德言作一代之樂以𤼵揚祖考順動之德而尊崇之殷極其盛而言盛至于薦上帝配祖考非以一人之豫通為上帝之豫而以祖考之豫通為上帝之豫見天地之心惟伏地之雷薦上帝而天神格配祖考而人鬼享惟出地之雷復極其閉關之固豫極其𤼵揚之盛彖易聖人俱以先王示人深矣初六鳴豫凶象曰初六鳴豫志窮凶也雷從地出四動原根初順出雷自𤼵聲地自鎮静四動有得初順无失是謂志應四動初動雷鳴地鳴豫不可鳴如地不可震凶動出于外順窮于内四志首无應于初象故以為窮六二介于石不終日貞吉象曰不終日貞吉以中正也以中正晉二同雷出地奮全地震動初雜艮不及便鳴二雜艮撰止這一介動幾止則石雷不能驚介初无其鳴介三无其盱介于石之象動則雷艮不能止无須臾之不斷决无頃刻之有凝滯不終日之象日出震終坎二在坎下而不終日正无固于二矣是以貞吉二中正天根深固動作于外順貞于内象故明以中正六三盱豫悔遲有悔象曰盱豫有悔位不當也盱香于切雎盱小人喜説貎張目上視為盱三承四近爻于己之順无貞惟四之動是視是之謂盱盱既有悔四已動而有作三復待而不前是之謂遲遲又有悔盱與介于石反遲與不終日反象言位不當者此九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也盍胡閤切簪側吟切又作含切首笄晁以道曰古冠服无簪程廽曰弁服之笄四以動主為大塗動由順出能由其道而豫能使人由之而豫由豫之象以一剛有五柔而得其應不惟于已有得能使五柔皆得其得大有得之象雜坎若似有疑震行原无不决五柔以四為朋順相求動相觀聚首而盍如簪之盍于首勿疑朋盍簪之象謙三艮止人无不服言功豫四雷動人皆為震言志謙三成艮歸坎一卦盡順其止是為有終豫四轟雷出坎一卦盡順其動是為大行象故明志大行六五貞疾恒不死象曰六五貞疾乗剛也恒不死中未亡也五舉爻豫賁大畜離姤損豐巽凡八又凢言疾者四有喜者三不死者一二貞吉以順五貞疾以乗五以乗四為貞不由四動其何以豫貞疾之象剛柔相應恒震反生反乗為應履動思順震動𤼵生之意油然有生雖疾不死之象五中恒則尚得順動之道故爻言不死而象明未亡夫恒乃不死一不恒必死中故未亡一失中必亡五未死亡恃有中在上六冥豫成有渝无咎象曰冥豫在上何可長也五以乗四之動為疾上以遠四之動為冥上冥暗且終日為成履震之極為有渝五恒坎疑終在僅不死上渝坎以震出朋簪速盍又无咎謙三止主不及三非其止過三非其止故三之下有渉有貞三之上有撝有侵伐之用有邑國之征豫四動主不及四非其動過四非其動故四之下介為吉鳴與盱皆有凶悔四之上又不可以貞不可冥而莫之渝謙五言隣上下皆君子之交豫四曰朋上下皆盍簪之好以謙服民者謙三之剛止餘五柔五民以豫盍朋者豫四之剛動餘五柔五朋民所服惟入地之山真能下人之君子朋所盍惟出地之雷大有震世之君子乗謙主者冐非侵即伐之罪謙民之所共誅乗豫主者為非疾即死之人豫朋之所不盍君子可以慎所處矣隨元亨利貞无咎彖曰隨剛來而下柔動而説隨大亨貞无咎而天下隨時隨時之義大矣哉隨兑柔在上震剛來居其下有剛來而下柔之象動而説震剛為動兑柔為説有以説隨動以柔隨剛之象卦所以名隨初上爻主主初為動要上有説進于五二之中二動以中五説以中上下相隨无隨不亨是以元亨隨不失正是以利貞既亨且貞時動則動時説則説无時而有動之失无時而有説之失是以无咎隨而要于无咎隨當其可是為天下之隨之時是為天下隨時之義隨義在時震出必期于説成外説必孚于内震一日之隨之時由是一嵗之隨之時由是聖人極贊隨時之義之大示人之愼所隨至矣象曰澤中有雷隨君子以嚮晦入宴息張子曰人之有息蓋剛柔相摩乾坤闔闢之象雷𤼵聲于震收聲于兑澤中有雷雷隨時而收聲隨象君子以嚮晦震日出之時為嚮明兑日入之時為嚮晦天心震動之生機涵于雷人心震動之生機涵于息隨陽為呼為生息隨隂為吸為止息入宴息與晦俱入得其所安如雷收聲于澤中凡人情識未忘習心未洗稍有絲髪外馳而不能入纎毫駘蕩而不能安雖終夜宴息在牀只是馳逐竝不可謂之入宴息隨宴息于晦所以養一日出震之生機而使其无弗説復閉關于至日所以養一嵗出震之生機而使其无不順初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也初剛來下柔之主稱官二三以柔成係初動无渝正動不在初失其為主矣惟无係而有渝方始无不正之動方始不失其為主官有渝貞吉之象同人之初以二為門隨初以二三為門初但渝于門内非出交于門外亦安保其不失初動于門能出初出于四有交君子之麗澤廣二三无係婦女之檢柙融豈曰无功出門交有功之象有渝門内之隨初本正二三以柔相係所從恐不得正渝然後正象故明其從正之吉有功門外之隨兩剛相求日起之功必得之道象故明不失六二係小子失丈夫象曰係小子弗兼與也二三視初方在門内尚未出震稱小子柔不利遠專一以近為隨稱係二以門内小子之正為可從門外丈夫之事非所與係小子失丈夫之象與子有餘與夫不足二若安于兩不能兼象故明弗兼與六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也三以近係四下舍初係丈夫失小子之象二係初貞動之官无事于求三係四撰止之夫不求則不得矣然四是剛爻説體三如巽而有求四必説而能得豈不相隨而言得隨有求得之象求四之説忘己之貞未利也以説求四以貞自居无不利矣利居貞之象象明志舍下三志專于上巽若視初在下為可舍亦猶二之弗兼與之意九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也三隨曰有求四隨曰有獲有獲因于有求丈夫剛立之義何在獲非其獲貞非所貞凶五嘉以説成孚初渝以動為道四以近五有其孚以應初在其道二三有係有失四為止主合以而進之光明俾隨夫隨子而皆得如是三无得而有求又何得而有咎初有出交之功四有以明之功明之功不下于出之功象故曰明功九五孚于嘉吉象曰孚于嘉吉位正中也婚曰嘉禮配曰嘉偶五以二動為嘉自二言居能下之體无敢下之意弗兼與乎外自五言意必相下動必相説説非動不成外非内无助實嘉與乎内孚于嘉之象五二孚内外遠近之相隨何莫而非嘉之會吉夫不可以隨婦而善在所當從故五不言隨而言孚象言位正中位剛之尊爻正中説之中德上六拘係之乃從維之王用亨于西山象曰拘係之上窮也姤上九巽上六亦曰上窮二係隨子三係隨夫上係隨君上與二三皆民上為首二三為從上三應爻上下聮合惟五是係既如艮手之為拘拘之不足又如巽繩之為維拘係之乃從維之之象兑下有艮為西山五西山之王上與二三皆西山之民王之所隨惟善民之所隨惟王无動弗説无動弗隨西山王業之震起皆用此維係説從之民以為之肇造王用亨于西山之象象言上窮言民心至上更无所往非固結之而自不解以是為隨道之極蠱元亨利渉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利渉大川往有事也先甲三日後甲三日終則有始天行也皿蟲為蠱又惑也又穀久積變為飛蠱先後皆去聲㳺氏曰辛丁二義若隠語然豈所以為易乎蠱之象艮剛上而巽柔下柔巽于下既象不果剛止于上又象不為是以日入于亂而謂之蠱蠱元亨非蠱有元亨之義謂治蠱而得元亨亂極為治貞下起元有渉大川之利則天下盡易而為治有先後三日之甲則天下盡易而為治如之何其不亨大川以中爻兑澤為象巽初柔前有大川未易往合二而以剛巽下乗巽木上出澤口不為二貞更去四吝如是其有事乃无所往而不利是為渉大川之利甲日以中爻震木為象二三皆剛巽之爻二一巽蠱之大川已渉三再巽蠱之甲日更新先乎巽入有震三爻在其中為能震動有為以飭于先而起下之巽後乎艮止有震三爻在其中為能震動有為以飭于後而成上之止是為先後三日之甲蓋蠱為天下已亂元亨是易亂為治了彖故明蠱元亨而天下治主初為巽柔不利遠進二而巽剛足以勝彖故明利渉大川為往有事自巽至艮艮則止矣豈非天行之終震甲即寓于巽止之中可見亂之終則治之始蠱壊之終則飭治之始匪曰人事當然之理實亦天行必然之數彖故明終則有始為天行象曰山下有風蠱君子以振民育德山下有風非如風在天上地上水上皆行而无阻乃旋轉山下為山所阻鬱而不暢之風蠱風族風鬱而山木生蟲蠱象民无振則風俗啙窳而有蠱君子以振民風在下而振動山木之象德无育則人心惑亂而有蠱君子以育德山在上而涵育風氣之象初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也幹古案切木之正身又為築墻之木呉氏曰凡有智力能成立其事皆謂之幹蠱上稱父以止處上不復有為故稱父蠱天下事非貞固不幹巽木震起挺立山下皆幹之象初去上遠巽初柔下于子未可言有以先二三而上巽二三剛有其事初柔有其意意在事在皆可稱子有子之象考成父有成德稱考有初之幹要上之成子之有父之有子之成父之成考无咎之象初有大川在前劈初知危要終利渉厲終吉之象父終止意專屬于子之善承初无剛果之才已有巽入之意于父意遂承得來象故曰意承考九二幹母之蠱不可貞象曰幹母之蠱得中道也五柔止于門内象母之有蠱二以剛巽五幹母之蠱之象貞止于為兑而説于内无能為震而動于外止以五中為止不要上止為止大川之利渉謂何先後三日之甲謂何上殊不以為可不可貞之象二剛巽之中以説承震自内自外次第整飭得起象故明得中道九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也上剛止三剛巽巽之究恐有躁之失震之始即有動之悔幹父之蠱小有悔之象原于上意為无失无大咎之象初厲渉大川之事三悔先後甲之心初稱考父原有德之辭三小悔盡其在小之辭象故明終无咎六四裕父之蠱往見吝象曰裕父之蠱往未得也四應初巽以承上止兩柔相巽于蠱能寛而未能幹裕父之蠱之象裕而來猶象有為裕而往便象終止往必見其可少殊无得于父意象故明其往未得六五幹父之蠱用譽象曰幹父用譽承以德也二視五稱母五視上復稱父五用二中以承上止從二言原多譽從五言以震履兌聲名震動天下説順合而成上之譽幹父之蠱用譽之象五之承上惟在用二則二之中道盡為五用豈惟能承父意五上合止一體有光若一德相承然象言承以德者此上九不事王侯髙尚其事象曰不事王侯志可則也五尊位以天下言為王中爻撰震以一國言為侯上出其外而終有所止不事王侯之象上止五既依之以止巽以震出亦終依之以止上非自以為髙惟王與侯无不尊尚上止以為止髙尚其事之象方曰不事又曰其事下在事中操巽之權以幹蠱有事固為其事上在事外體艮之止而髙尚不事亦為其事上之止而不事即下之巽而有事之則象故明其志可則蠱以家言上父五母衆爻子以國言五君下四爻事事之臣上一爻不事事之臣雷動澤隨隨以初動為主風感山應蠱以初巽為主隨上説而隨動之民從初出震進于五説之中則君道盡而民心為益固不然必失其所以為君蠱上止而受巽之父從初有巽進于五止之中則子職盡而父德為益光不然必失其所以為子隨初小子門未出已有震世之思四明正其合德之交若二三雖震體而夫道則有所不存以柔而撰止蠱初有子幹未成已有昂霄之志四裕非其同志之助二三雖巽體而母蠱不可貞其事以剛而撰震隨初有渝能貞二三之係此所以稱官蠱上髙尚更貞四五之動此所以稱父隨五孚嘉而天下无不維之説民見世不可无下民之君蠱五用譽而天下无不考之止父見世不可无巽父之子此二卦反對互𤼵之意臨元亨利貞至于八月有凶彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也復曰剛反又曰剛長以震剛反生言長臨曰剛浸而長下兑本柔以剛爻積漸言長柔浸長于上四剛无竝立共存之理故遯剛浸長于上四柔有包涵徧覆之心故臨卦體下説而上順二剛中而五應下有説上有順人説而天必順之通道也臨有天道之通是以元亨二以剛中感五以柔中應又人感而天必應之正道也臨有天道之正是以利貞天道春生秋成震長兑消復以初為震主屬少陽為七位于東為日于剛卦為長剛長之體來之于坤下是為七曰臨以三為兑主屬少隂為八位于西為月于柔卦為消柔消之體至之于坤下是為八月爻則浸長喜其亨喜其貞體則八月虞其至至則浸長之剛爻化為頓消之柔體豈无凶至于八月有凶之象復之七日言來自内之來反復而來臨之八月言至自外之至頃刻而至月令八月水始涸當始涸之時令澤水長必浸消必不久以其長浸而消驟彖故明消不久以説臨人與以震修身異致既恐順反乎坤又恐即説成毁八月有凶之戒示人深矣象曰澤上有地臨君子以教思无窮容保民无疆思息嗣切澤上于地澤蓄聚于地為萃澤上有地地臨制乎澤為臨君子以教思无窮不徒曰教而必曰思如澤之漸入于地中无有窮已之時容保民无疆不徒言容而又言保如澤之四周于地外无有疆域之限初九咸臨貞吉象曰咸臨貞吉志行正也初二之臨皆象咸初以剛正之説道與四咸應相與以為臨初咸以正四應以正上下皆以正相臨是之謂咸是之謂貞而得其吉初咸志在與二同行其正有正已而物正之志象故明志行正九二咸臨吉无不利象曰咸臨吉无不利未順命也二五相咸尤進于中二以剛中感五以柔中應中在二既无所失能行二中在五又无不利二説五順五能以順應二故以説感此豈順命之説若二咸止是順命之説安得吉安得无不利象故言未順命也六三甘臨无攸利既憂之无咎象曰甘臨位不當也既憂之咎不長也三所居在二剛浸長之前既欲不逆二剛于後又將自説三柔于先咸无心而甘有意進退俱所不可甘臨无攸利之象撰以坤惟剛是順撰以震反説為懼恐懼修省于説順之交而甘臨之過方善補既憂之无咎之象象明咎不長者此六四至臨无咎象曰至臨无咎位當也至謂致初來至初志行正正則行不正不行四能至初能行其正可知至臨无咎之象四所居下有以順行正之賢上可以對行中之主象故曰位當六五知臨大君之宜吉象曰大君之宜行中之謂也四通道于初象至五虚中應二象知觀以五中為大臨以二中為大虛五之中以行二中非已之宜而二之宜君道如五既成其大又无不宜故吉坤无不順又益以説似非大君所宜五以宜言謂不自為中而能行二中乃所以成其大成其知象故明行中之謂上六敦臨吉无咎象曰敦臨之吉志在内也二剛在内上遠而无應以坤重坤厚為五遂亦應二厚為四遂亦應初若兼五之知四之至而有之吉无咎之象上已處五之外无四之位而志不忘浸長之賢惟恐其有不至惟恐其不能知此所以有五之吉而又與四同其无咎也觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣觀卦爻俱平聲惟大觀在上中正以觀天下二觀字去聲觀通作觀仰鳴則晴俯鳴則隂震為鶴陽禽巽為鸛隂禽盥古滿古玩二切顒魚容切仰首而觀曰顒躬行于上風動于下為化觀之名卦但以四隂觀二陽取天下觀化于上之象卦名連彖辭與履同人艮同夫子𤼵明先自上之觀示始大觀在上以位言順而巽中正以觀天下以德言凡賔祭之禮潔手以獻為盥備品味以享為薦盥惟致其潔致其誠薦已備其物備其禮觀五以巽潔之體居在上之位備中正之德其所以觀示天下原是誠在物先敬在物外故下之所以仰觀于上惟觀上之盥而不待觀上之薦有孚顒若言觀盥已有孚已顒若不待觀薦而後孚後若感應神速彖故謂之下觀而化謂之神道之服以觀象原與天道合其神巽風運于上天有神道之象坤順成于下四時不忒之象觀天而知聖人不薦之教便是聖人風運无形之神道顒若之服便是四時自行之順令若下待觀薦而後孚上必以薦設教而後天下為之服則不足以言神又何足以語化彖言神爻言生惟神則生惟生亦神按神道設教之㫖義如觀卦後世乃有如王欽若杜鎬引以誤宋眞其罪不可勝誅矣象曰風行地上觀先王以省方觀民設教風行天上以其風力畜止天運之健曰小畜風行地上以其風力遍歴地勢之順曰觀先王以省方觀民設教教因其民亦因其方如地之有宜方皆有教省之觀之而以身設之如風之行地初六童觀小人无咎君子吝象曰初六童觀小人道也大觀在五柔小在初不得其門而入无能逺見五之中正之美童觀之象初本民分故曰小人惟上所化由之不知何咎之有小人无咎之象五欲通天下為君子以君子望初不徒以小人望初君子吝之象小人原不可責之以逺大之觀象故明曰小人道六二闚觀利女貞象曰闚觀女貞亦可醜也闚鈌規切閃也傾頭門中視也通作窺二本坤闔之爻又在艮門之下僅從門隙而闚覘中正之彷彿闚觀之象女未從人以不出門為正以不失正為利利女貞之象象言亦可醜亦之為言因初吝之辭五以婦順望二不徒以女貞望二也五中正以觀天下欲使人進君子之道人明婦順之章故吝初而醜二然能使初二无小人之咎有女貞之利下觀之化神道之服亦无以加此已六三觀我生進退象曰觀我生進退未失道也初二皆下觀之民三合五成艮遂為一體稱我坤純隂艮則為陽坤隂盛艮則為止隂止而陽生暗去而光生稱我生當下上之際進門闕之中可出可入觀我生進退之象三五同功進則生五之生而君子之道行三上應爻退則生上之生而君子之道明槩非下民之可疇象故明曰未失道六四觀國之光利用賔于王象曰觀國之光尚賔也四巽門闕之中為王國艮光明舉一國而化光三象君子之光五象天子之光四進而觀其中觀國之光之象二未出門而事五守民之分以貞為利四已入國而事五有臣之道匪賓亦弗自重利用賓于王之象抑又以見惟明王然後能賓臣象言尚賓五知重四而四知自重皆可以風天下而成觀故足尚也九五觀我生君子无咎象曰觀我生觀民也五上君子无咎與初小人无咎同義三觀我生通五為我以德合五之大觀為我生五觀我生通天下為我以徳合天地之大生為我生中在我以中觀天下能使人巽于中則于君子之分為无歉正在我以正觀天下能使人巽于正則于君子之分為无歉君子无咎之象象言觀民五通天下之民為一身即民生為我生民外无我故民外无觀上九觀其生君子无咎象曰觀其生志未平也上不言我而言其我生陽生明于上隂化光于下觀天下之皆生其生上雖陽爻體則隂巽巽隂入于上坤隂闔于下觀一人之自生我生君子通天下為君子无咎其生君子无位无民而君子之道在无咎上不欲自處五外而獨為君子象故言其志未平臨二以剛中在下為主與初皆咸天道无心之感著于人觀五以剛之中正在上為主與上皆生聖道不言之教同乎天臨二剛中而五應然言未順命見无妄説君上之道觀五中正而下化然止于闚觀見无深求下民之道臨于初二之剛雖言長以兑為正秋之氣故亟示八月有凶之戒觀于五上之剛不言消以巽為東南之氣故極言神道服民之化謂臨進則泰與其貞吉觀進則剝僅止无咎此則執典要言易非聖人因自然之象以設教之㫖噬嗑亨利用獄彖曰頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也噬市制切嗑胡臘切口咀肉為噬嗑為合如君臣父子夫婦兄弟朋友之際皆合也食而知味皆噬也獄所以繫囚又爭罪曰獄頥中有物曰噬嗑噬嗑兼有頥象但頥之中爻為重坤重坤皆柔虚象无物惟无物故非顚即拂噬嗑之中爻為坎艮坎艮皆剛實象有物惟有物故可噬而嗑噬嗑亨由噬故嗑由嗑故亨以下體之震言為剛為動為雷以上體之離言為柔為明為電剛柔分動而明剛分為動動得其動不以中爻有艮而為其所止柔分為明明得其明不以中爻有坎而為其所蔽此為二體分而得嗑之象雷電合而章雷合電而動以明章電合雷而明以動章此為二體合而得嗑之象噬嗑所以亨又曰利用獄正以不噬不嗑以艮反動以坎反離原初遂失其動罪在初故有獄可用于初要終盡蔽其明罪在上故有獄可用于上其言利用主五五得中上行象電上運其照而雷下霽其威雖不當于剛中之位實不失其柔中之用用之究察獄情始必得其不行之故而俾初之知所懲終必得其不明之故而俾上之知所誡是以利訟方爭故利見剛中之主獄已成故利用柔中之君柔得中而上行離以二柔為中居上卦下體或兑柔或巽柔或坤柔則曰進而上行睽鼎晉是下體震動亦曰得中上行但不云進噬嗑是下體或坎䧟或艮止則曰得中或得中乎外更不云進亦不云上行未濟旅是下體乾全以五為主則曰柔得尊位大中大有是居下卦則止曰來曰得中曰得位得中竝无進行之辭矣象曰雷電噬嗑先王以明罰敕法敕耻力切亦作勅通作飭俗作敕或疑象文之倒然泰不言地天交而言天地交噬嗑不言電雷而言雷電原是易中之正例離于他卦皆言火惟遇雷為電遇地言明純離亦言明雷電合章之物言雷電便是噬嗑之象豐震在明前君子以折獄致刑噬嗑明在震前先王以明罰敕法明罰雷照明示其罰薄以懲之使免于刑敕法雷威敕正其法豫以戒之使避于刑與折獄致刑之義别初九屨校滅趾无咎象曰屨校滅趾不行也屨紀具切校古效切音教噬以初動上行得嗑五明為合四艮坎雜撰之爻初如因止不行五遂以坎用獄震為足坎為校震足滅于坎校下屨校滅趾之象震體噬初懲戒得轉善補不行之過无咎屯初以剛動五剛之險動之難宜居噬初以剛嗑五柔之明嗑之易宜行象言不行罪初无以上行六二噬膚滅鼻无咎象曰噬膚滅鼻乗剛也膚方于切柔脆肥美曰膚或曰腹腴鼻毗至切从自二至五皆頥中之物二在頥中以柔中為膚以雜艮而止于五下五為目二至四為鼻方噬未嗑如鼻之于目亦若相礙而不得合二乗初剛剛不可禦動而上行動體行止體滅有噬膚滅鼻之象是以可无不嗑于五之咎六三噬腊肉遇毒小吝无咎象曰遇毒位不當也腊音昔呉氏曰三五云肉謂无骨者四云胏謂有骨者小物全體乾者稱腊此言腊肉則肉受曰暵柔者為堅耳腊肉之日乾者三在頥中為腊肉以明動相求為噬以與四近不相得為毒噬腊肉遇毒之象剛大柔小吝其在小受其在大五且麗四以成明三亦大小相得而上合小吝无咎之象三所居下不當于初之動上不當于五之明象故特明位不當九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也乾音干胏音緇上聲呉氏曰腊肉日所乾乾胏乾肉火所乾未光也震四兑上同四雜坎中爻以離火為乾以剛為乾胏以未合初動之直雖金而非矢四初噬不惟嗑又有得噬乾胏得金矢之象以噬為艱以得為貞以艱且貞為利合明動而成五章皆四剛之能事吉二三五之噬皆无咎而四之噬吉此剛柔分之辨四本明體而以坎為暗象故言未光六五噬乾肉得黄金貞厲无咎象曰貞厲无咎得當也五雜坎上爻以離火為乾以柔中為乾肉噬而嗑黄在五金合初噬乾肉得黄金之象以得為貞以噬為厲猶凛然有三之毒四之艱不嗑之過為善補貞厲无咎之象噬至五明動纔得相當象故言得當頥中虚就以不失其虚為養正故戒舍靈龜觀朶頥頥中有物就以有物為當噬當嗑故二噬膚三噬腊肉噬其以動而雜艮為物者四噬乾胏五噬乾肉噬其以明而雜坎為物者二滅鼻三遇毒動得其為動无不上合五之明四得金矢五得黄金明得其為明无不下合初之動彖謂噬嗑而亨動而明合而章皆此必欲强附刑獄之例以與彖之用獄合以小象象大象諸卦竝无此例也上九何校滅耳凶象曰何校滅耳聰不明也何上去聲夬四亦云聰不明校獄具坎為桎梏故通上下言校噬嗑中爻皆噬以雜撰之體為物以明動相合為嗑有如噬而未嗑初失其動无以上行如以中爻之坎桎初之足桎之廣過脛而掩其趾足全没于坎桎下屨校滅趾之象屨校輕初在下不行之罪小刑小罪用輕典夫是之謂用獄于初上失其明无以下合如以中爻之坎梏上之首梏之髙過項而蔽其耳首僅露于坎梏上又何校滅耳之象何校重上在上不明之罪大刑大罪用重典夫是之謂用獄于上中爻在噬有噬明動得合合剛與柔盡成其為君子初上在噬无噬明動不合雖皆剛盡墜為小人初懲小人之始猶无咎上怙小人之終遂凶耳目之用分言之視曰明聽曰聰合言之聰聽則明不聰聽則不明五得中上行離坎合而聰明具上何校既抉離明竝塞坎聰象言聰不明者此賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下賁彼義切噬賁相綜為一卦噬言剛柔分又曰柔得中如節言剛柔分而剛得中賁不言剛柔分然特明小利攸往而曰分剛上而文柔若主柔而分之之義聖人貴得中之爻而又不失大小之辨其義之精如此蘇氏曰直情而行之謂之茍禮以餙情謂之賁噬嗑五初兩畫是爻主賁上二兩畫是爻主艮剛上止无為離柔從中麗之著文明于剛止之中謂之柔來文剛文得其中故亨離柔居中用事艮剛從上止之加篤實于柔明之上謂之分剛上而文柔上剛大之爻匪小以往成止以艮之剛大止離之柔小收歛文明而不極其𤼵外之盛大之往小之利故小利有攸往天文也以剛柔之有來往言一剛一柔一往一來為日月之推遷為星辰之經緯豈不燦然成一天之文文明以止人文也人文不以往來言卦體内文明外艮止内主離柔之明德為文外用艮剛之篤實為止人成文文成止夫是之謂人之文天文惟往來日月代而晝夜以時變星辰運而寒暑以時變時時有變時時宜察故曰觀乎天文以察時變人文惟止五典以叙五禮以秩人得其文文得其止而人文之化遂成於天下故曰觀乎人文以化成天下天文一有飛流薄蝕變在天召在人人文一有僭亂差忒變在人應在天以人觀天以天觀人天以時變人以時察察其變之在天求其止之在人以人文合天文斯盡賁亨利往之義象曰山下有火賁君子以明庶政无敢折獄山上有火火寓于山山下有火山麗于火止而有耀光而成文賁象雷上之火震耀幽隱先王以之明罰山下之火光賁草木君子以明庶政火從雷激明生于威君子以之折獄火從山止明戒于察君子无敢折獄初九賁其趾舍車而徒象曰舍車而徒義弗乗也初明四止明止相求賁義首成于初趾四雜撰坎輪之爻為車大夫然後乗車三在上大夫也四二合而駕之于中宜乗初在下徒行士耳初受四止為徒徒則義一舉趾便成其文初升四輪為車車則不義一舉趾便不成其文明體審初以義為安賁其趾舍車而徒之象初視四有車可乗疑其于已為䧟而不于已為止便似義之所不在象故明曰義弗乗六二賁其須象曰賁其須與上興也賁以二柔為文上剛為止二上遠不相與五應爻以柔三近爻以離雜坎二為雜坎下爻三為雜坎中爻下易而上難䧟易而興難須三震起于二前于是二之文直通乎上之止而賁成賁其須之象二之所與成其賁者上然必須待震起之人與震起之時而後无下䧟之患象故明與上興九三賁如濡如永貞吉象曰永貞之吉終莫之陵也濡人朱切三剛明上剛止三上之賁成雜坎三爻无一非其潤澤之光賁如濡如之象濡无不貞患不永貞而永永于貞又何不吉要終而二四兩柔不為䧟上止无以加象故曰終莫之陵六四賁如皤如白馬翰如匪㓂婚媾象曰六四當位疑也匪冦婚媾終无尤也皤白波切老人白也又鬢白也翰胡安切終无尤賁四剥五蹇二鼎二旅二凢五言之四舉爻賁及兊凡二言之艮三爻皆剛上文柔然四五柔爻也何能以柔文柔文柔必以上為主四欲文初而不自用首戴上白以為白以上之白首樹初之觀刑賁如皤如之象又慮初之疑而弗乗不為坎之車輪而為震之馵足以人既白以馬又白示初鮮潔而可乗之以髙飛白馬翰如之象坎伏賁中象冦至是則人白馬白而初四合匪冦婚媾之象四與初剛柔相當初先疑而弗乗象故曰當位疑四初婚媾上无尤矣象故曰終无尤六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也戔音箋戔戔顯見貌六五之吉賁大畜離豐凡四言之有喜賁五大畜四升二凡三言之五髙山之中為丘苑有垣曰園五止于中上垣于外二須于下文明篤實之藴盡匡圍于五中賁于丘園之象五二皆柔五用上白與二要束表裏純白之光盡從五中顯見束帛戔戔之象雖在坎外仍有䧟憂將要終有止而得其吉吝終吉之象文明以止至五止矣柔來剛上之主于是交慶其成安得无喜象故明有喜上九白賁无咎象曰白賁无咎上得志也未有五色先有太素白太素之始賁以剛柔相文原非有所加餙故曰无色柔來文剛艮原光明離麗之即為文剛于剛无加剛上文柔離原文明艮止之即為文柔于柔无加賁極于上疑若文極于上而以剛止要終純然太素之初原非有色是之謂白是之謂賁而可以與天下共補致飾之過白賁无咎之象素履在初上健未必遽和象故明獨行願白賁在上下文无不成化象故明上得志噬賁反體噬以明動相合為嗑賁以明止相飾為文噬以嗑五為文明之中為亨賁以來二為文明之中為亨噬上行之明大无待于下剛之動利用獄賁下來之明小有待于上剛之止小利有攸往噬動而明初動要終亦動動而不合乎明无動不成䧟无動非小人故于初上寄小人之始終賁文明以止上止原初亦止文明不失其止有止則无䧟凡止皆君子故于初上明君子之志義噬四雜撰為坎艮噬之艱艱貞則吉賁三雜撰為坎震患不永永貞則吉噬五得黄金明與初動合噬亨此利用獄此賁二賁其須文明與上止合賁亨此小利有攸往此噬物得嗑而味在頥口之中知食物所關為甚大賁文成化而義嚴趾足之始知跬歩所係為不小二卦示人之意深矣像象管見卷二上欽定四庫全書像象管見卷二下明錢一本撰剥不利有攸往彖曰剥剥也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也剥北角切裂也刻割也落也削也傷害也彖言象者三剥鼎小過夬決剛決柔君子決小人惟有決如決澤而使之行流剥剥柔變剛小人剥君子惡其一割裂之使二惡其上墜落之使下不變為柔不止故言剥又言變復剛長利有攸往喜剛之辭剥小人長不利有攸往危小人之辭彖又𤼵明君子觀象尚剥之義以柔剥剛之心无可諒而下順上止之象仍可觀觀順象在下而尚其順以為順觀止象在上而尚其止以爲止葢消息盈虚天行之運天且弗違而况君子敢有弗尚尚順成止其止之也如天之有定覆尚止成順其順之也如天之无不生是為君子善處小人與天合行之道剥順止之象顯于外曰觀象復順動之幾涵于内曰見心剥以象觀非人之象而天之象復以心見非人之心而天之心剥復皆曰天行而君子若不以已與之復原始為天剥要終為天君子之天之有定固如此象曰山附于地剥上以厚下安宅象稱上惟剥山者形峙地上根蟠地中言附于地便是剥之象上以下為基地厚山附之而妄下厚上附之而安上以厚下地之載安宅山之止初六剥牀以足蔑貞凶象曰剥牀以足以滅下也蔑莫結切削也輕易也滅莫列切牀安身几柔以藉剛如牀以安身初在下為足從初有剥上剛遂无所藉以為安剥牀以足之象木以果為貞果非上之貞而初之貞初于上遠未相及順之始止之之下貞所自有而以剥足輕為削蔑蔑貞凶之象蔑乃自滅无與于上象故曰以滅下六二剥牀以辨蔑貞凶象曰剥牀以辨未有與也辨崔燝云牀梐辨牀體之中即上下分辨之處剥至二剥牀以辨之象二上猶未相及以順之中合止之中貞在二中亦如初蔑凶復五能敦為四二五在動上順撰得下卒成其君子剥二无能為三五二在止下順撰不上終墜為小人象明未有與隂陽以應為有與與原在上二自絶之故至此六三剥之无咎象曰剥之无咎失上下也上下皆剥剛之人三上應爻獨有所之之則有止小人從此不長剥之无咎之象象明失上下反體即獨復從道之人與之深矣六四剥牀以膚凶象曰剥牀以膚切近災也初牀足二牀辨牀也四曰膚與上一體之身矣乃初剥與剥二剥與剥剥牀而以自身之膚安得不凶災及于上猶隔一層政恐災先逮于四身而更危在旦夕象故曰切近災六五貫魚以宫人寵无不利象曰以宮人寵終无尤也洪景盧曰易中所言魚皆指巽貫魚下四爻皆從巽來如魚駢頭而貫也五止體之中因順以為止止下以成順聨絡之胥使下順以无失衆柔之美貫魚之象左右之胥使上順以均怙一剛之庇如妾媵侍使之承事其君以宫人寵之象三應上止故能之五承上止故能貫又能以貫則尊卑順序以則深宫固門艮剛可以化其光于内坤柔不得肆其害于外匪一剛之利而衆柔之利无不利之象終不為剛上君子之所尤象故明其終无尤上九碩果不食君子得輿小人剥廬象曰君子得輿民所載也小人剥廬終不可用也豐九三亦曰終不可用剥上言果而象碩匪但以剛大稱碩五柔下剥一剛上固剛陽生意盡收斂于剥上一爻中以乾言果全體大生之德在是以艮言果成終成始之實在是是為剥之貞反即復之元以其巍然樹杪未曽剥落下地碩果不食之象坤下載從上視之為輿艮上覆從下視之為廬剥極之時以上一剛言小人有剥君子惟止凡此剥我之柔无非載我之民其剥之未窮而變也此順而止之生而不傷之心无一息間斷不敢自失所載其剥之已窮而變也此順而止之生而不傷之心无一息間斷不敢自失所載君子得輿之象以下五柔言君子有止小人惟剥視一剛在上定要剥到盡處不知留這君子在上猶能覆葢小人這廬匪君子之廬而小人之廬乃以剥盡為快自廬而自為之剥曽不自思其无容身之所小人剥廬之象夬上无號象曰終不可長夬上終非小人可長之地君子終无不可長剥上剥廬象曰終不可用剥上終非小人可用之地君子終无不可用夬終曰无號小人自絶剥終曰碩果曰得輿君子自生君子終有用于小人小人終无用于君子其所就之不同固如此復亨出入无疾朋來无咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎七日震既濟言于爻以二五之合為七復言于卦以六一之合為七人行出外來歸曰反復亨亨以剥之一剛窮乎上反乎下還歸故居是以纔復即亨下動上順有動而以順行之象剛反為入震動又為出出入而行于坤順中惟見其有順不見其有逆出入无疾之象剥以五柔往剥一剛復以五柔來順一剛朋來无咎之象天行以健為道復初一剛止于坤上為六為往動于坤初為七為來要上則為止之道原初則為動之道道无變動只六反為一便是七日如往之有反如行之有復便成復體反復其道七日來復之象剥小人長不利有攸往復剛長既反而成復之體便長而有往之利利有攸往之象復其見天地之心乎天覆地載大生廣生此便喚做人人的心不為剥亡不為復存但剥之一剛止于上方止之際如果核之含其仁寂然不動復之一剛動于初纔動之初如果仁之有萌芽雖生生一息之端倪實生生无息之全體人人无不具足人人可以自見聖人于復指天地之心示人自見深矣人顧終迷不見以軀殻蕞爾之心為心而不勝自賊亦獨何哉象曰雷在地中復先王以至日閉關商旅不行后不省方關俗作関从廾皆非周禮月令夏五月日長至日長之極陽極隂生也冬十有一月日短至日短之極隂極陽生也今呼冬至為長至以隂極陽至短極長至為義三禮義宗至有三義一以明隂陽之氣之至極二以明隂陽之氣之始至三以明日行之南北至雷在地中地純隂雷以一陽初動地中復象復是一陽初至之日故稱至凡人出外而還歸故居亦皆稱至一陽初至之日天地萬物盡由此生宜安靜有養又凡出外而還歸之日俱宜安静有養此專直翕闢之至理而况先王動與天俱日至與至復之卦體一陽還反于初為至日五闔子上為閉一亘于下如以木横持門戸杜而加扄為關先王以至日閉關之象商行貨旅出塗皆坤衆馳騖之人雷聲寂在淵黙坤衆順以寧居能使功利衆夫盡絶而不馳商旅不行之象一陽為元后五隂為羣后一陽端拱于内五隂順治于外能使四方羣后盡肖而无為后不省方之象復閉關所以貞一歲震動之生幾而使行之无不順隨宴息所以貞一日震動之生幾而使行之无不説知閉關之義日日有至有復知宴息之義息息有宴有隨初九不逺復无祇悔元吉象曰不遠之復以修身也復初一剛是人人剛明震動之知體自其從天而動謂之无妄自其從剥而反透地而動地或有暗剛无不明明有常照剛有常勝初非逺而難至亦无在剥為失在復為得之間不逺復之象祇適悔生于動動涵于初乃天根深固主人以故居動之體无動之悔任其有動皆无適不順之動无更可致悔之動吉孰先之无祇悔元吉之象象曰以修身彖言心言見象言身言修不逺之復已見天地之心故能以之修其身不然與天地稍不相似便成一箇軀殻之身何修之有六二休復吉象曰休復之吉以下仁也凡動性易于外馳二以動撰順反轉順初一切向外走作易動心盡歇而泊于初復之上是為无失休復吉之象象曰以下仁二初以一體言仁以動不外馳反求初之不遠為下仁凡人氣一浮動脚不㸃地如果不落地果仁雖在終歸枯槁而无𤼵生之日六三頻復厲无咎象曰頻復之厲義无咎也義无咎復三觧漸既濟之初凡四言之頻之義為數為急為連三動而上急忙連歩反歸求初視二已隔一層二休為安三頻為危休于初仁能下吉頻于已義亦无咎象故明義无咎六四中行獨復象曰中行獨復以從道也柔爻有五皆為坤衆凡在復而知復者皆君子也在復而不知復如上之迷則坤衆之為耳四行坤衆之中而不與衆同迷與初為應惟初是從中行獨復之象四從初一直通行歩歩皆震之大塗象故明其為從道六五敦復无悔象曰敦復无悔中以自考也五于初非如二之近四之應然是坤順中體兩撰則為重坤其體愈厚其順愈至豈其不復豈其獨致初悔敦復无悔之象象曰中以自考復自知不待外求復五中要于成姤五中要于隕隂陽淑慝之所就固如此上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也㳺氏曰人心迷悟之分其端甚微然燕越殊轅各循所適于何不至故吉莫善于不逺復而凶莫大于迷復也上居復終出于重坤之外便于從初之道眩惑迷罔莫知所適迷復之象凶有災眚天降旣有災自作又有眚坤衆為師復動成順象迷動成逆象以順用衆无不助之以逆用衆无不叛之无一為用盡逃其上用行師終有大敗之象剥極剥廬迷極亦剥國君安得為以以必迷國誤君流禍无窮以其國君凶之象坤數窮于十无不反于一十乃坤之終一即震之始上有坤之終迷更无震之反生至于十年不克征之象君道在初自二至五无有不順惟上之迷為反象故以為反君道或問用行師終有大敗其始亦或有勝乎曰然今人憑著血氣用事血氣盛時慷慨激烈奮勇直前亦自所向无敵到血氣衰時便索然餒而不振小小利害亦足動心无有不盡䘮平生而一敗塗地者其以國君之凶亦然皆縁迷不自知認照為明認意為心認血氣為義理震雷不聲乎夜半真明不透乎地底真陽不奮乎黄宫反乎君道之故无妄元亨利貞其匪正有眚不利有攸往彖曰无妄剛自外來而為主于内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉眚音生上聲臨曰天道以中爻有震為象无妄萃曰天命以中爻有巽為象无妄外乾内震乾震皆剛震剛得乾剛初爻來居乾内以為動主為主于内者震初一剛其所自來者全體乾剛如是而動全是天動而非人動卦所以名无妄動而健主以下之震動合以上之乾健剛中而應進于乾剛之中應以震動之中動无不通全體天命之通是為无妄之元亨動无不正全體天命之正是為无妄之利貞其匪正中爻以動雜艮如災在三而不得牛于動為不貞匪无妄之正動矣以健雜巽如疾在五而稍試藥于健為不貞匪无妄之正健矣匪正之動動不應健匪正之健健不應動是為无妄之匪正是為无妄之有眚是為无妄之往而有所不利彖明无妄之往何之矣上乾是天命下動如人之有行往人有行往動與天俱何論有妄之往无之即无妄之往亦欲何之一有所之天命便有所不祐如何行往得故曰天命不祐行矣哉欲人知有天命在上雖无妄跬歩不敢違天而有匪正之行往况淪于妄而欲有所之有所往覬天命之有所祐乎示人深矣象曰天下雷行物與无妄先王以茂對時育萬物吳氏曰天下雷行物與聞之者雖庸愚之人莫不恐懼而心无妄思身无妄為有知無知之物莫不驚駭震動而无有所私皆无妄也妄人為之偽人无所不至惟天不容偽故惟天動為不妄天下雷行物與雷徧行于天下而无一物之不與物物之天因雷而動與雷俱行物物皆以天動无妄之象先王生育萬物之心奉天時行原无一息不流對此震雷𤼵動之時生意尤覺盛長故言茂言對言育惟育物之心對時愈茂此所以為先王之无妄後人生意以妄而萎將何以配合天時而生育萬物初九无妄往吉象曰无妄之往得志也初剛自全乾而來一動便有全體之健无妄往吉之象象明得志初志動與天一往无不祐之命故以言其得也六二不耕穫不菑畬則利有攸往象曰不耕穫未富也初純乎天二動止相雜駕以坤牛則耕歛以震稼則穫闢以坤土非一歲而為之菑即三歲而為之畬如此之動是曰匪正何可如初之往惟盡絶人為純以天動方與剛中之五為應是為不耕穫不菑畬則利有攸往之象象明未富二以應五為富以未應為未富六三无妄之災或繋之牛行人之得邑人之災象曰行人得牛邑人災也邵子曰順天而動有禍及者非禍也災也其詩曰就使有災宜俟天便是行人得牛之義闗氏曰无妄而災者災也有妄而災者則其所宜非災也三以柔動之終應乾健之窮動旣有反窮若生變无妄之災之象坤爻巽體雜撰于動健之交㝠㝠之中若助之順如牛之為順如繩之有繋或繋之牛之象或有繋三能震起而為行人巽而能動動以順行天不期祐而祐災不期消而消行人之得之象或有繫三如撰止而為邑人旣反震之動又失巽之順天何以祐災何以消邑人之災之象象故直名之曰行人得牛邑人災也九四可貞无咎象曰可貞无咎固有之也益六三亦曰固有之初正動四正健動而健健不為動是之謂貞是之謂可可貞无咎之象惟貞健之有于四者斯固象故曰固有之九五无妄之疾勿藥有喜象曰无妄之藥不可試也五剛中而應之爻何以疾于巽有撰于健若傷无妄之疾之象然巽順也于五何傷三固即巽以為牛五亦即疾以為藥而匪疾是藥于二自有正應之喜勿藥有喜之象象明无妄之藥不可試稍試先已不順正命謂何无妄之疾匪疾而无妄之藥為疾剛以震讋健為動遷可憂多矣不可之辭无妄之天莫定于五于是可見上九无妄行有眚无攸利象曰无妄之行窮之災也上三爻皆以健應下之動四可貞應初動也五有喜應二動也上行處健之窮于三動為不應矣三言災災自天來上言眚眚由已作初往動始為得上行健終為窮是為无妄行有眚无攸利之象象曰窮之災乾上无災以窮于亢為災无妄之上无災以窮于行為災乾之四以或躍為革故上亢為窮无妄之四以可貞為固故上行為窮无妄之災疾君子皆以不去為正以天命所祐惟有一順三得牛五勿藥皆能順受其正上行或以災疾之來非其自致稍行去之在无妄中斯謂之匪正斯謂之有眚而與助順之天命不合天命安得為祐彖謂无妄之往何之矣天命不祐行矣哉如此大畜利貞不家食吉利渉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利渉大川應乎天也大畜下乾上艮乾剛健因艮上畜内有艮之篤實外有艮之輝光日畜則進于日新而能日新其剛健之德是以謂之大畜无妄主初剛自乾來而成動因以動上乾之健大畜主上剛自乾上而成止因以動上乾之健剛上而尚賢能止健四五兩柔雖皆止體然不自以為止而惟依上成止一剛在上為止主四五兩柔尊而尚之于已上尚上一爻之止以止下三爻之健若曰上一爻下三爻皆剛大之賢以剛止止剛健于剛健三爻大有所正惟上之能而非已之能何正如之何大如之是謂大畜之利貞以止健而曰尚賢原不敢以柔加剛終止之于其下家食將賢人終止于下矣中爻有兊合兊口以向五惟五是食而不家食是為大畜不家食之吉大川而无以利渉全體乾健之道亦无大行之日矣兊見方阻而為大川震起旋通而為大塗合乾三爻而有天衢之利往是謂應乎天是謂大畜渉大川之利象曰天在山中大畜君子以多識前言往行以畜其德大莫若天止莫若山天在山中大畜之象前言前人之德言往行往哲之徳行人有全體剛健之德如天君子多識前言往行以畜其至大之天德如山中之天葢有其德而後前言往行皆吾畜德之資耳不然識徒多而德或病其為多也固誇多鬭靡之學而已矣亦何所畜之大之有初九有厲利已象曰有厲利已不犯災也已夷止切初欲上行四為下止止之不能若將毁之如之何其无已有厲利已之象已之利在初則知有厲之災初自犯之四于初无災也象故明不犯災九二輿説輹象曰輿説輹中无尤也輹伏免軸上承輿者車不行則説之輹車軸轉行縳止説與小畜之輻别小畜之輻說以人大畜之輹自為説健而自止于中五于二復何尤象故明曰中无尤九三良馬逐利艱貞曰閑輿衛利有攸往象曰利有攸往上合志也上時掌切乾三爻皆馬以有畜而調伏為良上亦三之羣三見上在前喜于得羣撰震而起良馬逐之象三上正止三以進為艱止為貞有貞无逐利艱貞之象三合二四雜撰兊口為曰乾體在下為輿止體在上為衛上下相習為閑至是交相告語若謂爾輿既閑于爾後爾衛又閑于爾前合駕上往惟此時為然曰閑輿衛利有攸往之象利艱貞與上止之之志合利攸往與上養之之志合象故明上合志六四童牛之牿元吉象曰六四元吉有喜也牿古毒切牛以角觸角著横木所以告人四以止初之爻雜撰震動動而順有動无觸為童牛上横設于四前四依上成止為牿未角之牛觸性未𤼵而豫加之以牿牿在四告在初四之畜成而禁于未𤼵之理得童牛之牿元吉之象四原不為災于初原是剛柔相得象故明有喜六五豶豕之牙吉象曰六五之吉有慶也豶符云切豶犗也音界古有犗刑豐五兊四亦皆曰有慶牛順豕躁五撰震上爻動而躁為豕止于中如以止犗去其躁性為豶近上而止如繫豕之杙為牙五以是義止二之健二以是義從五之止童而止與豶而止成功則一上下相成之慶更无以加此吉象故明有慶小畜之四血去惕出大畜四五牿牛牙豕不特見有已求人无已非人之義且見柔小終不自為主而以剛大為主柔小終不自為能而歸剛大之能聖人示人剛柔大小之分嚴矣上九何天之衢亨象曰何天之衢道大行也何平聲道四逹為衢上天爻合上下四剛而通為震塗為天衢何與曰義相喚應下方向上而言往之利上若俞下而云往于何上四通之天路也進此行往无所不通天之衢亨之象全體剛健之道惟上為能止亦進上為大行象故明道大行李氏詩千年古道萬年堤老牯馴馴不解迷牧子不知何處去亂山芳草鷓鴣啼最深于畜上天衢亨之㫖无妄動主在初與上三剛合德純動以天動與天一惟其所動而无不祐之天命故曰得志大畜止主在上與下三剛合德純止以天止與天一隨其所止而皆四逹之天衢故曰道大行動主不在初而在二三未可如初之往而剛健三爻在上貞斯固而行斯窮止主不在上而在四五未能為上之衢而剛健三爻在下止其時而行非其時无妄四以健應動主可貞大畜三以健應止主利往无妄之上戒行大畜之初利已无妄之五勿藥有喜大畜之二説輹无尤无妄因災疾而徴動健之貞大畜以災尤而驗止健之實俱相𤼵頥貞吉觀頥自求口實彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉頥以之切口車輔名頥之義養上止下動中虚无物動原始止要終中爻虚受純乎理不動乎欲如是言頥是之謂貞是之謂吉養有所養自養不同而正則一觀頥自求口實分上下體以觀止三爻在上以養人為正動三爻在下以自養為正分初上中爻以觀上止以制下動為正初動以要上止為正凡皆謂之觀所養中虚无實以虚受實爻自為觀爻自有求為正凡皆謂之觀自養天地養萬物上天下地中萬物合上下以養其中能覆載能生成是為天地之養聖人養賢以及萬民上聖初賢中萬民以上養下養一人之賢以及于萬民是為聖人之養天地養萬物養之必以其時聖人養賢以及萬民養之亦必以其時得其時无不震起𤼵生非其時止矣頥之時所以為大象曰山下有雷頥君子以慎言語節飲食頥體上止下動山下有雷山上止雷下動頥象君子以慎言語節飲食言語不慎如諺所謂禍從口出慎其自内出外之言語所以養德飲食不節如諺所謂疾從口入節其自外入内之飲食所以養身言語飲食如雷之有動為慎為節如山之有止初九舍爾靈龜觀我朶頥凶象曰觀我朶頥亦不足貴也朶丁果切樹木垂朶朶也今謂花為朶靈龜能不食者朶動初動主故稱朶頥四柔在中初皆目為靈龜以虚故靈二三虚受震陽之光以為靈四五虚受艮陽之光以為靈人全其靈而以觀初之動動皆養正為吉人失其靈而以觀初之動動皆狥欲為凶初以剛正主一卦之動有初之貞動然後有上之貞止故首以舍爾觀我盡人而示之以正動以人而靈不如龜无非飲食之人矣象故明亦不足貴六二顛頥拂經于丘頥征凶象曰六二征凶行失類也二舉爻頥恒大壯明夷家人升解損凡八二无自養之實顛以求初即二之頥二五持坤軸兩端二下以自養為經五上以所養為經二五无應五既從上二亦顛初自養常經在所弗執顛頥拂經之象五髙山之中為丘二如舍卑慕髙匪卑之顛而丘之征未得之五先失之初凶二初一體相求能類養正之情而以征自失象故明曰行失類六三拂頥貞凶十年勿用无攸利象曰十年勿用道大悖也三上應爻本正但上止三動上不為養三固有求動為援上為失已頥斯拂矣正于何有拂頥貞凶之象十年循環上下至于十年上終不以為賢而用之又安得而養之十年勿用无攸利之象以下旣悖初自養之道以上又悖上所養之道象故明道大悖六四顛頥吉虎視眈眈其欲逐逐无咎象曰顛頥之吉上施光也眈丁南切虎無項不能轉視眈眈專視象牛視逺意近虎視近意逺逐驅也放也斥也二以近初為顛四以應初為顛二顛在下而觀自養四顛居上而觀所養所養者賢所及者民吉四承上止以制下動儼止主如虎上踞專一下視視在已而意在初四若无顛上若為咥虎視眈眈之象能使從初正動非欲是動自養所養无不以正其欲逐逐之象如是既吉而又无咎象明上施光四虚不居實功施在上光在上三以下求上則曰道大悖四以上求下則曰上施光頥貞之道莫著明于斯矣六五拂經居貞吉不可渉大川象曰居貞之吉順以從上也五居養人尊位无養人之實不定執所養為經惟以順從上止為貞三應上五近上皆貞但三乃動極貞非所貞五則止中貞復能居五以貞為居惟上是順是從上之所養何莫而非五之所養拂經居貞吉之象二无自求之實而上征不觀初動皆非正動无征不凶五无養人之實而下渉不由上止欲无底止无渉不陷不可渉大川之象頥以兩實經四虚大過以兩虚輔四實頥二以顛初為頥大過之二以得初為生梯為女妻以俱與五无應而去上為逺頥五以從上為吉大過之五以得上為生華為士夫以俱與二无應而去初為逺頥過之三皆凶頥三動極上无以止過三躁極上无以輔頥過之四皆吉頥四止體為能制初之動大過四說體為能行初之巽此頥與大過相𤼵之義象上九由頥厲吉利渉大川象曰由頥厲吉大有慶也頥以上止為貞動以上止為由内為震之大塗外為艮之徑路人可由之以為養由頥之象髙以為居則危遠有所施則吉厲吉之象原始要終以止制動動而有止動則大川止則利渉利渉大川之象中爻有虚實相成之慶初上有聖賢相遇之慶象明大有慶者此大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而説行利有攸往乃亨大過之時大矣哉過古卧切棟多貢切極也中也屋􅆃木曰棟負棟者曰梁橈乃教切屈曲也又弱也小過震艮皆剛以柔小四爻用事外内言過大遇兊巽皆柔以剛大四爻合處于中言過彖故明大者過棟以極中兩剛言橈以本末兩柔言四剛合處于中而過重兩柔分居本末而過弱不勝任載若從中傾而墜下棟橈之象旣橈惡乎亨利有攸往亨言利往則亨不利往則不亨彖明剛過而中天下之事中焉止矣雖剛大亦何可獨過今二五處兩體之中三四處一卦之中皆可因過以求其中以中而救其過巽而説行初巽于下為本上説于上為末四剛在中下為行初之巽上為行上之説說巽相應以行如是利徃初為藉上為輔本末不失之弱橈者遂反為隆是為大過之亨小過利貞柔止可以小事故以貞為利大過利往剛猶可以大事故以往為利大過之時棟橈非常之失在此時利往非常之得亦在此時一失則不可復救故其時之所係為甚大象曰澤滅木大過君子以獨立不懼遯世无悶巽在地卦皆為風惟在澤地水火之中皆為木游氏曰大過次頥獨立不懼遯世无悶養之成也澤滅木澤上木下澤髙漲而浸滅乎木大過之象君子以獨立不懼如木立于澤中雖為澤所滅不為澤所仆何懼之有遯世无悶如木滅于澤中愈浸灌愈融液滅與世而相忘説與澤而俱深何悶之有獨立不懼是直參天地脚跟遯世无悶是包舉宇宙心量是為君子之大過初六藉用白茅无咎象曰藉用白茅柔在下也藉慈夜切薦也古者祭祀縮酌沃灌薦牲薦黍稷皆藉以茅白茅祭祀所共藉以初言茅以六言白以巽言自二以上皆大過之剛爻初以一柔巽承其下不但藉之如茅更又用之以白以此過慎之道承藉過重之剛枯者近之必囘生橈者應之必隆起是為初六之无咎九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也楊多生于澤中隂木或云白楊性勁直堪為屋材稊田黎切音題大戴禮正月楊稊稊𤼵孚也稊與女妻皆以初為象剛過故楊為枯而夫稱老二近初從本原上動其根荄𤼵其萌芽枯楊生稊之象初本爻主二以巽撰乾能主初而不主乎初取初之過慎濟已之過剛以近相得老夫得其女妻之象生稊則自榮得妻則有輔老夫之過既補白茅之用益彰无不利之象二與初老少相得原非正偶象故明過以相與九三棟橈凶象曰棟橈之凶不可以有輔也四剛皆以木象楊惟澤有易生木棟負衆榱屋極木二五言楊教之囬生三四言棟教之大厦非一木之支過剛必以柔為克而求人以自輔今三以剛居剛首逺初柔无本可以自立在初既不為藉在上又何能輔全象棟橈之凶三獨當之矣象故明不可以有輔九四棟隆吉有他吝象曰棟隆之吉不橈乎下也四棟亦橈而有隆之吉四應初救橈先本初旣為之藉于下上豈不為輔于上故吉又曰有他吝終以與三竝處一隆一橈之故四隆原无所加但以有本自立末弱遂非所虞耳象故明不橈乎下九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可久也老婦士夫亦可醜也華古花字呼𤓰切亦可醜解三同華與士夫皆以上為象二五皆過而枯匪近柔不生二近初而生生以東南方生之氣生在下為梯五近上而生生以兊西已成之氣生在上為華枯楊生華之象巽兊皆女體聖人目二為老夫二以剛過之爻巽于初之上主在二不在初固與其為夫也目五為老婦五以剛過之爻説于上之下主在上不在五乃正言其非夫矣非夫而惟上是主上夫而五婦上説而五順老婦得其士夫之象如是者過亦可補无咎剛不足稱无譽旣枯之楊无梯而但華雖榮不久象故曰何可久夫婦既易位老少更非偶象故曰亦可醜四過而藉初立本吉三過而援末為輔凶二過而善巽取初以為之補自訟于内挺然男子五過而妄説從上以為之補致飾于外􅚿然婦人此可以明剛大君子補過自立之道矣上六過渉滅頂凶无咎象曰過渉之凶不可咎也初過慎以巽藉于剛過之下若恐其墜諸地而從下以救其過之象上過渉以説引于剛過之上若恐其隕于淵而從上以救其過之象滅頂乾首沒于澤中之象三橈大厦將傾上渉一木之支然猶藉有上之支五婦夫義澌盡上渉士若徒勇然猶賴有上之勇凶无咎之象即无補于三之橈五之醜而匡扶剛大之過之名義具在其一段説渉真精神自是不可磨冺象故明不可咎大過之有本末本如木之根末如木之杪中如木之榦言本末弱以明中榦猶强世有白晝能為而屋漏則缺白刃可蹈而自勝則踈者為本弱之過滿局皆雄而了著則錯生平砥礪而頽齡則灰者為末弱之過從中殊絶勝人首尾俱有不稱者為本末俱弱之過白茅之用女妻以巽道順而承藉于下能起老夫之衰能致棟隆之吉以二四撰乾于初之上剛大雖過而能為主過渉之凶士夫以説道逆而激𤼵于上弗葢老婦之醜弗救橈棟之凶以三五撰乾于上之下剛大旣過而不能為主失之剛大拯之柔小失之中路拯之末路匪老為夫而老為婦其辱當年羞後世有不可言矣小過柔小之過亦為過分而逆之過大過剛大之過亦為過時而衰之過小過宜下不宜上以止二柔在下為順動二柔在上為逆大過拯本不拯末以生梯得妻則末无不舉生華得夫則本有不立小過以三四為君祖教四柔合順二剛之道大過以三四為棟二五為楊教二柔合輔四剛之道頥大過反對艮震與兊巽相為反對頥震艮之合大過巽兊之合震原始艮要終包坤于中如乾包坤坤麗乾中謂之頥巽原始兊要終包乾于中如坤包乾乾陷坤中謂之大過頥上止止无為初動而為養民于其下故二四下而求初皆顛三五上而求上皆拂過初巽巽有入上説而惟拯過于其末故三五以上為說皆凶二四以初為巽皆吉頥動于下止于上皆以用剛為養正之吉大過巽内入兊外説皆以用柔為救過之功頥外實内虚肖離大過陽中隂外肖坎既若啓離坎之先而振上經之終又若成咸恒之交而開下經之始是為頥大過反對互𤼵之義習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉習似入切坎苦感切水之所行曰險八重卦之上竝无所加獨坎上加一習坎險也陽陷隂中有人心惟危之象何可相習而相重重則愈險是以獨名為習坎習坎有孚二五剛中皆原初流水之信體以合流而上下坎皆盈為出險今兩坎相重水流于下二坎不盈險在下矣然二以剛居下之中二行下險初不失其剛中之信水流于上五坎不盈險在上矣然五以剛居上之中五行上險初不失其剛中之信信原具于坎之中亦初不失于習之中習坎是以象有孚維二五孚而成維二求小大小相維四納約剛柔相維二五雖皆處險其心之中通不啻流水之中通心何以不亨彖故曰乃以剛中行二五孚而合行二不以下險為安五不以上險為安二行往而上通下坎何以重上而為險五行往而下通上坎何以重下而為險无險非可行之地无行无出險之功彖故曰往有功此葢以習坎明處險之道上坎天險髙不可升此无形之險下坎地險山川丘陵各有疆域各有界限此有形之險王公設險以守其國兼設天地之險以守衛其國如城郭溝池則設地險以為其險辨尊卑分貴賤明等威異物采以杜絶陵僭以限隔上下則設天險以為其險有險之時有險之用其時用所係為甚大此葢以習坎明用險之道坎離得乾坤之中爻坎言王公二五皆王公設險之用離言王公二五皆王公嚮明之用象曰水洊至習坎君子以常德行習教事洊才甸切重也再至也大川之水原是朝夕兩至此言洊至則重疊相仍而至即洊水成重險習坎之象君子以常德行以不失坎中之剛為有德之行習教事以克治坎險之習為由教之事德行无常如水自窒其源教事无習如水更壅其流常德行常有得于剛中之象習教事惟恐習為重險之象初六習坎入于坎窞凶象曰習坎入坎失道凶也窞徒感切音萏又陵感切一曰坎中復有坎一曰旁入也或作欿下坎已在上坎之下于險為重習坎之象坎初更入下坎之下坎中又有小坎入于坎窞之象如是何時能出故凶坎陷震起初有震起之道在前而以入窞自塞求出之路象故明曰失道凶九二坎有險求小得象曰求小得未出中也二以剛中居上坎之下下坎之中于險有設于國有守坎有險之象二大之間三四皆小以小撰止止而不流小之无得者以小撰動動而通流小之有得者二于五大未孚先小得之求求小得之象二能止而守之于險中未能動而出之于險外象故明未出中六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終无功也枕章荏之任二切木在首曰枕又枕卧而不安之謂三四上下坎之交往來皆震方有出險之功如在二則求其得三四乃自不求相得來則仍為下坎之則仍為上坎三枕二四枕三上下交相枕藉无非險矣險且枕之象一枕即是初之坎窞初入无道可拯凶三入二又何求勿用象故明其終无功六四樽酒簋貳用缶納約自牖終无咎象曰樽酒簋貳剛柔際也小罍謂之坎酒樽貳如副貳之貳缶瓦器牖音酉穿壁以木為交窗古者一室一戸一牖牖開明處四處二大之間以撰震有得之爻承于五下為樽為簋為缶以二五皆剛中原有交孚之信為約以坎體原不内暗艮闕更可通明為牖于是樽以盛酒簋以為貳缶以為用席之通明之牖間在二五原自各有信四乃輸納其約自牖而進納約自牖之象如是則二大成孚各不為險二小間于其中交成有道亦何重險之有故終无咎二有求四有納四二相得四五相承遂合上下而成出險之交象故明曰剛柔際九五坎不盈祗既平无咎象曰坎不盈中未大也五以剛中居上坎之中二撰為動已通而能上行五撰為止仍止而未下行坎不盈之象祗適既盡坎本為通不為止止之撰體隱通之原體顯能使上下兩坎之流隨適皆通為平五之處險之過補矣又寧有咎上坎已出下坎之上然而下坎終在五能祗而平未能統而一象明中未大者此上六係用徽纆寘于叢棘三歲不得凶象曰上六失道凶三歲也纆音墨本作纆三股曰徽兩股曰纆皆拘攣罪人索叢棘多刺坎為叢棘既係又寘亦重險之義初以小入之于二下二不為求上以小乗之于五上五不能平以近相係因係為用若拘攣之勿使得逸欲上懲係而思觧係用徽纆之象不惟有係而又有寘欲上履刺而思平寘于叢棘之象係之寘之至于三歲終不改圖而得出險之道大方求小之得小終不求大之得恐徽纆无觧之日叢棘无釋之年凶坎四小皆為險于二大之人然中爻有雜撰之體三雖无功亦不言失惟初入險最深上處險最極初不思以承二上終至于乘五象于初上皆曰失道以此離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也離吕支切畜許六切牛語求切音尤麗郎計切亦平聲與離同音古作丽曲禮離坐離立毋往參焉兩相麗之謂離三相成之謂參坎陷主中兩剛而言離麗主中兩柔而言一柔附麗于上下二剛之間其卦錯然成文而華麗故曰離麗也以上體言有日月麗天成明之象以下體言有百穀草木麗土化光之象以全體言上下以明相重五二以正相麗舉天下无一不成正麗之化有重明以麗乎正乃化天下而成文明之象離利貞亨坎剛中莫尚于五故以五為尚離柔之中正莫過于二故利二之貞惟貞故亨畜牝牛吉一剛一柔以兩相麗原无不順自三四兩剛合于其中昃突于五二之交如火燥烈梗而无順上下之明何以重上下之正何以麗二中正合三四以上巽无不畜之而成順合之為牝牛則折獲之功无煩于出征而重明之化但惟以順致坎尚行振柔靡之水性以出險離畜牝化剛燥之火性以成明所謂化成天下正此是以利貞既為離之亨而畜牝牛又為離之吉象曰明兩作離大人以繼明照于四方繼續或作㡭反㡭為􅓟􅓟古絶字象稱大人惟離朱子曰若説兩明却是兩箇日頭項平甫曰重明如言聖益聖繼明如言聖繼聖坎趨而下曰至重坎象洊至離起而上曰作重明象兩作兩作之離以柔麗于上下剛明君子之中不惟一之而又兩之其人安得不稱大其明安有不繼之時而舉四方皆在其明照之中六十四卦惟離稱大人皇犧結繩之治首取諸離文王南面而聽嚮明而治獨取諸離以是哉初九履錯然敬之无咎象曰履錯之敬以辟咎也錯倉各切辟古避通離者柔麗剛匪剛麗柔初剛在下二以為麗三昃四突于中五亦躡二跡以相麗交錯而來履錯然之象剛承柔下為敬之原初不失為无咎初如不敬二得而咎之五亦得而咎之初何以辟象故明履錯之敬以辟咎六二黄離元吉象曰黄離元吉得中道也解夬九二亦皆曰得中道坤以五為中五亦地之位而下之體故坤之五為黄裳為元吉離以二為中二虚其柔中以順麗乎上下之陽剛陽剛之明皆其明卽成大明中天之麗故離之二為黄離為元吉二得一卦正麗之中道重而為五之明繼而成五之明皆重此繼此象故明得中道九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也坎以穴為缶離以腹為缶耋徒結切老也至也年之至也坎以五剛為中險自上出中兩柔皆當合二以尚五離以二柔為中明自下升中兩剛皆當合五以麗二三于二為近爻以近相得以順相麗此正日中之離也近不相得合四上撰便雜兑而為昃日矣曰昃之離之象以兑口向終極之爻憂喜失度惟情是狥順其情則喜喜非尋常之喜鼓缶而歌象不可勝之喜違其情則憂憂非尋常之憂大耋之嗟象不可解之憂不如此則如彼或歌以喜消昃或嗟以憂消昃正麗之道不講而茍延之計是圖晝夜不通生死俱罔凶象言何可久者此九四突如其來如焚如死如棄如象曰突如其來如无所容也突徒忽切恒三亦曰无所容三四皆以剛居離中三以與二不相得為不順四以與五不相得為不順三方以兑西昃四忽從巽東出突如之象進不可突惟有退來剛燥弗戢焦火自焚焚如之象兑見火以澤息巽見燼以風颺死如棄如之象突五來二皆不為容象故明无所容六五出涕沱若戚嗟若言象曰六五之吉離王公也二明五重以正相麗以雜撰兑説為不知出涕為不知戚嗟以得其正麗之本體反乎兑説之撰體為出涕沱若為戚嗟若為吉王以君天下公以君一國皆有南面之聽繼世之照五之沱涕戚嗟如是不成繼體之王之離即成繼體之公之離象言離而曰王公離二五皆王公嚮明出治之位與既濟三四同義上九王用出征有嘉折首獲匪其醜无咎象曰王用出征以正邦也離四剛皆二柔所麗之人中爻雜撰巽兑失其所麗惟初上是麗初下為二所麗而成履敬之于下无咎上上為五所麗而成用出征于上有嘉征者上伐下功之有嘉以折在四以獲在三四突稱首三昃亦曰匪類折乎四并獲乎三入以告成于五出功功烈可嘉如是夫孰尚之是為離上之无咎征言正三四以撰體反其麗體上承王命以正之三四正舉一邦无所不正而正匪自上為之皆五之重明麗正出之也象故明曰王用出征以正邦坎言水洊至地用莫大于水離言明兩作天用莫大于曰坎以中實象誠離以中虚象明坎言險險水性離言麗麗火性坎重險如兄弟之國離重明如父子之國坎平國在上二當尚其平以為平離明父在下五當繼其明以為明坎中爻間于兩大重險之中以原體為自陷以撰體為善事人持衡之國而合其交離中爻間于兩大重明之中以原體為善麗以撰體為不善處人相繼之世而失其麗坎五不盈祇平終岐為兩國象故曰中未大離五出涕戚嗟自通為一家象故曰離王公坎初入窞坎性本下初以柔故原始遂為下流離初敬之離性本上初以剛故劈初便知上麗坎上係用以近言係終險之人近于五故五因係以成用離上出征以逺言征失麗之人逺在三四故五用上以為征坎剛陷于兩柔之中已成險體重之兩柔更不相孚益險離柔麗于兩剛之中已成明體重之兩明復有相麗益明君子與君子竝立但兩不相孚即睽而成山川之險但兩相麗即合而成日月之明其在小人无以陷君子之剛且麗之于君子之中其在君子有以容小人之麗且亨之于小人之中坎離之能事備矣像象管見卷二下
