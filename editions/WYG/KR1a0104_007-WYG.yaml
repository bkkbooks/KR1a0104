body:
  text: 像象管見卷七明錢一本撰說卦傳昔者聖人之作易也幽贊于神明而生蓍參天兩地而倚數觀變于隂陽而立卦發揮于剛柔而生爻和順于道徳而理于義窮理盡性以至于命贊發明之也蓍數即河圖之數故從此推出蓍法河圖中五為生數之本參天兩地以中五為言倚數一三五天數三而參之倚天而起二四地數二而兩之倚地而起張敬夫曰義在我也命在天也天下之人皆知義命則聖人之易不作惟其不知義命此聖人不得已而生蓍倚數立卦生爻凡以為天下不知義命者作也蓍神策即筮法乾鑿度曰垂皇策者犧史軒轅出御乃獲神策昔者聖人作易有蓍有數有卦有爻其足以盡易乎其不足以盡易乎夫易聖人義命之奥也聖人通乎神明之徳而成位天地之中隂陽合徳而剛柔有體是故易之蓍數卦爻所由作焉筮蓍以求易易非徒蓍也有所以生蓍者聖人蓋有神明之幽贊者在焉極數以求易易非徒數也有所以倚數者聖人蓋有天地之參兩者在焉畫卦以求易易非徒卦也有所以立卦者聖人蓋有隂陽之變之洞觀者在焉效爻以求易易非徒爻也有所以生爻者聖人蓋有剛柔之發揮者在焉无聖人之幽贊而以言蓍非蓍也无聖人之參兩而以言數非數也无聖人之觀變發揮而以言卦言爻非卦非爻也蓍生于神明數倚于天地卦立于隂陽爻生于剛柔得之幽贊參兩之深本之變化發揮之妙蓍數卦爻之間率由之莫非道固有之莫非徳孰有不極其和且順也既和且順纎悉細微无之非義孰有不得其理也自天而命之自人而成之性命之理何者猶有所未窮也窮之斯无不盡聖人所以盡其性也盡之斯无不至聖人所以至于命也徒以蓍數卦爻而已者蓍數卦爻之易非聖人理義至命之易蓍數卦爻之占非聖人以易教人教人占易之學也昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章性命之理在天為隂陽在地為剛柔在人為仁義和順于道徳而理于義窮理盡性以至于命便是順性命之理今人多是逆是以性日鑿而不可以語于盡命日舛而不可以語于至聖人有憂之故作易以教人之有所順而无所逆天道有隂陽吾以陽生萬物以隂成萬物順乎天而不逆天道自我而立也性命之理之順也地道有剛柔吾以其剛為剛克以其柔為柔克順乎地而不逆地道自我而立也性命之理之順也人道有仁義吾之以仁育也天之陽也地之剛也吾之以義正也天之隂也地之柔也順乎人而不逆人道自我而立也性命之理之順也天地人之道謂之三才之道三畫之卦三才之象六畫之卦兩其三才之象兼三才而兩之上要立得一箇天道中要立得一箇人道下要立得一箇地道立得天道地道固是立得人道而人道仍要從中有立立得人道固是立得天道地道而天道仍要從上有立地道仍要從下有立易之六畫而成卦也合之有以盡三才之道之大者也此吾性命之理之統體无不順也卦之六畫一畫一位一畫而分天之陽用地之剛成人之仁一畫而分天之隂用地之柔成人之義易之六位而成章也析之有以極三才之道之精者也此吾性命之理之精微无不順也夫聖人言性命其曰窮理盡性以至于命明其合其曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義明其分分隂分陽迭用剛柔陽體而隂用剛體而柔用仁體而義用體用不可判然分為兩截此性命之理所以為合一也分陽用剛以成仁分隂用柔以成義體用不可混為一途此又性命之理所以為各正也今人不知性命之學何由而得順性命之理天地定位山澤通氣雷風相薄薄補各切音與博同一曰氣往迫之為薄虧毁曰食水火不相射八卦相錯數往者順知來者逆是故易逆數也數所矩切音與暑同楊氏曰畫自下而上圖自右而左皆謂之逆如邵子朱子之說一半順一半逆全氏曰以蓍數明之初揲分隂陽于左右得三十二次揲得十六三揲得八四揲得四五揲得二六爻備則二分而歸于一自六十四而約歸于一亦逆數也雷以動之風以散之雨以潤之日以晅之艮以止之兌以說之乾以君之坤以藏之朱子曰射音石犯也是不相害音亦與斁同是相為用而不相厭二義皆通音石是顧叔時曰天地定位易首乾坤也山澤通氣雷風相薄中咸恒也水火不相射上經終坎離下經終既未濟也易有太極一生二二生四四生八八相錯而六十四以八卦相錯言之八是體六十四是用就八卦明之天地定位是體六子是用六子皆乾坤之變乾坤有六子就是八卦相錯了故自乾坤相錯于上爻而有艮兌山脈流于澤為泉為水澤氣升于山為雲為雨曰山澤通氣自乾坤相錯于下爻而有震巽雷奮地與風俱奮風行天與雷俱行曰雷風相薄自乾坤相錯于中爻而有坎離離火坎水上炎下潤不相侵害曰水火不相射天地定位為體山澤通氣雷風相薄水火不相射為用定位者二无往來相錯者八有往來往為六十四來為八往為八來為二二來為一往順數來逆數易逆數也乾逆坤為震動為坎陷為艮止坤逆乾為巽入為離麗為兌說雷動風散雨潤日晅艮止兌說莫非乾之君而坤之藏皆逆數也以數言謂之逆以理言謂之窮今人上水亦謂之逆流矧易之為書全是教人窮性命之理由形而下之器達形而上之道以開物成務于方來謂為逆數不亦宜乎帝出乎震齊乎巽相見乎離致役乎坤説言乎兌戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聴天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤姚仁夫曰致役乎坤言地能役已以養萬物而不自以為也如母之養子亦是為子致役致畢其力之謂能兌正秋也萬物之所說也故曰說言乎兌戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮程子曰以主宰謂之帝邵子曰太極不變夫變者隂陽也帝言主宰則不變而出者謂隂陽從此變動而出也太極初分陽始于震隂始于巽出則必齊齊畢達之謂潔新鮮之義天地定位章皇羲所畫八卦俱相對待可以南北豎列為序亦可以東西横列為序原无方位之分帝出乎震章遂有方位之分卦之徳方以知地有四正四隅纔合到地上即乾坤亦與六子並列各主宰乎一方自然之序便如此聖人非以己意為之安排也或因天地定位章而規八卦為圓曰此為先天圖此為伏羲易因帝出乎震章而矩八卦為方曰此為後天圖此為文王易殊未然須知先後无二天卦位无二方羲文相授守一道至謂文王更定伏羲卦圖尤謬帝出乎震帝由震而後出匪震不出震便是東方動出萬物之一箇大主宰萬物出乎震物物皆有一震以為之主宰這八卦乃是方位上八箇大主宰天時之所以為天時其主宰之有定分亦如此神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也程可久曰始言六子之材各有所長終言六子之情各有所合孔仲達曰水火不相射而又曰相逮既不相入又不相及則无成物之功雷風相薄而又曰不相悖相薄而相悖亦无成物之功惟不相射又相逮相薄又不相悖山澤雖相懸而能通氣此所以為神戴師愈曰坎乾水也氣也一陽中陷于二隂為坎坎以氣潛行萬物之中為受命之根本故曰莫潤乎水兌坤水也形也一隂上徹于二陽為兌兌以形普施萬物之上為發生之利澤故曰莫說乎澤漢上朱氏曰妙萬物而為言者物物自妙也帝宰萬物物物有宰神妙萬物物物自妙雷以動萬物風以撓萬物火以燥萬物澤以說萬物水以潤萬物艮以終始乎萬物即六子言神言妙而不言乾坤六子皆乾坤妙用之神也乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌說也乾健也震動坎陷艮止皆健之為坤順也巽入離麗兌說皆順之為是故健動而順入健陷而順麗健止而順說主之者之謂帝妙之者之謂神乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊馬性健牛性順龍性動雞性入豕性陷雉性麗狗性止羊性說人而失其健順之性則馬牛之不如失其所止而不得其說則犬羊之不如聖人取象之意深切矣哉乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口乾首㑹諸陽坤腹藏諸隂震陽動于下為足巽隂垂于下為股坎耳之輪内陷離目之睛外附艮陽止于上為手兌隂拆于上為口聖人固以人身取象亦要知得人之一身有首有腹有足有股有耳有目有手有口此等形軀㑹有斃壞時何足為貴須要體認得乾為我之首我如不能自强不息而頫屈于物欲之下是无首者也坤為我之腹我如不能厚徳載物而隘陋以居之是無腹者也震為我之足我如不能恐懼修省出門一步遂不能无失脚是无足者也巽為我之股我如不能申命行事而隨足妄動是无股者也坎為我之耳我如不能常徳行習教事而天聰以為聰是无耳者也離為我之目我如不能繼明照四方而天明以為明是无目者也艮為我之手我如不能思不出其位而執守之不堅是无手者也兌為我之口我如不能以朋友講習而朶頥之是觀是无口者也易有聖人之道四而云以制器者尚其象人而至于首不首腹不腹足不足股不股耳不耳目不目手不手口不口象乎不象乎乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女中直衆切柴氏中行曰人但知男女之為人而未知物物有男女之象天地之性人為貴故以人言之耳全氏曰乾坤三索而生六子易于爻之象言龍于爻之交言索索者兩物相比竒偶相求龍之類蜿蜒而舒交之則索故爻取其交取其索也乾父坤母人人皆有一箇大乾坤人人稱父而可以父天下人人稱母而可以母天下孟子曰人病不求求者索也一不索遂无震巽再不索遂无坎離三不索遂无艮兌六子亡而父母或幾乎毁矣是故乾道成男成其為長男之震中男之坎少男之艮者也坤道成女成其為長女之巽中女之離少女之兌者也豈但成其男女之形已哉乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果龔氏曰八卦類萬物之情其情不可勝言觸類而長之乾為君則坤為臣乾為圜則坤為方巽為曲直則離為銳坤為吝嗇為均則乾為施為平乾為寒則巽為暑坤為凉艮為温俱不言可推乾純陽為天運轉无端為圜尊而居上為君萬物資之以始為父象義自明玉徳粹不雜金純剛能變寒位西北冰寒之凝玉潤金精寒冽冰潔半㸃瑕疵半毫炎熱沾染不上其剛健之至乎純陽而定位于南為大赤純陽而健為馬健最調徳莫尚者為良健最久智莫尚者為老健最堅峻骨莫尚者為瘠健最威猛力莫尚者為駁圜而在上生生不已為木果坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其于地也為黑地南北曰經東西曰緯中平廣而旁有邊幅為布乾生之坤化之化生物而為熟物為釡翕而不施為吝嗇闢而不偏為均順而多孕為子母牛方而厚載為大輿竒為質故偶為文竒為寡故偶為衆乾圜而倚坤方而直故為柄地之土色有五乾南故正色為赤坤北故正色為黑震為雷為龍為𤣥黄為旉旉華之通名華蒂下連而上分為旉俞氏曰陽止于終則結為果實陽動于初則發為華蘂為大塗為長子為决躁為蒼筤竹為萑葦集註萑實荻葦虚蘆蒼深青色筤謂色之美竹之筠也其于馬也為善鳴為馵足為作足為的顙其于稼也為反生其究為健為蕃鮮鄧氏曰震巽獨以究言剛柔之始雷震本象得乾初爻為龍震東方其宿有角有尾謂之蒼龍亦龍象乾坤始交兼有天地之色為𤣥黄一云乾色赤坤色黑赤黑相雜為𤣥黄陽氣始施為旉陽闢乎隂二偶開通前无壅塞為大塗尊于坎艮為長子陽静而隂躁一陽上進而决二隂為决躁𤣥黄雜而成蒼下苞上茂本實榦虚為蒼筤竹為萑葦或曰蒼筤㓜竹其于馬也為善鳴陽之動為馵足馵繫也馬性好動前足躁而後足繫為馵又後左足白為馵為作足雙足並舉皆下畫之陽之象為的顙額有白顛如射者之的上畫之虚之象其于稼也為反生稼諸穀之類其始必根于土繼為穀實必又反而生于土為反生其究為健而成乾為蕃育鮮明而極其盛長之不可量巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其于人也為寡髪為廣顙為多白眼為近利市三倍其究為躁卦臭二音許救切音與齅同尺救切氣之總名吴㓜清曰凡物有聲色臭味聲臭屬陽色味屬隂巽二陽外達故為臭反以三隅則震一陽内主為聲兌者巽之反體為味艮者震之反體為色陸徳明寡本作宣黒白雜為宣髪巽入物之善入者莫如木氣之善入者莫如風故為木為風木曰曲直紏木之曲而取直為繩直引繩之直以制木為工震陽于色為青巽隂于色為白風行為長木升為髙一隂盤旋于二陽之下隂性多疑為進退為不果一隂内鬱二陽外逹為臭隂少而血不升為寡髪陽多而氣上盛為廣顙離以柔居中為目之正反離中爻于下目睛不正為多白眼陽為主為近義隂為主為近利謀利者必于市故言利市市三倍猶詩言賈三倍近利之至也三畫皆變為震故其究為躁卦或曰震得陽氣之先巽得隂氣之先故其卦皆有究極之象坎為水為溝瀆為隠伏為矯輮為弓輪其于人也為加憂為心病為耳痛為血卦為赤其于馬也為美脊為亟心為下首為薄蹄為曳其于輿也為多眚為通為月為盜其于木也為堅多心水内明坎陽在内為水行水曰溝停水曰瀆陽為水二隂夾之為溝瀆陽匿隂中為隠伏陷而能制為矯輮矯者矯曲使直輮者輮直使曲激射運行為弓為輪陷而成險為加憂心耳皆以虚為體坎中實為病為痛離火為氣坎水為血得乾中畫之陽為赤設為血卦秉為赤心人之貫天日而質神明有此而已中剛為美脊為亟心上柔為下首不昻下柔為薄蹄不厚陷則失健又為曳皆于馬之象坤輿平易坎輿行險又坎水乃舟楫之利非車輿之利故為多眚通水之性月水之精盜因隠伏剛在中故于木為堅多心離為火為日為電為中女為甲胄為戈兵其于人也為大腹為乾乾古寒切卦為鼈為蟹為蠃為蚌為龜其于木也為科上槁離麗火麗于木日麗于天電麗乎雲故為火為日為電甲胄外堅戈兵上銳皆外剛上炎之象坤為腹離中虚為大腹坎水濕離火燥為乾卦鼈蟹蠃蚌龜皆外剛内柔之象科空中虚外乾科上槁之象艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為䑕為黔喙之屬其于木也為堅多節麻衣易以艮為鼻朱子曰鼻者面之山晉管輅已如此說黔箝同艮止而不動為山震陽開通二隂為大塗艮陽小而上窮如髙山之上成蹊非平地之大塗為徑路小石上實下虚為門闕純乾為木果艮一剛在上為木實之果二柔在下為草實之蓏震旉草木之始艮果蓏草木之終閽止人之入寺止人之出為閽寺因門闕為指因手以陽止于外者狗以隂止于内者䑕剛止于上其于獸畜已无行健之功但有嚙噬之象為黔喙之屬巽曲直榦陽根隂為木全材坎陽内為堅多心離中隂而虚為科上槁艮陽上為堅多節兌為澤為少女為巫為口舌為毁折為附决其于地也為剛鹵為妾為羊易詮離乾卦可見坎之為濕坎血卦可見離之為氣巽為臭可見震之為聲乾為君可見坤之為臣為圜可見坤之為方坤吝嗇可見乾之為施為輿可見乾之為蓋兌毁折可見艮為堅韌為附决可見艮為附剥學者能推類以及其餘庶幾哉盡天下之賾矣坎上下俱虚為陽水兌上虚下實為隂水故有以壅于地者為澤亦有以降于天零于夜者為澤兌說體通乎幽以言說神為巫交乎顯以言說人為口舌金氣始殺條枯實落物成則上柔者必折為毁折隂依于陽為附二陽下而一隂上則外附者必决為附决其于地也為剛鹵鹵鹹土東方曰斥西方曰鹵或曰剛鹵西方産金産鹽之地陽在下為剛剛者出金隂在上為鹵鹵者出鹽或曰地之鹵者无不潤水潤藏于中澤潤見于外然不能生物以潤氣在外也少女從姊為妾内狠外說為羊像象管見卷七
